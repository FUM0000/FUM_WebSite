                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">

                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in overview" :key="item.name">

                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <p class="text-subtitle-2 font-weight-bold">出題傾向</p>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">分野</th>

                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in exam_trend" :key="item.name">

                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>

                          </v-card>

                    <v-stepper v-model="Count_Step_2">

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>

  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>

        filteredA: [],

          { "name": "出題形式", "description": "オンライン多肢選択式。実施回ごとに問題数・試験時間・実施ルールが更新されるため、最新要項の確認が前提。" },
          { "name": "合格基準", "description": "総合得点で基準を超えることが必要。単語暗記だけでなく、手法選定・リスク説明・運用判断まで問われる。" },

              { "name": "次元削減(PCA)と特徴量設計" },

            ]
          },
          {
            "name": "3. 前処理とデータ品質",
            "children": [
              { "name": "欠損値・外れ値処理" },
              { "name": "標準化・正規化・カテゴリ変換" },
              { "name": "学習/検証/テスト分割" },
              { "name": "データリーク防止" }
            ]
          },
          {
            "name": "4. モデル評価",
            "children": [
              { "name": "混同行列・適合率・再現率・F1" },
              { "name": "ROC-AUC・PR-AUC" },
              { "name": "回帰指標(MAE/MSE/RMSE)" },

            ]
          },
          {
            "name": "5. 運用前提の基礎",
            "children": [
              { "name": "バイアスと分散のトレードオフ" },
              { "name": "ハイパーパラメータ探索" },
              { "name": "再現性確保(乱数シード・実験管理)" },
              { "name": "KPIと評価指標の接続" }
            ]
          }
        ],
        NotesB: [
          {
            "name": "1. ニューラルネットワーク基礎",
            "children": [
              { "name": "パーセプトロンと多層NN" },
              { "name": "順伝播・誤差逆伝播" },
              { "name": "活性化関数(ReLU/Sigmoid/Tanh)" },
              { "name": "最適化手法(SGD/Adam)" }
            ]
          },
          {
            "name": "2. 主要アーキテクチャ",
            "children": [
              { "name": "CNN(画像認識)" },
              { "name": "RNN/LSTM/GRU(系列データ)" },
              { "name": "AttentionとTransformer" },
              { "name": "事前学習とファインチューニング" }
            ]
          },
          {
            "name": "3. 学習安定化と性能向上",
            "children": [
              { "name": "正則化(Dropout/L2)" },
              { "name": "Batch Normalization" },
              { "name": "データ拡張と転移学習" },
              { "name": "早期終了と学習率調整" }
            ]
          },
          {
            "name": "4. 生成AIとLLM",
            "children": [
              { "name": "LLMの基礎(トークン・文脈長)" },
              { "name": "プロンプト設計の原則" },
              { "name": "RAGの構成と検索品質" },
              { "name": "ハルシネーション低減策" }
            ]
          },
          {
            "name": "5. 評価と安全性",
            "children": [
              { "name": "オフライン/オンライン評価" },
              { "name": "有害出力・プロンプト注入対策" },
              { "name": "モデル監視(ドリフト検知)" },
              { "name": "コスト・レイテンシ最適化" }
            ]
          }
        ],
        NotesC: [
          {
            "name": "1. 法律の基礎",
            "children": [
              { "name": "個人情報保護法の要点" },
              { "name": "著作権と学習データ利用" },
              { "name": "不正競争防止・営業秘密" },
              { "name": "契約(責任分界・保証・免責)" }
            ]
          },
          {
            "name": "2. AI倫理",
            "children": [
              { "name": "公平性と差別の回避" },
              { "name": "透明性・説明可能性" },
              { "name": "アカウンタビリティ" },
              { "name": "人間中心設計と人間の関与" }
            ]
          },
          {
            "name": "3. ガバナンス",
            "children": [
              { "name": "リスクアセスメント" },
              { "name": "利用方針・社内規程整備" },
              { "name": "監査ログ・追跡性確保" },
              { "name": "委託先管理とサプライチェーン" }
            ]
          },
          {
            "name": "4. セキュリティと信頼性",
            "children": [
              { "name": "データ保護(匿名化・アクセス制御)" },
              { "name": "モデル盗用・逆解析リスク" },
              { "name": "脆弱性とインシデント対応" },
              { "name": "継続監視と改善サイクル" }
            ]
          },
          {
            "name": "5. 記述的問題の整理",
            "children": [
              { "name": "技術論点と社会論点を分ける" },
              { "name": "利点・リスク・対策をセットで説明" },
              { "name": "断定しすぎない表現" },
              { "name": "試験語彙で簡潔に記述" }
            ]
          }
        ],
        NotesD: [
          {
            "name": "1. 導入プロセス",
            "children": [
              { "name": "課題定義と目的設定" },
              { "name": "KPI/KGI設計" },
              { "name": "PoC設計と成功条件" },
              { "name": "本番移行と運用体制" }
            ]
          },
          {
            "name": "2. 業界別ユースケース",
            "children": [
              { "name": "製造(外観検査・予兆保全)" },
              { "name": "金融(不正検知・与信)" },
              { "name": "小売(需要予測・レコメンド)" },
              { "name": "医療/公共/教育の活用例" }
            ]
          },
          {
            "name": "3. MLOps基礎",
            "children": [
              { "name": "データ/モデルのバージョン管理" },
              { "name": "継続学習と再学習トリガ" },
              { "name": "A/Bテストと段階リリース" },
              { "name": "障害時ロールバック" }
            ]
          },
          {
            "name": "4. 試験対策",
            "children": [
              { "name": "シラバス項目の用語即答" },
              { "name": "頻出テーマの横断整理" },
              { "name": "誤答を数理/DL/法務で分類" },
              { "name": "時間配分と見直し手順を固定" }
            ]
          },
          {
            "name": "5. 合格直結チェック",
            "children": [
              { "name": "公式用語で定義を説明できる" },
              { "name": "モデル選定理由を説明できる" },
              { "name": "法務・倫理リスクを指摘できる" },
              { "name": "ケース問題で最適解を選べる" }
            ]
          }
        ]
      },
      created() {
        this.filteredA = JSON.parse(JSON.stringify(this.NotesA));
        this.filteredB = JSON.parse(JSON.stringify(this.NotesB));
        this.filteredC = JSON.parse(JSON.stringify(this.NotesC));
        this.filteredD = JSON.parse(JSON.stringify(this.NotesD));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) collect(node.children);
            });
          };
          collect(items);
          return ids;
        },
        updateOpenA(newOpen) { this.openA = newOpen; },
        updateOpenB(newOpen) { this.openB = newOpen; },
        updateOpenC(newOpen) { this.openC = newOpen; },
        updateOpenD(newOpen) { this.openD = newOpen; },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredA = JSON.parse(JSON.stringify(this.NotesA));
            this.filteredB = JSON.parse(JSON.stringify(this.NotesB));
            this.filteredC = JSON.parse(JSON.stringify(this.NotesC));
            this.filteredD = JSON.parse(JSON.stringify(this.NotesD));
            this.openA = []; this.openB = []; this.openC = []; this.openD = [];
            return;
          }
          const filterTree = (items) => items.reduce((acc, item) => {
            const itemCopy = { ...item };
            const matches = item.name.toLowerCase().includes(query);
            if (item.children) {
              itemCopy.children = filterTree(item.children);
              if (itemCopy.children.length > 0 || matches) {
                itemCopy.matches = matches;
                acc.push(itemCopy);
              }
            } else if (matches) {
              itemCopy.matches = true;
              acc.push(itemCopy);
            }
            return acc;
          }, []);

          this.filteredA = filterTree(JSON.parse(JSON.stringify(this.NotesA)));
          this.filteredB = filterTree(JSON.parse(JSON.stringify(this.NotesB)));
          this.filteredC = filterTree(JSON.parse(JSON.stringify(this.NotesC)));
          this.filteredD = filterTree(JSON.parse(JSON.stringify(this.NotesD)));
          this.openA = this.collectAllNodeIds(this.filteredA);
          this.openB = this.collectAllNodeIds(this.filteredB);
          this.openC = this.collectAllNodeIds(this.filteredC);
          this.openD = this.collectAllNodeIds(this.filteredD);
        }
      }
    });
  </script>
