<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="description" content="A very simple Kampo introduction page with a quick list of common formulas and their uses.">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

  <title>Kampo</title>

  <style>
    [v-cloak] {
      display: none;
    }

    #Main {
      background:
        radial-gradient(circle at top left, rgba(198, 167, 122, 0.16), transparent 30%),
        linear-gradient(180deg, #f8f5ef 0%, #f2ede3 100%);
    }

    .kampo-shell {
      max-width: 1120px;
      margin: 0 auto;
    }

    .kampo-panel {
      background: rgba(255, 252, 247, 0.9);
      border: 1px solid rgba(111, 83, 54, 0.12);
      border-radius: 28px;
      padding: clamp(24px, 4vw, 42px);
      box-shadow: 0 22px 60px rgba(84, 66, 46, 0.08);
      backdrop-filter: blur(10px);
    }

    .kampo-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(240px, 0.9fr);
      gap: 24px;
      align-items: stretch;
    }

    .kampo-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .kampo-title {
      margin: 0 0 12px;
      color: #3d2f20;
      font-size: clamp(2rem, 4.4vw, 3.3rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .kampo-lead {
      margin: 0;
      max-width: 62ch;
      color: #665645;
      font-size: 1.02rem;
      line-height: 1.95;
    }

    .section-header {
      margin-top: 34px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      color: #3d2f20;
      font-size: clamp(1.35rem, 3vw, 1.95rem);
    }

    .filter-wrap {
      min-width: min(100%, 260px);
    }

    .filter-label {
      display: block;
      margin-bottom: 8px;
      color: #6b5a49;
      font-size: 0.86rem;
      letter-spacing: 0.05em;
    }

    .filter-select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(111, 83, 54, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.96);
      color: #3d2f20;
      font-size: 0.95rem;
      outline: none;
      appearance: none;
      box-shadow: 0 10px 24px rgba(84, 66, 46, 0.06);
    }

    .table-shell {
      margin-top: 16px;
      border: 1px solid rgba(111, 83, 54, 0.12);
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 44px rgba(84, 66, 46, 0.07);
    }

    .table-scroll {
      overflow-x: auto;
      max-width: 100%;
    }

    .kampo-table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
    }

    .kampo-table thead th {
      padding: 18px 20px;
      text-align: left;
      background: linear-gradient(180deg, #f4ecdf 0%, #efe4d3 100%);
      color: #4c3928;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
      border-bottom: 1px solid rgba(111, 83, 54, 0.12);
    }

    .kampo-table tbody tr {
      transition: background-color 0.18s ease;
    }

    .kampo-table tbody tr:nth-child(even) {
      background: rgba(248, 244, 236, 0.62);
    }

    .kampo-table tbody tr:hover {
      background: rgba(239, 226, 208, 0.5);
    }

    .kampo-table td {
      padding: 18px 20px;
      vertical-align: top;
      border-bottom: 1px solid rgba(111, 83, 54, 0.08);
      color: #5e4f40;
      line-height: 1.8;
    }

    .kampo-table tbody tr:last-child td {
      border-bottom: none;
    }

    .formula-name {
      min-width: 140px;
      color: #3d2f20;
      font-weight: 700;
      font-size: 1rem;
    }

    .category-cell {
      min-width: 112px;
      color: #8a5a30;
      font-weight: 700;
      white-space: nowrap;
    }

    .table-note {
      padding: 14px 18px 18px;
      color: #7a6a59;
      font-size: 0.9rem;
      line-height: 1.7;
      border-top: 1px solid rgba(111, 83, 54, 0.08);
      background: rgba(250, 247, 241, 0.92);
    }

    @media (max-width: 900px) {
      .kampo-hero {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .kampo-panel {
        border-radius: 22px;
        padding: 20px;
      }

      .filter-wrap {
        min-width: 100%;
      }

      .kampo-table {
        min-width: 0;
        table-layout: fixed;
      }

      .kampo-table thead th,
      .kampo-table td {
        padding: 14px 16px;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .formula-name,
      .category-cell {
        min-width: 0;
      }
    }
  </style>
</head>

<body>

  <v-app id="App" v-cloak>
    <template>

      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Kampo</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid class="pa-5">
            <div class="kampo-shell">
              <section class="kampo-panel">
                <div class="kampo-hero">
                  <div class="kampo-copy">
                    <h1 class="kampo-title">Kampo</h1>
                    <p class="kampo-lead">
                      Kampo uses carefully balanced herbal formulas chosen with the whole body in mind, including patterns such as coldness, low energy, and digestive weakness.
                    </p>
                  </div>
                </div>

                <div class="section-header">
                  <h2 class="section-title">Kampo List</h2>
                  <div class="filter-wrap">
                    <label class="filter-label" for="CategoryFilter">Filter by category</label>
                    <select id="CategoryFilter" class="filter-select" v-model="SelectedCategory">
                      <option value="All">All</option>
                      <option v-for="category in categories" :key="category" :value="category">{{ category }}</option>
                    </select>
                  </div>
                </div>

                <div class="table-shell">
                  <div class="table-scroll">
                    <table class="kampo-table">
                      <thead>
                        <tr>
                          <th>Category</th>
                          <th>Formula</th>
                          <th>Overview</th>
                          <th>Typical Uses</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr v-for="formula in FilteredFormulas" :key="formula.name">
                          <td class="category-cell">{{ formula.category }}</td>
                          <td class="formula-name">{{ formula.name }}</td>
                          <td>{{ formula.summary }}</td>
                          <td>{{ formula.effect }}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div class="table-note">
                    This list is only a simple guide. The same symptom may lead to a different formula depending on the person's overall condition and constitution.
                  </div>
                </div>
              </section>
            </div>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer-simple></main-footer-simple>

    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      computed: {
        categories() {
          return [...new Set(this.formulas.map(formula => formula.category))];
        },
        FilteredFormulas() {
          if (this.SelectedCategory === 'All') {
            return this.formulas;
          }
          return this.formulas.filter(formula => formula.category === this.SelectedCategory);
        }
      },
      data: {
        Ready_Page: true,
        SelectedCategory: 'All',
        formulas: [
          {
            name: 'Kakkonto',
            category: 'Cold',
            summary: 'A classic Kampo formula commonly used at the very start of a cold.',
            effect: 'Often used for chills, mild fever, stiffness in the neck and shoulders, and early cold symptoms.'
          },
          {
            name: 'Goreisan',
            category: 'Fluid Balance',
            summary: 'A well-known formula used to help regulate the body\'s fluid balance.',
            effect: 'Often used for swelling, headaches, dizziness, nausea, thirst, and discomfort linked to fluid imbalance or weather changes.'
          },
          {
            name: 'Shoseiryuto',
            category: 'Cold',
            summary: 'Often used when watery nasal discharge and coughing are the main issues.',
            effect: 'Commonly used for sneezing, runny nose, cough with thin mucus, and respiratory discomfort accompanied by chills.'
          },
          {
            name: 'Maoto',
            category: 'Cold',
            summary: 'A formula traditionally associated with the early stage of a stronger cold.',
            effect: 'Often used for chills, fever, body aches, and early cold symptoms when sweating is minimal.'
          },
          {
            name: 'Rikkunshito',
            category: 'Digestion',
            summary: 'A widely used formula for a weak stomach and reduced appetite.',
            effect: 'Often used for poor appetite, heaviness after eating, digestive fatigue, and feeling overly full after small meals.'
          },
          {
            name: 'Hangeshashinto',
            category: 'Digestion',
            summary: 'Often selected for digestive discomfort centered around the upper abdomen.',
            effect: 'Commonly used for stomach upset, nausea, diarrhea, bloating, and digestive issues accompanied by mouth irritation.'
          },
          {
            name: 'Daikenchuto',
            category: 'Digestion',
            summary: 'A Kampo formula often used when the abdomen feels cold or weak.',
            effect: 'Often used for abdominal coldness, stomach pain, sluggish bowel movement, and intestinal weakness after surgery.'
          },
          {
            name: 'Shakuyakukanzoto',
            category: 'Muscle Cramps',
            summary: 'A familiar formula often used for sudden cramping or muscle pain.',
            effect: 'Commonly used for leg cramps, muscle spasms, and sharp muscle pain that comes on suddenly.'
          },
          {
            name: 'Hochuekkito',
            category: 'Fatigue',
            summary: 'A classic formula associated with low stamina and recovery support.',
            effect: 'Often used for tiredness, low energy, poor appetite, and general weakness during recovery after illness.'
          },
          {
            name: 'Juzentaihoto',
            category: 'Fatigue',
            summary: 'A well-known restorative formula often mentioned when depletion is more pronounced.',
            effect: 'Often used for fatigue, reduced appetite, anemia-like weakness, and loss of strength after illness or surgery.'
          },
          {
            name: 'Ninjinyoeito',
            category: 'Fatigue',
            summary: 'Often discussed when both physical energy and motivation have dropped.',
            effect: 'Commonly used for exhaustion, low motivation, poor appetite, coldness, and slow recovery.'
          },
          {
            name: 'Keishibukuryogan',
            category: 'Circulation',
            summary: 'A representative formula often mentioned when circulation feels sluggish.',
            effect: 'Often used for cold hands and feet, shoulder stiffness, menstrual discomfort, and a heavy sluggish feeling.'
          },
          {
            name: 'Tokishakuyakusan',
            category: 'Circulation',
            summary: 'Often used for people who tend to experience both coldness and swelling.',
            effect: 'Commonly used for coldness, edema, anemia-like weakness, menstrual discomfort, and easy fatigue.'
          },
          {
            name: 'Kamishoyosan',
            category: 'Circulation',
            summary: 'A well-known formula for stress-related imbalance, especially with irritability or flushing.',
            effect: 'Often used for hot flashes, coldness, irritability, fatigue, and physical or emotional discomfort around the menstrual cycle.'
          },
          {
            name: 'Yokukansan',
            category: 'Nerves',
            summary: 'A formula sometimes used when the nervous system feels overstimulated or unsettled.',
            effect: 'Commonly used for irritability, poor sleep, nervous excitability, tension, and a keyed-up feeling.'
          },
          {
            name: 'Saikokaryukotsuboreito',
            category: 'Nerves',
            summary: 'Often mentioned when stress, tension, or inner agitation are strong.',
            effect: 'Often used for palpitations, anxiety, insomnia, irritability, and a persistently tense state.'
          },
          {
            name: 'Bakumondoto',
            category: 'Throat and Cough',
            summary: 'A familiar formula often associated with dry cough and throat dryness.',
            effect: 'Commonly used for dry cough, throat dryness, lingering cough, and cough with very little phlegm.'
          },
          {
            name: 'Seihaito',
            category: 'Throat and Cough',
            summary: 'A formula sometimes used for coughs that involve noticeable phlegm.',
            effect: 'Often used for phlegmy cough, a heavy feeling in the airways, and cough that tends to linger.'
          },
          {
            name: 'Choreito',
            category: 'Urination',
            summary: 'A formula sometimes used for urinary discomfort or trouble passing urine smoothly.',
            effect: 'Commonly used for painful urination, a lingering urge to urinate, frequent urination, and difficulty urinating.'
          },
          {
            name: 'Goshajinkigan',
            category: 'Coldness and Aging',
            summary: 'Often mentioned for weakness and coldness in the lower body.',
            effect: 'Often used for heaviness or weakness in the legs and lower back, numbness, urinary concerns, coldness, and age-related decline.'
          },
          {
            name: 'Hachimijiogan',
            category: 'Coldness and Aging',
            summary: 'A representative formula used to support declining vitality and persistent coldness.',
            effect: 'Commonly used for coldness in the legs and lower back, easy fatigue, urinary concerns, dry mouth, and age-related discomfort.'
          }
        ]
      }
    });
  </script>
</body>

</html>
