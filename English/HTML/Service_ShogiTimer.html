<html>

<head>
    <meta charset="UTF-8">
    <meta name="author" content="F U M">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-B89KY0993B');
    </script>

    <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

    <title>Shogi Timer</title>

    <style>
        html,
        body,
        #App {
            height: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
        }

        .timer-panel {
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .timer-panel.active {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
        }

        .timer-display {
            font-family: 'Space Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: 2px;
        }

        .timer-button {
            min-height: 64px;
            font-size: 1.1rem;
        }

        .preset-chip {
            cursor: pointer;
        }

        #Main .preset-row {
            margin: 0;
        }

        #Main .preset-row .v-col {
            padding: 0;
        }

        #Main .preset-row .v-chip-group {
            padding: 0;
            margin: 0;
        }

        .v-slide-group__content {
            justify-content: center;
        }

        .status-badge {
            font-size: 0.9rem;
            padding: 4px 16px;
            border-radius: 16px;
        }

        .move-count {
            font-family: 'Space Mono', monospace;
        }

        .col-auto {
            padding: 0;
        }

        @media (max-width: 800px) {
            #Main .v-container.pa-5 {
                padding: 0px !important;
            }

            #Main .v-row {
                margin: 0 !important;
            }

            #Main .v-row>.v-col {
                padding: 0 !important;
            }

            .timer-panel {
                padding: 0px;
            }

            .timer-panel .v-card-text {
                padding: 0px !important;
            }

            .timer-display {
                font-size: 3rem;
            }

            .status-badge {
                font-size: 1rem;
                padding-left: 5px;
                padding-right: 5px;
            }

            #Main .v-card>.v-row>.v-col {
                padding: 0 2.5px !important;
            }

            #Main .mb-4,
            #Main .mt-4,
            #Main .mb-2,
            #Main .mt-2 {
                margin: 0 !important;
            }

            .col-sm-6 {
                padding-top: 0px;
                padding-bottom: 0px;
            }

        }
    </style>
</head>

<body>

    <v-app id="App" v-cloak>
        <template>
            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Shogi Timer</main-system-bar>

            <v-main id="Main">
                <transition name="Fade_Page">
                    <v-container v-show="Ready_Page" fluid fill-height class="pa-5"
                        style="display: flex; align-content: center;">

                        <v-row justify="center">
                            <v-col cols="12" md="10" lg="8">
                                <v-card class="px-2 py-2" elevation="10" style="display: flex; flex-direction: column;">

                                    <v-row justify="center" class="preset-row" style="min-height: 48px;">
                                        <v-col cols="auto" v-show="!running && !paused">
                                            <v-chip-group v-model="selectedPreset" mandatory column>
                                                <v-chip v-for="preset in presets" :key="preset.value"
                                                    :color="selectedPreset === preset.value ? 'primary' : ''"
                                                    :outlined="selectedPreset !== preset.value" class="preset-chip"
                                                    filter @click="selectPreset(preset.value)">
                                                    {{ preset.label }}
                                                </v-chip>
                                            </v-chip-group>
                                        </v-col>
                                    </v-row>

                                    <v-row>
                                        <v-col cols="12" sm="6">
                                            <v-card
                                                :class="['timer-panel', { 'active': currentPlayer === 1 && running }]"
                                                :color="currentPlayer === 1 && running ? 'warning lighten-4' : 'grey lighten-4'"
                                                elevation="4" style="cursor: pointer;" @click="pressButton(1)">
                                                <v-card-text>
                                                    <div class="text-h5 font-weight-bold">
                                                        {{ player1Label }}
                                                    </div>
                                                    <div class="timer-display">
                                                        {{ formattedTime(player1Time) }}
                                                    </div>
                                                    <div v-if="running && currentPlayer === 1"
                                                        class="status-badge warning darken-2 white--text d-inline-block">
                                                        Your Turn
                                                    </div>
                                                    <div v-else
                                                        class="status-badge grey lighten-1 white--text d-inline-block"
                                                        :class="{ 'grey--text text--darken-3': !running }">
                                                        Waiting
                                                    </div>
                                                </v-card-text>
                                            </v-card>
                                        </v-col>

                                        <v-col cols="12" sm="6">
                                            <v-card
                                                :class="['timer-panel', { 'active': currentPlayer === 2 && running }]"
                                                :color="currentPlayer === 2 && running ? 'warning lighten-4' : 'grey lighten-4'"
                                                elevation="4" style="cursor: pointer;" @click="pressButton(2)">
                                                <v-card-text>
                                                    <div class="text-h5 font-weight-bold">
                                                        {{ player2Label }}
                                                    </div>
                                                    <div class="timer-display">
                                                        {{ formattedTime(player2Time) }}
                                                    </div>
                                                    <div v-if="running && currentPlayer === 2"
                                                        class="status-badge warning darken-2 white--text d-inline-block">
                                                        Your Turn
                                                    </div>
                                                    <div v-else
                                                        class="status-badge grey lighten-1 white--text d-inline-block"
                                                        :class="{ 'grey--text text--darken-3': !running }">
                                                        Waiting
                                                    </div>
                                                </v-card-text>
                                            </v-card>
                                        </v-col>
                                    </v-row>

                                    <v-row style="padding: 0 10px;">
                                        <v-col cols="12" class="d-flex align-center pa-0 py-2">
                                            <div class="move-count grey--text text--darken-1" style="flex: 1;">
                                                <v-icon small>mdi-chess-knight</v-icon>
                                                Move {{ moveCount }}
                                            </div>
                                            <div v-if="!running && !paused">
                                                <v-btn icon small color="info" @click="togglePlayers">
                                                    <v-icon>mdi-swap-horizontal</v-icon>
                                                </v-btn>
                                            </div>
                                            <div style="flex: 1; text-align: right;">
                                                <template v-if="!running && !paused">
                                                    <v-btn icon small color="success" @click="startGame">
                                                        <v-icon>mdi-play</v-icon>
                                                    </v-btn>
                                                </template>
                                                <template v-else-if="running">
                                                    <v-btn icon small color="warning" @click="openPauseDialog">
                                                        <v-icon>mdi-pause</v-icon>
                                                    </v-btn>
                                                </template>
                                                <template v-else>
                                                    <v-btn icon small color="success" @click="startGame" class="mr-1">
                                                        <v-icon>mdi-play</v-icon>
                                                    </v-btn>
                                                    <v-btn icon small color="error" @click="resetGame">
                                                        <v-icon>mdi-restart</v-icon>
                                                    </v-btn>
                                                </template>
                                            </div>
                                        </v-col>
                                    </v-row>

                                </v-card>
                            </v-col>
                        </v-row>

                    </v-container>
                </transition>

                <v-dialog v-model="showTimeoutDialog" max-width="400" persistent>
                    <v-card>
                        <v-card-title class="text-h4 justify-center pa-6">
                            Time Up!
                        </v-card-title>
                        <v-card-text class="text-center pa-6">
                            <v-icon x-large color="error" class="mb-4">mdi-alert-circle</v-icon>
                            <div class="text-h5">
                                {{ timeoutPlayer }}'s time has expired.
                            </div>
                        </v-card-text>
                        <v-card-actions class="justify-center pa-6">
                            <v-btn color="primary" x-large @click="resetGame">
                                <v-icon left>mdi-restart</v-icon>
                                New Game
                            </v-btn>
                        </v-card-actions>
                    </v-card>
                </v-dialog>

                <v-dialog v-model="showPauseDialog" max-width="280">
                    <v-card>
                        <v-card-title class="justify-center pa-4">
                            <span class="text-h5">Pause?</span>
                        </v-card-title>
                        <v-card-actions class="justify-center pa-4 pt-0">
                            <v-btn color="grey" text @click="cancelPause" class="mr-2">
                                Cancel
                            </v-btn>
                            <v-btn color="warning" text @click="confirmPause">
                                Pause
                            </v-btn>
                        </v-card-actions>
                    </v-card>
                </v-dialog>

            </v-main>

            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
            <main-footer-simple></main-footer-simple>
        </template>
    </v-app>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

    <style>
        .v-dialog {
            z-index: 10001 !important;
        }
    </style>

    <script>
        function playButtonSound(player) {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = player === 1 ? 523.25 : 783.99;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        }
        new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common],
            data: {
                presets: [
                    { label: '1m', value: 60 },
                    { label: '3m', value: 180 },
                    { label: '5m', value: 300 },
                    { label: '10m', value: 600 },
                    { label: '15m', value: 900 },
                    { label: '30m', value: 1800 },
                    { label: '60m', value: 3600 },
                ],
                selectedPreset: 60,
                player1Time: 60000,
                player2Time: 60000,
                initialTime: 60000,
                currentPlayer: 1,
                running: false,
                moveCount: 0,
                timerInterval: null,
                lastTickTime: 0,
                showTimeoutDialog: false,
                timeoutPlayer: '',
                paused: false,
                swapped: false,
                showPauseDialog: false,
            },
            computed: {
                player1Label: function () {
                    return this.swapped ? 'First' : 'Second';
                },
                player2Label: function () {
                    return this.swapped ? 'Second' : 'First';
                },
            },
            methods: {
                formattedTime: function (ms) {
                    var totalSeconds = Math.floor(ms / 1000);
                    var m = Math.floor(totalSeconds / 60);
                    var s = totalSeconds % 60;
                    return m + ':' + (s < 10 ? '0' : '') + s;
                },
                selectPreset: function (value) {
                    if (this.running) return;
                    this.selectedPreset = value;
                    this.initialTime = value * 1000;
                    this.player1Time = value * 1000;
                    this.player2Time = value * 1000;
                },
                startGame: function () {
                    if (this.running) return;
                    if (this.paused) {
                        this.running = true;
                        this.paused = false;
                        this.showTimeoutDialog = false;
                        this.startTimer();
                        return;
                    }
                    if (this.player1Time <= 0 || this.player2Time <= 0) {
                        this.player1Time = this.initialTime;
                        this.player2Time = this.initialTime;
                    }
                    this.currentPlayer = this.swapped ? 1 : 2;
                    this.moveCount = 0;
                    this.running = true;
                    this.paused = false;
                    this.showTimeoutDialog = false;
                    this.startTimer();
                },
                pauseGame: function () {
                    this.running = false;
                    this.paused = true;
                    this.stopTimer();
                },
                openPauseDialog: function () {
                    this.stopTimer();
                    this.showPauseDialog = true;
                },
                cancelPause: function () {
                    this.showPauseDialog = false;
                    this.startTimer();
                },
                confirmPause: function () {
                    this.showPauseDialog = false;
                    this.pauseGame();
                },
                resetGame: function () {
                    if (!this.paused) return;
                    this.stopTimer();
                    this.running = false;
                    this.paused = false;
                    this.currentPlayer = 1;
                    this.moveCount = 0;
                    this.player1Time = this.initialTime;
                    this.player2Time = this.initialTime;
                    this.showTimeoutDialog = false;
                    this.showPauseDialog = false;
                    this.timeoutPlayer = '';
                },
                togglePlayers: function () {
                    if (this.running) return;
                    this.swapped = !this.swapped;
                },
                pressButton: function (player) {
                    if (!this.running || this.currentPlayer !== player) return;
                    playButtonSound(player);
                    var now = Date.now();
                    var elapsed = now - this.lastTickTime;
                    this.lastTickTime = now;
                    if (this.currentPlayer === 1) {
                        this.player1Time -= elapsed;
                        if (this.player1Time <= 0) {
                            this.player1Time = 0;
                            this.onTimeout(1);
                            return;
                        }
                    } else {
                        this.player2Time -= elapsed;
                        if (this.player2Time <= 0) {
                            this.player2Time = 0;
                            this.onTimeout(2);
                            return;
                        }
                    }
                    this.moveCount++;
                    this.currentPlayer = player === 1 ? 2 : 1;
                },
                startTimer: function () {
                    var self = this;
                    this.stopTimer();
                    this.lastTickTime = Date.now();
                    this.timerInterval = setInterval(function () {
                        if (!self.running) return;
                        var now = Date.now();
                        var elapsed = now - self.lastTickTime;
                        self.lastTickTime = now;
                        if (self.currentPlayer === 1) {
                            self.player1Time -= elapsed;
                            if (self.player1Time <= 0) {
                                self.player1Time = 0;
                                self.onTimeout(1);
                            }
                        } else {
                            self.player2Time -= elapsed;
                            if (self.player2Time <= 0) {
                                self.player2Time = 0;
                                self.onTimeout(2);
                            }
                        }
                    }, 100);
                },
                stopTimer: function () {
                    if (this.timerInterval) {
                        clearInterval(this.timerInterval);
                        this.timerInterval = null;
                    }
                },
                onTimeout: function (player) {
                    this.stopTimer();
                    this.running = false;
                    this.paused = true;
                    this.timeoutPlayer = player === 1 ? this.player1Label : this.player2Label;
                    this.showTimeoutDialog = true;
                },
            },
            watch: {
                currentPlayer: function () {
                    this.startTimer();
                },
            },
            mounted: function () {
                this.initialTime = this.selectedPreset * 1000;
                this.player1Time = this.selectedPreset * 1000;
                this.player2Time = this.selectedPreset * 1000;
            },
        });
    </script>

</body>

</html>
