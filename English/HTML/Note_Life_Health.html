        this.filteredHealthDiet = JSON.parse(JSON.stringify(this.HealthDiet));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesHealthMethod(newOpen) {
          this.openNodesHealthMethod = newOpen;
        },
        updateOpenNodesHealthNutrition(newOpen) {
          this.openNodesHealthNutrition = newOpen;
        },
        updateOpenNodesHealthMental(newOpen) {
          this.openNodesHealthMental = newOpen;
        },
        updateOpenNodesHealthDiet(newOpen) {
          this.openNodesHealthDiet = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredHealthMethod = JSON.parse(JSON.stringify(this.HealthMethod));
            this.filteredHealthNutrition = JSON.parse(JSON.stringify(this.HealthNutrition));
            this.filteredHealthMental = JSON.parse(JSON.stringify(this.HealthMental));
            this.filteredHealthDiet = JSON.parse(JSON.stringify(this.HealthDiet));
            this.openNodesHealthMethod = [];
            this.openNodesHealthNutrition = [];
            this.openNodesHealthMental = [];
            this.openNodesHealthDiet = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredHealthMethod = filterTree(JSON.parse(JSON.stringify(this.HealthMethod)));
          this.filteredHealthNutrition = filterTree(JSON.parse(JSON.stringify(this.HealthNutrition)));
          this.filteredHealthMental = filterTree(JSON.parse(JSON.stringify(this.HealthMental)));
          this.filteredHealthDiet = filterTree(JSON.parse(JSON.stringify(this.HealthDiet)));

          this.openNodesHealthMethod = this.collectAllNodeIds(this.filteredHealthMethod);
          this.openNodesHealthNutrition = this.collectAllNodeIds(this.filteredHealthNutrition);
          this.openNodesHealthMental = this.collectAllNodeIds(this.filteredHealthMental);
          this.openNodesHealthDiet = this.collectAllNodeIds(this.filteredHealthDiet);
        }
      }
    });
