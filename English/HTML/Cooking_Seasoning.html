<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="F U M">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-B89KY0993B');
    </script>

    <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Lobster&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
    <link href="../../Asset/CSS/Cooking.css?v=1.0" rel="stylesheet" />
    <link href="../../Asset/CSS/Learning.css?v=1.0" rel="stylesheet" />

    <title>Seasoning</title>
    <meta name="robots" content="index, follow">
</head>

<body>
    <!-- 背景レイヤー1: グラデーション -->
    <div class="cooking-background-layer">
        <!-- アニメーションする料理アイコン -->
        <div class="cooking-icon-float">🍳</div>
        <div class="cooking-icon-float">🍝</div>
        <div class="cooking-icon-float">🥗</div>
        <div class="cooking-icon-float">🍰</div>
        <div class="cooking-icon-float">🐟</div>
        <div class="cooking-icon-float">🥩</div>
        <div class="cooking-icon-float">🍜</div>
        <div class="cooking-icon-float">🧁</div>
        <div class="cooking-icon-float">🦐</div>
        <div class="cooking-icon-float">🥕</div>
        <div class="cooking-icon-float">🍕</div>
        <div class="cooking-icon-float">🥘</div>
    </div>

    <!-- 背景レイヤー2: パターン -->
    <div class="cooking-pattern-overlay"></div>

    <v-app id="App">
        <template>
            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Cooking > Seasoning</main-system-bar>

            <v-main id="Main">
                <transition name="Fade_Page">
                    <v-container v-show="Ready_Page" fluid class="pa-5">
                        <v-row justify="center" class="page-title-wrapper">
                            <h1 class="page-title">Cooking Seasoning</h1>
                        </v-row>
                        <v-row>
                            <v-col cols="12">
                                <v-select v-model="selectedCategory" :items="categories" label="Category"
                                    class="category-select" @change="filterVideos">
                                    <template v-slot:selection="{ item }">
                                        <v-icon class="ml-2 mr-4">{{ getIcon(item) }}</v-icon>
                                        {{ item }}
                                    </template>
                                    <template v-slot:item="{ item }">
                                        <v-icon class="mr-4">{{ getIcon(item) }}</v-icon>
                                        {{ item }}
                                    </template>
                                </v-select>
                            </v-col>
                        </v-row>
                        <v-row justify="center">
                            <v-col class="Youtube_Col" cols="12" md="3" v-for="(video, index) in filteredVideos"
                                :key="index">
                                <div class="video-title">
                                    <v-icon :color="'#e67e22'" class="mr-2">{{ getIcon(video.category) }}</v-icon>
                                    {{ video.title }}
                                </div>
                                <iframe class="Youtube" :src="'https://www.youtube-nocookie.com/embed/' + video.id"
                                    frameborder="0" allow="encrypted-media;" allowfullscreen></iframe>
                                <div class="video-description">
                                    <v-icon small :color="'#e67e22'" class="mr-2" style="top: -3px;">mdi-information</v-icon>{{ video.description }}
                                </div>
                            </v-col>
                        </v-row>

                        <v-row justify="center">
                            <v-col cols="12" md="10">
                                <v-card class="mt-6">
                                    <v-card-title class="content-text">Condiments, Spices, Dressings &amp; Sauces</v-card-title>
                                    <v-card-text>
                                        <v-text-field v-model="searchQuery" label="Search" prepend-inner-icon="mdi-magnify" clearable
                                            outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                                        <v-treeview :items="filteredItems" item-key="name" activatable open-on-click
                                            dense :open.sync="openNodes" @update:open="updateOpenNodes">
                                            <template v-slot:label="{ item }">
                                                <span :class="{ 'search-highlight': item.matches }">
                                                    <strong>{{ item.name }}</strong>
                                                    <span v-if="item.description" class="caption ml-2" style="color: #666;">— {{ item.description }}</span>
                                                </span>
                                            </template>
                                        </v-treeview>
                                    </v-card-text>
                                </v-card>
                            </v-col>
                        </v-row>
                    </v-container>
                </transition>
            </v-main>


            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
            <main-footer></main-footer>
        </template>
    </v-app>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

    <script>
        let vue = new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Youtube],
            data: {
                selectedCategory: 'All',
                categories: ['All'],
                Videos: [],
                filteredVideos: [],
                dialog: [],
                categoryIcons: {
                    'Source': 'mdi-food-variant',
                    'Spice': 'mdi-shaker-outline',
                },
                searchQuery: '',
                filteredItems: [],
                openNodes: [],
                TreeData: [
                    {
                        name: 'Condiments',
                        children: [
                            {
                                name: 'Fresh Herbs', children: [
                                    { name: 'Cilantro', description: 'Distinctive fragrance indispensable in Asian cuisine.' },
                                    { name: 'Green onion', description: 'Refreshing pungency suits Japanese, Western, and Chinese cuisine.' },
                                    { name: 'Shiso', description: 'Refreshing fragrance essential for summer dishes and washoku.' },
                                ]
                            },
                            {
                                name: 'Root Aromatics', children: [
                                    { name: 'Garlic', description: 'Strong pungent aroma stimulates appetite.' },
                                    { name: 'Ginger', description: 'Adds a pungent, warm aroma that tightens any dish.' },
                                    { name: 'Myoga', description: 'Unique aroma and crunchy texture make it an ideal condiment.' },
                                    { name: 'Wasabi', description: 'Sharp pungency is a must for sashimi and soba.' },
                                ]
                            },
                            {
                                name: 'Spicy Condiments', children: [
                                    { name: 'Chili pepper', description: 'The king of heat. Adds kick and depth to any dish.' },
                                    { name: 'Sansho pepper', description: 'Numbing spiciness pairs perfectly with eel and meat.' },
                                ]
                            },
                        ]
                    },
                    {
                        name: 'Spices',
                        children: [
                            {
                                name: 'Warm & Sweet', children: [
                                    { name: 'Cardamom', description: 'Refreshing sweet scent perfect for chai and Nordic pastries.' },
                                    { name: 'Cinnamon', description: 'Sweet fragrance works from desserts to curries.' },
                                    { name: 'Nutmeg', description: 'Sweet aroma ideal for white sauce and baked goods.' },
                                ]
                            },
                            {
                                name: 'Savory & Earthy', children: [
                                    { name: 'Cumin', description: 'Warm aroma essential for curry and Latin American cuisine.' },
                                    { name: 'Paprika', description: 'Adds sweetness and vibrant color. Staple in Hungarian cooking.' },
                                    { name: 'Turmeric', description: 'Vibrant yellow hue. Essential for coloring curry.' },
                                ]
                            },
                            {
                                name: 'Woody Herbs', children: [
                                    { name: 'Oregano', description: 'Essential Italian herb. Pairs beautifully with tomatoes.' },
                                    { name: 'Rosemary', description: 'Pine-like strong fragrance suits meat dishes and bread.' },
                                    { name: 'Thyme', description: 'Refreshing herbal aroma. Great for stews and soups.' },
                                ]
                            },
                            {
                                name: 'Pungent', children: [
                                    { name: 'Black pepper', description: 'All-purpose spice. Freshly ground elevates any dish.' },
                                ]
                            },
                        ]
                    },
                    {
                        name: 'Dressings',
                        children: [
                            {
                                name: 'Oil & Vinegar', children: [
                                    { name: 'Balsamic dressing', description: 'Sweet-tart balsamic vinegar adds depth to salads.' },
                                    { name: 'French dressing', description: 'Classic vinegar-and-oil base. Simple and versatile.' },
                                    { name: 'Italian dressing', description: 'Olive oil with herbs and vinegar for a refreshing taste.' },
                                ]
                            },
                            {
                                name: 'Creamy', children: [
                                    { name: 'Caesar dressing', description: 'Rich dressing with cheese and garlic punch.' },
                                    { name: 'Sesame dressing', description: 'Rich dressing with ground sesame fragrance.' },
                                    { name: 'Thousand Island', description: 'Mayonnaise-based sweet and creamy dressing.' },
                                ]
                            },
                            {
                                name: 'Asian-style', children: [
                                    { name: 'Chinese dressing', description: 'Aromatic sesame oil and soy sauce based dressing.' },
                                    { name: 'Japanese dressing', description: 'Light soy sauce and vinegar based dressing.' },
                                ]
                            },
                        ]
                    },
                    {
                        name: 'Sauces',
                        children: [
                            {
                                name: 'Tomato-based', children: [
                                    { name: 'BBQ sauce', description: 'Sweet and tangy American-style grilling sauce.' },
                                    { name: 'Tomato sauce', description: 'Essential red sauce for pasta, pizza, and stews.' },
                                ]
                            },
                            {
                                name: 'Dairy & Egg', children: [
                                    { name: 'Hollandaise sauce', description: 'Rich yellow sauce with egg yolk and butter.' },
                                    { name: 'White sauce', description: 'Creamy classic made with milk and butter.' },
                                ]
                            },
                            {
                                name: 'Herb & Oil', children: [
                                    { name: 'Pesto', description: 'Vibrant green Italian sauce with basil and pine nuts.' },
                                ]
                            },
                            {
                                name: 'Savory Condiments', children: [
                                    { name: 'Tartar sauce', description: 'Mayonnaise with onion and pickles, perfect for fried foods.' },
                                    { name: 'Teriyaki sauce', description: 'Sweet-savory soy and mirin glaze, Japanese staple.' },
                                    { name: 'Worcestershire sauce', description: 'Concentrated umami of vegetables and fruit, born in England.' },
                                ]
                            },
                        ]
                    },
                ],
            },
            mounted() {
                const self = this;
                self.Videos = [
                    {
                        id: "PI5iZCk2IPw",
                        title: "French Dressing",
                        description: "A healthy dressing that's easy to make as long as you have the ingredients.",
                        categories: ["Source"]
                    },
                    {
                        id: "xTFGvMxEx14",
                        title: "Ranch Dressing",
                        description: "What should we put this refreshing and light dressing on?",
                        categories: ["Source"]
                    },
                    {
                        id: "GVFdQVUQxw4",
                        title: "Dried Parsley",
                        description: "You can easily dry it in the microwave.",
                        categories: ["Spice"]
                    },
                    {
                        id: "cxlCUlwwSuI",
                        title: "Bravas Sauce",
                        description: "This spicy sauce originates from Spain and is flavored with garlic, paprika, and chili peppers.",
                        categories: ["Source"]
                    }
                ];
                self.categories = ['All', ...new Set(self.Videos.flatMap(v => v.categories).filter(Boolean))].sort();
                self.filteredVideos = self.Videos;
                self.dialog = self.Videos.map(() => false);
                this.filteredItems = JSON.parse(JSON.stringify(this.TreeData));
            },
            methods: {
                ChangeDrawer(value) {
                    this.Drawer = value;
                },
                filterVideos() {
                    if (this.selectedCategory === 'All') {
                        this.filteredVideos = this.Videos;
                    } else {
                        this.filteredVideos = this.Videos.filter(video => video.categories.includes(this.selectedCategory));
                    }
                },
                getIcon(category) {
                    return this.categoryIcons[category] || 'mdi-silverware-fork-knife';
                },
                collectAllNodeIds(items) {
                    const ids = [];
                    const collect = (nodes) => {
                        nodes.forEach((node) => {
                            ids.push(node.name);
                            if (node.children) {
                                collect(node.children);
                            }
                        });
                    };
                    collect(items);
                    return ids;
                },
                updateOpenNodes(newOpen) {
                    this.openNodes = newOpen;
                },
                filterTreeview() {
                    const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
                    if (!query) {
                        this.filteredItems = JSON.parse(JSON.stringify(this.TreeData));
                        this.openNodes = [];
                        return;
                    }
                    const filterTree = (items) => {
                        return items.reduce((acc, item) => {
                            const itemCopy = { ...item };
                            const matchesName = item.name.toLowerCase().includes(query);
                            const matchesDesc = item.description ? item.description.toLowerCase().includes(query) : false;
                            const matches = matchesName || matchesDesc;
                            if (item.children) {
                                itemCopy.children = filterTree(item.children);
                                if (itemCopy.children.length > 0 || matches) {
                                    itemCopy.matches = matches;
                                    acc.push(itemCopy);
                                }
                            } else if (matches) {
                                itemCopy.matches = true;
                                acc.push(itemCopy);
                            }
                            return acc;
                        }, []);
                    };
                    this.filteredItems = filterTree(JSON.parse(JSON.stringify(this.TreeData)));
                    this.openNodes = this.collectAllNodeIds(this.filteredItems);
                }
            }
        });
    </script>
</body>

</html>
