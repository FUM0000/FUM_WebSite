<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="F U M">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-B89KY0993B');
    </script>

    <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

    <title>思考</title>

    <meta name="robots" content="index, follow">
</head>

<body>
    <v-app id="App">
        <template>

            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > 思考</main-system-bar>


            <v-main id="Main" class="brain-main">
                <canvas id="matrix-rain" aria-hidden="true"></canvas>
                <transition name="Fade_Page">
                    <v-container v-show="Ready_Page" fluid class="pa-5 brain-page">

                        <v-row justify="center" align="center" class="brain-content-row">
                            <v-col cols="12" md="8">

                                <v-card class="pb-2 profile-card">
                                    <v-card-title>
                                        <v-row align="center" no-gutters>
                                            <v-col cols="10" md="4">
                                                <v-text-field v-model="search" label="検索" prepend-icon="mdi-magnify"
                                                    single-line hide-details outlined dense clearable
                                                    @input="filterTree"></v-text-field>
                                            </v-col>
                                            <v-col cols="2" md="8" class="text-right">
                                                <v-btn icon @click="closeAllNodes" title="Close all nodes">
                                                    <v-icon>mdi-collapse-all</v-icon>
                                                </v-btn>
                                            </v-col>
                                        </v-row>
                                    </v-card-title>
                                    <v-treeview class="custom-treeview mt-4 mb-4" :items="filteredItems" item-key="id"
                                        :open="openNodes" activatable open-on-click dense>
                                    </v-treeview>
                                </v-card>

                            </v-col>
                        </v-row>

                    </v-container>
                </transition>
            </v-main>

            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
            <main-footer></main-footer>

        </template>
    </v-app>

    <style>
        .brain-main {
            position: relative;
            overflow: hidden;
            background: #000000 !important;
        }

        .brain-main #matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 0;
            pointer-events: none;
        }

        .brain-main .brain-page {
            position: relative;
            z-index: 1;
        }

        .brain-main .brain-page .brain-content-row {
            min-height: calc(100vh - 120px);
        }

        .brain-page .profile-card {
            background: rgba(7, 11, 20, 1) !important;
            border: 1px solid rgba(230, 238, 255, 0.2);
        }

        .brain-page .profile-card,
        .brain-page .profile-card .v-card__title,
        .brain-page .profile-card .v-card__text,
        .brain-page .profile-card .v-treeview-node__label,
        .brain-page .profile-card .v-icon,
        .brain-page .profile-card .v-label,
        .brain-page .profile-card input {
            color: rgba(238, 245, 255, 0.94) !important;
            caret-color: rgba(238, 245, 255, 0.94) !important;
        }

        .brain-page .profile-card .theme--light.v-text-field--outlined fieldset {
            border-color: rgba(238, 245, 255, 0.32);
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

    <script>
        new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common],
            data: {
                search: '',
                items: [],
                filteredItems: [],
                openNodes: [],
                nodeIdCounter: 0,
                matrixCtx: null,
                matrixCanvas: null,
                matrixMainEl: null,
                matrixColumns: 0,
                matrixDrops: [],
                matrixFontSize: 16,
                matrixLastWidth: 0,
                matrixLastHeight: 0,
                matrixTimer: null,
                matrixResizeHandler: null,
            },
            methods: {
                randomHexChar() {
                    return Math.floor(Math.random() * 16).toString(16).toUpperCase();
                },
                initMatrixRain() {
                    this.matrixMainEl = this.$el.querySelector('#Main');
                    this.matrixCanvas = this.$el.querySelector('#matrix-rain');
                    if (!this.matrixCanvas) return;

                    this.matrixCtx = this.matrixCanvas.getContext('2d');
                    this.resizeMatrixRain();

                    this.matrixResizeHandler = () => this.resizeMatrixRain();
                    window.addEventListener('resize', this.matrixResizeHandler);

                    this.startMatrixRain();
                },
                resizeMatrixRain() {
                    if (!this.matrixCanvas || !this.matrixCtx || !this.matrixMainEl) return;

                    const width = window.innerWidth;
                    const height = window.innerHeight;

                    if (width === this.matrixLastWidth && height === this.matrixLastHeight) {
                        return;
                    }
                    this.matrixLastWidth = width;
                    this.matrixLastHeight = height;

                    this.matrixCanvas.width = width;
                    this.matrixCanvas.height = height;

                    this.matrixColumns = Math.max(1, Math.ceil(this.matrixCanvas.width / this.matrixFontSize) + 2);
                    const rows = Math.max(1, Math.ceil(this.matrixCanvas.height / this.matrixFontSize));
                    this.matrixDrops = Array.from(
                        { length: this.matrixColumns },
                        () => Math.floor(Math.random() * rows)
                    );

                    this.matrixCtx.fillStyle = '#000000';
                    this.matrixCtx.fillRect(0, 0, this.matrixCanvas.width, this.matrixCanvas.height);
                },
                drawMatrixRain() {
                    if (!this.matrixCtx || !this.matrixCanvas) return;

                    const trailGradient = this.matrixCtx.createLinearGradient(
                        0,
                        0,
                        0,
                        this.matrixCanvas.height
                    );
                    trailGradient.addColorStop(0, 'rgba(2, 8, 20, 0.08)');
                    trailGradient.addColorStop(0.55, 'rgba(2, 8, 20, 0.11)');
                    trailGradient.addColorStop(1, 'rgba(2, 8, 20, 0.16)');
                    this.matrixCtx.fillStyle = trailGradient;
                    this.matrixCtx.fillRect(0, 0, this.matrixCanvas.width, this.matrixCanvas.height);
                    this.matrixCtx.font = `${this.matrixFontSize}px Space Mono, monospace`;

                    for (let i = 0; i < this.matrixColumns; i++) {
                        const hexChar = this.randomHexChar();
                        const x = (i - 1) * this.matrixFontSize;
                        const y = this.matrixDrops[i] * this.matrixFontSize;

                        const t = Math.min(1, Math.max(0, y / this.matrixCanvas.height));
                        const smooth = t * t * (3 - 2 * t); // smoothstep
                        const alpha = 0.6 - 0.5 * smooth;
                        this.matrixCtx.fillStyle = `rgba(230, 242, 255, ${alpha})`;
                        this.matrixCtx.fillText(hexChar, x, y);

                        if (y > this.matrixCanvas.height && Math.random() > 0.975) {
                            this.matrixDrops[i] = 0;
                        } else {
                            this.matrixDrops[i]++;
                        }
                    }

                    // Navy-only gradient overlay to smooth fade without gray shift
                    const fadeGradient = this.matrixCtx.createLinearGradient(
                        0,
                        0,
                        0,
                        this.matrixCanvas.height
                    );
                    fadeGradient.addColorStop(0, 'rgba(2, 8, 20, 0)');
                    fadeGradient.addColorStop(0.4, 'rgba(2, 8, 20, 0.04)');
                    fadeGradient.addColorStop(0.75, 'rgba(2, 8, 20, 0.12)');
                    fadeGradient.addColorStop(1, 'rgba(2, 8, 20, 0.22)');
                    this.matrixCtx.fillStyle = fadeGradient;
                    this.matrixCtx.fillRect(0, 0, this.matrixCanvas.width, this.matrixCanvas.height);
                },
                startMatrixRain() {
                    this.stopMatrixRain();
                    this.matrixTimer = setInterval(() => this.drawMatrixRain(), 55);
                },
                stopMatrixRain() {
                    if (this.matrixTimer) {
                        clearInterval(this.matrixTimer);
                        this.matrixTimer = null;
                    }
                },
                filterTree() {
                    if (this.search) {
                        this.filteredItems = this.filterItems(JSON.parse(JSON.stringify(this.items)));
                        this.openNodes = this.getAllNodes(this.filteredItems);
                    } else {
                        this.filteredItems = this.items;
                        this.openNodes = [];
                    }
                },
                filterItems(items) {
                    return items.filter(item => {
                        if (item.name.toLowerCase().includes(this.search.toLowerCase())) {
                            return true;
                        }
                        if (item.children) {
                            item.children = this.filterItems(item.children);
                            return item.children.length > 0;
                        }
                        return false;
                    });
                },
                getAllNodes(items) {
                    let nodes = [];
                    for (let item of items) {
                        nodes.push(item.id);
                        if (item.children) {
                            nodes = nodes.concat(this.getAllNodes(item.children));
                        }
                    }
                    return nodes;
                },
                assignNodeIds(items) {
                    for (const item of items) {
                        if (!item.id) {
                            this.nodeIdCounter += 1;
                            item.id = `brain-node-${this.nodeIdCounter}`;
                        }
                        if (item.children && item.children.length) {
                            this.assignNodeIds(item.children);
                        }
                    }
                },
                closeAllNodes() {
                    this.openNodes = [];
                }
            },
            mounted() {
                this.initMatrixRain();
            },
            beforeDestroy() {
                this.stopMatrixRain();
                if (this.matrixResizeHandler) {
                    window.removeEventListener('resize', this.matrixResizeHandler);
                }
            },
            created() {
                var self = this;
                fetch('../../Asset/Data/Brain.json')
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        self.items = data;
                        self.assignNodeIds(self.items);
                        self.filteredItems = self.items;
                    });
            }
        })
    </script>
</body>

</html>
