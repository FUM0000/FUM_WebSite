                matrixFontSize: 16,
                matrixLastWidth: 0,
                matrixLastHeight: 0,
                matrixTimer: null,
                matrixResizeHandler: null,
            },
            methods: {
                randomHexChar() {
                    return Math.floor(Math.random() * 16).toString(16).toUpperCase();
                },
                initMatrixRain() {
                    this.matrixMainEl = this.$el.querySelector('#Main');
                    this.matrixCanvas = this.$el.querySelector('#matrix-rain');
                    if (!this.matrixCanvas) return;

                    this.matrixCtx = this.matrixCanvas.getContext('2d');
                    this.resizeMatrixRain();

                    this.matrixResizeHandler = () => this.resizeMatrixRain();
                    window.addEventListener('resize', this.matrixResizeHandler);

                    this.startMatrixRain();
                },
                resizeMatrixRain() {
                    if (!this.matrixCanvas || !this.matrixCtx || !this.matrixMainEl) return;

                    const width = window.innerWidth;
                    const height = window.innerHeight;

                    if (width === this.matrixLastWidth && height === this.matrixLastHeight) {
                        return;
                    }
                    this.matrixLastWidth = width;
                    this.matrixLastHeight = height;

                    this.matrixCanvas.width = width;
                    this.matrixCanvas.height = height;

                    this.matrixColumns = Math.max(1, Math.ceil(this.matrixCanvas.width / this.matrixFontSize) + 2);
                    const rows = Math.max(1, Math.ceil(this.matrixCanvas.height / this.matrixFontSize));
                    this.matrixDrops = Array.from(
                        { length: this.matrixColumns },
                        () => Math.floor(Math.random() * rows)
                    );

                    this.matrixCtx.fillStyle = '#000000';
                    this.matrixCtx.fillRect(0, 0, this.matrixCanvas.width, this.matrixCanvas.height);
                },
                drawMatrixRain() {
                    if (!this.matrixCtx || !this.matrixCanvas) return;

                    const trailGradient = this.matrixCtx.createLinearGradient(
                        0,
                        0,
                        0,
                        this.matrixCanvas.height
                    );
                    trailGradient.addColorStop(0, 'rgba(2, 8, 20, 0.08)');
                    trailGradient.addColorStop(0.55, 'rgba(2, 8, 20, 0.11)');
                    trailGradient.addColorStop(1, 'rgba(2, 8, 20, 0.16)');
                    this.matrixCtx.fillStyle = trailGradient;
                    this.matrixCtx.fillRect(0, 0, this.matrixCanvas.width, this.matrixCanvas.height);
                    this.matrixCtx.font = `${this.matrixFontSize}px Space Mono, monospace`;

                    for (let i = 0; i < this.matrixColumns; i++) {
                        const hexChar = this.randomHexChar();
                        const x = (i - 1) * this.matrixFontSize;
                        const y = this.matrixDrops[i] * this.matrixFontSize;

                        const t = Math.min(1, Math.max(0, y / this.matrixCanvas.height));
                        const smooth = t * t * (3 - 2 * t); // smoothstep
                        const alpha = 0.6 - 0.5 * smooth;
                        this.matrixCtx.fillStyle = `rgba(230, 242, 255, ${alpha})`;
                        this.matrixCtx.fillText(hexChar, x, y);

                        if (y > this.matrixCanvas.height && Math.random() > 0.975) {
                            this.matrixDrops[i] = 0;
                        } else {
                            this.matrixDrops[i]++;
                        }
                    }

                    // Navy-only gradient overlay to smooth fade without gray shift
                    const fadeGradient = this.matrixCtx.createLinearGradient(
                        0,
                        0,
                        0,
                        this.matrixCanvas.height
                    );
                    fadeGradient.addColorStop(0, 'rgba(2, 8, 20, 0)');
                    fadeGradient.addColorStop(0.4, 'rgba(2, 8, 20, 0.04)');
                    fadeGradient.addColorStop(0.75, 'rgba(2, 8, 20, 0.12)');
                    fadeGradient.addColorStop(1, 'rgba(2, 8, 20, 0.22)');
                    this.matrixCtx.fillStyle = fadeGradient;
                    this.matrixCtx.fillRect(0, 0, this.matrixCanvas.width, this.matrixCanvas.height);
                },
                startMatrixRain() {
                    this.stopMatrixRain();
                    this.matrixTimer = setInterval(() => this.drawMatrixRain(), 55);
                },
                stopMatrixRain() {
                    if (this.matrixTimer) {
                        clearInterval(this.matrixTimer);
                        this.matrixTimer = null;
                    }
                },
                filterTree() {
                    if (this.search) {
                        this.filteredItems = this.filterItems(JSON.parse(JSON.stringify(this.items)));
                        this.openNodes = this.getAllNodes(this.filteredItems);
                    } else {
                        this.filteredItems = this.items;
                        this.openNodes = [];
                    }
                },
                filterItems(items) {
                    return items.filter(item => {
                        if (item.name.toLowerCase().includes(this.search.toLowerCase())) {
                            return true;
                        }
                        if (item.children) {
                            item.children = this.filterItems(item.children);
                            return item.children.length > 0;
                        }
                        return false;
                    });
                },
                getAllNodes(items) {
                    let nodes = [];
                    for (let item of items) {
                        nodes.push(item.id);
                        if (item.children) {
                            nodes = nodes.concat(this.getAllNodes(item.children));
                        }
                    }
                    return nodes;
                },
                assignNodeIds(items) {
                    for (const item of items) {
                        if (!item.id) {
                            this.nodeIdCounter += 1;
                            item.id = `brain-node-${this.nodeIdCounter}`;
                        }
                        if (item.children && item.children.length) {
                            this.assignNodeIds(item.children);
                        }
                    }
                },
                closeAllNodes() {
                    this.openNodes = [];
                }
            },
            mounted() {
                this.initMatrixRain();
            },
            beforeDestroy() {
                this.stopMatrixRain();
                if (this.matrixResizeHandler) {
                    window.removeEventListener('resize', this.matrixResizeHandler);
                }
            },
            created() {
                this.assignNodeIds(this.items);
                this.filteredItems = this.items;
            }
        })
