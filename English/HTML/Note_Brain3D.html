    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        let items = [];
        let maxTreeDepth = 0;

        function computeMaxDepth(arr, d) {
            for (const item of arr) {
                if (d > maxTreeDepth) maxTreeDepth = d;
                if (item.children) computeMaxDepth(item.children, d + 1);
            }
        }

        fetch('../../Asset/Data/Brain.json')
            .then(function (r) { return r.json(); })
            .then(function (data) {
                items = data;
                computeMaxDepth(data, 1);
                config.maxDepth = 1;
                buildScene();
            });

        const config = {
            maxDepth: 5,
            connectionOpacity: 0.55,
            autoRotateSpeed: 0,

            stringSag: 0.5,
            showLabels: true,
            expandAll: false,
        };

        const collapsedState = new Map();



        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020814);
        scene.fog = new THREE.Fog(0x020814, 0, 300);

        const container = document.getElementById('three-container');
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 600);
        camera.position.set(55, 39, 55);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(container.clientWidth, container.clientHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.left = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 8;
        controls.maxDistance = 180;
        controls.target.set(0, 0, 0);

        const ambientLight = new THREE.AmbientLight(0x446688, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xaaccff, 1.2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x6688aa, 0.4);
        fillLight.position.set(-10, -5, -10);
        scene.add(fillLight);

        const rimLight = new THREE.DirectionalLight(0x88ddff, 0.3);
        rimLight.position.set(-5, 15, -10);
        scene.add(rimLight);

        const starsGeo = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 100;
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({
            color: 0x88bbff,
            size: 0.08,
            transparent: true,
            opacity: 0.6,
            sizeAttenuation: true,
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        const group = new THREE.Group();
        scene.add(group);

        let allNodes = [];
        let allConnections = [];
        let allEntries = [];
        let allShells = [];
        let centerGroup = null;

        function getNodeColor(name, depth, parentColor, itemIndex, totalItems) {
            if (depth === 0) return new THREE.Color(0x88ddff);
            if (depth === 1) {
                const hue = 0.05 + (itemIndex / Math.max(1, totalItems)) * 0.75;
                return new THREE.Color().setHSL(hue, 0.7, 0.55);
            }
            if (parentColor) {
                const c = parentColor.clone();
                const h = {};
                c.getHSL(h);
                const lighten = 0.1 + Math.random() * 0.15;
                c.setHSL(h.h, Math.max(0.3, h.s - 0.1), Math.min(0.8, h.l + lighten));
                return c;
            }
            return new THREE.Color(0x88bbdd);
        }

        function makeDotTexture() {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            g.addColorStop(0, 'rgba(255,255,255,1)');
            g.addColorStop(0.25, 'rgba(220,235,255,0.9)');
            g.addColorStop(0.6, 'rgba(180,210,255,0.4)');
            g.addColorStop(1, 'rgba(180,210,255,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(c);
        }
        const dotTexture = makeDotTexture();

        let nodeParentMap = new Map();
        let childrenMap = new Map();
        let occupiedByDepth = new Map();

        function computeMinAngle(depth) {
            return Math.max(0.22, 0.95 - depth * 0.1);
        }

        function computeBranchRadius(depth) {
            if (depth <= 1) return 24;
            return 24 + depth * 10 + Math.max(0, depth - 2) * 10;
        }

        function getAutoCameraDistance(maxDepth) {
            const layoutRadius = maxDepth <= 1 ? 24 : computeBranchRadius(maxDepth);
            return Math.max(42, layoutRadius * 1.35 + 28);
        }

        function updateCameraForDepth(maxDepth, force = false) {
            const targetDistance = getAutoCameraDistance(maxDepth);
            controls.maxDistance = Math.max(600, targetDistance * 3);
            controls.minDistance = Math.min(12, targetDistance * 0.2);

            const currentDistance = camera.position.distanceTo(controls.target);
            if (force || currentDistance < targetDistance) {
                const dir = camera.position.clone().sub(controls.target);
                if (dir.lengthSq() < 0.000001) {
                    dir.set(0.6, 0.35, 0.6).normalize();
                } else {
                    dir.normalize();
                }
                camera.position.copy(controls.target).add(dir.multiplyScalar(targetDistance));
            }
        }

        function layoutItems(items, parentPos, depth, maxDepth, parentColor, parentItem) {
            if (depth > maxDepth) return [];
            const result = [];
            const count = items.length;
            const goldenAngle = Math.PI * (3 - Math.sqrt(5));
            const sphereRadius = 18;
            const siblingOccupied = [];

            function randomUnitVector() {
                const z = Math.random() * 2 - 1;
                const theta = Math.random() * Math.PI * 2;
                const radial = Math.sqrt(Math.max(0, 1 - z * z));
                return new THREE.Vector3(
                    radial * Math.cos(theta),
                    radial * Math.sin(theta),
                    z
                );
            }

            function makeConeBasis(axis) {
                const parentDir = axis.clone();
                if (parentDir.lengthSq() < 0.000001) parentDir.set(0, 1, 0);
                parentDir.normalize();
                const ref = Math.abs(parentDir.y) < 0.9
                    ? new THREE.Vector3(0, 1, 0)
                    : new THREE.Vector3(1, 0, 0);
                const right = new THREE.Vector3().crossVectors(parentDir, ref).normalize();
                const localUp = new THREE.Vector3().crossVectors(right, parentDir).normalize();
                return { parentDir, right, localUp };
            }

            function buildConeDirection(parentDir, right, localUp, azim, ang) {
                return new THREE.Vector3()
                    .addScaledVector(parentDir, Math.cos(ang))
                    .addScaledVector(right, Math.sin(ang) * Math.cos(azim))
                    .addScaledVector(localUp, Math.sin(ang) * Math.sin(azim))
                    .normalize();
            }

            function pickSphereDirection(occupied, minAngle, sampleCount) {
                let bestDir = null;
                let bestScore = -Infinity;
                for (let attempt = 0; attempt < sampleCount; attempt++) {
                    const dir = randomUnitVector();
                    let score = Math.PI;
                    let conflict = false;
                    for (const occ of occupied) {
                        const angle = dir.angleTo(occ);
                        if (angle < minAngle) {
                            conflict = true;
                            score = angle;
                            break;
                        }
                        if (angle < score) score = angle;
                    }
                    if (!conflict && score > bestScore) {
                        bestDir = dir;
                        bestScore = score;
                    }
                }
                if (bestDir) return bestDir;

                let fallbackDir = randomUnitVector();
                let fallbackScore = -Infinity;
                for (let attempt = 0; attempt < sampleCount; attempt++) {
                    const dir = randomUnitVector();
                    let score = Math.PI;
                    for (const occ of occupied) {
                        const angle = dir.angleTo(occ);
                        if (angle < score) score = angle;
                    }
                    if (score > fallbackScore) {
                        fallbackDir = dir;
                        fallbackScore = score;
                    }
                }
                return fallbackDir;
            }

            items.forEach((item, i) => {
                let pos;
                if (depth === 0) {
                    pos = new THREE.Vector3(0, 0, 0);
                } else if (depth === 1) {
                    const r = sphereRadius + 6;
                    const minAngle = computeMinAngle(depth);
                    const sampleCount = Math.max(240, count * 36);
                    const dir = pickSphereDirection(siblingOccupied, minAngle, sampleCount);
                    pos = dir.clone().multiplyScalar(r);
                    siblingOccupied.push(dir.clone());
                } else {
                    const basis = makeConeBasis(parentPos);
                    const parentDir = basis.parentDir;
                    const right = basis.right;
                    const localUp = basis.localUp;
                    const targetRadius = computeBranchRadius(depth);
                    const minAngle = computeMinAngle(depth);
                    const coneAngle = Math.min(Math.PI * 0.78, 0.18 + 0.12 * Math.sqrt(Math.max(0, count - 1)) + 0.03 * Math.max(0, depth - 1));
                    const baseT = count > 0 ? (i + 0.5) / count : 0.5;
                    const baseAng = Math.acos(1 - baseT * (1 - Math.cos(coneAngle)));
                    const baseAzim = goldenAngle * i;
                    let bestDir = null;
                    let bestScore = -Infinity;
                    for (let attempt = 0; attempt < 180; attempt++) {
                        let azim, ang;
                        if (attempt === 0) {
                            azim = baseAzim;
                            ang = baseAng;
                        } else {
                            const ring = Math.floor((attempt - 1) / 12) + 1;
                            const step = (attempt - 1) % 12;
                            const jitter = (step / 12) * Math.PI * 2;
                            const angJitter = (Math.random() - 0.5) * coneAngle * Math.min(0.35, 0.08 * ring);
                            azim = baseAzim + jitter + (Math.random() - 0.5) * goldenAngle * 0.25;
                            ang = Math.max(0, Math.min(coneAngle, baseAng + angJitter));
                        }
                        const dir = buildConeDirection(parentDir, right, localUp, azim, ang);
                        let score = Math.PI;
                        let conflict = false;
                        for (const occ of siblingOccupied) {
                            const angle = dir.angleTo(occ);
                            if (angle < minAngle) {
                                conflict = true;
                                score = angle;
                                break;
                            }
                            if (angle < score) score = angle;
                        }
                        if (!conflict && score > bestScore) {
                            bestDir = dir;
                            bestScore = score;
                            if (bestScore >= minAngle * 1.4) break;
                        }
                    }
                    const dir = bestDir || buildConeDirection(parentDir, right, localUp, baseAzim, baseAng);
                    if (dir) {
                        pos = dir.clone().multiplyScalar(targetRadius);
                        siblingOccupied.push(dir.clone());
                    }
                }
                const color = getNodeColor(item.name, depth, parentColor, i, items.length);
                const entry = { item, position: pos, depth, color, parentItem };
                result.push(entry);
                if (parentItem) nodeParentMap.set(item, parentItem);
                if (item.children) {
                    if (!childrenMap.has(item)) childrenMap.set(item, []);
                    for (const child of item.children) {
                        if (!childrenMap.get(item).includes(child)) {
                            childrenMap.get(item).push(child);
                        }
                    }
                }
                if (item.children && depth < maxDepth) {
                    const children = layoutItems(item.children, pos, depth + 1, maxDepth, color, item);
                    result.push(...children);
                }
            });
            return result;
        }

        function isItemVisible(item) {
            let cur = item;
            while (cur) {
                const parent = nodeParentMap.get(cur);
                if (parent && collapsedState.get(parent)) return false;
                cur = parent;
            }
            return true;
        }

        function applyVisibility() {
            for (const e of allEntries) {
                const vis = isItemVisible(e.item);
                e.mesh.visible = vis;
                if (e.hitMesh) e.hitMesh.visible = vis;
                if (e.label) {
                    e.label.visible = vis;
                    if (e.label.element) {
                        e.label.element.style.opacity = (e.depth === 0 || !config.showLabels) ? '0' : '1';
                    }
                }
            }
            for (const c of allConnections) {
                const fromVis = isItemVisible(c.from.item);
                const toVis = isItemVisible(c.to.item);
                c.mesh.visible = fromVis && toVis;
            }
            for (const e of allEntries) {
                if (e.depth === 0) continue;
                if (!e.label || !e.label.element) continue;
                const hasChildren = e.item.children && e.item.children.length > 0;
                const isCollapsed = collapsedState.get(e.item);
                if (hasChildren) {
                    e.label.element.style.cursor = 'pointer';
                    e.label.element.title = isCollapsed ? 'クリックで展開' : 'クリックで折り畳み';
                    const dot = e.label.element.querySelector('.collapse-dot');
                    if (dot) dot.textContent = isCollapsed ? '▸' : '▾';
                } else {
                    e.label.element.style.cursor = 'default';
                    e.label.element.title = '';
                }
            }
        }

        function makeRadialTex() {
            const s = 256, c = document.createElement('canvas');
            c.width = s; c.height = s;
            const x = c.getContext('2d');
            const g = x.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
            g.addColorStop(0, 'rgba(200,230,255,1)');
            g.addColorStop(0.15, 'rgba(180,215,255,0.7)');
            g.addColorStop(0.4, 'rgba(140,185,245,0.25)');
            g.addColorStop(0.7, 'rgba(110,160,230,0.08)');
            g.addColorStop(1, 'rgba(100,150,220,0)');
            x.fillStyle = g;
            x.fillRect(0, 0, s, s);
            return new THREE.CanvasTexture(c);
        }
        const _radialTex = makeRadialTex();
        function coreHit(r) {
            const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8), new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false }));
            return m;
        }
        function coreSprite(tex, col, s) {
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, color: col, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
            spr.scale.set(s, s, 1); return spr;
        }

        function buildDefaultCore(pos, dt) {
            const g = new THREE.Group(); g.position.copy(pos);
            const col = new THREE.Color(0x88ccff);
            const ringMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false, fog: false });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(2.8, 0.05, 8, 48), ringMat);
            g.add(ring);
            const spr1 = coreSprite(_radialTex, 0x88ddff, 2);
            spr1.material.fog = false;
            g.add(spr1);
            const spr2 = coreSprite(dt, 0xffffff, 0.6);
            spr2.material.fog = false;
            g.add(spr2);
            const hm = coreHit(3.5); hm.position.copy(pos); return { fogGroup: g, hitMesh: hm };
        }

        function buildScene() {
            for (const m of allNodes) {
                group.remove(m.mesh);
                group.remove(m.label);
                if (m.mesh.geometry) m.mesh.geometry.dispose();
                if (m.mesh.material) m.mesh.material.dispose();
            }
            for (const c of allConnections) {
                group.remove(c.mesh);
                if (c.mesh.geometry) c.mesh.geometry.dispose();
                if (c.mesh.material) c.mesh.material.dispose();
            }
            for (const s of allShells) {
                group.remove(s);
            }
            if (centerGroup) group.remove(centerGroup);
            allNodes = [];
            allConnections = [];
            allEntries = [];
            allShells = [];
            centerGroup = null;
            nodeParentMap = new Map();
            childrenMap = new Map();

            // Center visual node
            const centerResult = buildDefaultCore(new THREE.Vector3(0, 0, 0), dotTexture);
            centerGroup = centerResult.fogGroup;
            centerGroup.scale.setScalar(0.35);
            group.add(centerGroup);
            const centerMesh = centerResult.hitMesh;
            centerMesh.position.set(0, 0, 0);
            centerMesh.userData = { item: null, depth: 0, color: new THREE.Color(0x88ddff), fogGroup: centerGroup };
            group.add(centerMesh);

            const laidOut = layoutItems(items, new THREE.Vector3(0, 0, 0), 1, maxTreeDepth, null, null);

            for (const entry of laidOut) {
                const { item, position, depth, color, parentItem } = entry;

                const dotColor = color.clone();
                const depthFade = Math.max(0.15, 1 - (depth - 1) / Math.max(1, config.maxDepth - 1) * 0.7);
                const spriteMat = new THREE.SpriteMaterial({
                    map: dotTexture,
                    color: dotColor,
                    transparent: true,
                    opacity: depthFade,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });
                const scale = (depth === 1 ? 2.0 : depth === 2 ? 1.4 : 1.0);
                const mesh = new THREE.Sprite(spriteMat);
                mesh.position.copy(position);
                mesh.scale.set(scale, scale, 1);
                mesh.userData = { item, depth, color: dotColor };
                group.add(mesh);

                const labelDir = position.clone();
                if (labelDir.length() > 0.01) labelDir.normalize();
                else labelDir.set(0, 1, 0);
                const labelPos = position.clone().add(labelDir.multiplyScalar(1.4));

                const hitRadius = depth === 1 ? 1.5 : depth === 2 ? 1.2 : depth === 3 ? 1.0 : 0.8;
                const hitGeo = new THREE.SphereGeometry(hitRadius, 8, 8);
                const hitMat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false });
                const hitMesh = new THREE.Mesh(hitGeo, hitMat);
                hitMesh.position.copy(position);
                hitMesh.userData = { item, depth, color: dotColor };
                group.add(hitMesh);
                mesh.userData.hitMesh = hitMesh;
                entry.hitMesh = hitMesh;

                const div = document.createElement('div');
                div.className = 'label-2d depth-' + Math.min(depth, 5);
                const hasCh = item.children && item.children.length > 0;
                const isCollapsed = collapsedState.get(item);
                div.innerHTML = hasCh
                    ? `<span class="collapse-dot" style="display:inline-block;width:12px;text-align:center;font-size:10px;color:${color.getStyle()};">${isCollapsed ? '▸' : '▾'}</span> ${item.name}`
                    : item.name;

                const hsl = {};
                color.clone().getHSL(hsl);
                div.style.color = `hsl(${hsl.h * 360}, ${hsl.s * 80}%, ${Math.min(90, hsl.l * 100 + 20)}%)`;

                const label = new CSS2DObject(div);
                label.position.copy(labelPos);
                group.add(label);

                const entryData = { item, mesh, label, position, depth, color, parentItem, hitMesh: entry.hitMesh || null };
                allEntries.push(entryData);
                allNodes.push({ mesh, label });
                allNodes.push({ mesh: hitMesh, label: null });
            }

            // Center entry for connections & animation
            const centerEntryData = { item: null, mesh: centerMesh, label: null, position: new THREE.Vector3(0, 0, 0), depth: 0, color: new THREE.Color(0x88ddff), parentItem: null, hitMesh: centerMesh };
            allEntries.unshift(centerEntryData);

            const connData = [];
            for (const e of allEntries) {
                if (e.depth <= 1) continue;
                const parentEntry = allEntries.find(n => n.item === e.parentItem);
                if (parentEntry) connData.push({ from: parentEntry, to: e });
            }
            // Connect center to depth-1 items
            for (const e of allEntries) {
                if (e.depth === 1) connData.push({ from: centerEntryData, to: e });
            }

            const lineMat = new THREE.MeshBasicMaterial({
                color: 0x6688aa,
                transparent: true,
                opacity: config.connectionOpacity,
            });

            for (const conn of connData) {
                const p0 = conn.from.position.clone();
                const p3 = conn.to.position.clone();
                const dir = p3.clone().sub(p0);
                const dist = dir.length();
                if (dist < 0.1) continue;
                const dirN = dir.clone().normalize();

                const start = conn.from.depth === 0
                    ? p0.clone().add(dirN.clone().multiplyScalar(2.3))
                    : p0.clone();
                const end = p3.clone();
                const mid = start.clone().add(end).multiplyScalar(0.5);
                const len = start.distanceTo(end);
                if (len < 0.1) continue;

                const geo = new THREE.CylinderGeometry(0.035, 0.035, len, 4, 1);
                const col = conn.from.color.clone().lerp(conn.to.color, 0.5);
                const mat = lineMat.clone();
                mat.color = col;
                mat.opacity = config.connectionOpacity;
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(mid);
                const upRef = new THREE.Vector3(0, 1, 0);
                const d = end.clone().sub(start).normalize();
                mesh.quaternion.setFromUnitVectors(upRef, d);
                group.add(mesh);
                allConnections.push({ mesh, material: mat, from: conn.from, to: conn.to });
            }

            // Orbital shells (atomic electron shell rings)
            const shellRadii = new Map();
            for (const e of allEntries) {
                if (e.depth === 0) continue;
                const r = e.depth === 1 ? 24 : computeBranchRadius(e.depth);
                if (!shellRadii.has(r)) shellRadii.set(r, e.depth);
            }
            for (const [radius, depth] of shellRadii) {
                const shellGroup = new THREE.Group();
                const opacity = Math.max(0.03, 0.15 - depth * 0.02);
                const col = new THREE.Color(0x4488cc);
                for (let ri = 0; ri < 3; ri++) {
                    const ringGeo = new THREE.TorusGeometry(radius, 0.015, 6, 48);
                    const ringMat = new THREE.MeshBasicMaterial({
                        color: col,
                        transparent: true,
                        opacity: opacity,
                        side: THREE.DoubleSide,
                        depthWrite: false,
                    });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    if (ri === 0) ring.rotation.x = Math.PI / 2;
                    else if (ri === 1) ring.rotation.y = Math.PI / 2;
                    else {
                        ring.rotation.x = Math.PI / 3;
                        ring.rotation.z = Math.PI / 3;
                    }
                    shellGroup.add(ring);
                }
                group.add(shellGroup);
                allShells.push(shellGroup);
            }

            collapsedState.clear();
            for (const e of allEntries) {
                if (e.depth >= config.maxDepth && e.item.children && e.item.children.length > 0) {
                    collapsedState.set(e.item, true);
                }
            }
            updateCameraForDepth(config.maxDepth);
            applyVisibility();

            if (window._brainPointerHandler) {
                renderer.domElement.removeEventListener('pointermove', window._brainPointerHandler);
            }
            if (window._brainDownHandler) {
                renderer.domElement.removeEventListener('pointerdown', window._brainDownHandler);
            }
            if (window._brainUpHandler) {
                renderer.domElement.removeEventListener('pointerup', window._brainUpHandler);
            }

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const clickables = allEntries.map(e => e.depth === 0 ? e.mesh : (e.hitMesh || e.mesh));
            const _clickPos = { x: 0, y: 0 };

            function getItemAtScreenPos(cx, cy) {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(clickables);
                let best = { item: null, dist: Infinity };
                for (const h of hits) {
                    const it = h.object.userData.item;
                    if (it && h.distance < best.dist) best = { item: it, dist: h.distance };
                }
                for (const e of allEntries) {
                    if (!e.label || !e.label.element) continue;
                    const el = e.label.element;
                    const r = el.getBoundingClientRect();
                    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
                        const d = camera.position.distanceTo(e.position);
                        if (d < best.dist) best = { item: e.item, dist: d };
                    }
                }
                return best.item;
            }

            // ツリー表示用HTML生成（開閉可能、初期は全て閉じた状態）
            function buildSubtreeHtml(item) {
                const hasCh = item.children && item.children.length > 0;
                let html = '<div class="tree-node">';
                html += '<div class="tree-label">';
                if (hasCh) html += '<span class="tree-toggle">&#9654;</span> ';
                else html += '<span style="display:inline-block;width:1em"></span> ';
                html += item.name + '</div>';
                if (hasCh) {
                    html += '<div class="tree-children" style="display:none">';
                    for (const ch of item.children) html += buildSubtreeHtml(ch);
                    html += '</div>';
                }
                html += '</div>';
                return html;
            }

            // 長押しポップアップ
            const treePopup = document.getElementById('tree-popup');
            const treePopupContent = document.getElementById('tree-popup-content');
            document.getElementById('tree-popup-close').addEventListener('click', function () { treePopup.classList.remove('visible'); });
            treePopup.addEventListener('click', function (e) { if (e.target === treePopup) treePopup.classList.remove('visible'); });
            // ツリーの開閉はイベントデリゲーション
            treePopupContent.addEventListener('click', function (e) {
                const label = e.target.closest('.tree-label');
                if (!label) return;
                const node = label.parentElement;
                const children = node.querySelector('.tree-children');
                if (!children) return;
                const toggle = label.querySelector('.tree-toggle');
                const hidden = children.style.display === 'none';
                children.style.display = hidden ? 'block' : 'none';
                if (toggle) toggle.innerHTML = hidden ? '&#9660;' : '&#9654;';
            });

            window._brainPointerHandler = (e) => {
                const item = getItemAtScreenPos(e.clientX, e.clientY);
                renderer.domElement.style.cursor = item ? 'pointer' : 'grab';
                // 長押しキャンセル
                if (window._longPressTimer) {
                    const dx = e.clientX - _clickPos.x;
                    const dy = e.clientY - _clickPos.y;
                    if (dx * dx + dy * dy > 36) { clearTimeout(window._longPressTimer); window._longPressTimer = null; }
                }
            };

            function collapseAll(item) {
                collapsedState.set(item, true);
                if (item.children) { for (const child of item.children) collapseAll(child); }
            }
            function expandAll(item) {
                collapsedState.set(item, false);
                if (item.children) { for (const child of item.children) expandAll(child); }
            }
            function expandOneLevel(item) {
                collapsedState.set(item, false);
                if (item.children) { for (const child of item.children) collapsedState.set(child, true); }
            }

            window._brainDownHandler = (e) => {
                _clickPos.x = e.clientX;
                _clickPos.y = e.clientY;
                window._longPressed = false;
                treePopup.classList.remove('visible');
                if (window._longPressTimer) clearTimeout(window._longPressTimer);
                window._longPressTimer = setTimeout(function () {
                    const item = getItemAtScreenPos(_clickPos.x, _clickPos.y);
                    if (item && item.children && item.children.length > 0) {
                        treePopupContent.innerHTML = buildSubtreeHtml(item);
                        treePopup.classList.add('visible');
                    }
                    window._longPressTimer = null;
                    window._longPressed = true;
                }, 500);
            };

            window._brainUpHandler = (e) => {
                if (window._longPressTimer) { clearTimeout(window._longPressTimer); window._longPressTimer = null; }
                if (window._longPressed) { window._longPressed = false; return; }
                const dx = e.clientX - _clickPos.x;
                const dy = e.clientY - _clickPos.y;
                if (dx * dx + dy * dy > 25) return;
                const item = getItemAtScreenPos(e.clientX, e.clientY);
                if (item && item.children && item.children.length > 0) {
                    const isCollapsed = collapsedState.get(item) || false;
                    if (isCollapsed) {
                        if (config.expandAll) { expandAll(item); } else { expandOneLevel(item); }
                    } else { collapseAll(item); }
                    applyVisibility();
                }
            };

            renderer.domElement.addEventListener('pointermove', window._brainPointerHandler);
            renderer.domElement.addEventListener('pointerdown', window._brainDownHandler);
            renderer.domElement.addEventListener('pointerup', window._brainUpHandler);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            const t = time * 0.001;

            const centerEntry = allEntries.find(e => e.depth === 0);
            if (centerEntry && centerEntry.mesh && centerEntry.mesh.userData) {
                const p = 1 + 0.06 * Math.sin(t * 2) +
                    0.03 * Math.sin(t * 4.3 + 1.2);
                const fogGroup = centerEntry.mesh.userData.fogGroup;
                if (fogGroup) fogGroup.scale.setScalar(p);
            }

            if (config.autoRotateSpeed > 0) {
                const inc = 0.002 * config.autoRotateSpeed;
                group.rotation.y += inc;
                for (let si = 0; si < allShells.length; si++) {
                    allShells[si].rotation.y += inc * 0.6 * (1 + si * 0.5);
                    allShells[si].rotation.x += inc * 0.3 * (1 + si * 0.3);
                }
                stars.rotation.x += inc * 0.15;
                stars.rotation.y += inc * 0.25;
            }
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate(0);

        function onResize() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            labelRenderer.setSize(w, h);
        }

        window.addEventListener('resize', onResize);

        document.getElementById('slider-opacity').addEventListener('input', function () {
            config.connectionOpacity = parseFloat(this.value);
            document.getElementById('val-opacity').textContent = this.value;
            for (const c of allConnections) {
                if (c.material) c.material.opacity = this.value;
            }
        });

        document.getElementById('slider-rotate').addEventListener('input', function () {
            config.autoRotateSpeed = parseFloat(this.value);
            document.getElementById('val-rotate').textContent = this.value;
        });

        document.getElementById('slider-sag').addEventListener('input', function () {
            config.stringSag = parseFloat(this.value);
            document.getElementById('val-sag').textContent = this.value;
            for (const c of allConnections) {
                group.remove(c.mesh);
                if (c.mesh.geometry) c.mesh.geometry.dispose();
                if (c.mesh.material) c.mesh.material.dispose();
                const p0 = c.from.position.clone();
                const p3 = c.to.position.clone();
                const dir = p3.clone().sub(p0);
                const dist = dir.length();
                if (dist < 0.1) continue;
                const dirN = dir.clone().normalize();
                const start = c.from.depth === 0
                    ? p0.clone().add(dirN.clone().multiplyScalar(2.3))
                    : p0.clone();
                const end = p3.clone();
                const mid = start.clone().add(end).multiplyScalar(0.5);
                const perpDir = new THREE.Vector3(-dirN.z, Math.abs(dirN.x) * 0.5, dirN.x).normalize();
                const sag = config.stringSag * dist * 0.25;
                const sagDir = new THREE.Vector3(0, -1, 0).add(perpDir).normalize();
                const p1 = mid.clone().add(sagDir.clone().multiplyScalar(sag));
                const p2 = mid.clone().add(sagDir.clone().multiplyScalar(sag * 0.4));
                const curve = new THREE.CatmullRomCurve3([start, p1, p2, end]);
                const tubeSegments = Math.max(8, Math.min(20, Math.floor(dist * 3)));
                const tubeGeo = new THREE.TubeGeometry(curve, tubeSegments, 0.04, 4, false);
                const newMat = c.material.clone();
                newMat.opacity = config.connectionOpacity;
                const tube = new THREE.Mesh(tubeGeo, newMat);
                group.add(tube);
                c.mesh = tube;
                c.material = newMat;
                c.curve = curve;
            }
        });

        document.getElementById('slider-labels').addEventListener('input', function () {
            config.showLabels = parseInt(this.value) === 1;
            document.getElementById('val-labels').textContent = config.showLabels ? 'ON' : 'OFF';
            for (const e of allEntries) {
                if (e.label && e.label.element) {
                    e.label.element.style.opacity = (e.depth === 0 || !config.showLabels) ? '0' : '1';
                }
            }
        });

        document.getElementById('slider-expand').addEventListener('input', function () {
            config.expandAll = parseInt(this.value) === 1;
            document.getElementById('val-expand').textContent = config.expandAll ? 'ON' : 'OFF';
        });

        let uiVisible = false;
        document.getElementById('toggle-ui').addEventListener('click', function () {
            uiVisible = !uiVisible;
            document.getElementById('ui-panel').classList.toggle('hidden', !uiVisible);
        });
    </script>
</body>

</html>
