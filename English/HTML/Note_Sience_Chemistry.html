  <style>
    .periodic-wrap { width: 100%; overflow: hidden; }
    .periodic-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
    .periodic-table th, .periodic-table td { border: 1px solid #e0e0e0; text-align: center; padding: 2px; }
    .group-cell { font-size: clamp(9px, 1.2vw, 12px); background: #f5f5f5; font-weight: 700; }
    .period-cell { width: 36px; font-size: clamp(9px, 1.2vw, 12px); background: #f5f5f5; font-weight: 700; }
    .element-cell { height: clamp(26px, 3.2vw, 46px); }
    .element-btn {
      width: 100%; min-width: 0 !important; height: 100% !important;
      font-size: clamp(8px, 1vw, 11px) !important; font-weight: 700; color: #111 !important;
      padding: 0 !important; border-radius: 4px !important; border: 1px solid rgba(0, 0, 0, 0.08) !important; box-shadow: none !important;
    }
    .empty-cell { background: #fafafa; }
    .cat-alkali { background: #ffccbc !important; }
    .cat-alkaline { background: #ffe0b2 !important; }
    .cat-transition { background: #fff9c4 !important; }
    .cat-post-transition { background: #dcedc8 !important; }
    .cat-metalloid { background: #b2dfdb !important; }
    .cat-nonmetal { background: #bbdefb !important; }
    .cat-halogen { background: #d1c4e9 !important; }
    .cat-noble { background: #f8bbd0 !important; }
    .cat-lanthanide { background: #c5cae9 !important; }
    .cat-actinide { background: #b2ebf2 !important; }

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Sience > Chemistry</main-system-bar>
      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">
            
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">Periodic Table</v-card-title>
                  <v-card-text>
                    <div class="periodic-wrap">
                      <table class="periodic-table">
                        <thead>
                          <tr>
                            <th class="group-cell">Period\\Group</th>
                            <th v-for="group in groupHeaders" :key="'group-' + group" class="group-cell">{{ group }}</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr v-for="(row, rowIndex) in periodicTable" :key="'row-' + rowIndex">
                            <th class="period-cell">{{ periodLabels[rowIndex] }}</th>
                            <td v-for="(symbol, colIndex) in row" :key="'cell-' + rowIndex + '-' + colIndex" class="element-cell" :class="{ 'empty-cell': !symbol }">
                              <v-btn v-if="symbol" class="element-btn" :class="getElementCategoryClass(symbol)" depressed @click="openElementDetail(symbol)">
                                {{ symbol }}
                              </v-btn>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                    <div class="mt-3">
                      <v-chip v-for="legend in categoryLegend" :key="legend.key" class="ma-1" small :color="legend.color" text-color="#111">
                        {{ legend.label }}
                      </v-chip>
                    </div>
                    <div class="mt-2 text-caption">Click an element for detailed information.</div>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>

            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">Chemistry</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="Search chemistry notes" prepend-inner-icon="mdi-magnify" clearable outlined dense class="mb-4" @input="filterTreeview"></v-text-field>
                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1">Basics</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2">Reactions</v-stepper-step>
                      </v-stepper-header>
                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Matter, Atoms, Bonds</v-card-title>
                              <v-treeview :items="filteredChemistryBasics" item-key="name" activatable open-on-click dense :open.sync="openNodesChemistryBasics" @update:open="updateOpenNodesChemistryBasics">
                                <template v-slot:label="{ item }"><span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span></template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container"><v-btn color="primary" @click="Count_Step_1 = 2">Next</v-btn></div>
                        </v-stepper-content>
                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Acid/Base, Redox, Mole</v-card-title>
                              <v-treeview :items="filteredChemistryReactions" item-key="name" activatable open-on-click dense :open.sync="openNodesChemistryReactions" @update:open="updateOpenNodesChemistryReactions">
                                <template v-slot:label="{ item }"><span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span></template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container"><v-btn text @click="Count_Step_1 = 1">Back</v-btn></div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>

            <v-dialog v-model="elementDialog" max-width="760">
              <v-card v-if="selectedElement">
                <v-card-title class="headline">{{ selectedElement.symbol }} - {{ selectedElement.name }}</v-card-title>
                <v-card-text>
                  <div><strong>Atomic Number:</strong> {{ selectedElement.atomicNumber }}</div>
                  <div><strong>Atomic Weight:</strong> {{ selectedElement.atomicWeight }}</div>
                  <div><strong>Group:</strong> {{ selectedElement.groupNumber }}</div>
                  <div><strong>Period:</strong> {{ selectedElement.periodNumber }}</div>
                  <div><strong>Category:</strong> {{ selectedElement.categoryLabel }}</div>
                  <div><strong>Commonly Found In:</strong> {{ selectedElement.containsIn }}</div>
                  <div><strong>Common Uses:</strong> {{ selectedElement.usedFor }}</div>
                  <div><strong>Note:</strong> {{ selectedElement.note }}</div>
                </v-card-text>
                <v-card-actions><v-spacer></v-spacer><v-btn text color="primary" @click="elementDialog = false">Close</v-btn></v-card-actions>
              </v-card>
            </v-dialog>
          </v-container>
        </transition>
      </v-main>
      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

        },
        filteredChemistryBasics: [],
        filteredChemistryReactions: [],
        openNodesChemistryBasics: [],
        openNodesChemistryReactions: [],
        ChemistryBasics: [
          { name: 'Matter basics', children: [{ name: 'All matter is made of atoms.' }, { name: 'Atoms contain nucleus and electrons.' }, { name: 'Elements are defined by proton count.' }] },
          { name: 'Periodic trends', children: [{ name: 'Elements in a group have similar behavior.' }, { name: 'Metallic character increases to the left.' }, { name: 'Atomic number equals proton number.' }] },
          { name: 'Chemical bonds', children: [{ name: 'Ionic: electron transfer.' }, { name: 'Covalent: electron sharing.' }, { name: 'Metallic: delocalized electrons.' }] },
          { name: 'Energy and states', children: [{ name: 'Melting, boiling, condensation, sublimation.' }, { name: 'Exothermic vs endothermic reactions.' }, { name: 'Rate factors: temperature, concentration, catalyst.' }] }
        ],
        ChemistryReactions: [
          { name: 'Equations', children: [{ name: 'Atoms are conserved in reactions.' }, { name: 'Balance with coefficients.' }, { name: 'Example: 2H2 + O2 -> 2H2O' }] },
          { name: 'Mole', children: [{ name: '1 mol = 6.02 x 10^23 particles.' }, { name: 'n = m / M' }, { name: 'c = n / V (mol/L)' }] },
          { name: 'Acid/base', children: [{ name: 'Acids donate H+, bases accept H+.' }, { name: 'pH<7 acid, pH=7 neutral, pH>7 base.' }, { name: 'Neutralization: acid + base -> salt + water.' }] },
          { name: 'Redox', children: [{ name: 'Oxidation loses electrons.' }, { name: 'Reduction gains electrons.' }, { name: 'Key in batteries, combustion, corrosion.' }] }
        ]
      },
      created() {
        Object.keys(this.elementDetails).forEach((symbol) => {
          const key = this.getElementCategoryKey(symbol);
          this.elementDetails[symbol].containsIn = this.getDefaultContainsIn(symbol, key);
          this.elementDetails[symbol].usedFor = this.getDefaultUsedFor(symbol, key);
          this.elementDetails[symbol].note = this.getDefaultNote(symbol);
        });
        this.filteredChemistryBasics = JSON.parse(JSON.stringify(this.ChemistryBasics));
        this.filteredChemistryReactions = JSON.parse(JSON.stringify(this.ChemistryReactions));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => nodes.forEach((node) => { ids.push(node.name); if (node.children) collect(node.children); });
          collect(items);
          return ids;
        },
        updateOpenNodesChemistryBasics(v) { this.openNodesChemistryBasics = v; },
        updateOpenNodesChemistryReactions(v) { this.openNodesChemistryReactions = v; },
        getElementPosition(symbol) {
          for (let r = 0; r < this.periodicTable.length; r += 1) {
            const c = this.periodicTable[r].indexOf(symbol);
            if (c !== -1) return { period: this.periodLabels[r], group: c + 1 };
          }
          return { period: '-', group: '-' };
        },
        getElementCategoryKey(symbol) {
          const alkali = ['Li','Na','K','Rb','Cs','Fr'];
          const alkaline = ['Be','Mg','Ca','Sr','Ba','Ra'];
          const halogen = ['F','Cl','Br','I','At','Ts'];
          const noble = ['He','Ne','Ar','Kr','Xe','Rn','Og'];
          const nonmetal = ['H','C','N','O','P','S','Se'];
          const metalloid = ['B','Si','Ge','As','Sb','Te','Po'];
          const postTransition = ['Al','Ga','In','Tl','Sn','Pb','Bi','Nh','Fl','Mc','Lv'];
          const lanthanide = ['La','Ce','Pr','Nd','Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb','Lu'];
          const actinide = ['Ac','Th','Pa','U','Np','Pu','Am','Cm','Bk','Cf','Es','Fm','Md','No','Lr'];
          if (alkali.includes(symbol)) return 'alkali';
          if (alkaline.includes(symbol)) return 'alkaline';
          if (halogen.includes(symbol)) return 'halogen';
          if (noble.includes(symbol)) return 'noble';
          if (nonmetal.includes(symbol)) return 'nonmetal';
          if (metalloid.includes(symbol)) return 'metalloid';
          if (postTransition.includes(symbol)) return 'post-transition';
          if (lanthanide.includes(symbol)) return 'lanthanide';
          if (actinide.includes(symbol)) return 'actinide';
          return symbol ? 'transition' : 'unknown';
        },
        getElementCategoryLabel(key) {
          const map = {
            alkali: 'Alkali Metal', alkaline: 'Alkaline Earth Metal', transition: 'Transition Metal',
            'post-transition': 'Post-transition Metal', metalloid: 'Metalloid', nonmetal: 'Nonmetal',
            halogen: 'Halogen', noble: 'Noble Gas', lanthanide: 'Lanthanide', actinide: 'Actinide', unknown: 'Unknown'
          };
          return map[key] || map.unknown;
        },
        getElementCategoryClass(symbol) { return `cat-${this.getElementCategoryKey(symbol)}`; },
        getDefaultContainsIn(symbol, key) {
          const synthetic = ['Tc','Pm','Np','Pu','Am','Cm','Bk','Cf','Es','Fm','Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds','Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'];
          if (synthetic.includes(symbol)) return 'Mostly synthetic; trace or no natural abundance.';
          const map = {
            alkali: 'Mineral salts and seawater.',
            alkaline: 'Carbonate and sulfate minerals.',
            transition: 'Ore minerals in the crust.',
            'post-transition': 'Crustal ores and industrial by-products.',
            metalloid: 'Silicate and oxide ores.',
            nonmetal: 'Atmosphere, hydrosphere, biosphere, and nonmetal minerals.',
            halogen: 'Halide salts in seawater and evaporites.',
            noble: 'Trace gases in atmosphere or decay products.',
            lanthanide: 'Rare-earth minerals like monazite.',
            actinide: 'Radioactive ores or reactor products.'
          };
          return map[key] || 'Natural minerals or industrial production streams.';
        },
        getDefaultUsedFor(symbol, key) {
          const synthetic = ['Tc','Pm','Np','Pu','Am','Cm','Bk','Cf','Es','Fm','Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds','Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'];
          if (synthetic.includes(symbol)) return 'Nuclear science, research, and specialized instrumentation.';
          const map = {
            alkali: 'Batteries, chemicals, heat transfer media.',
            alkaline: 'Alloys, construction materials, desiccants.',
            transition: 'Alloys, catalysts, electronics, machinery.',
            'post-transition': 'Coatings, solders, semiconductors, shielding.',
            metalloid: 'Semiconductors, optics, specialty alloys.',
            nonmetal: 'Fertilizers, fuels, polymers, biochemistry.',
            halogen: 'Disinfection, polymers, etching, synthesis.',
            noble: 'Lighting, inert shielding gas, cryogenics.',
            lanthanide: 'Magnets, phosphors, lasers, catalysts.',
            actinide: 'Nuclear fuel cycle and radiation sources.'
          };
          return map[key] || 'Materials and chemical industry.';
        },
        getDefaultNote(symbol) {
          const radioactiveLike = ['Tc','Pm','Po','At','Rn','Fr','Ra','Ac','Np','Pu','Am','Cm','Bk','Cf','Es','Fm','Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds','Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'];
          if (radioactiveLike.includes(symbol)) return 'No stable isotopes or very short-lived isotopes; strict handling required.';
          return 'Properties depend on isotopic composition and chemical state.';
        },
        openElementDetail(symbol) {
          const base = this.elementDetails[symbol] || {};
          const pos = this.getElementPosition(symbol);
          const key = this.getElementCategoryKey(symbol);
          this.selectedElement = {
            symbol,
            name: base.name || 'Data pending',
            atomicNumber: this.getAtomicNumber(symbol),
            atomicWeight: base.atomicWeight || 'Data pending',
            groupNumber: pos.group,
            periodNumber: pos.period,
            categoryLabel: this.getElementCategoryLabel(key),
            containsIn: base.containsIn || this.getDefaultContainsIn(symbol, key),
            usedFor: base.usedFor || this.getDefaultUsedFor(symbol, key),
            note: base.note || this.getDefaultNote(symbol)
          };
          this.elementDialog = true;
        },
        getAtomicNumber(symbol) {
          const order = ['H','He','Li','Be','B','C','N','O','F','Ne','Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca','Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn','Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr','Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn','Sb','Te','I','Xe','Cs','Ba','La','Ce','Pr','Nd','Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb','Lu','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg','Tl','Pb','Bi','Po','At','Rn','Fr','Ra','Ac','Th','Pa','U','Np','Pu','Am','Cm','Bk','Cf','Es','Fm','Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds','Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'];
          const idx = order.indexOf(symbol);
          return idx === -1 ? '-' : idx + 1;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredChemistryBasics = JSON.parse(JSON.stringify(this.ChemistryBasics));
            this.openNodesChemistryBasics = [];
            this.filteredChemistryReactions = JSON.parse(JSON.stringify(this.ChemistryReactions));
            this.openNodesChemistryReactions = [];
            return;
          }
          const filterTree = (items) => items.reduce((acc, item) => {
            const copy = { ...item };
            const matches = item.name.toLowerCase().includes(query);
            if (item.children) {
              copy.children = filterTree(item.children);
              if (copy.children.length > 0 || matches) { copy.matches = matches; acc.push(copy); }
            } else if (matches) { copy.matches = true; acc.push(copy); }
            return acc;
          }, []);
          this.filteredChemistryBasics = filterTree(JSON.parse(JSON.stringify(this.ChemistryBasics)));
          this.openNodesChemistryBasics = this.collectAllNodeIds(this.filteredChemistryBasics);
          this.filteredChemistryReactions = filterTree(JSON.parse(JSON.stringify(this.ChemistryReactions)));
          this.openNodesChemistryReactions = this.collectAllNodeIds(this.filteredChemistryReactions);
        }
      }
    });
  </script>
</body>
