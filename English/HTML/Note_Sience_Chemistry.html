<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
    rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
  <link href="../../Asset/CSS/Learning.css" rel="stylesheet" />

  <title>Chemistry</title>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Sience > Chemistry</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">化学</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="化学ノートを検索" prepend-inner-icon="mdi-magnify" clearable outlined dense
                      class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1"
                          @click="Count_Step_1 = 1">基礎</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2"
                          @click="Count_Step_1 = 2">反応と計算</v-stepper-step>
                        <v-divider></v-divider>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">物質・原子・結合</v-card-title>
                              <v-treeview :items="filteredChemistryBasics" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesChemistryBasics" @update:open="updateOpenNodesChemistryBasics">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">酸塩基・酸化還元・モル計算</v-card-title>
                              <v-treeview :items="filteredChemistryReactions" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesChemistryReactions" @update:open="updateOpenNodesChemistryReactions">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        dialog: false,
        searchQuery: '',
        filteredChemistryBasics: [],
        filteredChemistryReactions: [],
        openNodesChemistryBasics: [],
        openNodesChemistryReactions: [],
        ChemistryBasics: [
          {
            name: "物質の基本",
            children: [
              { name: "すべての物質は原子で構成される。" },
              { name: "原子は原子核（陽子・中性子）と電子からなる。" },
              { name: "元素は同じ陽子数をもつ原子の集まり。" }
            ]
          },
          {
            name: "周期表の見方",
            children: [
              { name: "同じ族は似た化学的性質を示す。" },
              { name: "左ほど金属性が強く、右ほど非金属性が強い。" },
              { name: "原子番号は陽子数と一致する。" }
            ]
          },
          {
            name: "化学結合",
            children: [
              { name: "イオン結合: 電子の受け渡しで生じる。" },
              { name: "共有結合: 電子対を共有して生じる。" },
              { name: "金属結合: 自由電子で結びつき、電気を通しやすい。" }
            ]
          },
          {
            name: "状態変化とエネルギー",
            children: [
              { name: "融解・凝固・蒸発・凝縮・昇華は粒子運動で説明できる。" },
              { name: "発熱反応は熱を放出し、吸熱反応は熱を吸収する。" },
              { name: "温度、濃度、表面積、触媒は反応速度に影響する。" }
            ]
          }
        ],
        ChemistryReactions: [
          {
            name: "化学式と反応式",
            children: [
              { name: "化学反応式では反応前後で原子数が保存される。" },
              { name: "係数で調整して質量保存則を満たす。" },
              { name: "例: 2H2 + O2 -> 2H2O" }
            ]
          },
          {
            name: "モル計算",
            children: [
              { name: "1 mol = 6.02 x 10^23 個（アボガドロ定数）。" },
              { name: "物質量 n = 質量 m / モル質量 M。" },
              { name: "濃度 c (mol/L) = 物質量 n / 体積 V(L)。" }
            ]
          },
          {
            name: "酸・塩基",
            children: [
              { name: "酸は H+ を与え、塩基は H+ を受け取る。" },
              { name: "pH < 7 は酸性、pH = 7 は中性、pH > 7 は塩基性。" },
              { name: "中和: 酸 + 塩基 -> 塩 + 水。" }
            ]
          },
          {
            name: "酸化還元",
            children: [
              { name: "酸化は電子を失う反応、還元は電子を受け取る反応。" },
              { name: "酸化数の増減で電子移動を追跡できる。" },
              { name: "電池、燃焼、金属腐食は酸化還元の代表例。" }
            ]
          }
        ],
      },
      created() {
        this.filteredChemistryBasics = JSON.parse(JSON.stringify(this.ChemistryBasics));
        this.filteredChemistryReactions = JSON.parse(JSON.stringify(this.ChemistryReactions));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesChemistryBasics(newOpen) {
          this.openNodesChemistryBasics = newOpen;
        },
        updateOpenNodesChemistryReactions(newOpen) {
          this.openNodesChemistryReactions = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredChemistryBasics = JSON.parse(JSON.stringify(this.ChemistryBasics));
            this.openNodesChemistryBasics = [];
            this.filteredChemistryReactions = JSON.parse(JSON.stringify(this.ChemistryReactions));
            this.openNodesChemistryReactions = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredChemistryBasics = filterTree(JSON.parse(JSON.stringify(this.ChemistryBasics)));
          this.openNodesChemistryBasics = this.collectAllNodeIds(this.filteredChemistryBasics);
          this.filteredChemistryReactions = filterTree(JSON.parse(JSON.stringify(this.ChemistryReactions)));
          this.openNodesChemistryReactions = this.collectAllNodeIds(this.filteredChemistryReactions);
        }
      }
    });
  </script>
</body>

</html>
