<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
  <link href="../../Asset/CSS/Learning.css" rel="stylesheet" />

  <title>ショートカット</title>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Computer > Shortcut</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">ショートカット</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="ショートカットを検索" prepend-inner-icon="mdi-magnify" clearable
                      outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1"></v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2"></v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 3" step="3" @click="Count_Step_1 = 3"></v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Cursor</v-card-title>
                              <v-treeview :items="filteredShortcutCursor" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesShortcutCursor" @update:open="updateOpenNodesShortcutCursor">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Windows</v-card-title>
                              <v-treeview :items="filteredShortcutWindows" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesShortcutWindows" @update:open="updateOpenNodesShortcutWindows">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                            <v-btn color="primary" @click="Count_Step_1 = 3">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="3">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Blender</v-card-title>
                              <v-treeview :items="filteredShortcutBlender" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesShortcutBlender" @update:open="updateOpenNodesShortcutBlender">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 2">戻る</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        dialog: false,
        searchQuery: '',
        filteredShortcutCursor: [],
        filteredShortcutWindows: [],
        filteredShortcutBlender: [],
        openNodesShortcutCursor: [],
        openNodesShortcutWindows: [],
        openNodesShortcutBlender: [],
        ShortcutCursor: [
          {
            name: 'Cursor', children: [
              { name: '括弧', children: [
                { name: 'Ctrl + Shift → [ : カーソル位置の折り畳み' },
                { name: 'Ctrl + Shift → ] : カーソル位置の展開' },
                { name: 'Ctrl + M → [ : ネスト折り畳み' },
                { name: 'Ctrl + M → ] : ネスト展開' },
                { name: 'Ctrl + M → 0 : 全て折り畳み' },
                { name: 'Ctrl + M → J : 全て展開' },
              ]},
              { name: 'Shift + Alt + F  : 整地' },
              { name: 'Ctrl + Shift + K : 行削除' },
            ]
          },
        ],
        ShortcutWindows: [
          {
            name: 'Windows', children: [
              { name: 'OS', children: [
                { name: 'Windows + (1~9)     : タスクバーアプリの切り替え' },
                { name: 'Windows + Shift + S : スクリーンショット切り抜き' },
                { name: 'Windows + D         : デスクトップ表示' },
                { name: 'Alt + F4            : アクティブなウィンドウを閉じる' },
              ]},
              { name: 'ブラウザ', children: [
                { name: 'Ctrl + (1~9)     : タブの切り替え' },
                { name: 'Ctrl + Shift + T : タブの復元' },
                { name: 'Ctrl + L         : URLへカーソル移動' },
              ]},
            ]
          },
        ],
        ShortcutBlender: [
          {
            name: 'Blender', children: [
              { name: 'Alt + S        : 法線に対して拡縮' },
              { name: 'Ctrl + Alt + 0 : カメラをビューに固定' },
            ]
          },
        ],
      },
      created() {
        this.filteredShortcutCursor = JSON.parse(JSON.stringify(this.ShortcutCursor));
        this.filteredShortcutWindows = JSON.parse(JSON.stringify(this.ShortcutWindows));
        this.filteredShortcutBlender = JSON.parse(JSON.stringify(this.ShortcutBlender));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesShortcutCursor(newOpen) {
          this.openNodesShortcutCursor = newOpen;
        },
        updateOpenNodesShortcutWindows(newOpen) {
          this.openNodesShortcutWindows = newOpen;
        },
        updateOpenNodesShortcutBlender(newOpen) {
          this.openNodesShortcutBlender = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredShortcutCursor = JSON.parse(JSON.stringify(this.ShortcutCursor));
            this.filteredShortcutWindows = JSON.parse(JSON.stringify(this.ShortcutWindows));
            this.filteredShortcutBlender = JSON.parse(JSON.stringify(this.ShortcutBlender));
            this.openNodesShortcutCursor = [];
            this.openNodesShortcutWindows = [];
            this.openNodesShortcutBlender = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredShortcutCursor = filterTree(JSON.parse(JSON.stringify(this.ShortcutCursor)));
          this.filteredShortcutWindows = filterTree(JSON.parse(JSON.stringify(this.ShortcutWindows)));
          this.filteredShortcutBlender = filterTree(JSON.parse(JSON.stringify(this.ShortcutBlender)));

          this.openNodesShortcutCursor = this.collectAllNodeIds(this.filteredShortcutCursor);
          this.openNodesShortcutWindows = this.collectAllNodeIds(this.filteredShortcutWindows);
          this.openNodesShortcutBlender = this.collectAllNodeIds(this.filteredShortcutBlender);
        }
      }
    });
  </script>
</body>

</html>
