<body>
    <canvas id="CurlNoiseBg" aria-hidden="true"></canvas>
    <v-app id="App">
        <template>

            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">About Me > Blog</main-system-bar>
            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>

            <v-main id="Main">
                <transition name="Fade_Page">
                    <v-container v-show="Ready_Page" fluid class="pa-5">

                        <v-row>
                            <v-col cols="12" md="4" order="first" order-md="last">
                                <v-card class="mb-4">
                                    <v-card-title>About Me</v-card-title>
                                    <v-card-text>
                                        <v-row>
                                            <v-col cols="auto">
                                                <v-img lazy-src="../../Asset/Image/Icon_1_1.jpg"
                                                    src="../../Asset/Image/Icon_1_1.jpg"
                                                    style="border-radius: 50%; width: 5em; height: 5em;"></v-img>
                                            </v-col>
                                            <v-col>Hello. I'm FUM. i write articles about the world and Japan.</v-col>
                                        </v-row>
                                    </v-card-text>
                                </v-card>
                                <v-card class="mb-4">
                                    <v-date-picker v-model="selectedDate" @click:date="dateSelected"
                                        @update:picker-date="updatePickerDate" full-width no-title :events="postDates"
                                        event-color="primary" class="custom-date-picker"></v-date-picker>
                                    <v-card-text class="text-center py-0">
                                        <v-icon small style="color: #1976d2 !important;">mdi-circle</v-icon>
                                        <span class="ml-1 caption">Dates with posts</span>
                                    </v-card-text>
                                    <v-card-actions>
                                        <v-btn text color="primary" @click="showAllPosts">Show All</v-btn>
                                        <v-btn text color="primary" @click="showCurrentMonthPosts">Show Month</v-btn>
                                    </v-card-actions>
                                </v-card>
                                <v-card>
                                    <v-card-title>Themes</v-card-title>
                                    <v-card-text>
                                        <v-chip-group v-model="selectedThemes" column multiple>
                                            <v-chip v-for="theme in themes" :key="theme" :value="theme" filter outlined>
                                                {{ theme }}
                                            </v-chip>
                                        </v-chip-group>
                                    </v-card-text>
                                </v-card>
                            </v-col>
                            <v-col cols="12" md="8" order="last" order-md="first">
                                <v-card>
                                    <v-card-title class="text-h5 mb-4">
                                        {{ pageTitle }}
                                        <v-chip v-if="selectedThemes.length > 0" class="ml-2" small color="primary">
                                            {{ filteredThemesText }}
                                        </v-chip>
                                    </v-card-title>
                                    <template v-if="filteredPosts.length > 0">
                                        <v-card v-for="post in filteredPosts" :key="post.id" class="mb-6 pb-1 blog-card"
                                            :id="'post-card-' + post.id">
                                            <v-img :src="post.image" height="auto" style="max-height: 480px"></v-img>
                                            <v-card-title class="text-h6 pt-4">{{ post.title }}</v-card-title>
                                            <v-card-subtitle class="pb-2">{{ post.date }}</v-card-subtitle>
                                            <v-chip-group style="padding-left: 16px; padding-bottom: 16px;">
                                                <v-chip v-for="theme in post.themes" :key="theme" small>
                                                    {{ theme }}
                                                </v-chip>
                                            </v-chip-group>
                                            <v-card-text :key="'collapsed'">
                                                {{ post.excerpt }}
                                            </v-card-text>
                                            <v-card-actions class="pt-0 mb-2">
                                                <v-btn text @click="togglePost(post.id)">
                                                    {{ expandedPosts.includes(post.id) ? 'Close' : 'Read More' }}
                                                </v-btn>
                                            </v-card-actions>
                                            <v-card-text class="text-body-1 pb-4">
                                                <transition-group name="fade-slide" mode="out-in">
                                                    <div v-if="expandedPosts.includes(post.id)" :key="'expanded'">
                                                        <!-- 投稿ID=3 (大量絶滅) の場合、本文を分割してグラフを挿入 -->
                                                        <template v-if="post.id === 3">
                                                            <div v-html="post.content_part1"></div>
                                                            <div class="my-6">
                                                                <apexchart type="bar" height="350"
                                                                    :options="chartOptions" :series="chartSeries">
                                                                </apexchart>
                                                                <p class="caption text-right mt-1"><em>Source: Various
                                                                        scientific sources</em></p>
                                                            </div>
                                                            <div v-html="post.content_part2"></div>
                                                        </template>
                                                        <template v-else>
                                                            <div v-html="post.content"></div>
                                                        </template>
                                                        <div class="text-right mt-4 mb-4 mr-2">
                                                            <v-btn icon color="primary"
                                                                @click="scrollToCardTop(post.id)"
                                                                title="Scroll to top of card">
                                                                <v-icon style="color: #1976d2 !important;">mdi-arrow-up</v-icon>
                                                            </v-btn>
                                                        </div>
                                                    </div>
                                                </transition-group>
                                            </v-card-text>
                                        </v-card>
                                    </template>
                                    <v-card-text v-else class="text-h6">
                                        No posts available for this period or themes.
                                    </v-card-text>
                                </v-card>
                            </v-col>
                        </v-row>

                    </v-container>
                </transition>
            </v-main>

            <main-footer></main-footer>

        </template>
    </v-app>

    <script>
        new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            components: {
                apexchart: VueApexCharts,
            },
            mixins: [window.Mixins_Common],
            data: {
                selectedDate: null,
                showCurrentMonth: false,
                pickerDate: new Date(),
                expandedPosts: [],
                selectedThemes: [],
                themes: [
                    'Cooking',
                    'Culture',
                    'Food',
                    'Health',
                    'History',
                    'Japan',
                    'Science',
                    'Greeting',
                ],
                blogPosts: [
                    {
                        id: 1,
                        title: 'My First Post',
                        date: '2024-07-13',
                        image: '../../Asset/Image/Blog/20240713_1.png',
                        excerpt: 'This is my first blog post. I\'m excited to share my thoughts with you!',
                        content: `
                            <h3>Welcome to My Blog!</h3>
                            <p>
                                Hello everyone, I'm <b>FUM</b>.
                            </p>
                            <p>
                                In this blog, I will be sharing <b>Various information</b> about the world and Japan.
                            </p>
                            <p>
                                I will be writing articles from <b>My own perspective</b>, so please come and check them out.
                            </p>
                            <p>
                                <b>Thank you for your support</b>.
                            </p>
                        `,
                        themes: ['Greeting']
                    },
                    {
                        id: 2,
                        title: 'Homemade Ramen',
                        date: '2024-08-31',
                        image: '../../Asset/Image/Blog/20240831_1.png',
                        excerpt: 'I tackled making ramen from scratch for the first time, from the slow-simmered broth to custom noodles. It was a delicious success! Here\'s how it went.',
                        content: `
                            <p>
                                <h3>My Ramen Challenge: From Scratch</h3>
                                I've always wanted to try making authentic ramen, and this time I went all in—crafting everything from the broth to the noodles myself. Here is the story of my culinary journey to create this special bowl.
                            </p>
                            <br>
                            <p>
                                <h3>The Broth: Soul of the Ramen</h3>
                                The foundation of any good ramen is its broth. I let <b>chicken bones</b> and garlic simmer for hours, carefully drawing out the rich, deep flavors. The wonderful aroma filled the house and built up the anticipation.
                                <br><center><img src="../../Asset/Image/Blog/20240831_4.jpg" class="blog-content-image"></center>
                            </p>
                            <br>
                            <p>
                                <h3>Custom Noodles and "Tare" Seasoning</h3>
                                For the noodles, I wanted a personal touch, kneading a special dough with <b>chives, garlic, and egg</b>. The "tare" (the seasoning base) that defines the soup's final character was made from <b>soy sauce</b> infused with kombu (kelp). Combining this with the broth right before serving is the key to a fragrant and flavorful result.
                                <br><center><img src="../../Asset/Image/Blog/20240831_3.jpg" class="blog-content-image"></center>
                            </p>
                            <br>
                            <p>
                                <h3>The Final Bowl: A Taste of Accomplishment</h3>
                                Finally, all the elements came together into my very own, unique bowl of ramen. The more time and effort you invest, the more personal and special the flavor becomes. I believe this sense of accomplishment is the best spice for any homemade dish.
                                <br><center><img src="../../Asset/Image/Blog/20240831_2.jpg" class="blog-content-image"></center>
                            </p>
                            <br>
                            <p>
                                <h3>Epilogue: Now It's Your Turn!</h3>
                                You can adapt the toppings and seasonings using delicious ingredients from your own country. If this inspires you, I highly recommend giving it a try—the process itself is just as rewarding as the meal! For detailed instructions on how to make the noodles from scratch, please see the recipe on the <a href="./Cooking_Normal.html">Cooking page</a>.
                            </p>
                        `,
                        themes: ['Cooking', 'Food', 'Japan']
                    },
                    {
                        id: 3,
                        title: 'A Glimpse into Mass Extinctions',
                        date: '2025-06-20',
                        image: '../../Asset/Image/Blog/20250620_1.png',
                        excerpt: 'Did you know Earth has experienced five major mass extinctions? Scientists now warn we might be in the midst of the sixth, driven by human activity.',
                        content_part1: `
                            <p>
                                <h3>Earth's Dramatic History: The "Big Five"</h3>
                                The history of life on Earth is a dramatic story of evolution and extinction. Among these events, five stand out as "The Big Five," catastrophic moments that wiped out a significant portion of species. The chart below illustrates the staggering scale of these events.
                            </p>
                        `,
                        content_part2: `
                            <p>
                                <h3>From Dinosaurs to "The Great Dying"</h3>
                                Many of us know about the extinction that wiped out the dinosaurs at the end of the Cretaceous period, likely caused by an asteroid impact. However, the most severe was the Permian-Triassic extinction, also known as "The Great Dying." It eliminated about 96% of marine species and 70% of terrestrial vertebrate species. The leading theory points to massive volcanic eruptions in Siberia.
                            </p>
                            <br>
                            <p>
                                <h3>The Sixth Mass Extinction: A Human-Made Crisis</h3>
                                Now, many scientists are sounding the alarm about a "Sixth Mass Extinction." This time, the cause isn't a natural cataclysm but human activities: habitat destruction, climate change, and pollution. The current rate of extinction is estimated to be tens to hundreds of times higher than the natural background rate.
                            </p>
                            <br>
                            <p>
                                <h3>A Lesson for Our Time</h3>
                                Understanding these past events gives us a crucial perspective on our current impact on the planet. It's a stark reminder of our responsibility to protect the rich tapestry of life we share the Earth with.
                            </p>
                        `,
                        themes: ['Science']
                    },
                    {
                        id: 4,
                        title: "Plants' Silent Survival Strategies",
                        date: '2025-06-24',
                        image: '../../Asset/Image/Blog/20250624_1.png',
                        excerpt: 'Plants warn their neighbors of pest attacks and share nutrients through their roots. Discover their amazing abilities and some "slightly scary" knowledge you can use in your own garden.',
                        content: `
                            <p>
                                <h3>Introduction: Science That Changes How We See Plants</h3>
                                Plants may seem static and passive, but recent research reveals they possess highly advanced communication abilities. While they don't use sound, plants exchange information and compete for survival through chemical substances. This article introduces three plant abilities that science is beginning to unravel.
                            </p>
                            <br>
                            <p>
                                <h3>1. Aerial Chemical Signals: Warnings and Calls for Reinforcements Through Scent</h3>
                                When a plant is attacked by pests, it releases specific volatile organic compounds (VOCs), essentially "scents." This chemical signal has clear purposes.
                                <br><b>Warning to Nearby Individuals:</b>
                                Upon receiving this signal, neighboring plants activate their defense systems in advance. For example, they accumulate substances like tannins, which pests dislike, in their leaves, making them less likely to be eaten.
                                <br><b>Attracting Natural Enemies:</b>
                                Some of the released chemicals attract the pests' natural enemies (like parasitic wasps). This is a sophisticated defense strategy to indirectly protect themselves by summoning the predators of their predators.
                                <br><center><img src="../../Asset/Image/Blog/20250624_2.png" class="blog-content-image"></center>
                            </p>
                            <br>
                            <p>
                                <h3>2. The Underground Fungal Network: The "Wood-Wide Web"</h3>
                                Plant communication is also active underground. The roots of many trees are interconnected by the mycelia of "mycorrhizal fungi," forming a vast underground network.
                                This network, also known as the **"Wood-Wide Web,"** enables the exchange of nutrients like carbon and nitrogen. For instance, carbon can be sent from a parent tree in a sunny spot to a young sapling in the shade, a function that redistributes resources throughout the forest. This is a crucial mechanism contributing to the overall stability of the forest ecosystem.
                                <br><center><img src="../../Asset/Image/Blog/20250624_3.png" class="blog-content-image"></center>
                            </p>
                            <br>
                            <p>
                                <h3>3. Allelopathy: The Silent Turf War Waged with Chemicals</h3>
                                Beyond cooperation, plants also attack other plants to compete for survival. Their weapon of choice is **"allelopathy."**
                                This is a phenomenon where chemical substances released by one plant inhibit the growth of other plants nearby.
                                <br><b>Goldenrod:</b> Releases chemicals from its roots that suppress the germination of other plants, allowing it to expand its own colony.
                                <br><b>Walnut Trees:</b> Release a potent growth inhibitor called "juglone" from their leaves and roots, preventing other plants from taking root nearby.
                                This knowledge of allelopathy is crucial for understanding "companion planting" in agriculture and gardening, as well as identifying plants that do not grow well together.
                                <br><center><img src="../../Asset/Image/Blog/20250624_4.png" class="blog-content-image"></center>
                            </p>
                            <br>

                            <p>

                            </p>

                            <p>
                                <h3>2. The European Adaptation: Ketchup Without Tomatoes</h3>
                                Back in England, recreating the original fish-based sauce was difficult. Cooks began to improvise, creating their own versions of "ketchup" using more readily available ingredients. This led to a wide variety of ketchups, including those made from <b>mushrooms, walnuts, oysters, or lemons</b>. These sauces were typically dark and savory, used to add a complex, umami flavor to meats and other dishes. For a long time, "ketchup" was a broad category of tangy sauces, none of which involved tomatoes.

                                The game-changer was the tomato. Introduced to ketchup recipes in the early 19th century in the United States, tomatoes added a new dimension of flavor, sweetness, and color. An 1812 recipe by scientist and horticulturalist James Mease is one of the earliest known for tomato-based ketchup.
                                <br><br>
                                However, it was <b>Henry J. Heinz</b> who perfected and popularized it. In 1876, his company introduced a recipe using ripe tomatoes, vinegar (a natural preservative), and sugar. This created a consistent, appealing, and long-lasting product that perfectly suited the American palate. Heinz's innovative use of clear glass bottles to showcase the product's purity and vibrant red color was a marketing masterstroke, cementing tomato ketchup as the standard.

                            Everyday environments contain soil bacteria, plants, animals, and other people's microbiota. Contact with this diversity trains immune cells to distinguish real threats from harmless substances.

                            Together, these effects calm excessive immune reactions and lower chronic inflammation.
                            </p>
                            <br>

                            <p>

                            Immunity is essentially a learning system. T cells and gut-associated immune tissues develop tolerance through repeated exposure to benign microbes. 
                            When this education is insufficient — for example, in overly sterile environments — the immune system tends to overreact, attacking pollen, food, or even the body itself.
                            </p>

                            <ul>
                                <li>Higher risk of allergies and asthma</li>
                                <li>Increased autoimmune disorders</li>
                                <li>Persistent low-grade inflammation</li>

                            </p>

                            Nearly 70% of immune cells are located in the gut. The diversity of gut microbiota directly influences inflammation levels throughout the body.

                            },
                            xaxis: {
                                categories: [
                                    'Permian-Triassic ("The Great Dying")',
                                    'Ordovician-Silurian',
                                    'Triassic-Jurassic',
                                    'Cretaceous-Paleogene (Dinosaur Extinction)',
                                    'Late Devonian',
                                ],
                                title: { text: 'Estimated Percentage of Species Lost', style: { color: '#666' } }
                            },
                            tooltip: { y: { formatter: (val) => val + "% of all species" } },
                            fill: { opacity: 1 },
                            colors: ['#c0392b'],
                            title: { text: 'Severity of The "Big Five" Mass Extinctions', align: 'center', style: { fontSize: '16px', color: '#263238' } },
                        };
                    }
                },
                filteredPosts() {
                    let filtered = this.blogPosts.filter(post => {
                        const dateMatch = this.selectedDate ?
                            new Date(post.date).toDateString() === new Date(this.selectedDate).toDateString() :
                            this.showCurrentMonth ?
                                new Date(post.date).getMonth() === this.pickerDate.getMonth() &&
                                new Date(post.date).getFullYear() === this.pickerDate.getFullYear() :
                                true;

                        const themeMatch = this.selectedThemes.length === 0 ||
                            this.selectedThemes.some(theme => post.themes.includes(theme));

                        return dateMatch && themeMatch;
                    });
                    return filtered.sort((a, b) => b.id - a.id);
                },
                pageTitle() {
                    if (this.selectedDate) {
                        return `Posts for ${this.formattedDate}`;
                    } else if (this.showCurrentMonth) {
                        return `Posts for ${this.pickerDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long' })}`;
                    } else {
                        return 'All Posts';
                    }
                },
                formattedDate() {
                    if (!this.selectedDate) return '';
                    const date = new Date(this.selectedDate);
                    return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                },
                postDates() {
                    return this.blogPosts.map(post => post.date);
                },
                filteredThemesText() {
                    const count = this.selectedThemes.length;
                    if (count === 0) return 'All Themes';
                    if (count === 1) return '1 Theme Selected';
                    return `${count} Themes Selected`;
                },
            },
            methods: {
                dateSelected(date) {
                    this.selectedDate = date;
                    this.showCurrentMonth = false;
                },
                updatePickerDate(date) {
                    this.pickerDate = new Date(date);
                },
                showAllPosts() {
                    this.selectedDate = null;
                    this.showCurrentMonth = false;
                },
                showCurrentMonthPosts() {
                    this.selectedDate = null;
                    this.showCurrentMonth = true;
                },
                togglePost(postId) {
                    const index = this.expandedPosts.indexOf(postId);
                    if (index > -1) {
                        // 既に配列にあれば削除 (閉じる)
                        this.expandedPosts.splice(index, 1);
                    } else {
                        // なければ追加 (開く)
                        this.expandedPosts.push(postId);
                    }
                },
                scrollToCardTop(postId) {
                    const cardElement = document.getElementById(`post-card-${postId}`);
                    if (cardElement) {
                        cardElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                },
            }
        })
    </script>

    <script>
        (function () {
            const canvas = document.getElementById('CurlNoiseBg');
            if (!canvas) return;

            const ctx = canvas.getContext('2d', { alpha: true });
            if (!ctx) return;

            let width = 0;
            let height = 0;
            let dpr = 1;
            const isMobile = window.matchMedia('(max-width: 600px)').matches;
            const particleCount = isMobile ? 170 : 320;
            const depth = isMobile ? 760 : 980;
            const focal = isMobile ? 460 : 640;
            const particles = [];
            const center = { x: 0, y: 0 };
            let scrollY = 0;
            let scrollNorm = 0;

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                width = window.innerWidth;
                height = window.innerHeight;
                center.x = width * 0.5;
                center.y = height * 0.5;
                canvas.width = Math.floor(width * dpr);
                canvas.height = Math.floor(height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            function handleScroll() {
                scrollY = window.scrollY || window.pageYOffset || 0;
                scrollNorm = Math.max(-1.2, Math.min(1.2, scrollY / Math.max(1, window.innerHeight)));
            }

            function scalarNoise3D(x, y, z, t, ox, oy, oz) {
                const nx = x + ox;
                const ny = y + oy;
                const nz = z + oz;
                const s1 = Math.sin(nx * 0.010 + ny * 0.013 + nz * 0.007 + t * 0.00125);
                const s2 = Math.cos(nx * 0.012 - ny * 0.011 + nz * 0.009 - t * 0.00105);
                const s3 = Math.sin((nx + nz) * 0.008 + ny * 0.007 + t * 0.00091);
                const s4 = Math.cos((ny - nz) * 0.009 + nx * 0.006 - t * 0.00084);
                return s1 + s2 * 0.9 + s3 * 0.8 + s4 * 0.6;
            }

            function curl3D(x, y, z, t) {
                const e = 1.2;
                const offA = [31.416, -17.0, 9.3];
                const offB = [-47.2, 23.77, -11.1];
                const offC = [12.0, 41.8, 27.6];

                const F = (px, py, pz) => ({
                    x: scalarNoise3D(px, py, pz, t, offA[0], offA[1], offA[2]),
                    y: scalarNoise3D(px, py, pz, t, offB[0], offB[1], offB[2]),
                    z: scalarNoise3D(px, py, pz, t, offC[0], offC[1], offC[2]),
                });

                const fy1 = F(x, y + e, z), fy2 = F(x, y - e, z);
                const fz1 = F(x, y, z + e), fz2 = F(x, y, z - e);
                const fx1 = F(x + e, y, z), fx2 = F(x - e, y, z);

                const dFz_dy = (fy1.z - fy2.z) / (2 * e);
                const dFy_dz = (fz1.y - fz2.y) / (2 * e);
                const dFx_dz = (fz1.x - fz2.x) / (2 * e);
                const dFz_dx = (fx1.z - fx2.z) / (2 * e);
                const dFy_dx = (fx1.y - fx2.y) / (2 * e);
                const dFx_dy = (fy1.x - fy2.x) / (2 * e);

                return {
                    x: dFz_dy - dFy_dz,
                    y: dFx_dz - dFz_dx,
                    z: dFy_dx - dFx_dy,
                };
            }

            function rotateY(x, z, a) {
                const c = Math.cos(a);
                const s = Math.sin(a);
                return { x: x * c - z * s, z: x * s + z * c };
            }

            function project(x, y, z, time) {
                const drift = rotateY(x, z, Math.sin((time + scrollY * 7) * 0.00011) * 0.2);
                const pz = drift.z + depth;
                if (pz < 20) return null;
                const scale = focal / pz;
                return {
                    x: center.x + drift.x * scale,
                    y: center.y + y * scale - scrollNorm * 40,
                    scale
                };
            }

            function resetParticle(p) {
                p.x = (Math.random() - 0.5) * width * 1.6;
                p.y = (Math.random() - 0.5) * height * 1.4;
                p.z = -depth * 0.25 + Math.random() * depth * 0.95;
                p.vx = 0;
                p.vy = 0;
                p.vz = 0;
                p.hue = 208 + (Math.random() - 0.5) * 6;
            }

            function initParticles() {
                particles.length = 0;
                for (let i = 0; i < particleCount; i += 1) {
                    const p = {};
                    resetParticle(p);
                    particles.push(p);
                }
            }

            function drawFrame(time) {
                ctx.fillStyle = 'rgba(2, 8, 20, 0.2)';
                ctx.fillRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'source-over';

                for (let i = 0; i < particles.length; i += 1) {
                    const p = particles[i];
                    const prev = project(p.x, p.y, p.z, time);

                    const flowTime = time + scrollY * 16;
                    const c = curl3D(p.x * 0.05, p.y * 0.05 + scrollNorm * 0.9, p.z * 0.045, flowTime);
                    p.vx = p.vx * 0.9 + c.x * 1.05;
                    p.vy = p.vy * 0.9 + c.y * 1.05;
                    p.vz = p.vz * 0.92 + c.z * 1.25;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.z += p.vz;

                    if (p.z > depth * 0.95) {
                        p.z = -depth * 0.15;
                        p.vz *= 0.35;
                    } else if (p.z < -depth * 1.35) {
                        p.z = depth * 0.75;
                        p.vz *= 0.35;
                    }

                    if (p.x > width * 1.25) p.x = -width * 1.25;
                    else if (p.x < -width * 1.25) p.x = width * 1.25;

                    if (p.y > height * 1.25) p.y = -height * 1.25;
                    else if (p.y < -height * 1.25) p.y = height * 1.25;

                    const now = project(p.x, p.y, p.z, time);
                    if (!prev || !now) continue;

                    const speed = Math.min(1, Math.sqrt(p.vx * p.vx + p.vy * p.vy + p.vz * p.vz) / 2.6);
                    const depthAlpha = Math.min(1, Math.max(0, now.scale * 1.5));
                    ctx.lineWidth = 1.8 + now.scale * 2.8 + speed * 0.35;
                    ctx.strokeStyle = `hsla(${p.hue}, 90%, 62%, ${0.1 + depthAlpha * 0.18})`;
                    ctx.beginPath();
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(now.x, now.y);
                    ctx.stroke();
                }

                requestAnimationFrame(drawFrame);
            }

            resize();
            handleScroll();
            initParticles();
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, width, height);
            window.addEventListener('resize', () => {
                resize();
                handleScroll();
                initParticles();
                ctx.fillStyle = '#020617';
                ctx.fillRect(0, 0, width, height);
            });
            window.addEventListener('scroll', handleScroll, { passive: true });
            requestAnimationFrame(drawFrame);
        })();
    </script>

</body>
