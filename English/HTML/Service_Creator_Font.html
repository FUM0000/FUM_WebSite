<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
  <link href="../../Asset/CSS/Learning.css" rel="stylesheet" />

  <title>Font</title>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Creator > Font</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">Font</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="Search Fonts" prepend-inner-icon="mdi-magnify" clearable
                      outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1"></v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2"></v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 3" step="3" @click="Count_Step_1 = 3"></v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Japanese</v-card-title>
                              <v-treeview :items="filteredFontJapanese" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesFontJapanese" @update:open="updateOpenNodesFontJapanese">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">Next</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">English</v-card-title>
                              <v-treeview :items="filteredFontEnglish" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesFontEnglish" @update:open="updateOpenNodesFontEnglish">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">Back</v-btn>
                            <v-btn color="primary" @click="Count_Step_1 = 3">Next</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="3">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">Others</v-card-title>
                              <v-treeview :items="filteredFontOther" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesFontOther" @update:open="updateOpenNodesFontOther">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 2">Back</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        dialog: false,
        searchQuery: '',
        filteredFontJapanese: [],
        filteredFontEnglish: [],
        filteredFontOther: [],
        openNodesFontJapanese: [],
        openNodesFontEnglish: [],
        openNodesFontOther: [],
        FontJapanese: [
          {
            name: 'Japanese', children: [
              { name: 'Zen Kaku Gothic New : Gothic, monospace. Beautiful Kanji.' },
              { name: 'Zen Old Mincho     : Serif. Beautiful proportions.' },
              { name: 'Noto Serif JP       : Serif. More stable than Zen.' },
            ]
          },
        ],
        FontEnglish: [
          {
            name: 'English', children: [
              { name: 'Space Mono   : Monospace. Slightly cyber feel.' },
              { name: 'Source Sans 3 : Round and formal.' },
              { name: 'Nabla        : Smooth 3D.' },
              { name: 'Noto Serif   : Serif. Beautiful proportions.' },
            ]
          },
        ],
        FontOther: [
          {
            name: 'Others', children: [
              { name: 'Redacted Script : Unreadable text. Becomes readable when copied.' },
            ]
          },
        ],
      },
      created() {
        this.filteredFontJapanese = JSON.parse(JSON.stringify(this.FontJapanese));
        this.filteredFontEnglish = JSON.parse(JSON.stringify(this.FontEnglish));
        this.filteredFontOther = JSON.parse(JSON.stringify(this.FontOther));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesFontJapanese(newOpen) {
          this.openNodesFontJapanese = newOpen;
        },
        updateOpenNodesFontEnglish(newOpen) {
          this.openNodesFontEnglish = newOpen;
        },
        updateOpenNodesFontOther(newOpen) {
          this.openNodesFontOther = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredFontJapanese = JSON.parse(JSON.stringify(this.FontJapanese));
            this.filteredFontEnglish = JSON.parse(JSON.stringify(this.FontEnglish));
            this.filteredFontOther = JSON.parse(JSON.stringify(this.FontOther));
            this.openNodesFontJapanese = [];
            this.openNodesFontEnglish = [];
            this.openNodesFontOther = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredFontJapanese = filterTree(JSON.parse(JSON.stringify(this.FontJapanese)));
          this.filteredFontEnglish = filterTree(JSON.parse(JSON.stringify(this.FontEnglish)));
          this.filteredFontOther = filterTree(JSON.parse(JSON.stringify(this.FontOther)));

          this.openNodesFontJapanese = this.collectAllNodeIds(this.filteredFontJapanese);
          this.openNodesFontEnglish = this.collectAllNodeIds(this.filteredFontEnglish);
          this.openNodesFontOther = this.collectAllNodeIds(this.filteredFontOther);
        }
      }
    });
  </script>
</body>

</html>
