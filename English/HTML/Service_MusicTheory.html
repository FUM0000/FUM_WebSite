<html lang="en">

<head>

    content="Learn practical chord progressions and modulation with simple score examples you can read at a glance.">

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <title>Music Theory</title>

  <style>
    [v-cloak] {
      display: none;
    }

    #Main {
      background:
        radial-gradient(circle at top left, rgba(255, 179, 71, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(87, 180, 255, 0.14), transparent 32%),
        linear-gradient(180deg, #f7f4ed 0%, #eef2f6 100%);
    }

    .music-shell {
      max-width: 1180px;
      margin: 0 auto;
    }

    .music-panel {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(25, 61, 101, 0.09);
      border-radius: 30px;
      padding: clamp(22px, 4vw, 40px);
      box-shadow: 0 28px 70px rgba(20, 35, 55, 0.08);
      backdrop-filter: blur(10px);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.9fr);
      gap: 24px;
      align-items: stretch;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(22, 87, 160, 0.09);
      color: #24548a;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero-title {
      margin: 0 0 12px;
      color: #182b44;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero-lead {
      margin: 0;
      max-width: 60ch;
      color: #526277;
      font-size: 1rem;
      line-height: 1.9;
    }

    .hero-aside {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .glass-card {
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: linear-gradient(160deg, rgba(23, 42, 70, 0.92) 0%, rgba(38, 79, 128, 0.88) 100%);
      color: #f5fbff;
      box-shadow: 0 18px 36px rgba(19, 43, 69, 0.18);
    }

    .glass-card h2,
    .glass-card h3,
    .glass-card p {
      margin: 0;
    }

    .glass-card h2,
    .glass-card h3 {
      margin-bottom: 10px;
    }

    .glass-card p {
      color: rgba(245, 251, 255, 0.88);
      line-height: 1.75;
    }

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .theory-chip {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .theory-chip strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .theory-chip span {
      display: block;
      font-size: 1rem;
      font-weight: 700;
    }

    .section-block {
      margin-top: 34px;
    }

    .section-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .section-title {
      margin: 0;
      color: #1b3150;
      font-size: clamp(1.35rem, 3vw, 2rem);
    }

    .section-copy {
      margin: 6px 0 0;
      color: #66788e;
      line-height: 1.8;
      max-width: 70ch;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .control-card {
      min-width: min(100%, 220px);
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(34, 73, 116, 0.1);
      box-shadow: 0 12px 26px rgba(39, 61, 87, 0.06);
    }

    .control-label {
      display: block;
      margin-bottom: 8px;
      color: #4f6480;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .control-select {
      width: 100%;
      border: 1px solid rgba(35, 77, 124, 0.14);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fbfdff;
      color: #223e63;
      font-size: 0.95rem;
      outline: none;
    }

    .progression-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 18px;
    }

    .progression-card,
    .modulation-card,
    .cheat-card {
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(28, 68, 112, 0.1);
      box-shadow: 0 18px 40px rgba(32, 53, 79, 0.07);
      overflow: hidden;
    }

    .progression-card-head,
    .modulation-card-head {
      padding: 18px 20px 8px;
    }

    .progression-card-body,
    .modulation-card-body {
      padding: 0 20px 20px;
    }

    .card-kicker {
      display: inline-block;
      margin-bottom: 8px;
      color: #2f6aac;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card-title {
      margin: 0;
      color: #203a5c;
      font-size: 1.14rem;
    }

    .card-text {
      margin: 8px 0 0;
      color: #66788f;
      line-height: 1.8;
    }

    .roman-strip,
    .chord-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .roman-pill,
    .chord-pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.88rem;
    }

    .roman-pill {
      background: rgba(39, 99, 163, 0.08);
      color: #2d5f98;
    }

    .chord-pill {
      background: rgba(255, 195, 85, 0.16);
      color: #865b11;
    }

    .score-shell {
      margin-top: 18px;
      padding: 14px;
      border-radius: 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #f2f6fb 100%);
      border: 1px solid rgba(39, 80, 122, 0.08);
      overflow-x: auto;
    }

    .score-note {
      margin-top: 10px;
      color: #65788f;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .modulation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .mod-route {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .route-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(102, 117, 255, 0.1);
      color: #4f5fc5;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .cheat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .cheat-card {
      padding: 18px;
    }

    .cheat-card h3 {
      margin: 0 0 8px;
      color: #203a5c;
      font-size: 1.04rem;
    }

    .cheat-card p {
      margin: 0;
      color: #6a7b8f;
      line-height: 1.8;
    }

    .footer-note {
      margin-top: 22px;
      color: #6d7f94;
      font-size: 0.92rem;
      line-height: 1.8;
    }

    @media (max-width: 1100px) {
      .progression-grid,
      .modulation-grid,
      .cheat-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .music-panel {
        border-radius: 22px;
        padding: 20px;
      }

      .chip-grid {
        grid-template-columns: 1fr;
      }

      .score-shell {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Music Theory</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid class="pa-5">
            <div class="music-shell">
              <section class="music-panel">
                <div class="hero-grid">
                  <div>
                    <h1 class="hero-title">Music Theory</h1>
                    <p class="hero-lead">
                      Learn how chord progressions create momentum, and how modulation changes the emotional color of a song.
                      Each example below updates to the selected key and shows a simple score so you can connect theory with sound and shape.
                    </p>
                  </div>
                </div>

                <section class="section-block">
                  <div class="section-header">
                    <div>
                      <h2 class="section-title">Choose a Key</h2>
                      <p class="section-copy">
                        Switch the home key to see the same functional idea expressed with different chord names.
                      </p>
                    </div>
                    <div class="control-row">
                      <div class="control-card">
                        <label class="control-label" for="keySelect">Home Key</label>
                        <select id="keySelect" class="control-select" v-model="SelectedKey">
                          <option v-for="key in KeyOptions" :key="key.value" :value="key.value">{{ key.label }}</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </section>

                <section class="section-block">
                  <div class="section-header">
                    <div>
                      <h2 class="section-title">Core Progressions</h2>
                      <p class="section-copy">
                        These patterns appear again and again because they balance stability and motion. Try recognizing the Roman numerals first, then the actual chord names in your chosen key.
                      </p>
                    </div>
                  </div>

                  <div class="progression-grid">
                    <article class="progression-card" v-for="example in progressionExamples" :key="example.title">
                      <div class="progression-card-head">
                        <span class="card-kicker">{{ example.feel }}</span>
                        <h3 class="card-title">{{ example.title }}</h3>
                        <p class="card-text">{{ example.description }}</p>
                      </div>
                      <div class="progression-card-body">
                        <div class="roman-strip">
                          <span class="roman-pill" v-for="(roman, romanIndex) in example.romans" :key="`${example.title}-${roman}-${romanIndex}`">{{ roman }}</span>
                        </div>
                        <div class="chord-strip">
                          <span class="chord-pill" v-for="(chord, chordIndex) in resolveProgression(example.romans)" :key="`${example.title}-${chord}-${chordIndex}`">{{ chord }}</span>
                        </div>
                        <div class="score-shell" v-html="renderGrandStaff(resolveProgression(example.romans), KeySettings.label)"></div>
                        <p class="score-note">{{ example.tip }}</p>
                      </div>
                    </article>
                  </div>
                </section>

                <section class="section-block">
                  <div class="section-header">
                    <div>
                      <h2 class="section-title">Modulation Examples</h2>
                      <p class="section-copy">
                        A modulation works best when the listener feels both surprise and logic. These examples show three common ways to arrive in a new key.
                      </p>
                    </div>
                  </div>

                  <div class="modulation-grid">
                    <article class="modulation-card" v-for="modulation in modulationExamples" :key="`${SelectedKey}-${modulation.title}-${modulation.chords.join('-')}`">
                      <div class="modulation-card-head">
                        <span class="card-kicker">{{ modulation.targetLabel }}</span>
                        <h3 class="card-title">{{ modulation.title }}</h3>
                        <p class="card-text">{{ modulation.description }}</p>
                      </div>
                      <div class="modulation-card-body">
                        <div class="mod-route">
                          <span class="route-pill" v-for="(step, stepIndex) in modulation.route" :key="`${modulation.title}-${step}-${stepIndex}`">{{ step }}</span>
                        </div>
                        <div class="chord-strip">
                          <span class="chord-pill" v-for="(chord, chordIndex) in modulation.chords" :key="`${modulation.title}-${chord}-${chordIndex}`">{{ chord }}</span>
                        </div>
                        <div class="score-shell" :key="`${SelectedKey}-${modulation.targetLabel}-${modulation.chords.join('-')}`" v-html="renderGrandStaff(modulation.chords, modulation.targetLabel)"></div>
                        <p class="score-note">{{ modulation.tip }}</p>
                      </div>
                    </article>
                  </div>
                </section>
              </section>
            </div>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer-simple></main-footer-simple>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Ready_Page: true,
        SelectedKey: 'C',
        progressionExamples: [
          {
            title: 'Pop Lift',
            feel: 'Bright / Familiar',
            romans: ['I', 'V', 'vi', 'IV'],
            description: 'A modern classic. It keeps returning home while still feeling open and singable.',
            tip: 'Listen to how vi softens the energy after V, then IV gives a broad, supportive reset.'
          },
          {
            title: 'Cadence Focus',
            feel: 'Resolve',
            romans: ['ii', 'V', 'I', 'I'],
            description: 'This is one of the clearest ways to hear tension leading into release.',
            tip: 'Emphasize the pull from ii to V. The final I should feel more grounded than the opening bar.'
          },
          {
            title: 'Pre-Chorus Climb',
            feel: 'Forward Motion',
            romans: ['vi', 'IV', 'I', 'V'],
            description: 'Common in choruses and pre-choruses because it rises emotionally without sounding too technical.',
            tip: 'Start a little softer on vi and build your dynamic through the final V.'
          },
          {
            title: 'Turnaround',
            feel: 'Loop / Reset',
            romans: ['I', 'vi', 'ii', 'V'],
            description: 'A compact loop that points naturally back to the beginning and works well for practice.',
            tip: 'Hear the last V as a question mark. The next I is the answer.'
          }
        ],
        practiceCards: [
          {
            title: '1. Say the function aloud',
            text: 'Before playing, read the progression as Roman numerals. This trains your ear to notice function, not just fixed shapes.'
          },
          {
            title: '2. Keep one hand simple',
            text: 'Use roots in the left hand first. Once the bass feels stable, add the right-hand chord tones shown in the staff.'
          },
          {
            title: '3. Compare two neighboring keys',
            text: 'Practice in C major and then G major, or F major and Bb major. That small change is enough to deepen your fluency.'
          }
        ],
        keys: {
          C: {
            label: 'C major',
            preferFlats: false,
            chords: { I: 'C', ii: 'Dm', iii: 'Em', IV: 'F', V: 'G', vi: 'Am', vii: 'Bdim' },
            dominantTarget: 'G major',
            dominantPrep: 'D7',
            relativeMinorTarget: 'A minor',
            relativeMinorPrep: 'E7',
            wholeStepTarget: 'D major',
            wholeStepPrep: 'A7'
          },
          G: {
            label: 'G major',
            preferFlats: false,
            chords: { I: 'G', ii: 'Am', iii: 'Bm', IV: 'C', V: 'D', vi: 'Em', vii: 'F#dim' },
            dominantTarget: 'D major',
            dominantPrep: 'A7',
            relativeMinorTarget: 'E minor',
            relativeMinorPrep: 'B7',
            wholeStepTarget: 'A major',
            wholeStepPrep: 'E7'
          },
          D: {
            label: 'D major',
            preferFlats: false,
            chords: { I: 'D', ii: 'Em', iii: 'F#m', IV: 'G', V: 'A', vi: 'Bm', vii: 'C#dim' },
            dominantTarget: 'A major',
            dominantPrep: 'E7',
            relativeMinorTarget: 'B minor',
            relativeMinorPrep: 'F#7',
            wholeStepTarget: 'E major',
            wholeStepPrep: 'B7'
          },
          F: {
            label: 'F major',
            preferFlats: true,
            chords: { I: 'F', ii: 'Gm', iii: 'Am', IV: 'Bb', V: 'C', vi: 'Dm', vii: 'Edim' },
            dominantTarget: 'C major',
            dominantPrep: 'G7',
            relativeMinorTarget: 'D minor',
            relativeMinorPrep: 'A7',
            wholeStepTarget: 'G major',
            wholeStepPrep: 'D7'
          },
          Bb: {
            label: 'Bb major',
            preferFlats: true,
            chords: { I: 'Bb', ii: 'Cm', iii: 'Dm', IV: 'Eb', V: 'F', vi: 'Gm', vii: 'Adim' },
            dominantTarget: 'F major',
            dominantPrep: 'C7',
            relativeMinorTarget: 'G minor',
            relativeMinorPrep: 'D7',
            wholeStepTarget: 'C major',
            wholeStepPrep: 'G7'
          },
          Eb: {
            label: 'Eb major',
            preferFlats: true,
            chords: { I: 'Eb', ii: 'Fm', iii: 'Gm', IV: 'Ab', V: 'Bb', vi: 'Cm', vii: 'Ddim' },
            dominantTarget: 'Bb major',
            dominantPrep: 'F7',
            relativeMinorTarget: 'C minor',
            relativeMinorPrep: 'G7',
            wholeStepTarget: 'F major',
            wholeStepPrep: 'C7'
          }
        }
      },
      computed: {
        KeyOptions() {
          return Object.keys(this.keys).map(key => ({ value: key, label: this.keys[key].label }));
        },
        KeySettings() {
          return this.keys[this.SelectedKey];
        },
        modulationExamples() {
          const current = this.KeySettings;
          return [
            {
              title: 'Move to the Dominant',
              targetLabel: `${current.label} -> ${current.dominantTarget}`,
              description: 'A very natural lift. You briefly point to the new tonic with its own dominant, so the destination feels earned.',
              route: ['Home', 'Color', 'Secondary Dominant', 'New Tonic'],
              chords: [current.chords.I, current.chords.IV, current.dominantPrep, this.majorTonicFromLabel(current.dominantTarget)],
              tip: 'The third chord is the real hinge. It tells the ear that a new center of gravity is arriving.'
            },
            {
              title: 'Pivot to Relative Minor',
              targetLabel: `${current.label} -> ${current.relativeMinorTarget}`,
              description: 'Using vi as a shared chord keeps the transition smooth. The new dominant then clearly reveals the minor destination.',
              route: ['I', 'Shared vi', 'Dominant of minor', 'New i'],
              chords: [current.chords.I, current.chords.vi, current.relativeMinorPrep, this.minorTonicFromLabel(current.relativeMinorTarget)],
              tip: 'Notice how the mood darkens without the shift feeling abrupt. This is why relative minor is such a common modulation choice.'
            },
            {
              title: 'Whole-Step Pop Lift',
              targetLabel: `${current.label} -> ${current.wholeStepTarget}`,
              description: 'A direct lift creates immediate excitement. It is less subtle, but very effective for a final chorus or climax.',
              route: ['I', 'V', 'Dominant of new key', 'New I'],
              chords: [current.chords.I, current.chords.V, current.wholeStepPrep, this.majorTonicFromLabel(current.wholeStepTarget)],
              tip: 'This one works best when the rhythm and melody are already strong. The key change adds energy on top of that momentum.'
            }
          ];
        }
      },
      methods: {
        staffLayout(clef) {
          const topLineY = clef === 'treble' ? 72 : 192;
          const lineSpacing = 14;
          const stepSpacing = lineSpacing / 2;
          const bottomLineY = topLineY + (lineSpacing * 4);
          const lowestLineNote = clef === 'treble' ? 'E4' : 'G2';
          return {
            topLineY,
            lineSpacing,
            stepSpacing,
            bottomLineY,
            lowestLineStep: this.noteStep(lowestLineNote)
          };
        },
        resolveProgression(romans) {
          return romans.map(roman => this.KeySettings.chords[roman] || roman);
        },
        extractKeyRoot(label) {
          return label.split(' ')[0];
        },
        minorTonicFromLabel(label) {
          return label.split(' ')[0] + 'm';
        },
        majorTonicFromLabel(label) {
          return label.split(' ')[0];
        },
        parseChordSymbol(symbol) {
          const match = symbol.match(/^([A-G])([b#]?)(.*)$/);
          if (!match) {
            return { root: 'C', accidental: '', quality: '' };
          }
          return {
            root: match[1],
            accidental: match[2],
            quality: match[3]
          };
        },
        chordIntervals(quality) {
          if (quality === 'm') return [0, 3, 7];
          if (quality === 'dim') return [0, 3, 6];
          if (quality === '7') return [0, 4, 7, 10];
          if (quality === 'm7') return [0, 3, 7, 10];
          return [0, 4, 7];
        },
        noteToSemitone(note) {
          const map = {
            C: 0, 'C#': 1, Db: 1, D: 2, 'D#': 3, Eb: 3, E: 4, F: 5,
            'F#': 6, Gb: 6, G: 7, 'G#': 8, Ab: 8, A: 9, 'A#': 10, Bb: 10, B: 11
          };
          return map[note];
        },
        semitoneToNote(semitone, preferFlats) {
          const sharpNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
          const flatNames = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
          const normalized = ((semitone % 12) + 12) % 12;
          return preferFlats ? flatNames[normalized] : sharpNames[normalized];
        },
        midiToNoteName(midi, preferFlats) {
          const note = this.semitoneToNote(midi % 12, preferFlats);
          const octave = Math.floor(midi / 12) - 1;
          return `${note}${octave}`;
        },
        buildChordVoicing(symbol) {
          const parsed = this.parseChordSymbol(symbol);
          const rootName = `${parsed.root}${parsed.accidental}`;
          const rootSemitone = this.noteToSemitone(rootName);
          const intervals = this.chordIntervals(parsed.quality);
          const preferFlats = this.KeySettings.preferFlats || parsed.accidental === 'b';
          const leftRoot = 48 + rootSemitone;
          const rightBase = 60 + rootSemitone;
          const left = [leftRoot, leftRoot + intervals[Math.min(2, intervals.length - 1)]];
          const right = intervals.map(interval => rightBase + interval);
          if (right.length < 4) {
            right.push(rightBase + 12);
          }
          return {
            left: left.map(midi => this.midiToNoteName(midi, preferFlats)),
            right: right.map(midi => this.midiToNoteName(midi, preferFlats))
          };
        },
        noteStep(noteName) {
          const match = noteName.match(/^([A-G])([b#]?)(\d)$/);
          const order = { C: 0, D: 1, E: 2, F: 3, G: 4, A: 5, B: 6 };
          return (parseInt(match[3], 10) * 7) + order[match[1]];
        },
        noteY(noteName, clef) {
          const layout = this.staffLayout(clef);
          const stepOffset = this.noteStep(noteName) - layout.lowestLineStep;
          return layout.bottomLineY - (stepOffset * layout.stepSpacing);
        },
        ledgerLines(noteName, x, clef) {
          const layout = this.staffLayout(clef);
          const noteStepValue = this.noteStep(noteName);
          const lines = [];
          const topLineStep = layout.lowestLineStep + 8;

          if (noteStepValue < layout.lowestLineStep) {
            for (let step = layout.lowestLineStep - 2; step >= noteStepValue; step -= 2) {
              const y = layout.bottomLineY + ((layout.lowestLineStep - step) * layout.stepSpacing);
              lines.push(`<line x1="${x - 13}" y1="${y}" x2="${x + 13}" y2="${y}" stroke="#6d7f93" stroke-width="1.3"></line>`);
            }
          }

          if (noteStepValue > topLineStep) {
            for (let step = topLineStep + 2; step <= noteStepValue; step += 2) {
              const y = layout.topLineY - ((step - topLineStep) * layout.stepSpacing);
              lines.push(`<line x1="${x - 13}" y1="${y}" x2="${x + 13}" y2="${y}" stroke="#6d7f93" stroke-width="1.3"></line>`);
            }
          }

          return lines.join('');
        },
        drawChordNotes(notes, x, clef) {
          return notes.map(note => {
            const match = note.match(/^([A-G])([b#]?)(\d)$/);
            const y = this.noteY(note, clef);
            const accidental = match[2]
              ? `<text x="${x - 16}" y="${y + 5}" font-size="16" fill="#42556f" font-family="serif">${match[2] === 'b' ? '♭' : '♯'}</text>`
              : '';
            const ledger = this.ledgerLines(note, x, clef);
            return `${ledger}${accidental}<ellipse cx="${x}" cy="${y}" rx="8.5" ry="6" fill="#283b54"></ellipse>`;
          }).join('');
        },
        renderGrandStaff(chords, footerLabel) {
          const width = Math.max(760, chords.length * 170 + 90);
          const measureWidth = (width - 80) / chords.length;
          const treble = this.staffLayout('treble');
          const bass = this.staffLayout('bass');
          const trebleCenterY = (treble.topLineY + treble.bottomLineY) / 2;
          const bassCenterY = (bass.topLineY + bass.bottomLineY) / 2;
          let svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} 270" width="100%" height="270" role="img" aria-label="Score example in ${footerLabel}">
              <rect x="0" y="0" width="${width}" height="270" rx="18" fill="#f7fbff"></rect>
              <text x="34" y="${trebleCenterY + 2}" text-anchor="middle" dominant-baseline="middle" font-size="54" fill="#274263" font-family="'Times New Roman', serif">𝄞</text>
              <text x="34" y="${bassCenterY + 2}" text-anchor="middle" dominant-baseline="middle" font-size="56" fill="#274263" font-family="'Times New Roman', serif">𝄢</text>
          `;

          [0, 1, 2, 3, 4].map(index => treble.topLineY + (index * treble.lineSpacing)).forEach(y => {
            svg += `<line x1="56" y1="${y}" x2="${width - 24}" y2="${y}" stroke="#6d7f93" stroke-width="1.4"></line>`;
          });
          [0, 1, 2, 3, 4].map(index => bass.topLineY + (index * bass.lineSpacing)).forEach(y => {
            svg += `<line x1="56" y1="${y}" x2="${width - 24}" y2="${y}" stroke="#6d7f93" stroke-width="1.4"></line>`;
          });
          svg += `<line x1="56" y1="${treble.bottomLineY}" x2="56" y2="${bass.topLineY}" stroke="#6d7f93" stroke-width="1.2"></line>`;

          chords.forEach((symbol, index) => {
            const startX = 56 + (measureWidth * index);
            const centerX = startX + (measureWidth / 2);
            const voicing = this.buildChordVoicing(symbol);
            svg += `<line x1="${startX}" y1="${treble.topLineY}" x2="${startX}" y2="${bass.bottomLineY}" stroke="#9aacbf" stroke-width="1"></line>`;
            svg += `<text x="${centerX}" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#24496f">${symbol}</text>`;
            svg += this.drawChordNotes(voicing.right, centerX, 'treble');
            svg += this.drawChordNotes(voicing.left, centerX, 'bass');
          });

          svg += `
              <line x1="${width - 24}" y1="${treble.topLineY}" x2="${width - 24}" y2="${bass.bottomLineY}" stroke="#9aacbf" stroke-width="1.2"></line>
              <text x="${width - 24}" y="262" text-anchor="end" font-size="12" fill="#6b7f93">${footerLabel}</text>
            </svg>
          `;
          return svg;
        }
      }
    });
  </script>
</body>
