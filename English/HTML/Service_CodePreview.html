<v-app id="App" v-cloak>
    <template>
        <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Code Preview</main-system-bar>

        <v-main id="Main">
            <transition name="Fade_Page">
                <v-container v-show="Ready_Page" fluid fill-height class="workspace-shell">
                    <div class="code-preview-page">
                    <div class="workspace">
                        <v-card class="workspace-card" dark outlined>
                            <v-toolbar flat dark class="toolbar">
                                <v-toolbar-title class="font-weight-bold">Code Preview</v-toolbar-title>
                                <v-spacer></v-spacer>
                                <v-btn
                                    class="mr-2"
                                    outlined
                                    rounded
                                    color="cyan lighten-2"
                                    icon
                                    @click="togglePaneOrder"
                                >
                                    <v-icon small>mdi-swap-horizontal</v-icon>
                                </v-btn>
                            </v-toolbar>

                            <div class="workspace-body">
                                <div class="pane-layout">
                                    <div class="pane" :style="paneOrderStyle(true)">
                                        <v-card class="pane-card" dark flat>
                                            <div class="pane-header d-flex align-center justify-space-between">
                                                <div>

                                                </div>

                                    <div class="pane" :style="paneOrderStyle(false)">
                                        <v-card class="pane-card" dark flat>
                                            <div class="pane-header">

                                            </div>

                                                        slider-color="cyan lighten-2"
                                                        grow

                                                            class="editor-textarea"
                                                            :value="cssCode"
                                                            @input="updateCss"

<script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.js"></script>
<script src="../../Asset/Javascript/Common.js?v=1.03"></script>

<script>
new Vue({
  el: '#App',
  vuetify: new Vuetify(),
  mixins: [window.Mixins_Common],
  data: {
    activeTab: 0,
    isPreviewFirst: true,
    previewSize: '16:9',
    htmlCode: '',
    cssCode: '',
    jsCode: ''
  },
  computed: {
    previewStageStyle() {
      if (this.previewSize === '1:1') {
        return { aspectRatio: '1 / 1', height: '100%', width: 'auto' };
      }
      if (this.previewSize === '9:16') {
        return { aspectRatio: '9 / 16', height: '100%', width: 'auto' };
      }
      return { aspectRatio: '16 / 9', width: '100%', height: 'auto' };
    }
  },
  methods: {
    paneOrderStyle(isPreviewPane) {
      if (!this.$vuetify.breakpoint.mdAndUp) return {};
      return { order: isPreviewPane ? (this.isPreviewFirst ? 1 : 2) : (this.isPreviewFirst ? 2 : 1) };
    },
    getLineIndent(text) {
      const lineStart = text.lastIndexOf('\n') + 1;
      const line = text.slice(lineStart);
      const indentMatch = line.match(/^\s*/);
      return indentMatch ? indentMatch[0] : '';
    },
    getOpeningTagName(beforeCursor) {
      const lastOpenIndex = beforeCursor.lastIndexOf('<');
      if (lastOpenIndex < 0) return '';
      const fragment = beforeCursor.slice(lastOpenIndex + 1);
      if (!fragment || /[>\n]/.test(fragment)) return '';
      if (/^(\/|!|\?)/.test(fragment.trim())) return '';
      if (fragment.trim().endsWith('/')) return '';
      const tagMatch = fragment.match(/^([A-Za-z][\w:-]*)\b/);
      return tagMatch ? tagMatch[1] : '';
    },
    getHtmlIndentContext(text) {
      const voidTags = new Set(['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr']);
      const stack = [];
      const tagPattern = /<\/?([A-Za-z][\w:-]*)\b[^>]*?>/g;
      let match;
      while ((match = tagPattern.exec(text)) !== null) {
        const fullTag = match[0];
        const tagName = match[1].toLowerCase();
        const isClosing = fullTag.startsWith('</');
        const isSelfClosing = /\/>$/.test(fullTag) || voidTags.has(tagName);
        if (isClosing) {
          const lastIndex = stack.lastIndexOf(tagName);
          if (lastIndex !== -1) stack.splice(lastIndex, 1);
          continue;
        }
        if (!isSelfClosing) stack.push(tagName);
      }
      return { depth: stack.length, currentTag: stack.length ? stack[stack.length - 1] : '' };
    },
    applyEditorText(textarea, nextValue, caretStart, caretEnd) {
      const endPos = typeof caretEnd === 'number' ? caretEnd : caretStart;
      textarea.value = nextValue;
      this.htmlCode = nextValue;
      this.runCode();
      this.$nextTick(() => {
        textarea.focus();
        textarea.setSelectionRange(caretStart, endPos);
      });
    },
    getEditorTextarea(event) {
      if (event && event.target && event.target.tagName === 'TEXTAREA') return event.target;
      const ref = this.$refs.htmlEditorField;
      if (!ref || !ref.$el) return null;
      return ref.$el.querySelector('textarea');
    },
    getLineRange(text, start, end) {
      const lineStart = text.lastIndexOf('\n', start - 1) + 1;
      const lineEndIndex = text.indexOf('\n', end);
      const lineEnd = lineEndIndex === -1 ? text.length : lineEndIndex;
      return { lineStart, lineEnd };
    },
    indentSelectedLines(textarea, value, start, end, indentUnit) {
      const range = this.getLineRange(value, start, end);
      const block = value.slice(range.lineStart, range.lineEnd);
      const indented = block.split('\n').map((line) => `${indentUnit}${line}`).join('\n');
      const nextValue = `${value.slice(0, range.lineStart)}${indented}${value.slice(range.lineEnd)}`;
      const nextStart = start + indentUnit.length;
      const lineCount = block.split('\n').length;
      const nextEnd = end + indentUnit.length * lineCount;
      this.applyEditorText(textarea, nextValue, nextStart, nextEnd);
    },
    outdentSelectedLines(textarea, value, start, end, indentUnit) {
      const range = this.getLineRange(value, start, end);
      const block = value.slice(range.lineStart, range.lineEnd);
      let removedBeforeStart = 0;
      let removedTotal = 0;
      const outdented = block
        .split('\n')
        .map((line, index) => {
          let removed = 0;
          if (line.startsWith(indentUnit)) {
            removed = indentUnit.length;
            line = line.slice(indentUnit.length);
          } else {
            const spaces = line.match(/^ */);
            removed = Math.min(spaces ? spaces[0].length : 0, indentUnit.length);
            line = line.slice(removed);
          }
          if (index === 0) removedBeforeStart = removed;
          removedTotal += removed;
          return line;
        })
        .join('\n');
      const nextValue = `${value.slice(0, range.lineStart)}${outdented}${value.slice(range.lineEnd)}`;
      const nextStart = Math.max(range.lineStart, start - removedBeforeStart);
      const nextEnd = Math.max(nextStart, end - removedTotal);
      this.applyEditorText(textarea, nextValue, nextStart, nextEnd);
    },
    handleHtmlKeydown(event) {
      if (event.isComposing || event.keyCode === 229) return;
      const textarea = this.getEditorTextarea(event);
      if (!textarea) return;
      const value = textarea.value;
      const start = textarea.selectionStart;
      const end = textarea.selectionEnd;
      const beforeCursor = value.slice(0, start);
      const afterCursor = value.slice(end);
      const indentUnit = '    ';

      if (event.key === 'Tab') {
        event.preventDefault();
        if (event.shiftKey) return this.outdentSelectedLines(textarea, value, start, end, indentUnit);
        if (start !== end || beforeCursor.endsWith('\n')) return this.indentSelectedLines(textarea, value, start, end, indentUnit);
        const nextValue = `${beforeCursor}${indentUnit}${afterCursor}`;
        return this.applyEditorText(textarea, nextValue, start + indentUnit.length);
      }

      if (event.key === '>') {
        const tagName = this.getOpeningTagName(beforeCursor);
        if (!tagName) return;
        event.preventDefault();
        const nextValue = `${beforeCursor}>${afterCursor.startsWith(`</${tagName}>`) ? '' : `</${tagName}>`}${afterCursor}`;
        return this.applyEditorText(textarea, nextValue, start + 1);
      }

      if (event.key !== 'Enter') return;

      event.preventDefault();
      const indentContext = this.getHtmlIndentContext(beforeCursor);
      const contextIndent = indentUnit.repeat(indentContext.depth);
      const openingTagName = indentContext.currentTag;
      const trimmedAfterCursor = afterCursor.replace(/^\s*/, '');
      const isBetweenTagPair = openingTagName && trimmedAfterCursor.startsWith(`</${openingTagName}>`);
      const currentLineIndent = this.getLineIndent(beforeCursor);
      const nextIndent = contextIndent || currentLineIndent;
      let insertedText = `\n${nextIndent}`;
      const caret = start + insertedText.length;

      if (isBetweenTagPair) {
        const closingIndent = indentUnit.repeat(Math.max(indentContext.depth - 1, 0));
        const afterWithoutLeadingSpace = afterCursor.replace(/^\s*/, '');
        insertedText += `\n${closingIndent}`;
        const nextValue = `${beforeCursor}${insertedText}${afterWithoutLeadingSpace}`;
        return this.applyEditorText(textarea, nextValue, caret);
      }

      const nextValue = `${beforeCursor}${insertedText}${afterCursor}`;
      this.applyEditorText(textarea, nextValue, caret);
    },
    updateHtml(value) {
      this.htmlCode = value;
      this.runCode();
    },
    updateCss(value) {
      this.cssCode = value;
      this.runCode();
    },
    updateJs(value) {
      this.jsCode = value;
      this.runCode();
    },
    togglePaneOrder() {
      this.isPreviewFirst = !this.isPreviewFirst;
    },
    runCode() {
      const iframe = document.getElementById('preview');
      if (!iframe) return;
      const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
      iframeDoc.open();
      iframeDoc.write(`
        <html>
          <head>
            <style>${this.cssCode}</style>
          <\/head>
          <body>
            ${this.htmlCode}
            <script>${this.jsCode}<\/script>
          <\/body>
        <\/html>
      `);
      iframeDoc.close();
    }
  },
  mounted() {
    this.runCode();
  }
});
</script>
