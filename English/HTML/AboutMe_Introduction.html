    <style>
        html,
        body {
            background: #000 !important;
            color: #e6f4ff;

        }

        #interactive-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            z-index: 0;
            pointer-events: none;
        }

        #App,
        #App.v-application,
        #App.v-application.theme--light,
        #App .v-application--wrap {
            position: relative;
            background: transparent !important;
        }

        #Main,
        #Main.v-main,

            background: transparent !important;

        .v-application,
        .v-application--wrap,
        .v-main,
        .v-main__wrap,
        .container,
        .container.fill-height {
            background: transparent !important;
        }

        #interactive-space {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .intro-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(220, 241, 255, 0.82);
            font-size: clamp(26px, 4vw, 52px);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-align: center;
            text-shadow: 0 0 14px rgba(120, 190, 230, 0.25);
            pointer-events: none;
            z-index: 1;
        }

        .theme-bubble {
            position: absolute;
            padding: 20px 30px;
            border-radius: 50%;
            background: rgba(136, 185, 220, 0.16);
            box-shadow: 0 8px 28px rgba(48, 121, 182, 0.20);
            cursor: pointer;
            transition: transform 0.3s ease-out, background-color 0.3s;
            font-weight: 500;
            color: #dff0ff;
            display: flex;
            font-size: 15px;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(175, 222, 255, 0.28);
            will-change: transform;
            pointer-events: auto;
            z-index: 2;
        }

        .theme-bubble:hover {
            background-color: rgba(156, 210, 245, 0.26);
        }

        .theme-bubble.is-dragging {
            cursor: grabbing;
            z-index: 10;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transform-origin: center center;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal-content {
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-button {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        .close-button:hover {
            color: #333;
        }

        .modal-content h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #3f51b5;
        }

        .content-body {
            min-height: 120px;
            line-height: 1.8;
        }

        .content-body .Selectable,
        .content-body .Button_LikeVue {
            opacity: 0;
            animation: fadeIn 0.5s forwards 0.5s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .modal-nav {
            margin-top: 25px;
            text-align: center;
        }

        .modal-nav button {
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin: 0 15px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.2s;
        }

        .modal-nav button:hover:not(:disabled) {
            background-color: #e0e0e0;
        }

        .modal-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .Fade_Page-enter-active,
        .Fade_Page-leave-active {
            transition: opacity .5s;
        }

        .Fade_Page-enter,
        .Fade_Page-leave-to {
            opacity: 0;
        }

        @media (max-width: 768px) {
            .theme-bubble {
                font-size: 12px;
                padding: 10px;
            }
        }

        .chat-widget-container {
            position: fixed;
            bottom: 50px;
            left: 24px;
            z-index: 1000;
        }

        .chat-window {
            width: 350px;
            height: 500px;
            border-radius: 16px !important;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2) !important;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #f9f9f9;
        }

        @media (max-width: 400px) {
            .chat-widget-container {
                bottom: 50px;
                left: 0;
                right: 0;
                width: 100%;
                padding: 0 16px;
            }

            .chat-window {
                width: 100%;
                height: 70vh;
            }
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .chat-message {
            display: flex;
            margin-bottom: 12px;
            max-width: 85%;
        }

        .message-bubble {
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
            /* Keep line breaks in chat bubbles */
        }

        .chat-message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .chat-message.user .message-bubble {
            background-color: #3f51b5;
            /* Vuetify Primary */
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-message.bot {
            margin-right: auto;
        }

        .chat-message.bot .message-bubble {
            background-color: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            border-top: 1px solid #e0e0e0;
            background-color: white;
        }

        .v-navigation-drawer,
        .v-menu__content,
        .v-overlay {
            z-index: 3000 !important;
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>

    <script>

        let vue = new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common],
            data: {
                SelectedTheme: 'Greeting',
                PageNumber: 0,
                Themes: ['Greeting', 'Japanese Language', 'Plants', 'Game', 'Cooking', 'Music', 'Japanese Culture', 'About me'],
                ThemeContents: {
                    'Greeting': [`Hello!<br>Welcome to "FUM_Website"!`, `This Website is created to pack everything about my idea.<br><br>I'm aware of the following things.<br><br><p style="display: inline-block; text-align: left;">1. Simple and Easy to understand<br>2. Fun<br>3. Relax<br></p>`, `If you have any suggestions or requests, please contact <span class="Selectable">fuhito.suggestion.1@gmail.com</span>.`, `Please check the overview of the explanations for each theme on this site.<br><br><button id="CheckTheme" type="button" class="v-btn v-btn--outlined v-btn--rounded theme--light v-size--default primary--text" onclick="ScrollToBottom()"><span class="v-btn__content">Check Theme List</span></button>`,], 'Japanese Language': [`You may be able to improve your Japanese ability under my simple idea in this site.`, `First, I recommend grasping the key points about the brain mechanism.<br>The learning method that takes into account that mechanism will surely help you achieve your goals.<br><br><button class="Button_LikeVue" onclick="location.href='./Japanese_Basic_Memory.html'">Check Memory Mechanism</button>`, `Second, let's recap what we should know before learning Japanese!<br><br><button class="Button_LikeVue" onclick="location.href='./Japanese_Basic_LearningPoints.html'">Check Learning Points</button>`,], 'Plants': [`I compile data about plants.<br>I compile them in an easy-to-read format so that you can simply check how to grow them.<br>Nutritional values and Health benefits are also included.`, `I am adding mostly plants that I grow and the amount is still small.`,], 'Game': [`I'm currently creating simple games that can be made in about a day.
                            I plan to add games I've made in the past and create new ones in the future.`,], 'Cooking': [`I'll introduce Japanese cuisine, categorized by type and complexity.`, `I'm planning to summarize the ingredients and seasonings that appear in the videos.<br>Please wait for it.`,], 'Music': [`I'll introduce my favorite songs.<br>Don't expect any of the current trending songs.`,], 'Japanese Culture': [`I'm compiling information for people living in Japan.<br>It will also be useful for tourists.`,], 'About me': [`I'm sharing information about myself and my notes.<br>Occasionally, I also update a blog for cultural exchange.`,],
                },
                bubbles: [],
                modal: { visible: false, theme: null, pageIndex: 0, currentText: '' },
                isMobile: false,
                bug: { x: -100, y: -100, vx: 0, vy: 0, ax: 0, ay: 0, size: 20, state: 'inactive', style: {}, targetX: 0, targetY: 0, spawnTimer: null, rotation: 0, wanderAngle: 0, facing: 1, },
                typewriterTimer: null,
                draggedBubble: null,
                dragInfo: { lastX: 0, lastY: 0, lastTime: 0, vx: 0, vy: 0, moveEvent: null, upEvent: null },
                didDrag: false,

                chat: {
                    visible: false,
                    loading: false,
                    inputText: '',
                    messages: [
                        { from: 'bot', text: 'Hello!<br>Please ask me anything about this site.' }
                    ]
                }
            },
            watch: {
                'chat.messages': function () {
                    this.$nextTick(() => {
                        const container = this.$refs.chatMessagesContainer;
                        if (container) {
                            container.scrollTop = container.scrollHeight;
                        }
                    });
                }
            },
            mounted() {
                setTimeout(() => {
                    this.isMobile = window.innerWidth < 768;
                    this.setupBubbles();
                    this.animateScene();
                }, 150);
            },
            methods: {
                setupBubbles() {
                    const container = document.getElementById('interactive-space');
                    if (!container) return;

                    const containerRect = container.getBoundingClientRect();
                    const centerX = containerRect.width / 2;
                    const centerY = containerRect.height / 2;
                    this.bubbles = this.Themes.map(theme => {
                        const isMobile = window.innerWidth < 768;
                        const baseSize = isMobile ? 80 : 120;
                        const randomFactor = isMobile ? 30 : 40;
                        const size = baseSize + Math.random() * randomFactor;
                        const angle = Math.random() * 2 * Math.PI;
                        const radius = Math.min(centerX, centerY) * (isMobile ? 0.35 : (0.4 + Math.random() * 0.4));
                        const initialX = centerX + Math.cos(angle) * centerX;
                        const initialY = centerY + Math.sin(angle) * centerY;
                        return { theme: theme, x: initialX, y: initialY, vx: (Math.random() - 0.5) * 1, vy: (Math.random() - 0.5) * 1, isDragging: false, size: size, style: { width: `${size}px`, height: `${size}px`, transform: `translate(-50%, -50%) translate(${initialX}px, ${initialY}px)` } };
                    });
                },
                animateScene() {
                    this.updateBubbles();
                    requestAnimationFrame(this.animateScene);
                },
                updateBubbles() {
                    const container = document.getElementById('interactive-space');
                    if (!container) return;
                    const rect = container.getBoundingClientRect();
                    for (let i = 0; i < this.bubbles.length; i++) {
                        const b1 = this.bubbles[i];
                        if (b1.isDragging) continue;
                        b1.vx += (Math.random() - 0.5) * 0.02;
                        b1.vy += (Math.random() - 0.5) * 0.02;
                        const maxSpeed = 10;
                        b1.vx = Math.max(-maxSpeed, Math.min(maxSpeed, b1.vx));
                        b1.vy = Math.max(-maxSpeed, Math.min(maxSpeed, b1.vy));
                        b1.vx *= 0.99;
                        b1.vy *= 0.99;
                        const speed = Math.sqrt(b1.vx * b1.vx + b1.vy * b1.vy);
                        if (speed < 0.5 && speed > 0) {
                            b1.vx = (b1.vx / speed) * 0.5;
                            b1.vy = (b1.vy / speed) * 0.5;
                        }
                        b1.x += b1.vx;
                        b1.y += b1.vy;
                        if (b1.x - b1.size / 2 < 0 && b1.vx < 0) {
                            b1.x = b1.size / 2;
                            b1.vx *= -0.9;

                        } if (b1.x + b1.size / 2 > rect.width && b1.vx > 0) {
                            b1.x = rect.width - b1.size / 2;
                            b1.vx *= -0.9;

                        } if (b1.y - b1.size / 2 < 0 && b1.vy < 0) {
                            b1.y = b1.size / 2;
                            b1.vy *= -0.9;

                        } if (b1.y + b1.size / 2 > rect.height && b1.vy > 0) {
                            b1.y = rect.height - b1.size / 2;
                            b1.vy *= -0.9;

                        }
                        for (let j = i + 1; j < this.bubbles.length; j++) {
                            const b2 = this.bubbles[j];
                            const dx = b2.x - b1.x;
                            const dy = b2.y - b1.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const minDist = (b1.size / 2) + (b2.size / 2);
                            if (dist < minDist) {
                                this.resolveCollision(b1, b2, dx, dy, dist, minDist);
                            }
                        }
                    }

                    this.bubbles.forEach(b => { b.style.transform = `translate(-50%, -50%) translate(${b.x}px, ${b.y}px)`; });
                },
                updateBug() {
                    const bug = this.bug;
                    if (bug.state === 'inactive') return;
                    const container = document.getElementById('interactive-space');
                    if (!container) return;
                    const rect = container.getBoundingClientRect();
                    if (bug.state === 'flying') {
                        bug.wanderAngle += (Math.random() - 0.5) * 0.8;
                        const wanderForceMagnitude = 0.1;
                        const wanderForceX = Math.cos(bug.wanderAngle) * wanderForceMagnitude;
                        const wanderForceY = Math.sin(bug.wanderAngle) * wanderForceMagnitude;
                        const seekForceMagnitude = 0.0005;
                        const seekForceX = (bug.targetX - bug.x) * seekForceMagnitude;
                        const seekForceY = (bug.targetY - bug.y) * seekForceMagnitude;
                        let avoidanceForceX = 0; let avoidanceForceY = 0;
                        const avoidanceRadius = 180;
                        const avoidanceForceMagnitude = 0.8;
                        this.bubbles.forEach(bubble => {
                            const dx = bug.x - bubble.x;
                            const dy = bug.y - bubble.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const minDist = avoidanceRadius + bubble.size / 2;
                            if (dist < minDist) {
                                const force = (minDist - dist) / minDist;
                                avoidanceForceX += (dx / dist) * force * avoidanceForceMagnitude;
                                avoidanceForceY += (dy / dist) * force * avoidanceForceMagnitude;
                            }
                        });
                        bug.ax = wanderForceX + seekForceX + avoidanceForceX;
                        bug.ay = wanderForceY + seekForceY + avoidanceForceY;
                        bug.vx += bug.ax;
                        bug.vy += bug.ay;
                        const maxSpeed = 3;
                        const speed = Math.sqrt(bug.vx * bug.vx + bug.vy * bug.vy);
                        if (speed > maxSpeed) {
                            bug.vx = (bug.vx / speed) * maxSpeed;
                            bug.vy = (bug.vy / speed) * maxSpeed;

                        } bug.vx *= 0.97;
                        bug.vy *= 0.97;
                        const distToTarget = Math.sqrt(Math.pow(bug.targetX - bug.x, 2) + Math.pow(bug.targetY - bug.y, 2));
                        if (distToTarget < 80) { this.setNewBugTarget(rect); }
                        const margin = 50;
                        if (bug.x < margin) bug.vx += 0.1;
                        if (bug.x > rect.width - margin) bug.vx -= 0.1;
                        if (bug.y < margin) bug.vy += 0.1;
                        if (bug.y > rect.height - margin) bug.vy -= 0.1;
                        this.bubbles.forEach(bubble => {
                            const dx = bug.x - bubble.x;
                            const dy = bug.y - bubble.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const minDist = bug.size / 2 + bubble.size / 2;
                            if (dist < minDist) {
                                bug.state = 'falling';
                                bug.vx = bubble.vx * 0.5;
                                bug.vy = bubble.vy * 0.5 + 2;
                            }
                        });
                    } else if (bug.state === 'falling') {
                        bug.vy += 0.2;
                        bug.vx *= 0.99;
                        if (bug.y > rect.height + bug.size) {
                            bug.state = 'inactive';
                            clearTimeout(bug.spawnTimer);
                            bug.spawnTimer = setTimeout(() => this.spawnBug(), 2000);

                        }
                    } bug.x += bug.vx;
                    bug.y += bug.vy;
                    if (bug.vx > 0.1) {
                        bug.facing = -1;

                    } else if (bug.vx < -0.1) {
                        bug.facing = 1;

                    } bug.style = { transform: `translate(-50%, -50%) translate(${bug.x}px, ${bug.y}px) scaleX(${bug.facing})` };

                },
                spawnBug() {
                    const container = document.getElementById('interactive-space');
                    if (!container) return;
                    const rect = container.getBoundingClientRect(); this.bug.x = Math.random() * rect.width; this.bug.y = -this.bug.size * 2; this.bug.state = 'flying'; this.setNewBugTarget(rect);
                },
                setNewBugTarget(rect) { this.bug.targetX = Math.random() * rect.width; this.bug.targetY = Math.random() * rect.height; },
                dragStart(bubble, event) { if (this.modal.visible) return; this.didDrag = false; this.draggedBubble = bubble; const isTouchEvent = event.type === 'touchstart'; const moveEvent = isTouchEvent ? 'touchmove' : 'mousemove'; const upEvent = isTouchEvent ? 'touchend' : 'mouseup'; this.dragInfo.moveEvent = moveEvent; this.dragInfo.upEvent = upEvent; bubble.isDragging = true; const point = isTouchEvent ? event.touches[0] : event; const rect = event.target.closest('#interactive-space').getBoundingClientRect(); this.dragInfo.lastX = point.clientX - rect.left; this.dragInfo.lastY = point.clientY - rect.top; this.dragInfo.lastTime = Date.now(); this.dragInfo.vx = 0; this.dragInfo.vy = 0; bubble.vx = 0; bubble.vy = 0; window.addEventListener(moveEvent, this.dragMove, { passive: false }); window.addEventListener(upEvent, this.dragEnd, { once: true }); },
                dragMove(event) { if (event.cancelable) event.preventDefault(); if (!this.draggedBubble) return; this.didDrag = true; const point = event.touches ? event.touches[0] : event; const rect = document.getElementById('interactive-space').getBoundingClientRect(); const newX = point.clientX - rect.left; const newY = point.clientY - rect.top; const now = Date.now(); const dt = now - this.dragInfo.lastTime; if (dt > 1) { this.dragInfo.vx = this.dragInfo.vx * 0.7 + ((newX - this.draggedBubble.x) / dt) * 0.3; this.dragInfo.vy = this.dragInfo.vy * 0.7 + ((newY - this.draggedBubble.y) / dt) * 0.3; this.dragInfo.lastTime = now; } this.draggedBubble.x = newX; this.draggedBubble.y = newY; },
                dragEnd() { if (!this.draggedBubble) return; window.removeEventListener(this.dragInfo.moveEvent, this.dragMove); if (!this.didDrag) { this.openModal(this.draggedBubble.theme); this.didDrag = true; } else { this.draggedBubble.vx = this.dragInfo.vx * 20; this.draggedBubble.vy = this.dragInfo.vy * 20; } this.draggedBubble.isDragging = false; this.draggedBubble = null; setTimeout(() => { this.didDrag = false; }, 50); },
                handleBubbleClick(bubble) { if (!this.didDrag) { this.openModal(bubble.theme); } },
                resolveCollision(b1, b2, dx, dy, dist, minDist) { const overlap = (minDist - dist) / 2; const offsetX = (dx / dist) * overlap; const offsetY = (dy / dist) * overlap; b1.x -= offsetX; b1.y -= offsetY; b2.x += offsetX; b2.y += offsetY; const angle = Math.atan2(dy, dx); const sin = Math.sin(angle); const cos = Math.cos(angle); const v1 = { x: b1.vx * cos + b1.vy * sin, y: b1.vy * cos - b1.vx * sin }; const v2 = { x: b2.vx * cos + b2.vy * sin, y: b2.vy * cos - b2.vx * sin };[v1.x, v2.x] = [v2.x, v1.x]; b1.vx = v1.x * cos - v1.y * sin; b1.vy = v1.y * cos + v1.x * sin; b2.vx = v2.x * cos - v2.y * sin; b2.vy = v2.y * cos + v2.x * sin; },
                openModal(theme) { this.modal.visible = true; this.modal.theme = theme; this.modal.pageIndex = 0; this.updateModalContent(); },
                closeModal() { this.modal.visible = false; clearTimeout(this.typewriterTimer); },
                changeModalPage(direction) { const newIndex = this.modal.pageIndex + direction; const contents = this.ThemeContents[this.modal.theme]; if (newIndex >= 0 && newIndex < contents.length) { this.modal.pageIndex = newIndex; this.updateModalContent(); } },
                updateModalContent() { clearTimeout(this.typewriterTimer); const text = this.ThemeContents[this.modal.theme][this.modal.pageIndex]; this.startTypewriter(text); },
                startTypewriter(fullText) { let i = 0; this.modal.currentText = ''; const speed = 20; const type = () => { if (i < fullText.length) { if (fullText.charAt(i) === '<') { const tagEnd = fullText.indexOf('>', i); this.modal.currentText += fullText.substring(i, tagEnd + 1); i = tagEnd; } else { this.modal.currentText += fullText.charAt(i); } i++; this.typewriterTimer = setTimeout(type, speed); } }; type(); },
                Get_ThemeContent(_theme) { return this.ThemeContents[_theme] },


                toggleChat() {
                    this.chat.visible = !this.chat.visible;
                },

                async sendMessage() {
                    const inputText = this.chat.inputText.trim();
                    if (!inputText || this.chat.loading) {
                        return;
                    }

                    // 1. Add user message to chat history
                    this.chat.messages.push({ from: 'user', text: inputText });
                    this.chat.inputText = '';
                    this.chat.loading = true;

                    // 2. Add temporary bot placeholder
                    this.chat.messages.push({ from: 'bot', text: '...' });
                    const botMessageIndex = this.chat.messages.length - 1;

                    // 3. Call backend API
                    const backendUrl = 'https://gemini-proxy-632002457565.asia-northeast1.run.app';

                    try {
                        const response = await fetch(backendUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ prompt: inputText })
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.error || 'Server returned an error.');
                        }

                        const data = await response.json();
                        this.$set(this.chat.messages, botMessageIndex, { from: 'bot', text: data.text });

                    } catch (error) {
                        console.error('Error sending message:', error);
                        this.$set(this.chat.messages, botMessageIndex, { from: 'bot', text: `An error occurred: ${error.message}` });
                    } finally {
                        this.chat.loading = false;
                    }
                }
            }
        })
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('interactive-ring');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            let width = 0;
            let height = 0;
            const particles = [];
            const rubberRings = [];

            function randomParticle() {
                return {
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    size: 0.5 + Math.random() * 1.2,
                    alpha: 0.2 + Math.random() * 0.35,
                    phase: Math.random() * Math.PI * 2,
                    age: 0,
                    life: 260 + Math.random() * 380
                };
            }

            function resetParticle(p) {
                p.x = Math.random() * width;
                p.y = Math.random() * height;
                p.vx = (Math.random() - 0.5) * 0.3;
                p.vy = (Math.random() - 0.5) * 0.3;
                p.size = 0.5 + Math.random() * 1.2;
                p.alpha = 0.2 + Math.random() * 0.35;
                p.phase = Math.random() * Math.PI * 2;
                p.age = 0;
                p.life = 260 + Math.random() * 380;
            }

            function createScene() {
                particles.length = 0;
                const isMobile = width < 768;
                const particleCount = isMobile ? 105 : 170;
                for (let i = 0; i < particleCount; i++) {
                    const p = randomParticle();
                    p.age = Math.random() * p.life;
                    particles.push(p);
                }
            }

            function buildRubberRings() {
                rubberRings.length = 0;
                const isMobile = width < 768;
                const spacing = Math.min(width, height) * (isMobile ? 0.24 : 0.128);
                const yStep = spacing * 0.86;
                const radiusBase = spacing * 0.24;
                const xPad = spacing * 0.7;
                const yPad = spacing * 0.8;
                const rows = Math.ceil((height + yPad * 2) / yStep);
                const cols = Math.ceil((width + xPad * 2) / spacing);

                for (let row = 0; row < rows; row++) {
                    const y = row * yStep - yPad;
                    const xOffset = (row % 2) * spacing * 0.5;
                    for (let col = 0; col < cols; col++) {
                        if (isMobile && ((row + col) % 2 !== 0)) continue;
                        const x = col * spacing + xOffset - xPad;
                        if (x < -spacing || x > width + spacing || y < -spacing || y > height + spacing) continue;

                        rubberRings.push({
                            x,
                            y,
                            vx: (Math.random() - 0.5) * 0.45,
                            vy: (Math.random() - 0.5) * 0.45,
                            radius: radiusBase * (0.5 + Math.random() * 2.4),
                            hue: 188 + Math.random() * 28,
                            phaseA: Math.random() * Math.PI * 2,
                            phaseB: Math.random() * Math.PI * 2,
                            quant: 6 + Math.floor(Math.random() * 4)
                        });
                    }
                }
            }

            function updateRubberRings(t) {
                const maxSpeed = 0.85;

                // Soft local separation to keep ring overlap moderate.
                for (let i = 0; i < rubberRings.length; i++) {
                    const a = rubberRings[i];
                    for (let j = i + 1; j < rubberRings.length; j++) {
                        const b = rubberRings[j];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const distSq = dx * dx + dy * dy;
                        const minDist = (a.radius + b.radius) * 1.02;
                        if (distSq <= 0 || distSq > minDist * minDist) continue;
                        const dist = Math.sqrt(distSq);
                        const overlap = (minDist - dist);
                        const nx = dx / dist;
                        const ny = dy / dist;

                        // Position correction first, then velocity impulse (prevents persistent overlap).
                        const correction = overlap * 0.5;
                        a.x -= nx * correction;
                        a.y -= ny * correction;
                        b.x += nx * correction;
                        b.y += ny * correction;

                        const impulse = overlap * 0.010;
                        a.vx -= nx * impulse;
                        a.vy -= ny * impulse;
                        b.vx += nx * impulse;
                        b.vy += ny * impulse;
                    }
                }

                for (let i = 0; i < rubberRings.length; i++) {
                    const ring = rubberRings[i];
                    const driftX = Math.sin(t * 0.38 + ring.phaseA) * 0.009;
                    const driftY = Math.cos(t * 0.33 + ring.phaseB) * 0.009;
                    ring.vx += driftX;
                    ring.vy += driftY;
                    ring.vx *= 0.986;
                    ring.vy *= 0.986;

                    const speed = Math.hypot(ring.vx, ring.vy);
                    if (speed > maxSpeed) {
                        ring.vx = (ring.vx / speed) * maxSpeed;
                        ring.vy = (ring.vy / speed) * maxSpeed;
                    }

                    ring.x += ring.vx;
                    ring.y += ring.vy;

                    const margin = ring.radius * 1.1;
                    if (ring.x < margin) {
                        ring.x = margin;
                        ring.vx *= -0.86;
                    } else if (ring.x > width - margin) {
                        ring.x = width - margin;
                        ring.vx *= -0.86;
                    }
                    if (ring.y < margin) {
                        ring.y = margin;
                        ring.vy *= -0.86;
                    } else if (ring.y > height - margin) {
                        ring.y = height - margin;
                        ring.vy *= -0.86;
                    }
                }
            }

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                createScene();
                buildRubberRings();
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, width, height);
            }

            function fieldForce(x, y, t) {
                const c1x = width * (0.5 + Math.sin(t * 0.28) * 0.24);
                const c1y = height * (0.5 + Math.cos(t * 0.34) * 0.20);
                const c2x = width * (0.5 + Math.sin(t * 0.41 + 1.3) * 0.27);
                const c2y = height * (0.5 + Math.cos(t * 0.23 + 0.7) * 0.22);

                const dx1 = c1x - x;
                const dy1 = c1y - y;
                const dx2 = c2x - x;
                const dy2 = c2y - y;

                const d1 = dx1 * dx1 + dy1 * dy1 + 140;
                const d2 = dx2 * dx2 + dy2 * dy2 + 140;

                // Attractive field + rotational field + low-frequency standing wave
                const g = 90;
                const f1x = (dx1 / d1) * g;
                const f1y = (dy1 / d1) * g;
                const f2x = -(dx2 / d2) * g * 0.75;
                const f2y = -(dy2 / d2) * g * 0.75;

                const rot = Math.sin(t * 0.52) * 0.06;
                const rx = -(y - height * 0.5) * rot / Math.max(height, 1);
                const ry = (x - width * 0.5) * rot / Math.max(width, 1);

                const wave = Math.sin((x * 0.008) + (y * 0.006) + t * 1.4) * 0.04;
                const wx = Math.cos(t * 0.8 + y * 0.004) * wave;
                const wy = Math.sin(t * 0.9 + x * 0.004) * wave;

                return { x: f1x + f2x + rx + wx, y: f1y + f2y + ry + wy };
            }

            function drawContourField(t) {
                const segments = width < 768 ? 52 : 66;

                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                for (let r = 0; r < rubberRings.length; r++) {
                    const ring = rubberRings[r];
                    const pulse = 0.82 + Math.sin(t * 0.9 + ring.phaseA) * 0.18;
                    const lineAlpha = (0.012 + Math.random() * 0.01) * (width < 768 ? 2 : 1);
                    const lineWidth = 0.5 + Math.random() * 1;

                    ctx.beginPath();
                    for (let i = 0; i <= segments; i++) {
                        const a = (i / segments) * Math.PI * 2;
                        const harmonic =
                            Math.sin(a * 2.0 + t * 0.75 + ring.phaseA) * 0.55 +
                            Math.cos(a * 3.0 - t * 0.52 + ring.phaseB) * 0.45;
                        const stepped = Math.round(harmonic * ring.quant) / ring.quant;
                        const distortion = ring.radius * stepped;
                        const radius = ring.radius * pulse + distortion;
                        const x = ring.x + Math.cos(a) * radius;
                        const y = ring.y + Math.sin(a) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.lineWidth = lineWidth;
                    ctx.strokeStyle = `hsla(${ring.hue}, 60%, 66%, ${lineAlpha})`;
                    ctx.stroke();
                }
                ctx.restore();
            }

            function animate(now) {
                requestAnimationFrame(animate);
                const t = now * 0.001;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
                ctx.fillRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'screen';
                updateRubberRings(t);
                drawContourField(t);

                const phasePulse = 0.55 + Math.sin(t * 0.42) * 0.45;
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const prevX = p.x;
                    const prevY = p.y;
                    const f = fieldForce(p.x, p.y, t + p.phase);
                    p.age += 1;

                    const lifeProgress = p.age / p.life;
                    if (lifeProgress >= 1) {
                        resetParticle(p);
                        continue;
                    }

                    const fadeIn = Math.min(1, lifeProgress / 0.18);
                    const fadeOut = Math.min(1, (1 - lifeProgress) / 0.24);
                    const lifeEnvelope = Math.max(0, Math.min(fadeIn, fadeOut));

                    p.vx = (p.vx + f.x) * 0.965;
                    p.vy = (p.vy + f.y) * 0.965;
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < -20 || p.x > width + 20 || p.y < -20 || p.y > height + 20) {
                        resetParticle(p);
                        continue;
                    }

                    ctx.beginPath();
                    ctx.moveTo(prevX, prevY);
                    ctx.lineTo(p.x, p.y);
                    ctx.lineWidth = p.size;
                    ctx.strokeStyle = `hsla(${205 + phasePulse * 30}, 85%, ${48 + phasePulse * 16}%, ${p.alpha * (0.6 + phasePulse * 0.4) * lifeEnvelope})`;
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = `hsla(${200 + phasePulse * 40}, 95%, 62%, ${0.24 * lifeEnvelope})`;
                    ctx.stroke();
                }

                ctx.shadowBlur = 0;
                ctx.globalCompositeOperation = 'source-over';
            }

            window.addEventListener('resize', resize);
            resize();
            requestAnimationFrame(animate);
        });

    </script>
