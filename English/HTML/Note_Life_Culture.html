<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
  <link href="../../Asset/CSS/Learning.css" rel="stylesheet" />

  <title>文化</title>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Life > Culture</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">文化</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="文化を検索" prepend-inner-icon="mdi-magnify" clearable
                      outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1">日本</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2">中国</v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">日本</v-card-title>
                              <v-treeview :items="filteredCultureJapan" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesCultureJapan" @update:open="updateOpenNodesCultureJapan">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">中国</v-card-title>
                              <v-treeview :items="filteredCultureChina" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesCultureChina" @update:open="updateOpenNodesCultureChina">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        dialog: false,
        searchQuery: '',
        filteredCultureJapan: [],
        filteredCultureChina: [],
        openNodesCultureJapan: [],
        openNodesCultureChina: [],
        CultureJapan: [
          {
            name: '食', children: [
              {
                name: 'ラーメン', children: [
                  {
                    name: 'スープ', children: [
                      {
                        name: 'ベースの種類', children: [
                          { name: '豚骨' },
                          { name: '鳥骨' },
                          { name: '煮干し(小魚)' },
                          { name: '魚介類' },
                        ]
                      },
                      {
                        name: '味付けの種類', children: [
                          { name: '塩' },
                          { name: '醤油' },
                          { name: '味噌' },
                        ]
                      },
                    ]
                  },
                  {
                    name: '麺の種類', children: [
                      { name: '太さ' },
                      { name: '硬さ' },
                      { name: '縮れ具合' },
                      { name: '滑らかさ' },
                      { name: '卵の有無' },
                    ]
                  },
                  {
                    name: 'トッピング', children: [
                      { name: 'チャーシュー' },
                      { name: '煮卵' },
                      { name: 'その他' },
                    ]
                  },
                  {
                    name: 'ラーメンの種類', children: [
                      { name: '一般' },
                      { name: '担々麺' },
                      { name: '混ぜそば' },
                      { name: '長崎ちゃんぽん' },
                    ]
                  },
                  {
                    name: 'ポイント', children: [
                      { name: 'スープやラーメンの種類に関して意識してお店探し' },
                    ]
                  },
                ]
              },
            ]
          },
          {
            name: '伝統', children: [
              {
                name: '伝統的な陶器をお土産や観光に'
              },
              {
                name: '陶器', children: [
                  { name: '沖縄県　読谷山焼北窯壺屋焼' },
                  { name: '大分県　小鹿田焼' },
                  { name: '熊本県　小石原焼' },
                  { name: '福岡県　小代焼' },
                  { name: '島根県　石見焼' },
                  { name: '島根県　出西窯' },
                  { name: '島根県　湯町窯' },
                  { name: '鳥取県　因州中井窯' },
                  { name: '兵庫県　丹波立杭焼' },
                  { name: '三重県　伊賀丸柱焼' },
                  { name: '愛知県　瀬戸焼' },
                  { name: '栃木県　益子焼' },
                ]
              },
            ]
          },
        ],
        CultureChina: [
          {
            name: '言語', children: [
              {
                name: '発音', children: [
                  { name: 'iu→iou, ui→uei, un→uen' },
                ]
              },
            ]
          },
        ]
      },
      created() {
        this.filteredCultureJapan = JSON.parse(JSON.stringify(this.CultureJapan));
        this.filteredCultureChina = JSON.parse(JSON.stringify(this.CultureChina));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesCultureJapan(newOpen) {
          this.openNodesCultureJapan = newOpen;
        },
        updateOpenNodesCultureChina(newOpen) {
          this.openNodesCultureChina = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredCultureJapan = JSON.parse(JSON.stringify(this.CultureJapan));
            this.openNodesCultureJapan = [];
            this.filteredCultureChina = JSON.parse(JSON.stringify(this.CultureChina));
            this.openNodesCultureChina = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredCultureJapan = filterTree(JSON.parse(JSON.stringify(this.CultureJapan)));
          this.openNodesCultureJapan = this.collectAllNodeIds(this.filteredCultureJapan);
          this.filteredCultureChina = filterTree(JSON.parse(JSON.stringify(this.CultureChina)));
          this.openNodesCultureChina = this.collectAllNodeIds(this.filteredCultureChina);
        }
      }
    });
  </script>
</body>

</html>
