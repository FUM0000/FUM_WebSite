<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
  <link href="../../Asset/CSS/Learning.css" rel="stylesheet" />

  <title>音楽</title>
    <meta name="robots" content="index, follow">
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > アート > 音楽</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">音楽</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="音楽を検索" prepend-inner-icon="mdi-magnify" clearable
                      outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1"
                          @click="Count_Step_1 = 1">メロディ</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2"
                          @click="Count_Step_1 = 2">理論</v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">メロディ</v-card-title>
                              <v-treeview :items="filteredMusicMelody" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesMusicMelody" @update:open="updateOpenNodesMusicMelody">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">理論</v-card-title>
                              <v-treeview :items="filteredMusicTheory" item-key="name" activatable open-on-click
                                dense :open.sync="openNodesMusicTheory" @update:open="updateOpenNodesMusicTheory">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        dialog: false,
        searchQuery: '',
        filteredMusicMelody: [],
        filteredMusicTheory: [],
        openNodesMusicMelody: [],
        openNodesMusicTheory: [],
        MusicMelody: [
          { name: 'ミソラ' },
          { name: 'レミソミ' },
          { name: 'ドシソラ' },
          { name: 'ファミ' },
          { name: 'ミファソ' },
          { name: 'ミファレ' },
        ],
        MusicTheory: [
          {
            name: '調合', children: [
              {
                name: '♯系', children: [
                  { name: 'ト長調(♯1)' },
                  { name: 'ニ長調(♯2)' },
                  { name: 'イ長調(♯3)' },
                  { name: 'ホ長調(♯4)' },
                  { name: 'ロ長調(♯5)' },
                  { name: '嬰ヘ長調(♯6)' },
                  { name: '嬰ハ長調(♯7)' },
                ]
              },
              {
                name: '♭系', children: [
                  { name: 'ヘ長調(♭1)' },
                  { name: '変ロ長調(♭2)' },
                  { name: '変ホ長調(♭3)' },
                  { name: '変イ長調(♭4)' },
                  { name: '変ニ長調(♭5)' },
                  { name: '変ト長調(♭6)' },
                  { name: '変ハ長調(♭7)' },
                ]
              },
            ]
          },
          {
            name: '近親調と遠隔調', children: [
              { name: '使ってる音程が似ているかどうか。変調の印象を決定づける' },
              { name: '平行調=同じ音程を使う同じ調合の音階' },
              { name: '同主調=主音が同じとなる長短の音階' },
              { name: '属調、下属調=主調に対して順にドミナント、サブドミナントから始まる音階' },
            ]
          },
          {
            name: 'スケール', children: [
              {
                name: 'メジャースケール', children: [
                  { name: '全全半全全全半' },
                ]
              },
              {
                name: 'マイナースケール', children: [
                  { name: 'ナチュラル:全半全全半全全' },
                  { name: 'ハーモニック:全半全全半(3半)半' },
                ]
              },
            ]
          },
          {
            name: '非和声音', children: [
              { name: '旋律線にある和音以外の音' },
              { name: '刺繍音=2度上下する音' },
              { name: '経過音=和音の音を分解して間を補填する音' },
              { name: '倚音=刺繍音の最初を2番目の音にして和音と調和させない音' },
              { name: '逸音=弱拍で和音から一音外れ、次の音とは3度以上離れる音' },
              { name: '掛留音=次の拍まで延ばして次の拍で和音と不協和させる音' },
              { name: '先取音=次の泊の和音を弱拍で先取りする音' },
              { name: '保続音=低音でとても長く伸ばされる音' },
            ]
          },
          {
            name: 'コード進行', children: [
              { name: '完全終止' },
              { name: '半終止' },
              { name: '偽終止' },
              {
                name: 'ドミナントモーション', children: [
                  { name: 'ツーファイブワン' },
                ]
              },
              { name: 'ドッペルドミナント' },
            ]
          },
        ],
      },
      created() {
        this.filteredMusicMelody = JSON.parse(JSON.stringify(this.MusicMelody));
        this.filteredMusicTheory = JSON.parse(JSON.stringify(this.MusicTheory));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesMusicMelody(newOpen) {
          this.openNodesMusicMelody = newOpen;
        },
        updateOpenNodesMusicTheory(newOpen) {
          this.openNodesMusicTheory = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredMusicMelody = JSON.parse(JSON.stringify(this.MusicMelody));
            this.filteredMusicTheory = JSON.parse(JSON.stringify(this.MusicTheory));
            this.openNodesMusicMelody = [];
            this.openNodesMusicTheory = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredMusicMelody = filterTree(JSON.parse(JSON.stringify(this.MusicMelody)));
          this.filteredMusicTheory = filterTree(JSON.parse(JSON.stringify(this.MusicTheory)));

          this.openNodesMusicMelody = this.collectAllNodeIds(this.filteredMusicMelody);
          this.openNodesMusicTheory = this.collectAllNodeIds(this.filteredMusicTheory);
        }
      }
    });
  </script>
</body>

</html>
