  <style>
    .learning-stepper-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start !important;
      gap: 12px 10px;
      align-items: stretch;
      padding: 8px 0 12px;
      height: auto !important;
      overflow: visible !important;
    }

    .learning-stepper-header .v-stepper__step {
      flex: 0 0 calc((100% - 30px) / 4);
      max-width: calc((100% - 30px) / 4);
      min-width: 0;
      border: 0 !important;
      border-radius: 0;
      background: transparent !important;
      box-shadow: none !important;
      padding: 10px 28px 10px 8px;
      position: relative;
    }

    .learning-stepper-header .v-stepper__label {
      display: inline-block;
      max-width: calc(100% - 28px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .learning-stepper-header .v-stepper__step::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 4px;
      width: 22px;
      height: 2px;
      background: #b0bec5;
      transform: translateY(-50%);
    }

    .learning-stepper-header .v-stepper__step:nth-child(4n)::after,
    .learning-stepper-header .v-stepper__step:last-child::after {
      display: none;
    }

    @media (max-width: 1280px) {
      .learning-stepper-header .v-stepper__step {
        padding-right: 24px;
      }
    }

    @media (max-width: 780px) {
      .learning-stepper-header .v-stepper__step {
        flex: 0 0 calc((100% - 10px) / 2);
        max-width: calc((100% - 10px) / 2);
        padding-right: 18px;
      }

      .learning-stepper-header .v-stepper__step::after {
        display: block;
      }

      .learning-stepper-header .v-stepper__step:nth-child(2n)::after,
      .learning-stepper-header .v-stepper__step:last-child::after {
        display: none;
      }

      .learning-stepper-header .v-stepper__label {
        display: inline-block !important;
        max-width: calc(100% - 24px);
        font-size: 12px;
      }
    }
  </style>

  <title>Color Coordinator</title>
</head>

<body>

  <v-app id="App" v-cloak>
    <template>

      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Color Coordinator</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">

            <v-row justify="center">
              <v-col xs="12" md="6">

                <v-row justify="center" class="my-5 Highlight">
                  <v-col cols="auto" class="font-weight-medium">スタンダードクラス</v-col>
                </v-row>
                <v-card>
                  <v-card-title class="content-text">試験について</v-card-title>
                  <v-card-text>
                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header class="learning-stepper-header exam-stepper-header">
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1"
                          class="step-title">概要</v-stepper-step>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2"
                          class="step-title">出題概要</v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">概要</v-card-title>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 30%; min-width: 120px;">項目</th>
                                      <th class="text-left" style="width: 70%; min-width: 400px;">説明</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in overview" :key="item.name">
                                      <td style="padding: 12px;">{{ item.name }}</td>
                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <p class="text-subtitle-2 font-weight-bold">出題概要</p>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">分野</th>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">割合</th>
                                      <th class="text-left" style="width: 50%; min-width: 200px;">概要</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in exam_trend" :key="item.name">
                                      <td style="padding: 12px;">{{ item.name }}</td>
                                      <td v-html="item.rate" style="font-size: 16px; padding: 12px;"></td>
                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                              <p class="mt-4 text-caption" style="color: #666;">
                                ※上記の割合は、公式シラバスや過去問題傾向を基にした推定値であり、実際の試験では変動する可能性があります。</p>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>

                <v-card class="mt-6">
                  <v-card-title class="content-text">学習</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="学習内容を検索" prepend-inner-icon="mdi-magnify" clearable
                      outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_2">
                      <v-stepper-header class="learning-stepper-header">
                        <template v-for="(label, index) in learningLabels">
                          <v-stepper-step :key="'learning-step-' + (index + 1)" :complete="Count_Step_2 > (index + 1)"
                            :step="index + 1" @click="Count_Step_2 = index + 1" class="step-title">
                            {{ label }}
                          </v-stepper-step>
                        </template>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content v-for="(label, index) in learningLabels"
                          :key="'learning-content-' + (index + 1)" :step="index + 1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">{{ label }}</v-card-title>
                              <v-treeview :items="filteredNotes[index]" item-key="name" activatable open-on-click dense
                                :open="openNotes[index]" @update:open="updateOpen(index, $event)">
                                <template v-slot:label="{ item }"><span :class="{ 'search-highlight': item.matches }">{{
                                    item.name }}</span></template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text v-if="index > 0" @click="Count_Step_2 = index">戻る</v-btn>
                            <v-btn color="primary" v-if="index < learningLabels.length - 1"
                              @click="Count_Step_2 = index + 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>


                <v-row justify="center" class="my-5 Highlight">
                  <v-col cols="auto" class="font-weight-medium">アドバンスクラス</v-col>
                </v-row>

              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        Count_Step_2: 1,
        dialog: false,
        searchQuery: '',
        filteredNotes: [],
        openNotes: [],
        overview: [
          { "name": "試験の目的", "description": "スタンダードクラスは色彩の基礎知識と生活・実務での活用力を確認する基礎レベル。" },
          { "name": "出題形式", "description": "多肢選択式。IBT方式というインターネットを通じて自宅等から受験する方式。" },
          { "name": "合格基準", "description": "100点中70点以上が合格目安。" },
          { "name": "出題範囲", "description": "色の基礎と光、色の表示方法、色の見え方、色彩心理、配色理論、生活と色彩、色と社会・ユニバーサルデザイン" }
        ],
        exam_trend: [
          { "name": "色の基礎と光", "rate": "約15%", "description": "色の定義、光と色、物体色、光源による違いを扱う基礎分野。" },
          { "name": "色の表示方法", "rate": "約15%", "description": "三属性、色相環、トーン、マンセル表色系など色を表す方法を学ぶ。" },
          { "name": "色の見え方", "rate": "約15%", "description": "視覚の仕組み、色覚、対比、同化、面積効果など知覚の特性を理解する。" },
          { "name": "色彩心理", "rate": "約15%", "description": "心理効果、感情、イメージ、象徴性など色が人に与える影響を学ぶ。" },
          { "name": "配色理論", "rate": "約15%", "description": "配色原則、色相配色、トーン配色、調和理論など実践的配色の基礎を扱う。" },
          { "name": "生活と色彩", "rate": "約15%", "description": "ファッション、インテリア、食品、商品における色彩活用を理解する。" },
          { "name": "色と社会・ユニバーサルデザイン", "rate": "約10%", "description": "色覚多様性、見やすい配色、公共デザイン、情報伝達における色の役割を学ぶ。" }
        ],
        learningLabels: [
          "色の基礎と光",
          "色の表示方法",
          "色の見え方",
          "色彩心理",
          "配色理論",
          "生活と色彩",
          "色と社会・ユニバーサルデザイン"
        ],
        learningNotes: [
          [
            {
              "name": "1.1 色とは何か",
              "children": [
                {
                  "name": "色の定義",
                  "children": [
                    { "name": "説明：色は物体に固有のものではなく、光・物体・人間の視覚が相互作用して生まれる知覚現象である。" }
                  ]
                },
                {
                  "name": "色を構成する要素",
                  "children": [
                    { "name": "説明：光源、物体の反射特性、観察者の視覚の三要素によって色は成立する。" }
                  ]
                },
                {
                  "name": "色の認識プロセス",
                  "children": [
                    { "name": "説明：光が物体に当たり反射し、眼に入り、視神経を通じて脳で色として認識される過程。" }
                  ]
                }
              ]
            },
            {
              "name": "1.2 光と色",
              "children": [
                {
                  "name": "可視光線の波長範囲",
                  "children": [
                    { "name": "説明：人間が色として認識できる光の波長は約380〜780nmの範囲。" }
                  ]
                },
                {
                  "name": "光のスペクトル",
                  "children": [
                    { "name": "説明：光を波長ごとに分解したもので、虹のように連続した色の分布を示す。" }
                  ]
                },
                {
                  "name": "太陽光と人工光",
                  "children": [
                    { "name": "説明：太陽光は広い波長を含む自然光、人工光は光源によって含まれる波長が異なる。" }
                  ]
                }
              ]
            },
            {
              "name": "1.3 物体色の仕組み",
              "children": [
                {
                  "name": "反射",
                  "children": [
                    { "name": "説明：物体表面が特定の波長の光を跳ね返すことで色として見える。" }
                  ]
                },
                {
                  "name": "吸収",
                  "children": [
                    { "name": "説明：物体が特定の波長の光を吸収することで残った光が色として認識される。" }
                  ]
                },
                {
                  "name": "透過",
                  "children": [
                    { "name": "説明：ガラスなどの透明物質で光が通過する際に色が生じる現象。" }
                  ]
                },
                {
                  "name": "散乱",
                  "children": [
                    { "name": "説明：光が粒子などによって拡散することで色が変化して見える現象。" }
                  ]
                }
              ]
            },
            {
              "name": "1.4 光源による色の違い",
              "children": [
                {
                  "name": "昼光",
                  "children": [
                    { "name": "説明：太陽光を基準とする自然光で、色評価の基準として用いられる。" }
                  ]
                },
                {
                  "name": "蛍光灯",
                  "children": [
                    { "name": "説明：蛍光物質の発光によって光を出す人工光源で、スペクトルに偏りがある。" }
                  ]
                },
                {
                  "name": "LED",
                  "children": [
                    { "name": "説明：半導体の発光を利用した光源で、エネルギー効率が高く色温度の調整が可能。" }
                  ]
                },
                {
                  "name": "色温度",
                  "children": [
                    { "name": "説明：光の色味を温度に例えて表した尺度で、K（ケルビン）で表す。" }
                  ]
                }
              ]
            },
            {
              "name": "1.5 演色性と演色評価数（CRI）",
              "children": [
                {
                  "name": "演色性",
                  "children": [
                    { "name": "説明：光源が物体の色をどれだけ自然に再現できるかを示す性質。" }
                  ]
                },
                {
                  "name": "演色評価数（CRI）",
                  "children": [
                    { "name": "説明：演色性を数値化した指標で、基準光源を100とし数値が高いほど自然に見える。" }
                  ]
                },
                {
                  "name": "Ra（一般演色評価数）",
                  "children": [
                    { "name": "説明：代表的な評価値で、標準試験色の平均で算出される。" }
                  ]
                },
                {
                  "name": "用途と選定",
                  "children": [
                    { "name": "説明：美術館・医療・撮影など色の正確さが重要な環境では高CRIが求められる。" }
                  ]
                }
              ]
            }
          ],
          [
            {
              "name": "2.1 色の三属性",
              "children": [
                {
                  "name": "色相",
                  "children": [
                    { "name": "説明：赤・青・黄など色味の違いを示す属性。" }
                  ]
                },
                {
                  "name": "明度",
                  "children": [
                    { "name": "説明：色の明るさの度合いを示す属性。" }
                  ]
                },
                {
                  "name": "彩度",
                  "children": [
                    { "name": "説明：色の鮮やかさや純度を示す属性。" }
                  ]
                }
              ]
            },
            {
              "name": "2.2 色相環",
              "children": [
                {
                  "name": "基本色相",
                  "children": [
                    { "name": "説明：色相環を構成する基礎的な色の分類。" }
                  ]
                },
                {
                  "name": "補色関係",
                  "children": [
                    { "name": "説明：色相環で正反対に位置する色の関係で、互いを強調する。" }
                  ]
                },
                {
                  "name": "色相距離",
                  "children": [
                    { "name": "説明：色相環上での色の離れ具合を表し、配色の関係性を示す。" }
                  ]
                }
              ]
            },
            {
              "name": "2.3 トーン（色調）",
              "children": [
                {
                  "name": "明度と彩度の組み合わせ",
                  "children": [
                    { "name": "説明：トーンは明度と彩度の組み合わせで色の印象を分類する概念。" }
                  ]
                },
                {
                  "name": "トーン分類",
                  "children": [
                    { "name": "説明：色を一定の明度・彩度グループに整理したもの。" }
                  ]
                },
                {
                  "name": "ペール・ビビッド・ダークなど",
                  "children": [
                    { "name": "説明：トーンの代表的な種類で、淡い色・鮮やかな色・暗い色などの特徴を持つ。" }
                  ]
                }
              ]
            },
            {
              "name": "2.4 表色系",
              "children": [
                {
                  "name": "マンセル表色系の構造",
                  "children": [
                    { "name": "説明：色相・明度・彩度の三属性で色を体系化した表色システム。" }
                  ]
                },
                {
                  "name": "色立体",
                  "children": [
                    { "name": "説明：色を三次元空間で表した構造で、色の関係を立体的に理解できる。" }
                  ]
                },
                {
                  "name": "表記方法（H V/C）",
                  "children": [
                    { "name": "説明：マンセル表色系で色相・明度・彩度を記号で表す方法。" }
                  ]
                }
              ]
            }
          ],
          [
            {
              "name": "3.1 視覚の基本",
              "children": [
                {
                  "name": "眼の構造",
                  "children": [
                    { "name": "説明：角膜・水晶体・網膜など、視覚情報を受け取る器官の構造。" }
                  ]
                },
                {
                  "name": "視細胞（錐体・桿体）",
                  "children": [
                    { "name": "説明：網膜にある光受容細胞で、錐体は色覚、桿体は明暗感知に関与する。" }
                  ]
                },
                {
                  "name": "明所視・暗所視",
                  "children": [
                    { "name": "説明：明るい環境では錐体が働き、暗い環境では桿体が働く視覚状態。" }
                  ]
                }
              ]
            },
            {
              "name": "3.2 色覚",
              "children": [
                {
                  "name": "三色説",
                  "children": [
                    { "name": "説明：赤・緑・青の三種類の受容体によって色が知覚されるという理論。" }
                  ]
                },
                {
                  "name": "反対色説",
                  "children": [
                    { "name": "説明：赤対緑、青対黄など反対関係の信号によって色覚が成立するという理論。" }
                  ]
                },
                {
                  "name": "色覚の個人差",
                  "children": [
                    { "name": "説明：遺伝や生理的要因により色の感じ方に違いが生じる。" }
                  ]
                }
              ]
            },
            {
              "name": "3.3 色の対比",
              "children": [
                {
                  "name": "明度対比",
                  "children": [
                    { "name": "説明：背景の明るさによって色の明るさの印象が変わる現象。" }
                  ]
                },
                {
                  "name": "色相対比",
                  "children": [
                    { "name": "説明：周囲の色によって色相の印象が変化する現象。" }
                  ]
                },
                {
                  "name": "彩度対比",
                  "children": [
                    { "name": "説明：周囲の色の鮮やかさによって彩度の見え方が変わる現象。" }
                  ]

      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) collect(node.children);
            });
          };
          collect(items);
          return ids;
        },
        updateOpen(index, newOpen) {
          this.$set(this.openNotes, index, newOpen);
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredNotes = JSON.parse(JSON.stringify(this.learningNotes));
            this.openNotes = this.learningNotes.map(() => []);
            return;
          }
          const filterTree = (items) => items.reduce((acc, item) => {
            const itemCopy = { ...item };
            const matches = item.name.toLowerCase().includes(query);
            if (item.children) {
              if (matches) {
                // If the parent matches, keep all descendants as-is.
                itemCopy.children = JSON.parse(JSON.stringify(item.children));
                itemCopy.matches = true;
                acc.push(itemCopy);
                return acc;
              }
              itemCopy.children = filterTree(item.children);
              if (itemCopy.children.length > 0) {
                itemCopy.matches = matches;
                acc.push(itemCopy);
              }
            } else if (matches) {
              itemCopy.matches = true;
              acc.push(itemCopy);
            }
            return acc;
          }, []);

          this.filteredNotes = this.learningNotes.map((chapter) => filterTree(JSON.parse(JSON.stringify(chapter))));
          this.openNotes = this.filteredNotes.map((chapter) => this.collectAllNodeIds(chapter));
        }
      }
