    .learning-stepper-header {
      display: flex;

      align-items: stretch;
      padding: 8px 0 12px;
      height: auto !important;
      overflow: visible !important;
    }

    .learning-stepper-header .v-stepper__step {
      flex: 0 0 calc((100% - 30px) / 4);
      max-width: calc((100% - 30px) / 4);
      min-width: 0;
      border: 0 !important;
      border-radius: 0;
      background: transparent !important;
      box-shadow: none !important;
      padding: 10px 28px 10px 8px;
      position: relative;
    }

    .learning-stepper-header .v-stepper__label {
      display: inline-block;
      max-width: calc(100% - 28px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .learning-stepper-header .v-stepper__step::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 4px;
      width: 22px;
      height: 2px;
      background: #b0bec5;
      transform: translateY(-50%);
    }

    .learning-stepper-header .v-stepper__step:nth-child(4n)::after,
    .learning-stepper-header .v-stepper__step:last-child::after {
      display: none;
    }

    @media (max-width: 1280px) {
      .learning-stepper-header .v-stepper__step {
        padding-right: 24px;
      }
    }

    @media (max-width: 780px) {

        max-width: calc((100% - 10px) / 2);

      created() {
        const normalizeChapter = (chapter) => (Array.isArray(chapter) ? chapter : [chapter]);
        const findByName = (nodes, name) => {
          for (let i = 0; i < nodes.length; i++) {
            const node = nodes[i];
            if (node.name === name) return node;
            if (node.children) {
              const found = findByName(node.children, name);
              if (found) return found;
            }
          }
          return null;
        };
        this.filteredNotes = this.learningNotes.map((chapter, index) => {
          const nodes = normalizeChapter(JSON.parse(JSON.stringify(chapter)));
          const match = findByName(nodes, this.learningLabels[index]);
          return match && match.children ? match.children : [];
        });
        this.openNotes = this.learningNotes.map(() => []);
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) collect(node.children);
            });
          };
          collect(items);
          return ids;
        },
        updateOpen(index, newOpen) {
          this.$set(this.openNotes, index, newOpen);
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          const normalizeChapter = (chapter) => (Array.isArray(chapter) ? chapter : [chapter]);
          const findByName = (nodes, name) => {
            for (let i = 0; i < nodes.length; i++) {
              const node = nodes[i];
              if (node.name === name) return node;
              if (node.children) {
                const found = findByName(node.children, name);
                if (found) return found;
              }
            }
            return null;
          };
          if (!query) {
            this.filteredNotes = this.learningNotes.map((chapter, index) => {
              const nodes = normalizeChapter(JSON.parse(JSON.stringify(chapter)));
              const match = findByName(nodes, this.learningLabels[index]);
              return match && match.children ? match.children : [];
            });
            this.openNotes = this.learningNotes.map(() => []);
            return;
          }
          const filterTree = (items) => items.reduce((acc, item) => {
            const itemCopy = { ...item };
            const matches = item.name.toLowerCase().includes(query);
            if (item.children) {
              if (matches) {
                // If the parent matches, keep all descendants as-is.
                itemCopy.children = JSON.parse(JSON.stringify(item.children));
                itemCopy.matches = true;
                acc.push(itemCopy);
                return acc;
              }
              itemCopy.children = filterTree(item.children);
              if (itemCopy.children.length > 0) {
                itemCopy.matches = matches;
                acc.push(itemCopy);
              }
            } else if (matches) {
              itemCopy.matches = true;
              acc.push(itemCopy);
            }
            return acc;
          }, []);

          this.filteredNotes = this.learningNotes.map((chapter, index) => {
            const nodes = normalizeChapter(JSON.parse(JSON.stringify(chapter)));
            const match = findByName(nodes, this.learningLabels[index]);
            const children = match && match.children ? match.children : [];
            return filterTree(JSON.parse(JSON.stringify(children)));
          });
          this.openNotes = this.filteredNotes.map((chapter) => this.collectAllNodeIds(chapter));
        }
      }
