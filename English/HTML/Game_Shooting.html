    <script type="importmap">

    <!-- ゲームスクリプト (全クラスをここに集約) -->
    <script type="module">
        import * as THREE from 'three';

        const TOP_UI_WORLD_RESERVE = 6;
        const BASE_BULLET_SPEED = 0.8;
        const BULLET_SPEED_RAMP_TIME = 180000;
        const INITIAL_BULLET_SPEED_RATE = 0.1;
        const HEAL_WARNING_TIME = 5000;
        const HEAL_INTERVAL = 60000;

        function createHeartMesh() {
            const shape = new THREE.Shape();
            shape.moveTo(0, 0.35);
            shape.bezierCurveTo(0, 0.75, -0.7, 0.75, -0.7, 0.2);
            shape.bezierCurveTo(-0.7, -0.35, 0, -0.65, 0, -1);
            shape.bezierCurveTo(0, -0.65, 0.7, -0.35, 0.7, 0.2);
            shape.bezierCurveTo(0.7, 0.75, 0, 0.75, 0, 0.35);
            const geometry = new THREE.ShapeGeometry(shape);
            const material = new THREE.MeshBasicMaterial({ color: 0xff3b5c, side: THREE.DoubleSide });
            const heart = new THREE.Mesh(geometry, material);
            heart.scale.set(0.62, 0.62, 1);
            return heart;
        }

        // ==================================================================
        // ===== Audio Utility (Web Audio API for Sound Effects) ==========
        // ==================================================================

        let audioCtx;
        let bgmOscillator;
        let bgmGain;
        let bgmTimer;
        const bgmNotes = [220.00, 220.00, 246.94, 220.00, 220.00, 261.63, 246.94, 220.00]; // Simple note sequence
        let bgmNoteIndex = 0;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;

            const now = audioCtx.currentTime;
            const gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);

            switch (type) {
                case 'shoot':
                    const oscShoot = audioCtx.createOscillator();
                    oscShoot.type = 'triangle';
                    oscShoot.frequency.setValueAtTime(880, now);
                    oscShoot.frequency.exponentialRampToValueAtTime(220, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    oscShoot.connect(gainNode);
                    oscShoot.start(now);
                    oscShoot.stop(now + 0.1);
                    break;
                case 'hit':
                    const oscHit = audioCtx.createOscillator();
                    oscHit.type = 'square';
                    oscHit.frequency.setValueAtTime(440, now);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    oscHit.connect(gainNode);
                    oscHit.start(now);
                    oscHit.stop(now + 0.2);
                    break;
                case 'destroy':
                    const oscDestroy = audioCtx.createOscillator();
                    oscDestroy.type = 'sawtooth';
                    oscDestroy.frequency.setValueAtTime(160, now);
                    oscDestroy.frequency.exponentialRampToValueAtTime(35, now + 1.0);
                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
                    oscDestroy.connect(gainNode);
                    oscDestroy.start(now);
                    oscDestroy.stop(now + 1.0);
                    break;
                case 'bgm':
                    if (bgmOscillator) bgmOscillator.stop();
                    if (bgmTimer) clearTimeout(bgmTimer);
                    initAudio();
                    bgmOscillator = audioCtx.createOscillator();
                    bgmGain = audioCtx.createGain();
                    bgmOscillator.type = 'sine';
                    bgmGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    bgmOscillator.connect(bgmGain).connect(audioCtx.destination);
                    bgmOscillator.start();

                    const playNextNote = () => {
                        if (!bgmOscillator) return;
                        const note = bgmNotes[bgmNoteIndex % bgmNotes.length];
                        bgmOscillator.frequency.setValueAtTime(note, audioCtx.currentTime);
                        bgmNoteIndex++;
                        bgmTimer = setTimeout(playNextNote, 500);
                    };
                    playNextNote();
                    break;
            }
        }

        function stopBGM() {
            if (bgmOscillator) {
                if (bgmTimer) clearTimeout(bgmTimer);
                bgmTimer = null;
                bgmGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                bgmOscillator.stop(audioCtx.currentTime + 0.5);
                bgmOscillator = null;
            }
        }

        // ==================================================================
        // ===== Bullet Class =============================================
        // ==================================================================
        class WarpParticleEffect {
            constructor(scene, position, color) {
                this.scene = scene;
                this.life = 1;
                this.group = new THREE.Group();
                this.group.position.copy(position);
                this.particles = [];

                for (let i = 0; i < 18; i++) {
                    const geometry = new THREE.CircleGeometry(0.45, 8);
                    const material = new THREE.MeshBasicMaterial({
                        color,
                        transparent: true,
                        opacity: 0.9,
                        side: THREE.DoubleSide
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    const angle = (Math.PI * 2 * i) / 18;
                    const speed = 0.55 + Math.random() * 0.45;
                    mesh.position.set(Math.cos(angle) * 1.4, Math.sin(angle) * 1.4, 0.2);
                    this.group.add(mesh);
                    this.particles.push({
                        mesh,
                        velocity: new THREE.Vector3(Math.cos(angle) * speed, Math.sin(angle) * speed, 0),
                        spin: (Math.random() - 0.5) * 0.35
                    });
                }

                scene.add(this.group);
            }

            update() {
                this.life -= 0.045;
                this.group.rotation.z += 0.08;

                for (const particle of this.particles) {
                    particle.mesh.position.add(particle.velocity);
                    particle.mesh.rotation.z += particle.spin;
                    particle.mesh.scale.multiplyScalar(0.97);
                    particle.mesh.material.opacity = Math.max(0, this.life);
                }

                if (this.life <= 0) {
                    this.removeFromScene();
                    return false;
                }
                return true;
            }

            removeFromScene() {
                this.scene.remove(this.group);
                for (const particle of this.particles) {
                    particle.mesh.geometry.dispose();
                    particle.mesh.material.dispose();
                }
            }
        }

        class CharacterExplosionEffect {
            constructor(scene, character) {
                this.scene = scene;
                this.life = 1;
                this.group = new THREE.Group();
                this.group.position.copy(character.mesh.position);
                this.particles = [];
                const color = character.mesh.material.color.getHex();

                for (let i = 0; i < 34; i++) {
                    const geometry = new THREE.BoxGeometry(0.5 + Math.random() * 0.65, 0.5 + Math.random() * 0.65, 0.2);
                    const material = new THREE.MeshBasicMaterial({
                        color,
                        transparent: true,
                        opacity: 0.95
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 1.45;
                    mesh.position.set((Math.random() - 0.5) * character.bodyWidth, (Math.random() - 0.5) * character.bodyHeight, 0.35);
                    this.group.add(mesh);
                    this.particles.push({
                        mesh,
                        velocity: new THREE.Vector3(Math.cos(angle) * speed, Math.sin(angle) * speed, 0),
                        spin: (Math.random() - 0.5) * 0.5
                    });
                }

                scene.add(this.group);
            }

            update() {
                this.life -= 0.009;
                for (const particle of this.particles) {
                    particle.mesh.position.add(particle.velocity);
                    particle.mesh.rotation.z += particle.spin;
                    particle.velocity.multiplyScalar(0.992);
                    particle.mesh.material.opacity = Math.max(0, this.life);
                }

                if (this.life <= 0) {
                    this.removeFromScene();
                    return false;
                }
                return true;
            }

            removeFromScene() {
                this.scene.remove(this.group);
                for (const particle of this.particles) {
                    particle.mesh.geometry.dispose();
                    particle.mesh.material.dispose();
                }
            }
        }

        class HealWarning {
            constructor(scene, position) {
                this.scene = scene;
                this.position = position.clone();
                this.life = HEAL_WARNING_TIME;
                this.group = new THREE.Group();
                this.group.position.copy(position);
                this.dots = [];

                for (let i = 0; i < 24; i++) {
                    const geometry = new THREE.CircleGeometry(0.25, 8);
                    const material = new THREE.MeshBasicMaterial({
                        color: 0x66ff99,
                        transparent: true,
                        opacity: 0.8,
                        side: THREE.DoubleSide
                    });
                    const dot = new THREE.Mesh(geometry, material);
                    const angle = (Math.PI * 2 * i) / 24;
                    dot.position.set(Math.cos(angle) * 4, Math.sin(angle) * 4, 0.15);
                    this.group.add(dot);
                    this.dots.push(dot);
                }

                scene.add(this.group);
            }

            update(deltaTime) {
                this.life -= deltaTime;
                this.group.rotation.z += 0.035;
                const opacity = 0.35 + Math.sin(Date.now() * 0.015) * 0.25;
                for (const dot of this.dots) dot.material.opacity = opacity;
                return this.life > 0;
            }

            removeFromScene() {
                this.scene.remove(this.group);
                for (const dot of this.dots) {
                    dot.geometry.dispose();
                    dot.material.dispose();
                }
            }
        }

        class HealPack {
            constructor(scene, position) {
                this.scene = scene;
                this.size = 1.7;
                this.group = new THREE.Group();
                this.group.position.copy(position);

                const vertical = new THREE.Mesh(
                    new THREE.BoxGeometry(1.0, 3.0, 0.25),
                    new THREE.MeshBasicMaterial({ color: 0x66ff99 })
                );
                const horizontal = new THREE.Mesh(
                    new THREE.BoxGeometry(3.0, 1.0, 0.25),
                    new THREE.MeshBasicMaterial({ color: 0x66ff99 })
                );
                this.group.add(vertical);
                this.group.add(horizontal);
                scene.add(this.group);
            }

            update() {
                this.group.rotation.z += 0.025;
            }

            removeFromScene() {
                this.scene.remove(this.group);
                for (const child of this.group.children) {
                    child.geometry.dispose();
                    child.material.dispose();
                }
            }
        }

        class Bullet {
            constructor(scene, owner, game) {
                this.scene = scene;
                this.owner = owner;
                this.game = game;

                this.speed = this.game.getBulletSpeed();
                this.size = 0.8;
                this.distanceTraveled = 0;

                const geometry = new THREE.SphereGeometry(this.size, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: this.owner.mesh.material.color });
                this.mesh = new THREE.Mesh(geometry, material);

                const direction = this.owner.getForward();
                this.mesh.position.copy(this.owner.mesh.position).add(direction.clone().multiplyScalar(this.owner.bodyWidth / 2 + this.size + 0.2));
                this.velocity = direction.multiplyScalar(this.speed);

                this.scene.add(this.mesh);
            }

            update() {
                this.mesh.position.add(this.velocity);
                this.distanceTraveled += this.speed;
                this.checkWarp();
            }

            checkWarp() {
                const worldWidth = this.game.frustumSize * this.game.aspect / 2;
                const worldHeight = this.game.frustumSize / 2;

                let warped = false;
                const beforeWarp = this.mesh.position.clone();
                if (this.mesh.position.x > worldWidth) {
                    this.mesh.position.x = -worldWidth;
                    warped = true;
                } else if (this.mesh.position.x < -worldWidth) {
                    this.mesh.position.x = worldWidth;
                    warped = true;
                }

                if (this.mesh.position.y > worldHeight) {
                    this.mesh.position.y = -worldHeight;
                    warped = true;
                } else if (this.mesh.position.y < -worldHeight) {
                    this.mesh.position.y = worldHeight;
                    warped = true;
                }
                if (warped) {
                    this.game.createWarpEffect(beforeWarp, this.owner.mesh.material.color.getHex());
                    this.game.createWarpEffect(this.mesh.position, this.owner.mesh.material.color.getHex());
                }
            }

            removeFromScene() {
                this.scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
            }
        }

        // ==================================================================
        // ===== Character Class (Base) ===================================
        // ==================================================================
        class Character {
            constructor(scene, game, position, color, hp = 3) {
                this.scene = scene;
                this.game = game;

                this.bodyWidth = 2.4;
                this.bodyHeight = 6.0;
                this.size = this.bodyHeight / 2;
                this.sizeSq = this.size * this.size;
                this.forward = new THREE.Vector3(0, 1, 0);
                const geometry = new THREE.BoxGeometry(this.bodyWidth, this.bodyHeight, 0.25);
                const material = new THREE.MeshBasicMaterial({ color });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.copy(position);
                this.scene.add(this.mesh);

                this.hp = hp;
                this.maxHp = this.hp;
                this.maxAmmo = 5;
                this.ammo = this.maxAmmo;
                this.baseSpeed = 0.5;
                this.speed = this.baseSpeed;

                this.distanceForAmmo = 0;
                this.distanceToGetAmmo = 120;

                this.fireCooldown = 300; // ms
                this.lastFireTime = 0;

                this.hpGroup = new THREE.Group();
                this.ammoGroup = new THREE.Group();
                this.scene.add(this.hpGroup);
                this.scene.add(this.ammoGroup);
                this.createIndicators();
            }

            createIndicators() {
                this.hearts = [];
                for (let i = 0; i < this.maxHp; i++) {
                    const heart = createHeartMesh();
                    this.hpGroup.add(heart);
                    this.hearts.push(heart);
                }

                this.ammoBlocks = [];
                const ammoRadius = (this.bodyHeight / this.maxAmmo) * 0.38;
                const geometry = new THREE.CircleGeometry(ammoRadius, 18);
                for (let i = 0; i < this.maxAmmo; i++) {
                    const material = new THREE.MeshBasicMaterial({
                        color: this.mesh.material.color,
                        transparent: true,
                        opacity: 0.85
                    });
                    const block = new THREE.Mesh(geometry, material);
                    this.ammoGroup.add(block);
                    this.ammoBlocks.push(block);
                }

                this.updateIndicators();
            }

            updateIndicators() {
                const heartSpacing = 0.85;
                const heartStart = -((this.maxHp - 1) * heartSpacing) / 2;
                const ammoDiameter = this.bodyHeight / this.maxAmmo;
                const indicatorGap = this.bodyWidth / 2 + ammoDiameter / 2 + 0.45;
                this.hpGroup.position.set(this.mesh.position.x, this.mesh.position.y + this.bodyHeight / 2 + indicatorGap - this.bodyWidth / 2, 0.4);
                for (let i = 0; i < this.hearts.length; i++) {
                    const heart = this.hearts[i];
                    heart.position.set(heartStart + i * heartSpacing, 0, 0);
                    heart.visible = i < this.hp;
                }

                const forward = this.getForward();
                const behind = forward.clone().negate();
                const wallCenter = this.mesh.position.clone().add(behind.multiplyScalar(indicatorGap));
                const blockSpacing = ammoDiameter;
                const blockStart = -this.bodyHeight / 2 + ammoDiameter / 2;
                this.ammoGroup.position.set(wallCenter.x, wallCenter.y, 0.25);
                this.ammoGroup.rotation.z = 0;

                for (let i = 0; i < this.ammoBlocks.length; i++) {
                    const block = this.ammoBlocks[i];
                    block.position.set(0, blockStart + i * blockSpacing, 0);
                    block.visible = i < this.ammo;
                }
            }

            getForward() {
                return this.forward.clone().normalize();
            }

            shoot() {
                const now = Date.now();
                if (this.ammo > 0 && now - this.lastFireTime > this.fireCooldown) {
                    this.ammo--;
                    this.lastFireTime = now;

                    const bullet = new Bullet(this.scene, this, this.game);
                    this.game.bullets.push(bullet);
                    playSound('shoot');
                    return true;
                }
                return false;
            }

            updateSpeed() {
                const speedModifier = 1.0 - (this.ammo / this.maxAmmo) * (2 / 3);
                this.speed = this.baseSpeed * speedModifier;
            }

            heal(amount) {
                const hpBefore = this.hp;
                this.hp = Math.min(this.maxHp, this.hp + amount);
                return this.hp > hpBefore;
            }

            canReplenishFromOwnBullet(bullet) {
                if (bullet.owner !== this || this.ammo >= this.maxAmmo || bullet.distanceTraveled < this.size * 3) return false;
                const toBullet = bullet.mesh.position.clone().sub(this.mesh.position);
                const forward = this.getForward();
                return toBullet.lengthSq() < this.sizeSq * 1.6 && forward.dot(toBullet.normalize()) < -0.45;
            }

            addAmmoOnMove(distance) {
                this.distanceForAmmo += distance;
                if (this.distanceForAmmo >= this.distanceToGetAmmo) {
                    if (this.ammo < this.maxAmmo) {
                        this.ammo++;
                    }
                    this.distanceForAmmo = 0;
                }
            }

            takeDamage(amount) {
                this.hp = Math.max(0, this.hp - amount);
            }

            isDead() {
                return this.hp <= 0;
            }

            destroy() {
                this.hpGroup.visible = false;
                this.ammoGroup.visible = false;
                this.mesh.visible = false;
                this.game.createCharacterExplosion(this);
            }
        }

        // ==================================================================
        // ===== Player Class ===============================================
        // ==================================================================
        class Player extends Character {
            constructor(scene, game, position, color) {
                super(scene, game, position, color);
                this.keys = {};
                document.addEventListener('keydown', (e) => this.keys[e.code] = true);
                document.addEventListener('keyup', (e) => this.keys[e.code] = false);

                this._moveVector = new THREE.Vector3();
                this.forward.set(1, 0, 0);
                this.updateIndicators();
            }

            update() {
                this._moveVector.set(0, 0, 0);
                if (this.keys['KeyW']) this._moveVector.y += 1;
                if (this.keys['KeyS']) this._moveVector.y -= 1;
                if (this.keys['KeyA']) this._moveVector.x -= 1;
                if (this.keys['KeyD']) this._moveVector.x += 1;
                this._moveVector.x += this.game.mobileMove.x;
                this._moveVector.y += this.game.mobileMove.y;

                this.updateSpeed();

                if (this._moveVector.lengthSq() > 0) {
                    this._moveVector.normalize().multiplyScalar(this.speed);
                    this.mesh.position.add(this._moveVector);
                    this.addAmmoOnMove(this._moveVector.length());
                }

                if (this.keys['Space'] || this.game.mobileShootRequested) {
                    this.shoot();
                    this.game.mobileShootRequested = false;
                }

                this.keepInBounds();
                this.updateIndicators();
            }

            keepInBounds() {
                const worldWidth = this.game.frustumSize * this.game.aspect / 2 - this.size;
                const worldHeight = this.game.frustumSize / 2 - this.size;
                this.mesh.position.x = Math.max(-worldWidth, Math.min(0 - this.size, this.mesh.position.x));
                this.mesh.position.y = Math.max(-worldHeight, Math.min(worldHeight - TOP_UI_WORLD_RESERVE, this.mesh.position.y));
            }
        }

        // ==================================================================
        // ===== Enemy Class (AI) =========================================
        // ==================================================================
        class Enemy extends Character {
            constructor(scene, game, position, color) {
                super(scene, game, position, color, 5);

                this.thinkInterval = 3;
                this.thinkCooldown = this.thinkInterval;

                this._moveDirection = new THREE.Vector3();
                this._targetPosition = new THREE.Vector3();
                this._toMeVector = new THREE.Vector3();
                this._evasionDir = new THREE.Vector3();
                this._pos1 = new THREE.Vector3();
                this._pos2 = new THREE.Vector3();
                this._lastPlayerPosition = new THREE.Vector3();
                this._playerVelocity = new THREE.Vector3();
                this._predictedPlayerPosition = new THREE.Vector3();
                this._hasPlayerSample = false;
                this._bulletLayerInfo = null;
                this._tempVec = new THREE.Vector3();

                this.forward.set(-1, 0, 0);
                this.fireCooldown = 800;
                this.updateIndicators();
            }

            think(player) {
                const playerPos = player.mesh.position;
                const predictedPlayerPos = this.getPredictedPlayerPosition(player);
                const layerInfo = this._bulletLayerInfo || this.analyzeBulletLayers(player, this.game.bullets);

                const worldWidth = this.game.frustumSize * this.game.aspect / 2 - this.size;
                const worldHeight = this.game.frustumSize / 2 - this.size;
                const topWorldHeight = worldHeight - TOP_UI_WORLD_RESERVE;

                const pressure = layerInfo.lanePressure + layerInfo.rearPressure;
                const ammoCrit = this.ammo <= 1;
                const playerWeak = player.hp <= 1 || player.ammo <= 1;

                let targetX = worldWidth * 0.3;
                let targetY = predictedPlayerPos.y;

                if (pressure > 2.5) {
                    targetX = worldWidth * 0.45;
                    targetY += (Math.random() - 0.5) * 20;
                } else if (ammoCrit && pressure < 0.8) {
                    targetX = worldWidth * 0.15 + Math.random() * worldWidth * 0.15;
                    targetY += (Math.random() - 0.5) * 30;
                } else if (playerWeak && this.ammo >= 2) {
                    targetX = worldWidth * 0.12;
                    targetY = predictedPlayerPos.y;
                } else {
                    targetX = worldWidth * (0.22 + Math.random() * 0.16);
                    targetY += (Math.random() - 0.5) * 10;
                }

                this._targetPosition.x = THREE.MathUtils.clamp(targetX, this.size + 5, worldWidth * 0.85);
                this._targetPosition.y = THREE.MathUtils.clamp(targetY, -worldHeight * 0.85, topWorldHeight * 0.85);
            }

            update(player, bullets) {
                this.updateSpeed();
                if (!this._hasPlayerSample) {
                    this._lastPlayerPosition.copy(player.mesh.position);
                    this._hasPlayerSample = true;
                }
                this._playerVelocity.subVectors(player.mesh.position, this._lastPlayerPosition);
                this._lastPlayerPosition.copy(player.mesh.position);
                this._bulletLayerInfo = this.analyzeBulletLayers(player, bullets);

                this.thinkCooldown--;
                if (this.thinkCooldown <= 0) {
                    this.think(player);
                    this.thinkCooldown = this.thinkInterval + Math.floor(Math.random() * 2);
                }

                this._moveDirection.set(0, 0, 0);

                const threateningBullet = this.findHighThreateningBullet(bullets);
                if (threateningBullet) {
                    this.getEvasionVector(threateningBullet, this._moveDirection);
                } else if (this._bulletLayerInfo.nearThreat) {
                    this._moveDirection.copy(this._bulletLayerInfo.evasionVector);
                }

                if (this._moveDirection.lengthSq() === 0) {
                    this._moveDirection.subVectors(this._targetPosition, this.mesh.position);
                }

                this.applyEdgeAvoidance(this._moveDirection);

                if (this._moveDirection.lengthSq() > 0) {
                    this._moveDirection.normalize().multiplyScalar(this.speed);
                    this.mesh.position.add(this._moveDirection);
                    this.addAmmoOnMove(this._moveDirection.length());
                }

                this.keepInBounds();
                this.updateIndicators();
                this.trySmartShot(player, bullets);
            }

            applyEdgeAvoidance(outVector) {
                const worldWidth = this.game.frustumSize * this.game.aspect / 2 - this.size;
                const worldHeight = this.game.frustumSize / 2 - this.size;
                const topWorldHeight = worldHeight - TOP_UI_WORLD_RESERVE;

                const margin = 10;
                const toLeft = this.mesh.position.x - this.size;
                const toRight = worldWidth - this.mesh.position.x;
                const toBottom = this.mesh.position.y + worldHeight;
                const toTop = topWorldHeight - this.mesh.position.y;

                const pushL = Math.max(0, (margin - toLeft) / margin);
                const pushR = Math.max(0, (margin - toRight) / margin);
                const pushB = Math.max(0, (margin - toBottom) / margin);
                const pushT = Math.max(0, (margin - toTop) / margin);

                outVector.x += (pushL - pushR) * 2.5;
                outVector.y += (pushB - pushT) * 2.5;
            }

            findThreateningBullet(bullets) {
                let closestThreat = null;
                let minDistanceSq = 30 * 30;

                for (const bullet of bullets) {
                    if (bullet.owner === this) continue;

                    const distSq = bullet.mesh.position.distanceToSquared(this.mesh.position);
                    if (distSq < minDistanceSq) {
                        this._toMeVector.subVectors(this.mesh.position, bullet.mesh.position);
                        if (bullet.velocity.dot(this._toMeVector) > 0) {
                            minDistanceSq = distSq;
                            closestThreat = bullet;
                        }
                    }
                }
                return closestThreat;
            }

            findHighThreateningBullet(bullets) {
                let closestThreat = null;
                let bestThreatScore = 0;

                for (const bullet of bullets) {
                    if (bullet.owner === this) continue;

                    const relative = this.mesh.position.clone().sub(bullet.mesh.position);
                    const velocitySq = Math.max(0.001, bullet.velocity.lengthSq());
                    const closingSpeed = relative.dot(bullet.velocity);
                    const timeToClosest = THREE.MathUtils.clamp(closingSpeed / velocitySq, 0, 90);
                    const closestPoint = bullet.mesh.position.clone().add(bullet.velocity.clone().multiplyScalar(timeToClosest));
                    const closestDistanceSq = closestPoint.distanceToSquared(this.mesh.position);
                    const currentDistanceSq = bullet.mesh.position.distanceToSquared(this.mesh.position);
                    const threatRadius = this.size + bullet.size + 11;
                    const threatScore = Math.max(0, threatRadius * threatRadius - closestDistanceSq) + Math.max(0, 32 * 32 - currentDistanceSq) * 0.2;

                    if (closingSpeed > 0 && threatScore > bestThreatScore) {
                        bestThreatScore = threatScore;
                        closestThreat = bullet;
                    }
                }

                return closestThreat;
            }

            trySmartShot(player, bullets) {
                if (this.ammo <= 0) return;
                const predictedPlayerPos = this.getPredictedPlayerPosition(player);
                const yDiff = Math.abs(this.mesh.position.y - predictedPlayerPos.y);
                const shouldFire = yDiff < (player.hp <= 1 || player.ammo <= 1 ? 26 : 18) && this.hasClearShot(player, bullets);
                if (shouldFire) this.shoot();
            }

            getPredictedPlayerPosition(player) {
                const distanceToPlayer = Math.abs(this.mesh.position.x - player.mesh.position.x);
                const framesAhead = THREE.MathUtils.clamp(distanceToPlayer / Math.max(0.1, this.game.getBulletSpeed()), 8, 55);
                this._predictedPlayerPosition.copy(player.mesh.position).add(this._playerVelocity.clone().multiplyScalar(framesAhead));
                const hw = this.game.frustumSize / 2 - player.size;
                const hw2 = hw - TOP_UI_WORLD_RESERVE;
                this._predictedPlayerPosition.y = THREE.MathUtils.clamp(this._predictedPlayerPosition.y, -hw, hw2);
                return this._predictedPlayerPosition;
            }

            hasClearShot(player, bullets) {
                for (const bullet of bullets) {
                    if (bullet.owner !== player) continue;
                    const betweenX = bullet.mesh.position.x > player.mesh.position.x && bullet.mesh.position.x < this.mesh.position.x;
                    if (betweenX && Math.abs(bullet.mesh.position.y - this.mesh.position.y) < 5) return false;
                }
                return true;
            }

            analyzeBulletLayers(player, bullets) {
                const worldHeight = this.game.frustumSize / 2 - this.size;
                const topWorldHeight = worldHeight - TOP_UI_WORLD_RESERVE;
                const ringRadii = [28, 52, 80, 110];
                const laneSamples = [
                    -worldHeight,
                    -worldHeight * 0.5,
                    player.mesh.position.y - 10,
                    player.mesh.position.y,
                    player.mesh.position.y + 10,
                    topWorldHeight * 0.5,
                    topWorldHeight
                ].map((y) => THREE.MathUtils.clamp(y, -worldHeight, topWorldHeight));
                const scores = laneSamples.map((y) => ({ y, danger: Math.abs(y - player.mesh.position.y) * 0.015 }));
                const evasionVector = new THREE.Vector3(0, 0, 0);
                let lanePressure = 0;
                let rearPressure = 0;
                let nearThreat = false;

                for (const bullet of bullets) {
                    if (bullet.owner !== player) continue;

                    const fromPlayer = bullet.mesh.position.clone().sub(player.mesh.position);
                    const distance = fromPlayer.length();
                    const layerIndex = ringRadii.findIndex((radius) => distance <= radius);
                    if (layerIndex === -1) continue;

                    const layerWeight = ringRadii.length - layerIndex;
                    const isBetweenPlayers = bullet.mesh.position.x > player.mesh.position.x && bullet.mesh.position.x < this.mesh.position.x;
                    const headingToEnemy = bullet.velocity.x > 0;
                    const relative = this.mesh.position.clone().sub(bullet.mesh.position);
                    const velocitySq = Math.max(0.001, bullet.velocity.lengthSq());
                    const timeToClosest = THREE.MathUtils.clamp(relative.dot(bullet.velocity) / velocitySq, 0, 80);
                    const closestPoint = bullet.mesh.position.clone().add(bullet.velocity.clone().multiplyScalar(timeToClosest));
                    const closestDistance = closestPoint.distanceTo(this.mesh.position);
                    const sameLane = Math.abs(bullet.mesh.position.y - this.mesh.position.y) < 9 + layerWeight || closestDistance < this.size + bullet.size + 4;
                    const isBehindEnemy = bullet.mesh.position.x > this.mesh.position.x && Math.abs(bullet.mesh.position.y - this.mesh.position.y) < 12;

                    if (isBetweenPlayers && headingToEnemy && sameLane) {
                        lanePressure += layerWeight;
                        nearThreat = true;
                        evasionVector.y += this.mesh.position.y >= closestPoint.y ? layerWeight * 1.6 : -layerWeight * 1.6;
                    }

                    if (closestDistance < this.size + bullet.size + 6 && relative.dot(bullet.velocity) > 0) {
                        lanePressure += layerWeight * 1.4;
                        nearThreat = true;
                        evasionVector.y += this.mesh.position.y >= closestPoint.y ? layerWeight * 2 : -layerWeight * 2;
                        evasionVector.x += this.mesh.position.x > bullet.mesh.position.x ? layerWeight * 0.25 : -layerWeight * 0.25;
                    }

                    if (isBehindEnemy && bullet.velocity.x < 0) {
                        rearPressure += layerWeight;
                        nearThreat = true;
                        evasionVector.x -= layerWeight * 0.45;
                        evasionVector.y += this.mesh.position.y >= bullet.mesh.position.y ? layerWeight : -layerWeight;
                    }

                    for (const score of scores) {
                        const yDistance = Math.abs(score.y - bullet.mesh.position.y);
                        const pathDanger = isBetweenPlayers && headingToEnemy ? Math.max(0, 12 - yDistance) * layerWeight : Math.max(0, 6 - yDistance) * layerWeight * 0.35;
                        score.danger += pathDanger;
                    }
                }

                scores.sort((a, b) => a.danger - b.danger);
                if (evasionVector.lengthSq() === 0) {
                    evasionVector.set(0, this.mesh.position.y > player.mesh.position.y ? 1 : -1, 0);
                }

                return {
                    lanePressure,
                    rearPressure,
                    nearThreat,
                    evasionVector: evasionVector.normalize(),
                    bestAttackY: scores[0]?.y,
                    bestFarmY: scores[Math.min(1, scores.length - 1)]?.y,
                    bestRetreatY: scores[0]?.y
                };
            }

            getEvasionVector(bullet, outVector) {
                const relative = this.mesh.position.clone().sub(bullet.mesh.position);
                const velocitySq = Math.max(0.001, bullet.velocity.lengthSq());
                const timeToClosest = THREE.MathUtils.clamp(relative.dot(bullet.velocity) / velocitySq, 0, 40);
                const closestPoint = bullet.mesh.position.clone().add(bullet.velocity.clone().multiplyScalar(timeToClosest));

                outVector.subVectors(this.mesh.position, closestPoint);
                outVector.z = 0;

                if (outVector.lengthSq() < 0.01) {
                    outVector.set(-bullet.velocity.y, bullet.velocity.x, 0);
                }

                outVector.normalize();
                return outVector;
            }

            keepInBounds() {
                const worldWidth = this.game.frustumSize * this.game.aspect / 2 - this.size;
                const worldHeight = this.game.frustumSize / 2 - this.size;
                this.mesh.position.x = Math.max(0 + this.size, Math.min(worldWidth, this.mesh.position.x));
                this.mesh.position.y = Math.max(-worldHeight, Math.min(worldHeight - TOP_UI_WORLD_RESERVE, this.mesh.position.y));
            }
        }


        // ==================================================================
        // ===== Game Class (Main Controller) =============================
        // ==================================================================
        class Game {
            constructor() {
                this.scene = new THREE.Scene();
                this.aspect = window.innerWidth / window.innerHeight;
                this.frustumSize = 100;
                this.camera = new THREE.OrthographicCamera(
                    this.frustumSize * this.aspect / -2,
                    this.frustumSize * this.aspect / 2,
                    this.frustumSize / 2,
                    this.frustumSize / -2,
                    1,
                    1000
                );
                this.camera.position.z = 10;

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setClearColor(0x1a1a1a);
                document.body.appendChild(this.renderer.domElement);

                this.player = null;
                this.enemy = null;
                this.bullets = [];
                this.particles = [];
                this.healWarning = null;
                this.healPack = null;
                this.startedAt = Date.now();
                this.lastFrameAt = this.startedAt;
                this.nextHealWarningAt = this.startedAt + HEAL_INTERVAL - HEAL_WARNING_TIME;
                this.pendingHealSpawnAt = null;
                this.musicEnabled = true;
                this.hasStarted = false;
                this.mobileMove = new THREE.Vector2(0, 0);
                this.mobileShootRequested = false;
                this.joystickPointerId = null;
                this.joystickOrigin = new THREE.Vector2(0, 0);

                this.playerHpUI = document.getElementById('player-hp');
                this.playerAmmoUI = document.getElementById('player-ammo');
                this.enemyHpUI = document.getElementById('enemy-hp');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.gameOverText = document.getElementById('game-over-text');
                this.restartButton = document.getElementById('restart-button');
                this.musicToggle = document.getElementById('music-toggle');
                this.startScreen = document.getElementById('start-screen');
                this.joystickBase = document.getElementById('joystick-base');
                this.joystickKnob = document.getElementById('joystick-knob');

                this.isGameOver = false;

                window.addEventListener('resize', this.onWindowResize.bind(this), false);
                this.restartButton.addEventListener('click', () => location.reload());
                this.startScreen.addEventListener('pointerdown', (event) => {
                    event.preventDefault();
                    this.startFromTap();
                });
                this.musicToggle.addEventListener('click', () => this.toggleMusic());
                document.body.addEventListener('keydown', this.firstInteraction.bind(this), { once: true });
                this.setupMobileControls();
            }

            firstInteraction() {
                if (!this.musicEnabled) return;
                initAudio();
                playSound('bgm');
            }

            toggleMusic() {
                this.musicEnabled = !this.musicEnabled;
                this.musicToggle.textContent = this.musicEnabled ? 'MUSIC ON' : 'MUSIC OFF';
                this.musicToggle.blur();

                if (this.musicEnabled) {
                    initAudio();
                    playSound('bgm');
                } else {
                    stopBGM();
                }
            }

            startFromTap() {
                if (this.hasStarted) return;
                this.hasStarted = true;
                const now = Date.now();
                this.startedAt = now;
                this.lastFrameAt = now;
                this.nextHealWarningAt = now + HEAL_INTERVAL - HEAL_WARNING_TIME;
                this.startScreen.classList.add('is-starting');
                setTimeout(() => this.startScreen.remove(), 950);
                if (this.musicEnabled) {
                    initAudio();
                    playSound('bgm');
                }
            }

            setupMobileControls() {
                const isInteractiveTarget = (target) => target.closest && target.closest('#game-toolbar, #game-over-screen, #start-screen');

                window.addEventListener('pointerdown', (event) => {
                    if (!this.hasStarted || this.isGameOver) return;
                    if (isInteractiveTarget(event.target)) return;
                    if (event.pointerType === 'mouse') return;

                    if (event.clientX < window.innerWidth / 2 && this.joystickPointerId === null) {
                        event.preventDefault();
                        this.joystickPointerId = event.pointerId;
                        this.joystickOrigin.set(event.clientX, event.clientY);
                        this.joystickBase.style.left = `${event.clientX - 46}px`;
                        this.joystickBase.style.top = `${event.clientY - 46}px`;
                        this.joystickBase.style.bottom = 'auto';
                        this.updateJoystick(event.clientX, event.clientY);
                    } else if (event.clientX >= window.innerWidth / 2) {
                        event.preventDefault();
                        this.mobileShootRequested = true;
                        initAudio();
                    }
                }, { passive: false });

                window.addEventListener('pointermove', (event) => {
                    if (event.pointerId !== this.joystickPointerId) return;
                    event.preventDefault();
                    this.updateJoystick(event.clientX, event.clientY);
                }, { passive: false });

                const endJoystick = (event) => {
                    if (event.pointerId !== this.joystickPointerId) return;
                    this.joystickPointerId = null;
                    this.mobileMove.set(0, 0);
                    this.joystickKnob.style.left = `${this.joystickOrigin.x}px`;
                    this.joystickKnob.style.top = `${this.joystickOrigin.y}px`;
                    this.joystickKnob.style.bottom = 'auto';
                };

                window.addEventListener('pointerup', endJoystick);
                window.addEventListener('pointercancel', endJoystick);
            }

            updateJoystick(clientX, clientY) {
                const delta = new THREE.Vector2(clientX - this.joystickOrigin.x, clientY - this.joystickOrigin.y);
                const maxDistance = 38;
                if (delta.length() > maxDistance) delta.setLength(maxDistance);

                this.mobileMove.set(delta.x / maxDistance, -delta.y / maxDistance);
                this.joystickKnob.style.left = `${this.joystickOrigin.x + delta.x}px`;
                this.joystickKnob.style.top = `${this.joystickOrigin.y + delta.y}px`;
                this.joystickKnob.style.bottom = 'auto';
            }

            start() {
                this.isGameOver = false;
                this.gameOverScreen.style.display = 'none';
                this.startedAt = Date.now();
                this.lastFrameAt = this.startedAt;
                this.nextHealWarningAt = this.startedAt + HEAL_INTERVAL - HEAL_WARNING_TIME;
                this.pendingHealSpawnAt = null;

                this.player = new Player(this.scene, this, new THREE.Vector3(-30, 0, 0), 0x00aaff);
                this.enemy = new Enemy(this.scene, this, new THREE.Vector3(30, 0, 0), 0xff4444);

                const courtLineMaterial = new THREE.LineBasicMaterial({ color: 0xaaaaaa, linewidth: 2 });
                const points = [];
                const worldHeight = this.frustumSize / 2;
                points.push(new THREE.Vector3(0, -worldHeight, 0));
                points.push(new THREE.Vector3(0, worldHeight, 0));
                const courtLineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                const courtLine = new THREE.Line(courtLineGeometry, courtLineMaterial);
                this.scene.add(courtLine);

                this.animate();
            }

            animate() {
                requestAnimationFrame(this.animate.bind(this));
                const now = Date.now();
                const deltaTime = now - this.lastFrameAt;
                this.lastFrameAt = now;

                if (this.hasStarted && !this.isGameOver) {
                    this.player.update();
                    this.enemy.update(this.player, this.bullets);

                    this.bullets.forEach(bullet => bullet.update());
                    this.updateHeal(deltaTime, now);
                    this.checkCollisions();
                    this.updateUI();
                }
                this.updateParticles();

                this.renderer.render(this.scene, this.camera);
            }

            createWarpEffect(position, color) {
                this.particles.push(new WarpParticleEffect(this.scene, position, color));
            }

            createCharacterExplosion(character) {
                this.particles.push(new CharacterExplosionEffect(this.scene, character));
            }

            getBulletSpeed() {
                const elapsed = Date.now() - this.startedAt;
                const progress = Math.min(1, elapsed / BULLET_SPEED_RAMP_TIME);
                return BASE_BULLET_SPEED * (INITIAL_BULLET_SPEED_RATE + (1 - INITIAL_BULLET_SPEED_RATE) * progress);
            }

            getRandomPlayPosition() {
                const worldWidth = this.frustumSize * this.aspect / 2 - 8;
                const worldHeight = this.frustumSize / 2 - 8;
                return new THREE.Vector3(
                    THREE.MathUtils.lerp(-worldWidth, worldWidth, Math.random()),
                    THREE.MathUtils.lerp(-worldHeight, worldHeight - TOP_UI_WORLD_RESERVE, Math.random()),
                    0
                );
            }

            updateHeal(deltaTime, now) {
                if (!this.healWarning && !this.healPack && now >= this.nextHealWarningAt) {
                    const position = this.getRandomPlayPosition();
                    this.healWarning = new HealWarning(this.scene, position);
                    this.pendingHealSpawnAt = now + HEAL_WARNING_TIME;
                }

                if (this.healWarning) {
                    this.healWarning.update(deltaTime);
                    if (now >= this.pendingHealSpawnAt) {
                        const position = this.healWarning.position.clone();
                        this.healWarning.removeFromScene();
                        this.healWarning = null;
                        this.healPack = new HealPack(this.scene, position);
                        this.pendingHealSpawnAt = null;
                    }
                }

                if (this.healPack) {
                    this.healPack.update();
                }
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    if (!this.particles[i].update()) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            checkCollisions() {
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];

                    if (this.player.canReplenishFromOwnBullet(bullet)) {
                        this.player.ammo++;
                        bullet.removeFromScene();
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    if (this.enemy.canReplenishFromOwnBullet(bullet)) {
                        this.enemy.ammo++;
                        bullet.removeFromScene();
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    if (bullet.owner !== this.player && bullet.mesh.position.distanceToSquared(this.player.mesh.position) < this.player.sizeSq) {
                        this.player.takeDamage(1);
                        playSound('hit');
                        bullet.removeFromScene();
                        this.bullets.splice(i, 1);
                        if (this.player.isDead()) this.endGame('YOU LOSE...');
                        continue;
                    }

                    if (bullet.owner !== this.enemy && bullet.mesh.position.distanceToSquared(this.enemy.mesh.position) < this.enemy.sizeSq) {
                        this.enemy.takeDamage(1);
                        playSound('hit');
                        bullet.removeFromScene();
                        this.bullets.splice(i, 1);
                        if (this.enemy.isDead()) this.endGame('YOU WIN!');
                    }
                }

                this.checkHealPackCollisions();
            }

            checkHealPackCollisions() {
                if (!this.healPack) return;

                const packPosition = this.healPack.group.position;
                const playerTouchesPack = packPosition.distanceToSquared(this.player.mesh.position) < (this.player.size + this.healPack.size) ** 2;
                const enemyTouchesPack = packPosition.distanceToSquared(this.enemy.mesh.position) < (this.enemy.size + this.healPack.size) ** 2;

                if ((playerTouchesPack && this.player.heal(1)) || (enemyTouchesPack && this.enemy.heal(1))) {
                    this.healPack.removeFromScene();
                    this.healPack = null;
                    this.nextHealWarningAt = Date.now() + HEAL_INTERVAL - HEAL_WARNING_TIME;
                }
            }

            endGame(message) {
                if (this.isGameOver) return;
                this.isGameOver = true;

                playSound('destroy');
                stopBGM();

                this.gameOverText.textContent = message;
                this.gameOverScreen.style.display = 'flex';

                if (message.includes('WIN')) {
                    this.enemy.destroy();
                } else {
                    this.player.destroy();
                }
            }

            updateUI() {
                this.playerHpUI.textContent = this.player.hp;
                this.playerAmmoUI.textContent = `${this.player.ammo} / ${this.player.maxAmmo}`;
                this.enemyHpUI.textContent = this.enemy.hp;
            }

            onWindowResize() {
                this.aspect = window.innerWidth / window.innerHeight;
                this.camera.left = this.frustumSize * this.aspect / -2;
                this.camera.right = this.frustumSize * this.aspect / 2;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // ==================================================================
        // ===== Main Execution ===========================================
        // ==================================================================
        window.addEventListener('DOMContentLoaded', () => {
            const game = new Game();
            game.start();
        });

    </script>
</body>

</html>
