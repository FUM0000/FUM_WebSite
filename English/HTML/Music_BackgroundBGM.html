<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

  <title>Background BGM</title>
    <meta name="robots" content="index, follow">
</head>

<body>

  <v-app id="App" v-cloak>
    <template>

      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Music > Background BGM</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" class="pa-4" fluid fill-height style="display: flex; align-content: center;">
            <v-row justify="center">
              <v-col cols="12" md="6">

                <v-card class="mx-auto" rounded="xl" elevation="2">

                  <v-card-text>

                    <v-card class="pa-5 py-2" outlined rounded>
                      <v-card-title class="font-weight-bold text-h6 pb-2">Music Player</v-card-title>
                      <!-- Category Selection -->
                      <v-select v-model="selectedCategory" :items="categories" label="Category" item-text="text"
                        item-value="value" outlined rounded color="primary" prepend-inner-icon="mdi-music-box-multiple"
                        class="mt-4">
                      </v-select>

                      <!-- Track Selection -->
                      <v-select v-model="selectedTrack" :items="currentTracks" label="Track" item-text="name"
                        return-object outlined rounded color="primary" prepend-inner-icon="mdi-music-note"
                        :disabled="!selectedCategory">
                      </v-select>

                      <!-- Audio Player -->
                      <v-responsive class="mt-0 mb-4">
                        <div v-if="selectedTrack">
                          <audio :src="selectedTrack.url" ref="bgmAudio" controls loop style="width: 100%;"></audio>
                        </div>
                      </v-responsive>
                    </v-card>


                    <!-- Hertz Generator -->
                    <v-card class="mt-4 pa-5 py-2" outlined rounded>
                      <v-card-title class="font-weight-bold text-h6 pb-2">Hertz Generator</v-card-title>

                      <!-- プリセット -->
                      <v-select class="mt-4" v-model="selectedPreset" :items="presets" label="Preset" outlined rounded
                        color="primary" prepend-inner-icon="mdi-tune" @change="applyPreset"></v-select>

                      <!-- 周波数入力 -->
                      <v-text-field v-model="toneFreq" label="Frequency (Hz)" type="number" outlined rounded
                        color="primary" prepend-inner-icon="mdi-waveform"></v-text-field>

                      <v-row>
                        <v-col cols="12" md="6">
                          <!-- 音量調整 -->
                          <v-slider v-model="toneVolume" min="0" max="0.1" step="0.01" label="Volume" color="primary"
                            prepend-icon="mdi-volume-high"></v-slider>
                        </v-col>
                        <v-col cols="12" md="6">
                          <!-- 倍音調整 -->
                          <v-slider v-model="toneHarmonics" min="0" max="1" step="0.01" label="Warmth" color="primary"
                            prepend-icon="mdi-chart-bell-curve"></v-slider>
                        </v-col>

                        <!-- 操作ボタン -->
                        <v-col cols="12" class="text-center">
                          <v-btn color="primary" class="mr-2" @click="playToneHz">Play</v-btn>
                          <v-btn color="error" class="mr-2" @click="stopTone">Stop</v-btn>
                          <v-btn color="secondary" @click="resetTone">Reset</v-btn>
                        </v-col>
                      </v-row>
                    </v-card>

                    <!-- Pure Noise Generator -->
                    <v-card class="mt-4 pa-5 py-2" outlined rounded>
                      <v-card-title class="font-weight-bold text-h6">Noise Generator</v-card-title>

                      <v-row>
                        <v-col cols="12" md="6">
                          <v-select v-model="noiseType" :items="noiseTypes" label="Type" outlined rounded
                            color="primary" prepend-inner-icon="mdi-chart-bell-curve"></v-select>
                        </v-col>
                        <v-col cols="12" md="6">
                          <v-slider v-model="noiseVolume" min="0" max="0.1" step="0.01" label="Volume" color="primary"
                            prepend-icon="mdi-volume-high"></v-slider>
                        </v-col>
                        <v-col cols="12" class="text-center">
                          <v-btn color="primary" class="mr-2" @click="playNoise">Play</v-btn>
                          <v-btn color="error" @click="stopNoise">Stop</v-btn>
                        </v-col>
                      </v-row>
                    </v-card>
                  </v-card-text>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        selectedCategory: "Piano",
        selectedTrack: { name: 'Clair De Lune', url: '../../Asset/Audio/clair_de_lune.wav' },
        toneFreq: 285,
        toneVolume: 0.02,
        toneHarmonics: 0,
        noiseType: 'white',
        noiseVolume: 0.02,
        noiseTypes: [
          { text: 'White Noise', value: 'white' },
          { text: 'Pink Noise', value: 'pink' },
          { text: 'Brown Noise', value: 'brown' },
        ],
        noiseSource: null,
        noiseGain: null,
        noiseCtx: null,
        selectedPreset: 'relax', presets: [
          { text: 'Relax (285Hz)', value: 'relax', freq: 285 },
        ],

        categories: [
          { text: 'Piano', value: 'Piano' },
          { text: 'Ambient', value: 'Ambient' },
          { text: 'Lo-Fi', value: 'LoFi' },
        ],
        tracks: {
          Piano: [
            { name: 'Clair De Lune', url: '../../Asset/Audio/clair_de_lune.wav' },
            { name: 'An Der Wiege', url: '../../Asset/Audio/an_der_wiege.wav' },
            { name: 'Bach Prelude In C Dur', url: '../../Asset/Audio/bach-prelude-in-c-dur.wav' },
            { name: 'Gymnopedies', url: '../../Asset/Audio/gymnopedies.wav' },
          ],
          Ambient: [
            { name: 'Clock Tick', url: '../../Asset/Audio/clock-tick.wav' },
          ],
          LoFi: [
            { name: 'Lofi 1', url: '../../Asset/Audio/lofi_1.wav' },
            { name: 'Lofi 2', url: '../../Asset/Audio/lofi_2.wav' },
          ],
        }
      },
      computed: {
        currentTracks() {
          return this.tracks[this.selectedCategory] || [];
        }
      },
      watch: {
        selectedCategory(newCategory) {
          if (this.tracks[newCategory] && this.tracks[newCategory].length > 0) {
            this.selectedTrack = this.tracks[newCategory][0];
          } else {
            this.selectedTrack = null;
          }
        },
        toneVolume(newVolume) {
          if (this.harmonicGains && this.harmonicGains.length) {
            const warmth = parseFloat(this.toneHarmonics) || 0;
            this.harmonicGains.forEach((gain, i) => {
              const amp = i === 0 ? 1 : (warmth / (i + 1));
              gain.gain.setValueAtTime(newVolume * amp, this.audioCtx.currentTime);
            });
          }
        },
        toneHarmonics(newVal) {
          if (this.harmonicGains && this.harmonicGains.length) {
            const warmth = parseFloat(newVal) || 0;
            this.harmonicGains.forEach((gain, i) => {
              if (i > 0) {
                gain.gain.setValueAtTime(this.toneVolume * (warmth / (i + 1)), this.audioCtx.currentTime);
              }
            });
          }
        },
        noiseVolume(newVolume) {
          if (this.noiseGain) {
            this.noiseGain.gain.setValueAtTime(newVolume, this.noiseCtx.currentTime);
          }
        }
      },
      mounted() {
        this.selectedCategory = 'Piano';
        this.selectedTrack = this.tracks.Piano[0];
        if (this.$refs.bgmAudio) {
          this.$refs.bgmAudio.volume = 0.5;
        }
      },
      methods: {
        playToneHz() {
          const freq = parseFloat(this.toneFreq);
          if (!freq || freq <= 0) {
            alert("正しい周波数(Hz)を入力してください。");
            return;
          }

          // 再生中なら止める
          if (this.audioCtx) this.audioCtx.close();

          this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const warmth = parseFloat(this.toneHarmonics) || 0;
          const numHarmonics = 9;
          this.oscillators = [];
          this.harmonicGains = [];

          for (let i = 0; i < numHarmonics; i++) {
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq * (i + 1), this.audioCtx.currentTime);

            const amp = i === 0 ? 1 : (warmth / (i + 1));
            gain.gain.setValueAtTime(this.toneVolume * amp, this.audioCtx.currentTime);

            osc.connect(gain).connect(this.audioCtx.destination);
            osc.start();
            this.oscillators.push(osc);
            this.harmonicGains.push(gain);
          }
        },

        stopTone() {
          if (this.oscillators) {
            this.oscillators.forEach(osc => { osc.stop(); osc.disconnect(); });
            this.oscillators = [];
            this.harmonicGains = [];
          }
          if (this.audioCtx) {
            this.audioCtx.close();
            this.audioCtx = null;
          }
        },

        resetTone() {
          this.toneFreq = 285;
          this.toneVolume = 0.02;
          this.toneHarmonics = 0;
          this.selectedPreset = 'relax';
          this.stopTone();
        },

        applyPreset(presetValue) {
          const preset = this.presets.find(p => p.value === presetValue);
          if (preset) {
            this.toneFreq = preset.freq;
          }
        },

        playNoise() {
          if (this.noiseCtx) this.noiseCtx.close();

          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(this.noiseVolume, ctx.currentTime);

          const bufferSize = ctx.sampleRate * 2;
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);

          if (this.noiseType === 'white') {
            for (let i = 0; i < bufferSize; i++) {
              data[i] = Math.random() * 2 - 1;
            }
          } else if (this.noiseType === 'pink') {
            let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
            for (let i = 0; i < bufferSize; i++) {
              const white = Math.random() * 2 - 1;
              b0 = 0.99886 * b0 + white * 0.0555179;
              b1 = 0.99332 * b1 + white * 0.0750759;
              b2 = 0.96900 * b2 + white * 0.1538520;
              b3 = 0.86650 * b3 + white * 0.3104856;
              b4 = 0.55000 * b4 + white * 0.5329522;
              b5 = -0.7616 * b5 - white * 0.0168980;
              data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
              b6 = white * 0.115926;
            }
          } else if (this.noiseType === 'brown') {
            let val = 0;
            for (let i = 0; i < bufferSize; i++) {
              val += (Math.random() * 2 - 1) * 0.5;
              if (val > 1) val = 1;
              if (val < -1) val = -1;
              data[i] = val * 0.5;
            }
          }

          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.loop = true;
          source.connect(gain).connect(ctx.destination);
          source.start();

          this.noiseSource = source;
          this.noiseGain = gain;
          this.noiseCtx = ctx;
        },

        stopNoise() {
          if (this.noiseSource) {
            this.noiseSource.stop();
            this.noiseSource.disconnect();
            this.noiseSource = null;
          }
          if (this.noiseCtx) {
            this.noiseCtx.close();
            this.noiseCtx = null;
          }
        }
      }

    });
  </script>
</body>

</html>
