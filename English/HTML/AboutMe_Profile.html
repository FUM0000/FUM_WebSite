            <v-main id="Main">

                                <v-card class="mb-4 profile-card">

                                        </v-btn>

                                                    </v-avatar>
                                                </v-col>
                                                <v-col cols="12" md="8">
                                                    <h3 class="subtitle-1 font-weight-bold mb-2">Greeting:</h3>
                                                    <p class="subtitle-1">　Hello. My nickname is FUM. Thank you for
                                                        visiting my profile. This site is created to represent me. I
                                                        hope it will be a place where we can learn, relax and play :>
                                                    </p>

                                                    <v-divider class="my-4"></v-divider>

                                                    <h3 class="subtitle-1 font-weight-bold mb-2">Contact:</h3>
                                                    <v-list dense>
                                                        <v-list-item>
                                                            <v-list-item-icon>
                                                                <v-icon>mdi-email</v-icon>
                                                            </v-list-item-icon>
                                                            <v-list-item-content>
                                                                <a
                                                                    href="mailto:fuhito.work.1@gmail.com">fuhito.work.1@gmail.com</a>
                                                            </v-list-item-content>
                                                        </v-list-item>
                                                    </v-list>

                                                    <v-divider class="my-4"></v-divider>

                                                    <h3 class="subtitle-1 font-weight-bold mb-2">Donation:</h3>
                                                    <v-list dense>
                                                        <v-list-item>
                                                            <v-list-item-icon>
                                                                <v-icon>mdi-gift-outline</v-icon>
                                                            </v-list-item-icon>
                                                            <v-list-item-content>
                                                                <a
                                                                    href="https://paypal.me/fuhito0001?country.x=JP&locale.x=ja_JP">https://paypal.me/fuhito0001?country.x=JP&locale.x=ja_JP</a>
                                                            </v-list-item-content>
                                                        </v-list-item>
                                                    </v-list>
                                                    <p>
                                                        　It encourages site production and makes FUM much happier :3
                                                    </p>

                                                    <v-divider class="my-4"></v-divider>

                                                    <h3 class="subtitle-1 font-weight-bold mb-2">Supporter:</h3>
                                                    <v-list dense>
                                                        <v-list-item>No one yet...</v-list-item>
                                                    </v-list>
                                                    <p>
                                                        　If you support me, please let me know your nickname by e-mail
                                                        or other means. There are no requirements for donations, etc.
                                                    </p>
                                                </v-col>
                                            </v-row>
                                        </v-card-text>
                                    </v-expand-transition>
                                </v-card>

                                <v-card class="mb-4 hobby-card">
                                    <v-card-title class="text-h5 font-weight-bold py-3 d-flex justify-space-between">
                                        <span><v-icon left>mdi-heart</v-icon> Hobbies</span>
                                        <v-btn icon @click="toggleCard('hobby', $event)">
                                            <v-icon>{{ hobbyExpanded ? 'mdi-chevron-up' : 'mdi-chevron-down' }}</v-icon>
                                        </v-btn>
                                    </v-card-title>
                                    <v-expand-transition>
                                        <v-card-text v-show="hobbyExpanded" class="pa-5" style="min-height: 220px; position: relative; overflow: hidden;">
                                            <div class="hobby-physics-area" ref="hobbyArea">
                                                    <div v-for="(chip, i) in hobbyChips" :key="chip.name"
                                                        class="hobby-chip"
                                                        :class="{ 'is-dragging': chip.isDragging }"
                                                        :style="chip.style"
                                                        @mousedown.prevent="hobbyDragStart(i, $event)"
                                                        @touchstart.prevent="hobbyDragStart(i, $event)">
                                                        {{ chip.name }}
                                                    </div>
                                            </div>
                                        </v-card-text>
                                    </v-expand-transition>
                                </v-card>

                                <v-card class="mb-4 job-offerings-card">
                                    <v-card-title class="text-h5 font-weight-bold py-3 d-flex justify-space-between">
                                        <span><v-icon left>mdi-briefcase-outline</v-icon>Open for Opportunities</span>
                                        <v-btn icon @click="toggleCard('jobOfferings', $event)">
                                            <v-icon>{{ jobOfferingsExpanded ? 'mdi-chevron-up' : 'mdi-chevron-down'
                                                }}</v-icon>
                                        </v-btn>
                                    </v-card-title>
                                    <v-expand-transition>
                                        <v-card-text v-show="jobOfferingsExpanded" class="pa-5">
                                            <v-list dense>
                                                <template v-for="(category, catIndex) in jobOfferings">
                                                    <v-subheader :key="`header-${catIndex}`" class="font-weight-bold">{{
                                                        category.name }}</v-subheader>
                                                    <v-list-item v-for="(job, jobIndex) in category.items"
                                                        :key="`${catIndex}-${jobIndex}`">
                                                        <v-list-item-icon>
                                                            <v-icon>{{ job.icon }}</v-icon>
                                                        </v-list-item-icon>
                                                        <v-list-item-content>
                                                            <v-list-item-title>{{ job.title }}</v-list-item-title>
                                                        </v-list-item-content>
                                                    </v-list-item>
                                                    <v-divider v-if="catIndex < jobOfferings.length - 1"
                                                        :key="`divider-${catIndex}`" class="my-2"></v-divider>
                                                </template>
                                            </v-list>
                                            <v-divider class="my-4"></v-divider>
                                            <p class="subtitle-1 font-weight-bold">The following services are limited to
                                                certain areas:</p>
                                            <v-list dense>
                                                <v-list-item v-for="(job, index) in localJobOfferings" :key="index">
                                                    <v-list-item-icon>
                                                        <v-icon>{{ job.icon }}</v-icon>
                                                    </v-list-item-icon>
                                                    <v-list-item-content>
                                                        <v-list-item-title>{{ job.title }}</v-list-item-title>
                                                    </v-list-item-content>
                                                </v-list-item>
                                            </v-list>
                                            <v-divider class="my-4"></v-divider>
                                            <p class="subtitle-1">
                                                　I will accept the job for 3,000 yen per hour. In areas where I am not
                                                at a high enough level, I will learn with you for 1,000 yen. For details
                                                or inquiries, please feel free to contact me ☞ <a
                                                    href="mailto:fuhito.work.1@gmail.com">fuhito.work.1@gmail.com</a>
                                            </p>
                                        </v-card-text>
                                    </v-expand-transition>
                                </v-card>

                                <v-card class="life-journey-card">
                                    <v-card-title class="text-h5 font-weight-bold py-3 d-flex justify-space-between">
                                        <span><v-icon left>mdi-timeline-clock</v-icon> Life Journey</span>
                                        <v-btn icon @click="toggleCard('lifeJourney', $event)">
                                            <v-icon>{{ lifeJourneyExpanded ? 'mdi-chevron-up' : 'mdi-chevron-down'
                                                }}</v-icon>
                                        </v-btn>
                                    </v-card-title>
                                    <v-expand-transition>
                                        <v-card-text v-show="lifeJourneyExpanded" class="pa-5">
                                            <v-timeline align-top dense>
                                                <v-timeline-item v-for="(event, index) in lifeEvents" :key="index"
                                                    :color="event.color" small>
                                                    <div class="font-weight-bold">{{ event.year }}</div>
                                                    <div class="text-caption">{{ event.description }}</div>
                                                </v-timeline-item>
                                            </v-timeline>
                                        </v-card-text>
                                    </v-expand-transition>
                                </v-card>

                            </v-col>
                        </v-row>

                    </v-container>
                </transition>
            </v-main>

            <main-footer></main-footer>
        </template>
    </v-app>

    <style>
        :root {
            --hud-black: #05070a;
            --hud-panel: #0c1017;
            --hud-panel-2: #141923;
            --hud-text: #f2f7ff;
            --hud-muted: #c6cfde;
            --hud-line: #8d98ab;
            --hud-cyan: #34e7ff;
            --hud-yellow: #d6bf55;
        }

        #Main {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(1200px 900px at 12% -10%, rgba(52, 231, 255, 0.15), transparent 58%),
                radial-gradient(1100px 900px at 88% -20%, rgba(214, 191, 85, 0.13), transparent 60%),
                linear-gradient(145deg, #030406 0%, #0a101a 44%, #05070a 100%);
        }

        #Main::before {
            content: "";
            position: absolute;
            inset: -30%;
            pointer-events: none;
            background:
                radial-gradient(circle at 24% 30%, rgba(52, 231, 255, 0.12) 0 14%, transparent 32%),
                radial-gradient(circle at 73% 67%, rgba(120, 143, 255, 0.08) 0 16%, transparent 40%),
                radial-gradient(circle at 56% 50%, rgba(214, 191, 85, 0.1) 0 12%, transparent 34%);
            filter: blur(30px);
            animation: driftGlow 24s ease-in-out infinite alternate;
        }

        #Main::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 3px),
                repeating-linear-gradient(90deg, rgba(52, 231, 255, 0.05) 0 1px, transparent 1px 44px),
                repeating-linear-gradient(0deg, rgba(214, 191, 85, 0.035) 0 1px, transparent 1px 44px);
            mix-blend-mode: screen;
            opacity: 0.2;
            animation: pulseGrid 12s ease-in-out infinite alternate;
        }

        .profile-page {
            position: relative;
            z-index: 1;
            color: var(--hud-text);
        }

        .profile-page::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255, 255, 255, 0.5) 0.7px, transparent 0.9px),
                radial-gradient(circle, rgba(245, 96, 132, 0.35) 0.8px, transparent 1px);
            background-size: 46px 46px, 92px 92px;
            background-position: 0 0, 18px 26px;
            opacity: 0.3;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes driftGlow {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-3%, 2%) scale(1.05); }
            66% { transform: translate(2%, -3%) scale(0.95); }
            100% { transform: translate(-1%, 1%) scale(1.02); }
        }

        @keyframes pulseGrid {
            0% { opacity: 0.15; }
            50% { opacity: 0.3; }
            100% { opacity: 0.15; }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.45; }
        }

        .profile-page .profile-card,
        .profile-page .hobby-card,
        .profile-page .life-journey-card,
        .profile-page .job-offerings-card {
            position: relative;
            border: 1px solid rgba(230, 238, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            background: rgba(7, 11, 20, 1) !important;
            box-shadow: none;
            transition: border-color 0.25s ease;
        }

        .profile-page .profile-card:hover,
        .profile-page .hobby-card:hover,
        .profile-page .life-journey-card:hover,
        .profile-page .job-offerings-card:hover {
            border-color: rgba(230, 238, 255, 0.35);
        }

        .profile-page .v-card__title {
            background: transparent;
            border-bottom: 1px solid rgba(230, 238, 255, 0.12);
            color: rgba(238, 245, 255, 0.94);
            font-weight: 700;
            letter-spacing: normal;
            text-transform: none;
        }

        .profile-page .v-card__title .v-icon {
            color: rgba(238, 245, 255, 0.96) !important;
        }

        .profile-page .v-card__text,
        .profile-page .v-list-item__title,
        .profile-page .v-list-item__content,
        .profile-page .v-subheader,
        .profile-page .subtitle-1,
        .profile-page p,
        .profile-page .text-caption,
        .profile-page .font-weight-bold {
            color: rgba(238, 245, 255, 0.94) !important;
            text-shadow: none;
        }

        .profile-page .v-subheader {
            color: #ffffff !important;
            letter-spacing: 0.08em;
        }

        .profile-page a {
            color: #9edcff !important;
            text-decoration-color: rgba(158, 220, 255, 0.88);
            text-underline-offset: 2px;
        }

        .profile-page .v-divider {
            border-color: rgba(198, 207, 222, 0.34) !important;
        }

        .profile-page .profile-avatar {
            border: 2px solid rgba(230, 238, 255, 0.22);
            box-shadow: none;
        }

        .profile-page .v-btn.v-btn--icon {
            background: transparent !important;
            border: none;
            border-radius: 50%;
        }

        .profile-page .v-btn.v-btn--icon .v-icon {
            color: rgba(238, 245, 255, 0.94) !important;
        }

        .profile-page .v-list-item__icon .v-icon {
            color: rgba(238, 245, 255, 0.84) !important;
        }

        .profile-page .theme--light.v-list,
        .profile-page .v-list,
        .profile-page .v-list-item,
        .profile-page .v-list-item::before {
            background: transparent !important;
        }

        .profile-page .v-chip {
            background: rgba(238, 245, 255, 0.08) !important;
            border: 1px solid rgba(230, 238, 255, 0.26);
            color: #223344 !important;
            text-shadow: none;
        }

        .profile-page .v-timeline::before {
            border-right: 2px solid rgba(52, 231, 255, 0.64);
        }

        .profile-page .v-timeline-item__dot {
            box-shadow: 0 0 0 2px rgba(241, 247, 255, 0.52), 0 0 16px rgba(52, 231, 255, 0.35);
        }

        .profile-page .v-timeline-item__body {
            padding-left: 15px;
        }

        .profile-page .job-offerings-card .v-list-item__title {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
        }

        .profile-page .subtitle-1 {
            margin-bottom: 0 !important;
        }

        .profile-layout-row {
            min-height: calc(100vh - 170px);
            align-items: center;
        }

        .hobby-physics-area {
            position: relative;
            width: 100%;
            height: 220px;
            pointer-events: auto;
        }

        .hobby-chip {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            border: 1px solid rgba(230, 238, 255, 0.35);
            color: #1a1f2e;
            font-size: 12px;
            font-weight: 700;
            cursor: grab;
            user-select: none;
            padding: 3px 10px;
            box-sizing: border-box;
            transition: box-shadow 0.18s, border-color 0.18s;
            z-index: 2;
            letter-spacing: 0.03em;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.3);
            line-height: 1.3;
            white-space: nowrap;
        }

        .hobby-chip:hover {
            border-color: rgba(52, 231, 255, 0.6);
            box-shadow: 0 0 14px rgba(52, 231, 255, 0.25);
        }

        .hobby-chip.is-dragging {
            cursor: grabbing;
            z-index: 10;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            border-color: rgba(52, 231, 255, 0.8);
        }

        @media (max-width: 960px) {
            .profile-layout-row {
                min-height: auto;
                align-items: stretch;
            }

            .hobby-physics-area {
                height: 450px;
            }

            .profile-page .hobby-card .v-card__text {
                min-height: 450px !important;
            }

        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>

    <script src="../../Asset/Javascript/Common.js?v=1.03"></script>


    <script>
        new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common],
            data: {
                profileExpanded: true,
                hobbyExpanded: false,
                jobOfferingsExpanded: false,
                lifeJourneyExpanded: false,
                hobbies: [
                    { name: 'Plant', color: 'green lighten-4', category: 'Nature' },
                    { name: 'Piano', color: 'blue-grey lighten-4', category: 'Art' },
                    { name: 'Art', color: 'purple lighten-4', category: 'Art' },

                    { name: 'Movie', color: 'pink lighten-4', category: 'Entertainment' },
                    { name: 'Game', color: 'pink lighten-4', category: 'Entertainment' },
                    { name: 'AI', color: 'blue lighten-4', category: 'Tech' },
                    { name: 'Cooking', color: 'orange lighten-4', category: 'Health' },
                    { name: 'Languages', color: 'green lighten-4', category: 'Study' },
                ],
                hobbyChips: [],
                hobbyDragInfo: { index: -1, lastX: 0, lastY: 0, startX: 0, startY: 0, lastTime: 0, vx: 0, vy: 0, moveEvent: null, upEvent: null, boundMove: null, boundEnd: null, didDrag: false },
                hobbyRAF: null,
                hobbyRunning: false,
                jobOfferings: [
                    {
                        name: 'Lessons',
                        items: [
                            { icon: 'mdi-translate', title: 'Language (Japanese, English, Spanish, Chinese)' },
                            { icon: 'mdi-code-tags', title: 'Programming (Basics, Game Development, Website Creation, Others)' },
                            { icon: 'mdi-cube-outline', title: '3D Modeling' },

                            { icon: 'mdi-laptop', title: 'Computer and Smartphone Usage' },

                        ]
                    },
                    {

                        items: [
                            { icon: 'mdi-web', title: 'Website Creation and Maintenance' },
                            { icon: 'mdi-chart-line', title: 'Business Process Optimization Programming' },
                        ]
                    },
                    {
                        name: 'Consultation',
                        items: [
                            { icon: 'mdi-piggy-bank', title: 'Saving and Investment' },
                            { icon: 'mdi-comment-question', title: 'Problem-solving' },
                        ]
                    },
                    {
                        name: 'Other',
                        items: [
                            { icon: 'mdi-help-circle', title: 'Other Services (Let\'s talk about it.)' },

                ],

                ],
                lifeEvents: [
                    { year: '1996', description: 'Born in Sapporo, Hokkaido.', color: '#C8E6C9' },
                    { year: 'Childhood', description: 'I was an active and curious age, riding my tricycle around the neighborhood and making it a routine to greet elderly people tending to their gardens.', color: '#FFF9C4' },
                    { year: 'Studenthood', description: 'I talked to everyone and was interested in everything. I especially liked sports and games. My mother drank during the day, her violence and outbursts were the worst, and I was in a constant state of bipolar disorder. I could hardly get any of the studies my mother forced me to do.', color: '#B3E5FC' },

                    { year: 'Turning Point I', description: 'I finally started to move in a positive direction by beginning years of philosophical problem solving and conscious positive thinking while organizing my thoughts during my walk, which had become a habit.', color: '#D1C4E9' },

                    { year: '2023', description: "For several reasons, I was not satisfied with my life in the company and quit my job. Went on a trip to Spain and moved to family home in Fukuyama, Hiroshima.", color: '#F8BBD0' },
                    { year: 'Turning Point Ⅱ', description: 'The humanistic aspirations of my childhood are returning as I find balance and what I value from a combination of factors such as experience and environment.', color: '#F0F4C3' },
                    { year: 'Present', description: 'I work part time while learning hobbies and spending quality time.', color: '#CFD8DC' },
                    { year: 'Future', description: 'I would like to speed up my studies of science, mathematics, IT, and art, and eventually go to space in a few decades.' },
                ]
            },
            methods: {
                toggleCard(card, event) {
                    this[card + 'Expanded'] = !this[card + 'Expanded'];
                    if (this[card + 'Expanded']) {
                        var self = this;
                        this.$nextTick(function () {
                            var btn = event && event.currentTarget;
                            if (btn) {
                                var cardEl = btn.closest('.v-card');
                                if (cardEl) {
                                    var sysBar = document.querySelector('main-system-bar');
                                    var offset = sysBar ? 56 : 70;
                                    setTimeout(function () {
                                        var rect = cardEl.getBoundingClientRect();
                                        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                                        var targetY = Math.max(0, scrollTop + rect.top - offset);
                                        var startY = scrollTop;
                                        var diff = targetY - startY;
                                        var duration = 1000;
                                        var startTime = null;
                                        function ease(t) { return 1 - Math.pow(1 - t, 3); }
                                        function animate(time) {
                                            if (!startTime) startTime = time;
                                            var elapsed = time - startTime;
                                            var p = Math.min(1, elapsed / duration);
                                            window.scrollTo(0, startY + diff * ease(p));
                                            if (p < 1) requestAnimationFrame(animate);
                                        }
                                        requestAnimationFrame(animate);
                                    }, 350);
                                }
                            }
                        });
                    }
                    if (card === 'hobby') {
                        if (this.hobbyExpanded) {
                            this.$nextTick(this.initHobbyPhysics);
                        } else {
                            this.stopHobbyPhysics();
                        }
                    }
                },
                initHobbyPhysics() {
                    const container = this.$refs.hobbyArea;
                    if (!container) return;
                    const pRect = container.parentElement.getBoundingClientRect();
                    const cRect = container.getBoundingClientRect();
                    const wallL = pRect.left - cRect.left;
                    const wallT = pRect.top - cRect.top;
                    const chips = [];
                    const catColors = {
                        Nature: '#a5d6a7',
                        Art: '#ce93d8',
                        Tech: '#90caf9',
                        Study: '#fff59d',
                        Health: '#ffcc80',
                        Entertainment: '#f48fb1'
                    };
                    const gap = 8;
                    const chipH = 34;
                    const pad = 10;
                    const items = this.hobbies.map(h => ({
                        w: h.name.length * 10 + 42,
                        h: chipH,
                        name: h.name, category: h.category
                    }));
                    var maxW = Math.max.apply(null, items.map(i => i.w));
                    var totalW = pRect.width - pad * 2;
                    var cols = Math.max(1, Math.floor((totalW + gap) / (maxW + gap)));
                    var rows = Math.ceil(items.length / cols);
                    var colW = totalW / cols;
                    var startY = wallT + (pRect.height - (rows * chipH + (rows - 1) * gap)) / 2;
                    items.forEach((item, i) => {
                        var col = i % cols;
                        var row = Math.floor(i / cols);
                        var x = wallL + pad + col * colW + colW / 2;
                        var y = startY + row * (chipH + gap) + chipH / 2;
                        var bg = catColors[item.category] || 'rgba(238,245,255,0.15)';
                        chips.push({
                            name: item.name,
                            category: item.category,
                            x: x, y: y,
                            vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                            rot: 0, rotV: 0,
                            w: item.w, h: item.h,
                            isDragging: false, movable: true,
                            style: {
                                width: item.w + 'px',
                                height: chipH + 'px',
                                background: bg,
                                transform: 'translate(-50%, -50%) translate(' + x + 'px,' + y + 'px)'
                            }
                        });
                    });
                    this.hobbyChips = chips;
                    this.startHobbyPhysics();
                },
                startHobbyPhysics() {
                    var self = this;
                    self.hobbyRunning = true;
                    function loop() {
                        if (!self.hobbyRunning) return;
                        self.updateHobbyPhysics();
                        self.hobbyRAF = requestAnimationFrame(loop);
                    }
                    loop();
                },
                stopHobbyPhysics() {
                    this.hobbyRunning = false;
                    if (this.hobbyRAF) {
                        cancelAnimationFrame(this.hobbyRAF);
                        this.hobbyRAF = null;
                    }
                    this.hobbyChips = [];
                },
                updateHobbyPhysics() {
                    function getVerts(b) {
                        var r = b.rot * Math.PI / 180;
                        var c = Math.cos(r), s = Math.sin(r);
                        var hw = b.w / 2, hh = b.h / 2;
                        var pts = [
                            {x:-hw, y:-hh}, {x: hw, y:-hh},
                            {x: hw, y: hh}, {x:-hw, y: hh}
                        ];
                        var out = [];
                        for (var p = 0; p < 4; p++) {
                            out.push({
                                x: b.x + pts[p].x * c - pts[p].y * s,
                                y: b.y + pts[p].x * s + pts[p].y * c
                            });
                        }
                        return out;
                    }
                    function proj(verts, axis) {
                        var min = Infinity, max = -Infinity;
                        for (var p = 0; p < 4; p++) {
                            var d = verts[p].x * axis.x + verts[p].y * axis.y;
                            if (d < min) min = d;
                            if (d > max) max = d;
                        }
                        return {min: min, max: max};
                    }
                    var container = this.$refs.hobbyArea;
                    if (!container) return;
                    var rect = container.getBoundingClientRect();
                    var pRect = container.parentElement.getBoundingClientRect();
                    var wallL = pRect.left - rect.left;
                    var wallR = pRect.right - rect.left;
                    var wallT = pRect.top - rect.top;
                    var wallB = pRect.bottom - rect.top;
                    var chips = this.hobbyChips;
                    for (var i = 0; i < chips.length; i++) {
                        var c = chips[i];
                        if (c.isDragging) continue;
                        if (c.movable) {
                            c.vx *= 0.9975;
                            c.vy *= 0.9975;
                            c.vx = Math.min(40, Math.max(-40, c.vx));
                            c.vy = Math.min(40, Math.max(-40, c.vy));
                            c.x += c.vx;
                            c.y += c.vy;
                            c.rotV *= 0.985;
                            c.rot += c.rotV;
                            var rA = c.rot * Math.PI / 180;
                            var cosA = Math.cos(rA), sinA = Math.sin(rA);
                            var hw = c.w / 2, hh = c.h / 2;
                            var hw_w = hw * Math.abs(cosA) + hh * Math.abs(sinA);
                            var hh_w = hw * Math.abs(sinA) + hh * Math.abs(cosA);
                            if (c.x - hw_w < wallL) { c.x = wallL + hw_w; c.vx *= -0.4; c.rotV *= 0.3; }
                            if (c.x + hw_w > wallR) { c.x = wallR - hw_w; c.vx *= -0.4; c.rotV *= 0.3; }
                            if (c.y - hh_w < wallT) { c.y = wallT + hh_w; c.vy *= -0.4; c.rotV *= 0.3; }
                            if (c.y + hh_w > wallB) { c.y = wallB - hh_w; c.vy *= -0.4; c.rotV *= 0.3; }
                        }
                        for (var j = i + 1; j < chips.length; j++) {
                            var c2 = chips[j];
                            if (!c2 || c2.isDragging) continue;
                            if (!c.movable && !c2.movable) continue;
                            var r1 = c.rot * Math.PI / 180;
                            var r2 = c2.rot * Math.PI / 180;
                            var axes = [
                                {x: Math.cos(r1), y: Math.sin(r1)},
                                {x: -Math.sin(r1), y: Math.cos(r1)},
                                {x: Math.cos(r2), y: Math.sin(r2)},
                                {x: -Math.sin(r2), y: Math.cos(r2)}
                            ];
                            var v1 = getVerts(c);
                            var v2 = getVerts(c2);
                            var minOverlap = Infinity;
                            var nX = 0, nY = 0;
                            for (var a = 0; a < 4; a++) {
                                var ax = axes[a].x, ay = axes[a].y;
                                var p1 = proj(v1, {x: ax, y: ay});
                                var p2 = proj(v2, {x: ax, y: ay});
                                var overlap = Math.min(p1.max, p2.max) - Math.max(p1.min, p2.min);
                                if (overlap < 0.001) { minOverlap = -1; break; }
                                if (overlap < minOverlap) {
                                    minOverlap = overlap;
                                    var cd = (c2.x - c.x) * ax + (c2.y - c.y) * ay;
                                    var s = cd >= 0 ? 1 : -1;
                                    nX = ax * s; nY = ay * s;
                                }
                            }
                            if (minOverlap <= 0) continue;
                            if (!c.movable) c.movable = true;
                            if (!c2.movable) c2.movable = true;
                            var invM1 = c.movable ? 1 : 0;
                            var invM2 = c2.movable ? 1 : 0;
                            var totalM = invM1 + invM2;
                            var push = Math.max(minOverlap, 0.5) / totalM;
                            c.x -= nX * push * invM1;
                            c.y -= nY * push * invM1;
                            c2.x += nX * push * invM2;
                            c2.y += nY * push * invM2;
                            var rvx = c2.vx - c.vx;
                            var rvy = c2.vy - c.vy;
                            var velAlongNormal = rvx * nX + rvy * nY;
                            if (velAlongNormal < 0) {
                                function supportPoint(verts, nx, ny) {
                                    var best = verts[0];
                                    var bestDot = best.x * nx + best.y * ny;
                                    for (var s = 1; s < 4; s++) {
                                        var d = verts[s].x * nx + verts[s].y * ny;
                                        if (d > bestDot) { bestDot = d; best = verts[s]; }
                                    }
                                    return best;
                                }
                                var sp1 = supportPoint(v1, nX, nY);
                                var sp2 = supportPoint(v2, -nX, -nY);
                                var cx = (sp1.x + sp2.x) * 0.5;
                                var cy = (sp1.y + sp2.y) * 0.5;
                                var offX = cx - c.x, offY = cy - c.y;
                                var offX2 = cx - c2.x, offY2 = cy - c2.y;
                                var invI1 = 300 / (c.w * c.w + c.h * c.h);
                                var invI2 = c2.movable ? 300 / (c2.w * c2.w + c2.h * c2.h) : 0;
                                var cross1 = offX * nY - offY * nX;
                                var cross2 = offX2 * nY - offY2 * nX;
                                var angTerm = (cross1 * cross1 * invI1 * invM1 + cross2 * cross2 * invI2 * invM2);
                                var e = 0.3;
                                var j = -(1 + e) * velAlongNormal / (totalM + angTerm);
                                c.vx -= j * nX * invM1;
                                c.vy -= j * nY * invM1;
                                c2.vx += j * nX * invM2;
                                c2.vy += j * nY * invM2;
                                c.rotV += j * (offY * nX - offX * nY) * invI1 * invM1;
                                if (c2.movable) {
                                    c2.rotV += j * (offX2 * nY - offY2 * nX) * invI2 * invM2;
                                }
                            }
                        }
                    }
                    for (var k = 0; k < chips.length; k++) {
                        var ck = chips[k];
                        if (!ck.isDragging && Math.abs(ck.rotV) < 0.01) ck.rotV = 0;
                        ck.style.transform = 'translate(-50%, -50%) translate(' + ck.x + 'px,' + ck.y + 'px) rotate(' + ck.rot + 'deg)';
                    }
                },
                hobbyDragStart(index, event) {
                    if (!this.hobbyChips[index]) return;
                    var chip = this.hobbyChips[index];
                    var isTouch = event.type === 'touchstart';
                    var point = isTouch ? event.touches[0] : event;
                    var container = this.$refs.hobbyArea;
                    if (!container) return;
                    var rect = container.getBoundingClientRect();
                    var info = this.hobbyDragInfo;
                    info.index = index;
                    info.lastX = point.clientX - rect.left;
                    info.lastY = point.clientY - rect.top;
                    info.startX = info.lastX;
                    info.startY = info.lastY;
                    info.lastTime = Date.now();
                    info.vx = 0;
                    info.vy = 0;
                    chip.isDragging = true;
                    chip.movable = true;
                    chip.vx = 0;
                    chip.vy = 0;
                    chip.rotV = 0;
                    info.didDrag = false;
                    var self = this;
                    var moveEvent = isTouch ? 'touchmove' : 'mousemove';
                    var upEvent = isTouch ? 'touchend' : 'mouseup';
                    info.moveEvent = moveEvent;
                    info.upEvent = upEvent;
                    info.boundMove = function (e) { self.hobbyDragMove(e); };
                    info.boundEnd = function () { self.hobbyDragEnd(); };
                    window.addEventListener(moveEvent, info.boundMove, { passive: false });
                    window.addEventListener(upEvent, info.boundEnd, { once: true });
                },
                hobbyDragMove: function (event) {
                    if (event.cancelable) event.preventDefault();
                    var info = this.hobbyDragInfo;
                    if (info.index < 0) return;
                    var chip = this.hobbyChips[info.index];
                    if (!chip) return;
                    var container = this.$refs.hobbyArea;
                    if (!container) return;
                    var rect = container.getBoundingClientRect();
                    var point = event.touches ? event.touches[0] : event;
                    var newX = point.clientX - rect.left;
                    var newY = point.clientY - rect.top;
                    var dxFromStart = newX - info.startX;
                    var dyFromStart = newY - info.startY;
                    if (!this.hobbyDragInfo.didDrag && (dxFromStart * dxFromStart + dyFromStart * dyFromStart) < 64) return;
                    this.hobbyDragInfo.didDrag = true;
                    var now = Date.now();
                    var dt = now - info.lastTime;
                    if (dt > 1) {
                        info.vx = info.vx * 0.7 + ((newX - chip.x) / dt) * 0.3;
                        info.vy = info.vy * 0.7 + ((newY - chip.y) / dt) * 0.3;
                        info.lastTime = now;
                    }
                    var pRect2 = container.parentElement.getBoundingClientRect();
                    var wallL2 = pRect2.left - rect.left;
                    var wallR2 = pRect2.right - rect.left;
                    var wallT2 = pRect2.top - rect.top;
                    var wallB2 = pRect2.bottom - rect.top;
                    var halfW = chip.w / 2;
                    var halfH = chip.h / 2;
                    chip.x = Math.max(wallL2 + halfW, Math.min(wallR2 - halfW, newX));
                    chip.y = Math.max(wallT2 + halfH, Math.min(wallB2 - halfH, newY));
                },
                hobbyDragEnd: function () {
                    var info = this.hobbyDragInfo;
                    var chip = info.index >= 0 ? this.hobbyChips[info.index] : null;
                    if (chip) {
                        if (info.boundMove) window.removeEventListener(info.moveEvent, info.boundMove);
                        chip.isDragging = false;
                        chip.vx = info.vx * 2;
                        chip.vy = info.vy * 2;
                    }
                    info.index = -1;
                    var self = this;
                    setTimeout(function () { self.hobbyDragInfo.didDrag = false; }, 50);
                },
            },
            mounted: function () {
                this.$nextTick(function () {
                    if (this.hobbyExpanded) {
                        this.initHobbyPhysics();
                    }
                });
            },
            beforeDestroy: function () {
                this.stopHobbyPhysics();
            }
        })
    </script>
</body>

</html>
