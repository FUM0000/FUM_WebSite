  <title>物理</title>

  <style>
    html { background: #020208 !important; }
    body { background: #020208 !important; min-height: 100vh; }
    .v-application { background: transparent !important; }

    #App { background: transparent !important; }

    #Main {
      background: transparent !important;
    }

    .v-main__wrap {
      background: transparent !important;
    }

    .v-card {
      background-color: rgba(10, 12, 30, 0.88) !important;
      border: 1px solid rgba(80, 120, 255, 0.12) !important;
      backdrop-filter: blur(4px);
    }

    .v-card .v-card__title,
    .v-card .v-card__text,
    .v-card .v-card__text span {
      color: #d0d8e8 !important;
    }

    .v-card .v-btn {
      color: #b0c8e0 !important;
    }

    .v-card .v-btn--outlined {
      border-color: rgba(80, 120, 255, 0.25) !important;
    }

    .content-text {
      color: #80b0ff !important;
      font-weight: 500;
    }

    #OrbitContainer {
      width: 100%;
      height: 500px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }

    .speed-input {
      max-width: 200px;
    }
  </style>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > サイエンス > 物理</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid class="pa-5">
            <v-row justify="center">
              <v-col xs="12" md="6">
                <v-card class="mt-6">
                  <v-card-title class="content-text">太陽と地球の楕円軌道</v-card-title>
                  <v-card-text>
                    <div id="OrbitContainer"></div>
                    <div class="text-center mt-2">
                      <v-btn small outlined @click="ToggleOrbitAnimation">
                        <v-icon small>{{ OrbitPlaying ? 'mdi-pause' : 'mdi-play' }}</v-icon>
                        {{ OrbitPlaying ? '一時停止' : '再生' }}
                      </v-btn>
                      <v-btn small outlined @click="ResetOrbitCamera" class="ml-2">
                        <v-icon small>mdi-camera</v-icon>
                        視点リセット
                      </v-btn>
                    </div>
                    <div class="d-flex align-center justify-center mt-3">
                      <v-text-field
                        v-model="SpeedExpr"
                        label="倍率 (式)"
                        dense
                        hide-details="auto"
                        solo
                        class="speed-input"
                        :error-messages="SpeedError"
                        @keydown.enter="ApplySpeed"
                      ></v-text-field>
                      <span class="ml-2 body-2" style="color:#80b0ff;white-space:nowrap;">
                        {{ SpeedMultiplier.toLocaleString() }} 倍
                      </span>
                      <v-btn small outlined class="ml-2" @click="ApplySpeed">適応</v-btn>
                    </div>
                    <div class="d-flex flex-wrap justify-center mt-2">
                      <v-btn x-small outlined class="mr-1 mb-1" @click="SetSpeedPreset(1, '1')">×1</v-btn>
                      <v-btn x-small outlined class="mr-1 mb-1" @click="SetSpeedPreset(365, '365')">×365</v-btn>
                      <v-btn x-small outlined class="mr-1 mb-1" @click="SetSpeedPreset(8760, '365*24')">×8760</v-btn>
                      <v-btn x-small outlined class="mr-1 mb-1" @click="SetSpeedPreset(525600, '365*24*60')">×525600</v-btn>
                      <v-btn x-small outlined class="mb-1" @click="SetSpeedPreset(31536000, '365*24*60*60')">最大</v-btn>
                    </div>
                  </v-card-text>
                </v-card>

              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer-simple></main-footer-simple>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        OrbitPlaying: true,
        SpeedExpr: '365*24*60',
        SpeedMultiplier: 525600,
        SpeedError: ''
      },
      methods: {
        SafeEval(expr) {
          if (!/^[\d+\-*/().\s]+$/.test(expr)) return null;
          try { return Function('return (' + expr + ')')(); } catch { return null; }
        },
        ApplySpeed() {
          this.SpeedError = '';
          const result = this.SafeEval(this.SpeedExpr);
          if (result === null || result <= 0 || !isFinite(result)) {
            this.SpeedError = '無効な式';
            return;
          }
          this.SpeedMultiplier = Math.round(result);
          window.OrbitSpeedMultiplier = this.SpeedMultiplier;
        },
        SetSpeedPreset(val, expr) {
          this.SpeedExpr = expr;
          this.SpeedMultiplier = val;
          this.SpeedError = '';
          window.OrbitSpeedMultiplier = val;
        },
        ToggleOrbitAnimation() {
          this.OrbitPlaying = !this.OrbitPlaying;
          window.OrbitPlaying = this.OrbitPlaying;
        },
        ResetOrbitCamera() {
          if (window.ResetOrbitCameraFn) {
            window.ResetOrbitCameraFn();
          }
        }
      }
    });
  </script>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.126.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.126.1/examples/jsm/controls/OrbitControls.js';

    const VIS_MULT = 628;
    const SUN_VIS_RADIUS = 0.25;

    function parseHex(c) { return parseInt(c.slice(1), 16); }

    async function initOrbit() {
      const container = document.getElementById('OrbitContainer');
      if (!container) {
        setTimeout(initOrbit, 200);
        return;
      }

      const resp = await fetch('../../Asset/Python/Data/Planet_Orbit.json');
      const data = await resp.json();

      const width = container.clientWidth;
      const height = container.clientHeight;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a1a);

      const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
      camera.position.set(50, 30, 60);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.target.set(0, 0, 0);

      const ambientLight = new THREE.AmbientLight(0x404060);
      scene.add(ambientLight);

      const sunLight = new THREE.PointLight(0xffffff, 2, 100);
      sunLight.position.set(data.sun.x, data.sun.y, data.sun.z);
      scene.add(sunLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
      dirLight.position.set(10, 20, 10);
      scene.add(dirLight);

      const sunGeo = new THREE.SphereGeometry(SUN_VIS_RADIUS, 32, 32);
      const sunMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 0.8 });
      const sunMesh = new THREE.Mesh(sunGeo, sunMat);
      sunMesh.position.set(data.sun.x, data.sun.y, data.sun.z);
      scene.add(sunMesh);

      const glowGeo = new THREE.SphereGeometry(SUN_VIS_RADIUS * 1.8, 32, 32);
      const glowMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.15 });
      const glowMesh = new THREE.Mesh(glowGeo, glowMat);
      glowMesh.position.copy(sunMesh.position);
      scene.add(glowMesh);

      const planetMeshes = [];

      for (const planet of data.planets) {
        const color = parseHex(planet.color);
        const visualRadius = Math.max(planet.radius * VIS_MULT, 0.005);

        const geo = new THREE.SphereGeometry(visualRadius, 24, 24);
        const mat = new THREE.MeshStandardMaterial({ color });
        const mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);

        const pts = planet.orbit.map(p => new THREE.Vector3(p.x, p.y, p.z));
        const orbitGeo = new THREE.BufferGeometry().setFromPoints(pts);
        const orbitMat = new THREE.LineBasicMaterial({ color, opacity: 0.3, transparent: true });
        const orbitLine = new THREE.LineLoop(orbitGeo, orbitMat);
        scene.add(orbitLine);

        planetMeshes.push({ mesh, points: pts, angle: Math.random() });
      }

      window.OrbitPlaying = true;
      window.OrbitSpeedMultiplier = 525600;

      const FRAMES_PER_SEC = 60;

      function getSpeed(periodDays) {
        const M = window.OrbitSpeedMultiplier || 525600;
        return M / (FRAMES_PER_SEC * periodDays * 24 * 60 * 60);
      }

      window.ResetOrbitCameraFn = function() {
        camera.position.set(50, 30, 60);
        controls.target.set(0, 0, 0);
        controls.update();
      };

      function animate() {
        requestAnimationFrame(animate);

        if (window.OrbitPlaying) {
          for (let i = 0; i < planetMeshes.length; i++) {
            const pm = planetMeshes[i];
            const period = data.planets[i].period_days;
            pm.angle += getSpeed(period);
            if (pm.angle >= 1) pm.angle -= 1;

            const idx = Math.floor(pm.angle * (pm.points.length - 1));
            pm.mesh.position.copy(pm.points[idx]);
          }
        }

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      const resizeObserver = new ResizeObserver(() => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
      resizeObserver.observe(container);
    }

    initOrbit();
  </script>
</body>

</html>
