    <script>
        window.vue = new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common, window.Mixins_Index],
            data: {
                ShowMessage: false,
                CurrentMessage: '',
                MessageStyle: { top: '0px', left: '0px' }
            },
        })
        window.addEventListener('load', () => {
            const overlay = document.getElementById('loading-overlay');
            const loadingRing = document.getElementById('loadingRing');
            const loadingPercent = document.getElementById('loadingPercent');
            const menuGuide = document.getElementById('menu-guide');
            const loadingGalaxyCanvas = document.getElementById('loadingGalaxyCanvas');

            const orbitContainer = document.querySelector('.text-orbit');
            const introCircle = document.querySelector('.intro-circle');
            const innerCircle = document.querySelector('.inner-circle');
            let menuGuideDismissed = false;
            let destroyLoadingGalaxy = null;
            let orbitLetters = null;
            let orbitAngle = 0;
            let exploded = false;

            const setupLoadingGalaxy = (canvas) => {
                if (!canvas || !window.THREE) return null;

                const renderer = new THREE.WebGLRenderer({
                    canvas,
                    antialias: true,
                    alpha: true
                });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
                renderer.setClearColor(0x000000, 0);
                renderer.outputEncoding = THREE.sRGBEncoding;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 2000);
                camera.position.set(0, 600, 0);
                camera.up.set(0, 0, -1);
                camera.lookAt(0, 0, 0);

                const galaxyGroup = new THREE.Group();
                scene.add(galaxyGroup);

                const ambientLight = new THREE.AmbientLight(0xa8bfff, 0.05);
                scene.add(ambientLight);

                function createLoadingParticleTexture() {
                    const s = 32;
                    const c = document.createElement('canvas');
                    c.width = c.height = s;
                    const ctx = c.getContext('2d');
                    const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
                    g.addColorStop(0, 'rgba(255,255,255,1)');
                    g.addColorStop(0.3, 'rgba(255,255,255,0.85)');
                    g.addColorStop(0.6, 'rgba(255,255,255,0.2)');
                    g.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, s, s);
                    return new THREE.CanvasTexture(c);
                }
                const loadingParticleTex = createLoadingParticleTexture();

                // ── ローディング中天の川銀河（渦巻銀河） ── ローディング後と同じ計算式
                const milkyWayTotal = 5000;
                const armConfig = [
                    { armCount: 2, weight: 0.65, twist: 0.045, scatterBase: 0.4, scatterGrowth: 0.008 },
                    { armCount: 2, weight: 0.35, twist: 0.030, scatterBase: 0.6, scatterGrowth: 0.012 },
                ];
                const diskSpread = 10;
                const starSizeGroups = [
                    { ratio: 0.40, size: 0.18, opacity: 1.0 },
                    { ratio: 0.30, size: 0.35, opacity: 1.0 },
                    { ratio: 0.18, size: 0.6, opacity: 1.0 },
                    { ratio: 0.09, size: 1.0, opacity: 1.0 },
                    { ratio: 0.03, size: 2.0, opacity: 1.0 },
                ];

                for (let g = 0; g < starSizeGroups.length; g++) {
                    const group = starSizeGroups[g];
                    const count = Math.floor(milkyWayTotal * group.ratio);
                    if (count < 5) continue;
                    const positions = new Float32Array(count * 3);
                    const colors = new Float32Array(count * 3);

                    for (let i = 0; i < count; i++) {
                        const isMain = Math.random() < armConfig[0].weight;
                        const cfg = isMain ? armConfig[0] : armConfig[1];
                        const armIdx = Math.floor(Math.random() * cfg.armCount);
                        const baseAngle = (Math.PI * 2 * armIdx) / cfg.armCount;

                        const radius = 10 + Math.pow(Math.random(), 0.65) * 190;
                        const armAngle = radius * cfg.twist;
                        const scatter = cfg.scatterBase + cfg.scatterGrowth * radius;
                        const angle = baseAngle + armAngle + (Math.random() - 0.5) * scatter;

                        const x = Math.cos(angle) * radius + (Math.random() - 0.5) * diskSpread;
                        const y = (Math.random() - 0.5) * (diskSpread * 0.3);
                        const z = Math.sin(angle) * radius + (Math.random() - 0.5) * diskSpread;

                        let color;
                        const t = radius / 200;
                        const isOrangeSpot = Math.random() < 0.18;
                        if (isOrangeSpot) {
                            color = new THREE.Color().setHSL(0.07 + Math.random() * 0.06, 0.5 + Math.random() * 0.3, 0.6 + Math.random() * 0.3);
                        } else if (t < 0.18) {
                            color = new THREE.Color().setHSL(0.07 + Math.random() * 0.05, 0.5 + Math.random() * 0.3, 0.6 + Math.random() * 0.25);
                        } else {
                            color = new THREE.Color().setHSL(0.58 + Math.random() * 0.07, 0.15 + Math.random() * 0.2, 0.85 + Math.random() * 0.15);
                        }

                        positions[i * 3] = x;
                        positions[i * 3 + 1] = y;
                        positions[i * 3 + 2] = z;
                        colors[i * 3] = color.r;
                        colors[i * 3 + 1] = color.g;
                        colors[i * 3 + 2] = color.b;
                    }

                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                    const material = new THREE.PointsMaterial({
                        map: loadingParticleTex,
                        vertexColors: true,
                        size: group.size,
                        transparent: true,
                        opacity: group.opacity,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        sizeAttenuation: true
                    });
                    galaxyGroup.add(new THREE.Points(geometry, material));
                }

                // 暗黒星雲
                const darkCount = 900;
                const darkPositions = new Float32Array(darkCount * 3);
                for (let i = 0; i < darkCount; i++) {
                    const isMain = Math.random() < armConfig[0].weight;
                    const cfg = isMain ? armConfig[0] : armConfig[1];
                    const armIdx = Math.floor(Math.random() * cfg.armCount);
                    const baseAngle = (Math.PI * 2 * armIdx) / cfg.armCount;

                    const radius = 10 + Math.pow(Math.random(), 0.65) * 190;
                    const armAngle = radius * cfg.twist;
                    const scatter = (cfg.scatterBase + cfg.scatterGrowth * radius) * 0.3;
                    const angle = baseAngle + armAngle + (Math.random() - 0.5) * scatter;

                    darkPositions[i * 3] = Math.cos(angle) * radius + (Math.random() - 0.5) * (diskSpread * 0.3);
                    darkPositions[i * 3 + 1] = (Math.random() - 0.5) * (diskSpread * 0.15);
                    darkPositions[i * 3 + 2] = Math.sin(angle) * radius + (Math.random() - 0.5) * (diskSpread * 0.3);
                }
                const darkGeometry = new THREE.BufferGeometry();
                darkGeometry.setAttribute('position', new THREE.BufferAttribute(darkPositions, 3));
                const darkMaterial = new THREE.PointsMaterial({
                    map: loadingParticleTex,
                    color: 0x000000,
                    size: 3.0,
                    transparent: true,
                    opacity: 0.7,

                    const x = radius * Math.cos(angleRad);

                    letter.style.left = `calc(50% + ${x}px)`;
                    letter.style.top = `calc(50% + ${y}px)`;

                const timer = setInterval(() => {
                    progress += (100 / (duration / interval));
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(timer);
                    }
                    const offset = circumference * (1 - progress / 100);
                    loadingRing.style.strokeDashoffset = offset;
                    if (loadingPercent) {
                        loadingPercent.textContent = Math.round(progress) + '%';

                            Array.from(orbitLetters).forEach((letter) => {
                                const baseAngle = parseFloat(letter.dataset.angle);
                                const currentAngle = baseAngle + angleRad;
                                const cx = circleRadius * Math.cos(currentAngle);
                                const cy = circleRadius * Math.sin(currentAngle);
                                letter.style.left = `calc(50% + ${cx}px)`;
                                letter.style.top = `calc(50% + ${cy}px)`;
                                const idx = parseInt(letter.dataset.index);
                                letter.style.transform = `translate(-50%, -50%) rotate(${orbitAngle + idx * 30}deg)`;

                    requestAnimationFrame(tickRotation);

        function fibonacciSphere(index, total) {
            const goldenRatio = (1 + Math.sqrt(5)) / 2;
            const theta = Math.acos(1 - 2 * (index + 0.5) / total);
            const phi = 2 * Math.PI * index / goldenRatio;
            return { theta, phi };

                fwScatterVz[idx] = svz;

        }

        const SHAPE_NAMES = ['saturn', 'star', 'butterfly', 'smiley', 'heart'];
        function rotate2Dto3D(lx, ly, lz, ry, rx) {
            const cy = Math.cos(ry), sy = Math.sin(ry);
            const cx = Math.cos(rx), sx = Math.sin(rx);
            const x1 = lx * cy - lz * sy;
            const z1 = lx * sy + lz * cy;
            const y1 = ly * cx - z1 * sx;
            const z2 = ly * sx + z1 * cx;
            return { x: x1, y: y1, z: z2 };
        }
        function makeShapeSaturn(x, y, z, palette, scale, ry, rx) {
            const ringCount = 60;
            const ringR = (6 + Math.random() * 1) * scale;
            for (let i = 0; i < ringCount && fwCount < FW_MAX; i++) {
                const a = (i / ringCount) * Math.PI * 2;
                const lx = Math.cos(a) * ringR;
                const lz = Math.sin(a) * ringR * 1.2;
                const ly = (Math.random() - 0.5) * 0.5;
                const r = rotate2Dto3D(lx, ly, lz, ry, rx);
                const spd = (2 + Math.random()) * scale;
                const ci = Math.floor(i * palette.length / ringCount);
                const c = palette[Math.min(ci, palette.length - 1)];
                spawnParticle(x, y, z, r.x * spd, r.y * spd, r.z * spd, 1.5 + Math.random() * 0.5, c[0], c[1], c[2]);
            }
            const sphereCount = 12;
            for (let i = 0; i < sphereCount && fwCount < FW_MAX; i++) {
                const { theta, phi } = fibonacciSphere(i, sphereCount);
                const spd = 4.5 * scale;
                const r = rotate2Dto3D(Math.sin(theta) * Math.cos(phi), Math.cos(theta), Math.sin(theta) * Math.sin(phi), ry, rx);
                const ci = Math.floor(i * palette.length / sphereCount);
                const c = palette[Math.min(ci, palette.length - 1)];
                spawnParticle(x, y, z, r.x * spd, r.y * spd, r.z * spd, 2.0, c[0] * 0.8, c[1] * 0.8, c[2] * 0.8);
            }
        }
        function makeShapeStar(x, y, z, palette, scale, ry, rx) {
            const outerR = 7 * scale, innerR = 3 * scale;
            const points = 5;
            const total = 100;
            const segs = points * 2;
            for (let i = 0; i < total && fwCount < FW_MAX; i++) {
                const t = (i / total) * Math.PI * 2;
                const seg = Math.floor(t / (Math.PI * 2 / segs));
                const localT = (t - seg * (Math.PI * 2 / segs)) / (Math.PI * 2 / segs);
                const r = seg % 2 === 0 ? outerR : innerR;
                const nextR = (seg + 1) % 2 === 0 ? outerR : innerR;
                const cr = r + (nextR - r) * localT;
                const lx = Math.cos(t) * cr;
                const ly = Math.sin(t) * cr;
                const lz = (Math.random() - 0.5) * 0.5;
                const rot = rotate2Dto3D(lx, ly, lz, ry, rx);
                const spd = (1 + Math.random() * 0.5) * scale;
                const ci = Math.floor(i * palette.length / total);
                const c = palette[Math.min(ci, palette.length - 1)];
                spawnParticle(x, y, z, rot.x * spd, rot.y * spd, rot.z * spd, 1.8 + Math.random() * 0.6, c[0], c[1], c[2]);
            }
        }
        function makeShapeButterfly(x, y, z, palette, scale, ry, rx) {
            const total = 80;
            const size = 5 * scale;
            for (let i = 0; i < total && fwCount < FW_MAX; i++) {
                const t = (i / total) * Math.PI * 2;
                const et = Math.exp(Math.cos(t));
                const r = size * (et - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5));
                const lx = Math.sin(t) * r;
                const ly = Math.cos(t) * r * 0.8;
                const lz = (Math.random() - 0.5) * 0.6;
                const rot = rotate2Dto3D(lx, ly, lz, ry, rx);
                const spd = (1.2 + Math.random() * 0.4) * scale;
                const ci = Math.floor(i * palette.length / total);
                const c = palette[Math.min(ci, palette.length - 1)];
                spawnParticle(x, y, z, rot.x * spd, rot.y * spd, rot.z * spd, 1.5 + Math.random() * 0.5, c[0], c[1], c[2]);
            }
        }
        function makeShapeSmiley(x, y, z, palette, scale, ry, rx) {
            const faceR = 6 * scale;

            for (let i = 0; i < faceCount && fwCount < FW_MAX; i++) {

            for (let side = -1; side <= 1; side += 2) {
                for (let j = 0; j < 6 && fwCount < FW_MAX; j++) {
                    const a = (j / 6) * Math.PI * 2;
                    const lx = Math.cos(a) * 0.8 + side * eyeOff;
                    const ly = Math.sin(a) * 0.8 + 0.5 * scale;
                    const rot = rotate2Dto3D(lx, ly, (Math.random() - 0.5) * 0.3, ry, rx);

                    const c = palette[0];
                    spawnParticle(x, y, z, rot.x * spd, rot.y * spd, rot.z * spd, 1.5, c[0] * 1.2, c[1] * 1.2, c[2] * 1.2);
                }
            }
            for (let m = 0; m < 20 && fwCount < FW_MAX; m++) {
                const t = (m / 20) * Math.PI;
                const lx = Math.cos(t + Math.PI) * 3.5 * scale;
                const ly = Math.sin(t + Math.PI) * 1.2 * scale - 1.2 * scale;
                const rot = rotate2Dto3D(lx, ly, (Math.random() - 0.5) * 0.3, ry, rx);
                const spd = (1 + Math.random() * 0.3) * scale;
                const c = palette[Math.floor(Math.random() * palette.length)];
                spawnParticle(x, y, z, rot.x * spd, rot.y * spd, rot.z * spd, 1.5, c[0], c[1], c[2]);
            }
        }
        function makeShapeHeart(x, y, z, palette, scale, ry, rx) {
            const total = 80;

                const ly = size * (0.8125 * Math.cos(t) - 0.3125 * Math.cos(2 * t) - 0.125 * Math.cos(3 * t) - 0.0625 * Math.cos(4 * t));
                const lz = (Math.random() - 0.5) * 0.7;

                spawnParticle(x, y, z, rot.x * spd, rot.y * spd, rot.z * spd, 1.8 + Math.random() * 0.6, c[0], c[1], c[2]);

        }
        function burstKatamono(x, y, z, palette, scale) {               // 3 型物
            const shape = SHAPE_NAMES[Math.floor(Math.random() * SHAPE_NAMES.length)];

        function burstCrackle(x, y, z, palette, scale) {                // 5 万雷
            const count = Math.floor(180 * scale);
            const speed = 7 * scale;
            for (let i = 0; i < count && fwCount < FW_MAX; i++) {
                const { theta, phi } = fibonacciSphere(i, count);
                const spd = speed * (0.7 + (i % 5) * 0.06);
                const vx = Math.sin(theta) * Math.cos(phi) * spd;
                const vy = Math.cos(theta) * spd;
                const vz = Math.sin(theta) * Math.sin(phi) * spd;

                const c = palette[ci];
                spawnParticle(x, y, z, vx, vy, vz, life, c[0], c[1], c[2]);

        }

        function burstCrackleSubBurst(x, y, z, palette, scale) {
            const count = Math.floor(80 * scale);
            const speed = 7 * scale;
            for (let i = 0; i < count && fwCount < FW_MAX; i++) {
                const { theta, phi } = fibonacciSphere(i, count);

                spawnParticle(x, y, z, vx, vy, vz, life, c[0], c[1], c[2]);

            for (let i = 0; i < centerCount && fwCount < FW_MAX; i++) {

                const vx = Math.sin(theta) * Math.cos(phi) * spd;
                const vy = Math.cos(theta) * spd;
                const vz = Math.sin(theta) * Math.sin(phi) * spd;

        function burstKanmuri(x, y, z, palette, scale) {                // 8 冠
            const count = Math.floor(100 * scale);
            const speed = 24 * scale;
            for (let i = 0; i < count && fwCount < FW_MAX; i++) {
                const { theta, phi } = fibonacciSphere(i, count);
                const spd = speed * (0.6 + (i % 3) * 0.15);
                const vx = Math.sin(theta) * Math.cos(phi) * spd;
                const vy = Math.cos(theta) * spd - 1 * scale;
                const vz = Math.sin(theta) * Math.sin(phi) * spd;
                const life = 4.0 + (i % 6) * 0.3;
                const ci = Math.floor(i * palette.length / count);
                const c = palette[Math.min(ci, palette.length - 1)];
                spawnParticle(x, y, z, vx, vy, vz, life, c[0], c[1], c[2]);
                for (let t = 1; t <= 2; t++) {
                    const trail = t * 0.3;
                    spawnParticle(x, y, z,
                        vx * (1 - trail * 0.2), vy * (1 - trail * 0.2) - 0.5, vz * (1 - trail * 0.2),
                        life * (1 - trail * 0.15), c[0] * (1 - trail * 0.25), c[1] * (1 - trail * 0.25), c[2] * (1 - trail * 0.25));
                }
            }
        }

        function launchShell(type) {
            const palette = FW_PALETTES[Math.floor(Math.random() * FW_PALETTES.length)];
            const x = (Math.floor(Math.random() * 100) / 100) * 60 - 30;
            const z = (Math.floor(Math.random() * 100) / 100) * 60 - 30;

            let vy, burstH;
            const configs = [
                { vy: 40, h: 22 },  // 0 牡丹
                { vy: 38, h: 24 },  // 1 菊
                { vy: 37, h: 24 },  // 2 色彩蜂
                { vy: 35, h: 25 },  // 3 型物
                { vy: 36, h: 26 },  // 4 千輪菊
                { vy: 32, h: 28 },  // 5 万雷
                { vy: 38, h: 32 },  // 6 虎の尾
                { vy: 50, h: 22 },  // 7 ダリア
                { vy: 75, h: 110 }, // 8 冠
            ];
            const cfg = configs[type] || configs[0];
            vy = cfg.vy;
            burstH = cfg.h + vy * 1.2;

            shells.push({
                x, y: -10, z, vy, type, palette, phase: 0, timer: 0, burstH,
                lastSubBurst: type === 5 ? -1 : undefined,
                sphereBursts: type === 5 ? 0 : undefined
            });
        }

        function updateFireworks(delta, time) {
            // 1. Update existing particles (move, age, compact)
            let write = 0;
            for (let i = 0; i < fwCount; i++) {
                fwLife[i] -= delta;
                if (fwLife[i] <= 0) continue;
                const i3 = i * 3;
                const w3 = write * 3;
                fwPos[i3] += fwVel[i3] * delta;
                fwPos[i3+1] += fwVel[i3+1] * delta;
                fwPos[i3+2] += fwVel[i3+2] * delta;
                fwVel[i3+1] -= 1.5 * delta;
                if (fwScatterTimer[i] > 0) {
                    fwScatterTimer[i] -= delta;
                    if (fwScatterTimer[i] <= 0) {
                        fwVel[i3] = fwScatterVx[i];
                        fwVel[i3+1] = fwScatterVy[i];
                        fwVel[i3+2] = fwScatterVz[i];
                        fwScatterTimer[i] = -1;
                    }
                }
                if (write !== i) {
                    fwPos[w3] = fwPos[i3]; fwPos[w3+1] = fwPos[i3+1]; fwPos[w3+2] = fwPos[i3+2];
                    fwVel[w3] = fwVel[i3]; fwVel[w3+1] = fwVel[i3+1]; fwVel[w3+2] = fwVel[i3+2];
                    fwLife[write] = fwLife[i];
                    fwCol[w3] = fwCol[i3]; fwCol[w3+1] = fwCol[i3+1]; fwCol[w3+2] = fwCol[i3+2];
                    fwScatterVx[write] = fwScatterVx[i];
                    fwScatterVy[write] = fwScatterVy[i];
                    fwScatterVz[write] = fwScatterVz[i];
                    fwScatterTimer[write] = fwScatterTimer[i];
                }
                write++;
            }
            fwCount = write;

            // 2. Type switching (only one type at a time)
            typeElapsed += delta;
            if (typeElapsed >= TYPE_DURATION) {
                typeSeqIndex = (typeSeqIndex + 1) % TYPE_SEQUENCE.length;
                currentFireworkType = TYPE_SEQUENCE[typeSeqIndex];
                typeElapsed = 0;
                typeLaunchTimer = 0;
            }

            // 3. Launch timer (only shells of current type)
            const maxShells = 6;
            typeLaunchTimer -= delta;
            if (typeLaunchTimer <= 0 && shells.length < maxShells) {
                const launchCount = currentFireworkType === 4 ? 25 : 1;
                for (let i = 0; i < launchCount && shells.length < maxShells; i++) {
                    launchShell(currentFireworkType);
                }
                typeLaunchTimer = LAUNCH_INTERVAL;
            }

            // 4. Process shells
            for (let s = shells.length - 1; s >= 0; s--) {
                const shell = shells[s];
                if (shell.phase === 0) {
                    shell.y += shell.vy * delta;
                    shell.vy -= 9.8 * delta;
                    shell.timer += delta;
                    // Trail spark (deterministic) — all types
                    if (shell.timer % 0.04 < delta + 0.001) {
                        const sparkCount = 2;
                        for (let i = 0; i < sparkCount; i++) {
                            const a = (i * Math.PI) + shell.timer * 2;
                            spawnParticle(shell.x, shell.y, shell.z,
                                Math.cos(a) * 0.3, -1.5 - (i % 2) * 0.5, Math.sin(a) * 0.3,
                                0.4, 1, 0.8, 0.4);
                        }
                    }
                    // 虎の尾 (type 6): continuous trail from ground to apex, persists entire ascent
                    if (shell.type === 6 && shell.phase === 0) {
                        for (let t = 0; t < 3; t++) {
                            const a2 = shell.timer * 4 + t * 2.09;
                            spawnParticle(shell.x, shell.y, shell.z,
                                Math.cos(a2) * 0.3, -0.5 - t * 0.3, Math.sin(a2) * 0.3,
                                2.5 + t * 0.2, 1, 0.85, 0.35);
                        }
                        for (let ti = 1; ti <= 3; ti++) {
                            spawnParticle(shell.x, shell.y - ti * 0.4, shell.z,
                                0, -0.8 - ti * 0.2, 0,
                                2.2 + ti * 0.1, 1 - ti * 0.06, 0.85 - ti * 0.06, 0.35 - ti * 0.04);
                        }
                    }
                    // 万雷 (type 5): 3-4 sphere blooms at spaced intervals while rising
                    if (shell.type === 5 && shell.phase === 0 && shell.sphereBursts < 4) {
                        const totalDist = shell.burstH - (-10);
                        const currentDist = shell.y - (-10);
                        const thresholds = [0.2, 0.45, 0.7, 0.9];
                        const thresh = thresholds[shell.sphereBursts];
                        if (currentDist / totalDist >= thresh) {
                            shell.sphereBursts++;
                            const subScale = Math.max(1.2, (shell.y + 10) / 40);
                            burstCrackleSubBurst(shell.x, shell.y, shell.z, shell.palette, subScale);
                        }
                    }
                    if (shell.vy <= 0 || shell.y >= shell.burstH) {
                        shell.phase = 1;
                        shell.timer = 0;
                        burstFirework(shell);
                    }
                } else {
                    shell.timer += delta;
                    if (shell.timer > 4.5) shells.splice(s, 1);
                }
            }

            // 5. Update geometry
            fwGeo.attributes.position.needsUpdate = true;
            fwGeo.attributes.color.needsUpdate = true;
            fwGeo.setDrawRange(0, fwCount);
        }
        function createStarNoiseTexture(size = 1024, density = 0.002) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, size, size);

            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;

            for (let i = 0; i < size * size; i++) {
                if (Math.random() < density) {
                    const brightness = 200 + Math.random() * 55;
                    data[i * 4] = brightness;
                    data[i * 4 + 1] = brightness;
                    data[i * 4 + 2] = brightness;
                    data[i * 4 + 3] = 255;
                }
            }

            ctx.putImageData(imageData, 0, 0);

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(4, 2);
            return texture;
        }

        // 星々
        function randomColor() {
            const rand = Math.random();
            let cumulativeProb = 0;
            for (const category of colorDistribution) {
                cumulativeProb += category.prob;
                if (rand <= cumulativeProb) {
                    const colorChoice = category.colors[Math.floor(Math.random() * category.colors.length)];
                    return new THREE.Color(colorChoice.r, colorChoice.g, colorChoice.b);
                }
            }
            return new THREE.Color(1, 1, 1);

        function createUniverseDetail() {

        function Calculate_Bezier(x, p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y) {
            let t = 0.5;
            const epsilon = 0.0001;
            const maxIterations = 10;
            for (let i = 0; i < maxIterations; i++) {
                let u = 1 - t;
                let tt = t * t;
                let uu = u * u;
                let uuu = uu * u;
                let ttt = tt * t;
                let currentX = uuu * p0x + 3 * uu * t * p1x + 3 * u * tt * p2x + ttt * p3x;
                let dx = -3 * p0x * uu + 3 * p1x * (1 - 4 * t + 3 * tt) + 3 * p2x * (2 * t - 3 * tt) + 3 * p3x * tt;
                if (Math.abs(x - currentX) < epsilon) break;
                t = t - (currentX - x) / dx;
                t = Math.max(0, Math.min(1, t));
            }
            let u = 1 - t;
            let tt = t * t;
            let uu = u * u;
            let uuu = uu * u;
            let ttt = tt * t;
            return uuu * p0y + 3 * uu * t * p1y + 3 * u * tt * p2y + ttt * p3y;
        }

                const distanceFactor = Calculate_Bezier(progress, 0, 1, 0.4, 1, 0.6, 0, 1, 0);
                Radius = POSITION_START.length() * distanceFactor + DISTANCE_INNER * (1 - distanceFactor);
            } else if (Elapsed < DURATION_ALL) {
                const progress = (Elapsed - DURATION_INNER) / DURATION_END;
                const distanceFactor = Calculate_Bezier(progress, 0, 0, 0.9, 0.1, 0.7, 0.7, 1, 1);
                const startDistance = DISTANCE_INNER;
                const endDistance = POSITION_END.length();
                Radius = startDistance * (1 - distanceFactor) + endDistance * distanceFactor;
            }
        }
        function Calculate_Theta() {
            if (Elapsed < DURATION_INNER) {

                Theta = Math.PI * 0.5 - Math.PI * (90 / 180) * Calculate_Bezier(progress, 0, 0, 0.4, 0, 0.4, 0, 1, 1);

                Theta = Math.PI * (10 / 180) * Calculate_Bezier(progress, 0, 0, 0.4, 0, 0.3, 1, 1, 1);

            vertexShader: `
            varying vec3 vNormal;
            varying vec3 vWorldPosition;
            varying vec3 vViewPosition;
            uniform float time;
            uniform float noiseScale;
            uniform float noiseStrength;
            uniform float flowSpeed;

            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(
                          i.z + vec4(0.0, i1.z, i2.z, 1.0))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ * ns.x + ns.yyyy;
                vec4 y = y_ * ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            vec3 curlNoise(vec3 p) {
                const float e = 0.1;
                vec3 dx = vec3(e, 0.0, 0.0);
                vec3 dy = vec3(0.0, e, 0.0);
                vec3 dz = vec3(0.0, 0.0, e);

                float n0 = snoise(p);
                float n1 = snoise(p + dx);
                float n2 = snoise(p - dx);
                float n3 = snoise(p + dy);
                float n4 = snoise(p - dy);
                float n5 = snoise(p + dz);
                float n6 = snoise(p - dz);

                float dNdx = (n1 - n2) / (2.0 * e);
                float dNdy = (n3 - n4) / (2.0 * e);
                float dNdz = (n5 - n6) / (2.0 * e);

                vec3 curl;
                curl.x = dNdy - dNdz;
                curl.y = dNdz - dNdx;
                curl.z = dNdx - dNdy;

                return normalize(curl);
            }

            void main() {
                vec3 pos = position;
                vec3 noisePos = pos * noiseScale + time * flowSpeed;
                vec3 curl = curlNoise(noisePos);
                pos += curl * noiseStrength;
                vNormal = normalize(normalMatrix * (normal + curl * noiseStrength));
                vec4 worldPosition = modelMatrix * vec4(pos, 1.0);
                vWorldPosition = worldPosition.xyz;
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `,
            fragmentShader: `
            uniform float time;
            uniform vec3 baseColor;
            uniform samplerCube envMap;
            uniform vec3 viewPos;
            uniform float cameraDistance;
            uniform float fresnelPower;
            uniform float fresnelScale;
            uniform float fresnelBias;
            uniform float specularStrength;
            uniform float shininess;
            uniform float scatteringStrength;
            uniform float rimPower;
            uniform float rimStrength;
            uniform vec3 rimColor;
            varying vec3 vNormal;
            varying vec3 vWorldPosition;
            varying vec3 vViewPosition;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(viewPos - vWorldPosition);
                float distanceFactor = clamp(8.0 / cameraDistance, 0.3, 1.0);
                float fresnel = fresnelBias + fresnelScale * pow(1.0 - max(dot(normal, viewDir), 0.0), fresnelPower);
                fresnel *= distanceFactor;
                float rim = rimStrength * pow(1.0 - max(dot(normal, viewDir), 0.0), rimPower);
                rim *= distanceFactor;
                vec3 reflectDir = reflect(-viewDir, normal);
                vec3 reflection = textureCube(envMap, reflectDir).rgb;
                reflection *= distanceFactor;
                vec3 lightDir = normalize(vec3(5.0, 5.0, 5.0));
                vec3 halfwayDir = normalize(lightDir + viewDir);
                float spec = pow(max(dot(normal, halfwayDir), 0.0), shininess);
                vec3 specular = specularStrength * spec * vec3(1.0);
                specular *= distanceFactor;
                float scatter = scatteringStrength * (1.0 - max(dot(normal, viewDir), 0.0));
                vec3 color = baseColor + reflection * fresnel + specular;
                color += vec3(1.0, 0.6, 0.1) * scatter * 0.6;
                color += rim * rimColor;
                float alpha = 0.25;
                gl_FragColor = vec4(color, alpha);
            }
        `,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false

            const a = Math.random() * Math.PI * 2;
            const h = (Math.random() - 0.5) * (0.3 + r * 0.04);
            diskPos[i*3] = Math.cos(a) * r;
            diskPos[i*3+1] = h;
            diskPos[i*3+2] = Math.sin(a) * r;
            const t = (r - 4.5) / 18;
            const col = new THREE.Color().setHSL(0.10 - t * 0.06, 0.7 + t * 0.3, 0.2 + (1 - t) * 0.5);
            diskCol[i*3] = col.r;
            diskCol[i*3+1] = col.g;
            diskCol[i*3+2] = col.b;
        }
        const diskGeo = new THREE.BufferGeometry();
        diskGeo.setAttribute('position', new THREE.BufferAttribute(diskPos, 3));
        diskGeo.setAttribute('color', new THREE.BufferAttribute(diskCol, 3));
        const diskMat = new THREE.PointsMaterial({
            map: particleTexture,
            size: 0.35,
            vertexColors: true,
            transparent: true,
            opacity: 0.35,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
            fog: false
        });
        const accretionDisk = new THREE.Points(diskGeo, diskMat);
        scene.add(accretionDisk);
        const diskGlow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: bhGlowTex,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.15,
            depthWrite: false,
            fog: false,
            color: 0xff8800
        }));
        diskGlow.position.set(0, 0, 0);
        diskGlow.scale.set(40, 8, 1);
        scene.add(diskGlow);
        let textMesh1, textMeshMouthClosed, textMeshMouthOpen;
        const loader = new THREE.FontLoader();
        loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function (font) {
            const textGeometry1 = new THREE.TextGeometry('. .', { font: font, size: 4, height: 0.25, curveSegments: 2, bevelEnabled: true, bevelThickness: 0, bevelSize: 0.02, bevelOffset: 0, bevelSegments: 0 });
            const textGeometryMouthClosed = new THREE.TextGeometry('-', { font: font, size: 2, height: 0.25, curveSegments: 2, bevelEnabled: true, bevelThickness: 0, bevelSize: 0.02, bevelOffset: 0, bevelSegments: 0 });
            const textGeometryMouthOpen = new THREE.TextGeometry('Ο', { font: font, size: 1, height: 0.25, curveSegments: 2, bevelEnabled: true, bevelThickness: 0, bevelSize: 0.02, bevelOffset: 0, bevelSegments: 0 });

            const textMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff88,
                fog: false
            });

            textMesh1 = new THREE.Mesh(textGeometry1, textMaterial);
            textMeshMouthClosed = new THREE.Mesh(textGeometryMouthClosed, textMaterial);
            textMeshMouthOpen = new THREE.Mesh(textGeometryMouthOpen, textMaterial);

            textGeometry1.computeBoundingBox();
            const textWidth1 = textGeometry1.boundingBox.max.x - textGeometry1.boundingBox.min.x;
            textMesh1.position.set(-textWidth1 / 2, 0, 0);
            textMesh1.renderOrder = 1;

            textGeometryMouthClosed.computeBoundingBox();
            const textWidthClosed = textGeometryMouthClosed.boundingBox.max.x - textGeometryMouthClosed.boundingBox.min.x;
            textMeshMouthClosed.position.set(-textWidthClosed / 2, -1, 0);
            textMeshMouthClosed.renderOrder = 1;

            textGeometryMouthOpen.computeBoundingBox();
            const textWidthOpen = textGeometryMouthOpen.boundingBox.max.x - textGeometryMouthOpen.boundingBox.min.x;
            textMeshMouthOpen.position.set(-textWidthOpen / 2, -1, 0);
            textMeshMouthOpen.renderOrder = 1;

            textMeshMouthOpen.visible = false;

            faceScene.add(textMesh1);
            faceScene.add(textMeshMouthClosed);
            faceScene.add(textMeshMouthOpen);
        });
        const jetLength = 200;
        const jetOffset = 6;
        const messages = [
            "やぁ！",
            "ようこそ！FUM Websiteへ！",
            "調子はどう？",
            "ん...何かよう？",
            "宇宙はひろいなぁ～。",
            "冒険しようよ！",
            "新しいことを学ぶのって楽しいよね！",
            "SpaceX。かっこいいよね！わかるぅ～！",
            "それぞれの場ってどうやって繋がってるんだろう？",
            "宇宙生物って絶対いるよね！",
            "君も宇宙に行きたいの？",
            "...あれ？...ボクのこと見えてるの？",
            "ボクの中ってどうなってると思う？",
            "FUMはたぶん元気だよ。",
            "FUMはたぶん退屈なんだよ。"
        ];
        const MESSAGE_DISTANCE_THRESHOLD = 35;
        let messageVisible = false;
        let messageCooldown = false;
        let isFirstMessage = true;
        function updateSpeechBubble() {
            if (!blackhole || !vue) return;

            const distance = camera.position.distanceTo(blackhole.position);

            if (distance < MESSAGE_DISTANCE_THRESHOLD && !messageVisible && !messageCooldown) {
                messageVisible = true;
                messageCooldown = true;
                vue.ShowMessage = true;

                if (isFirstMessage) {
                    vue.CurrentMessage = messages[0];
                    isFirstMessage = false;
                } else {
                    const randomIndex = Math.floor(Math.random() * messages.length);
                    vue.CurrentMessage = messages[randomIndex];
                }

                setTimeout(() => {
                    messageVisible = false;
                    vue.ShowMessage = false;
                    setTimeout(() => {
                        messageCooldown = false;
                    }, 3000);
                }, 4000);
            }

            if (vue.ShowMessage) {
                const screenPosition = blackhole.position.clone().project(camera);
                const x = (screenPosition.x * 0.5 + 0.5) * window.innerWidth;
                const MAX_DISTANCE = MESSAGE_DISTANCE_THRESHOLD;
                const MIN_DISTANCE = 15;
                const currentDistance = camera.position.distanceTo(blackhole.position);
                let proximityFactor = (MAX_DISTANCE - currentDistance) / (MAX_DISTANCE - MIN_DISTANCE);
                proximityFactor = Math.max(0, Math.min(1, proximityFactor));
                const yOffsetFar = 0.45;
                const yOffsetClose = 0.38;
                const dynamicOffsetY = yOffsetFar + (yOffsetClose - yOffsetFar) * proximityFactor;
                const y = (-screenPosition.y * 0.5 + dynamicOffsetY) * window.innerHeight;

                vue.MessageStyle = {
                    top: `${y}px`,
                    left: `${x}px`
                };
            }
        }
        let blinkTimer = 0;
        function updateFace(delta) {
            blinkTimer += delta;
            if (blinkTimer > 3 + Math.random() * 3) {
                if (textMesh1) textMesh1.visible = false;

                setTimeout(() => {
                    if (textMesh1) textMesh1.visible = true;
                }, 120);

                blinkTimer = 0;
            }
            if (vue && vue.ShowMessage && textMeshMouthClosed && textMeshMouthOpen) {
                const isMouthOpen = Math.floor(time * 2) % 2 === 0;
                textMeshMouthClosed.visible = !isMouthOpen;
                textMeshMouthOpen.visible = isMouthOpen;
            } else if (textMeshMouthClosed && textMeshMouthOpen) {
                textMeshMouthClosed.visible = true;
                textMeshMouthOpen.visible = false;
            }
        }
        const particleCount = 1000;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount);
        const lifetimes = new Float32Array(particleCount);
        const coneAngle = Math.PI / 40;
        const jetSpeed = 2;
        const velocitiesX = new Float32Array(particleCount);
        const velocitiesY = new Float32Array(particleCount);
        const velocitiesZ = new Float32Array(particleCount);
        const speedScales = new Float32Array(particleCount);
        for (let i = 0; i < particleCount; i++) {
            resetParticle(i, true);
        }
        function resetParticle(i, randomizeStart = false) {
            const isTop = Math.random() > 0.5;

            positions[i * 3 + 0] = 0;
            positions[i * 3 + 1] = isTop ? jetOffset : -jetOffset;
            positions[i * 3 + 2] = 0;

            const theta = Math.random() * Math.PI * 2;
            const spread = Math.random() * Math.tan(coneAngle);

            const vx = Math.cos(theta) * spread;
            const vz = Math.sin(theta) * spread;
            const vy = isTop ? 1 : -1;

            const len = Math.sqrt(vx * vx + vy * vy + vz * vz);

            // Per-particle speed variation to avoid uniform motion
            speedScales[i] = 0.6 + Math.random() * 1.1; // 0.6 - 1.7
            velocitiesX[i] = (vx / len) * jetSpeed * speedScales[i];
            velocitiesY[i] = (vy / len) * jetSpeed * speedScales[i];
            velocitiesZ[i] = (vz / len) * jetSpeed * speedScales[i];

            // Stagger initial emission so particles don't clump at the start frame
            if (randomizeStart) {
                const travel = Math.random() * (jetLength * 0.9);
                const steps = travel / jetSpeed;
                positions[i * 3 + 0] += velocitiesX[i] * steps;
                positions[i * 3 + 1] += velocitiesY[i] * steps;
                positions[i * 3 + 2] += velocitiesZ[i] * steps;
            }

            lifetimes[i] = Math.random() * 80;
        }
        particleGeometry.setAttribute(
            'position',
            new THREE.BufferAttribute(positions, 3)
        );
        const particleMaterial = new THREE.PointsMaterial({
            color: 0x88ccff,
            size: 0.06,
            transparent: true,
            opacity: 0.08,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const jetParticles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(jetParticles);
        function updateJetParticles() {
            const pos = particleGeometry.attributes.position.array;

            for (let i = 0; i < particleCount; i++) {
                pos[i * 3 + 0] += velocitiesX[i];
                pos[i * 3 + 1] += velocitiesY[i];
                pos[i * 3 + 2] += velocitiesZ[i];

                lifetimes[i]--;

                if (
                    lifetimes[i] <= 0 ||
                    Math.abs(pos[i * 3 + 1]) > jetLength * 0.9
                ) {
                    resetParticle(i);
                }
            }

            particleGeometry.attributes.position.needsUpdate = true;
        }


        // ポストエフェクト
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight));
        bloomPass.threshold = 0;
        if (isMobile) {
            bloomPass.strength = 0.6;
            bloomPass.radius = 0.1;
        } else {
            bloomPass.strength = 0.8;
            bloomPass.radius = 0.6;
        }
        composer.addPass(bloomPass);
        const BlackholeWarpShader = {
            uniforms: {
                'tDiffuse': { value: null },
                'center': { value: new THREE.Vector2(0.5, 0.5) },
                'radius': { value: 0.08 },
                'strength': { value: 0.08 },
                'aspect': { value: window.innerWidth / window.innerHeight }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec2 center;
                uniform float radius;
                uniform float strength;
                uniform float aspect;
                varying vec2 vUv;

                void main() {
                    vec2 delta = vUv - center;
                    vec2 deltaAspect = vec2(delta.x * aspect, delta.y);
                    float r = length(deltaAspect);
                    float ring = smoothstep(radius * 1.8, radius * 0.9, r);
                    float falloff = clamp(1.0 - (r / (radius * 1.8)), 0.0, 1.0);
                    float protectRadius = radius * 0.65;
                    float protection = smoothstep(0.0, protectRadius, r);
                    float warp = strength * ring * falloff * protection;
                    vec2 dir = normalize(deltaAspect + 1e-6);
                    vec2 offset = dir * warp;
                    offset.x /= aspect;
                    vec2 warpedUv = vUv + offset;
                    gl_FragColor = texture2D(tDiffuse, warpedUv);
                }
            `
        };
        blackholeWarpPass = new THREE.ShaderPass(BlackholeWarpShader);
        blackholeWarpPass.renderToScreen = false;
        composer.addPass(blackholeWarpPass);
        const DigitalGlitchShader = {
            uniforms: {
                'tDiffuse': { value: null },
                'tDisp': { value: null },
                'byp': { value: 0 },
                'amount': { value: 0.08 },
                'angle': { value: 0.02 },
                'seed': { value: 0.02 },
                'seed_x': { value: 0.02 },
                'seed_y': { value: 0.02 },
                'distortion_x': { value: 0.5 },
                'distortion_y': { value: 0.6 },
                'col_s': { value: 0.05 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform int byp;
                uniform sampler2D tDiffuse;
                uniform sampler2D tDisp;
                uniform float amount;
                uniform float angle;
                uniform float seed;
                float seed_x;
                uniform float seed_y;
                uniform float distortion_x;
                uniform float distortion_y;
                uniform float col_s;
                varying vec2 vUv;

                float rand(vec2 co) {
                    return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
                }

                void main() {
                    if (byp < 1) {
                        vec2 p = vUv;
                        if (amount > 0.0) {
                            float xs = floor(gl_FragCoord.x / 0.5);
                            float ys = floor(gl_FragCoord.y / 0.5);
                            vec4 normal = texture2D(tDisp, p * seed * seed);
                            if (p.y < distortion_x + col_s && p.y > distortion_x - col_s * seed) {
                                if (seed_x > 0.0) {
                                    p.y = 1.0 - (p.y + distortion_y);
                                } else {
                                    p.y = distortion_y;
                                }
                            }
                            if (p.x < distortion_y + col_s && p.x > distortion_y - col_s * seed) {
                                if (seed_y > 0.0) {
                                    p.x = distortion_x;
                                } else {
                                    p.x = 1.0 - (p.x + distortion_x);
                                }
                            }
                            p.x += normal.x * seed_x * (seed / 5.0);
                            p.y += normal.y * seed_y * (seed / 5.0);
                            vec2 offset = amount * vec2(cos(angle), sin(angle));
                            vec4 cr = texture2D(tDiffuse, p + offset);
                            vec4 cga = texture2D(tDiffuse, p);
                            vec4 cb = texture2D(tDiffuse, p - offset);
                            gl_FragColor = vec4(cr.r, cga.g, cb.b, 1.0);
                        } else {
                            gl_FragColor = texture2D(tDiffuse, p);
                        }
                    } else {
                        gl_FragColor = texture2D(tDiffuse, vUv);
                    }
                }
            `
        };
        function generateNoiseTextureForGlitch(size = 64) {
            const data = new Uint8Array(size * size * 4);
            for (let i = 0; i < size * size * 4; i++) {
                data[i] = Math.random() * 255;
            }
            const texture = new THREE.DataTexture(data, size, size, THREE.RGBAFormat);
            texture.needsUpdate = true;
            return texture;
        }
        let glitchPass;
        let fxaaPass;
        glitchPass = new THREE.ShaderPass(DigitalGlitchShader);
        glitchPass.uniforms.tDisp.value = generateNoiseTextureForGlitch();
        glitchPass.renderToScreen = false;
        composer.addPass(glitchPass);

        fxaaPass = new THREE.ShaderPass(THREE.FXAAShader);
        fxaaPass.material.uniforms['resolution'].value.set(
            1 / (window.innerWidth * pixelRatio),
            1 / (window.innerHeight * pixelRatio)
        );
        fxaaPass.renderToScreen = true;
        composer.addPass(fxaaPass);
        let isGlitching = false;
        let glitchTimeout;
        function updateGlitch() {
            if (isGlitching) {
                glitchPass.uniforms.seed.value = Math.random();
                glitchPass.uniforms.amount.value = Math.random() * 0.1 + 0.02;
                glitchPass.uniforms.angle.value = Math.random() * 2;
                glitchPass.uniforms.seed_x.value = (Math.random() > 0.5 ? 0.02 : -0.02);
                glitchPass.uniforms.seed_y.value = (Math.random() > 0.5 ? 0.02 : -0.02);
                glitchPass.uniforms.distortion_x.value = Math.random() * 0.5;
                glitchPass.uniforms.distortion_y.value = Math.random() * 0.5;
                glitchPass.uniforms.col_s.value = Math.random() * 0.05;
            } else {
                glitchPass.uniforms.amount.value = 0;
            }
        }
        function triggerGlitch() {
            isGlitching = true;
            clearTimeout(glitchTimeout);
            const duration = (Math.random() - 0.5) * 500;
            glitchTimeout = setTimeout(() => {
                isGlitching = false;
            }, duration);
            const nextTrigger = Math.random() * 5000 + 3000;
            setTimeout(triggerGlitch, nextTrigger);
        }
        setTimeout(triggerGlitch, 2000);


        // アニメーション
        const clock = new THREE.Clock();
        let time = 0.0;
        let countDistance = Math.PI;
        let countTheata = Math.PI;
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const currentTime = performance.now();
            time += delta;

            // カメラアニメーション
            if (Flag_CameraAnimation) {
                if (Time_CameraAnimation_Start === null) {
                    Time_CameraAnimation_Start = currentTime;
                    Position_Trun_Start = camera.position.clone();
                }
                Elapsed = currentTime - Time_CameraAnimation_Start;
                if (Elapsed < DURATION_ALL) {
                    Calculate_Radius();
                    Calculate_Theta();
                    Calculate_Phi();
                    const x = Radius * Math.cos(Theta) * Math.cos(Phi);
                    const y = Radius * Math.sin(Theta);
                    const z = Radius * Math.cos(Theta) * Math.sin(Phi);
                    camera.position.set(x, y, z);
                    camera.lookAt(0, 0, 0);
                }
                if (Elapsed > DURATION_ALL) {
                    Flag_CameraAnimation = false;
                    controls.maxDistance = 1200;
                    controls.enabled = true;
                }
            } else {
                countDistance += Math.PI * 0.01 * delta;
                const currentDistance = camera.position.length();
                let newDistance = currentDistance + Math.sin(countDistance) * 2 * delta;
                if (newDistance < 18) {
                    newDistance = 18;
                    countDistance += Math.PI * delta;
                }
                const currentPhi = Math.atan2(camera.position.z, camera.position.x);
                const newPhi = currentPhi + Math.PI * 0.05 * delta;
                countTheata += Math.PI * 0.2 * delta;
                let currentTheta = Math.asin(camera.position.y / newDistance);
                if (currentTheta <= -Math.PI * 0.49) {
                    currentTheta = -Math.PI * 0.49;
                }
                if (currentTheta >= Math.PI * 0.49) {
                    currentTheta = Math.PI * 0.49;
                }
                const newTheta = currentTheta + Math.sin(countTheata) * Math.PI * 2.5 / 180 * delta;
                const x = newDistance * Math.cos(newTheta) * Math.cos(newPhi);
                const y = newDistance * Math.sin(newTheta);
                const z = newDistance * Math.cos(newTheta) * Math.sin(newPhi);
                camera.position.set(x, y, z);
                camera.lookAt(0, 0, 0);
            }

            // ブラックホール
            blackholeShaderMaterial.uniforms.time.value = time;
            blackholeShaderMaterial.uniforms.viewPos.value.copy(camera.position);
            blackholeShaderMaterial.uniforms.cameraDistance.value = camera.position.length();
            const bhDist = camera.position.length();
            const bhScale = THREE.MathUtils.clamp(0.1 + bhDist * 0.003, 0.1, 10.0);
            blackhole.scale.set(bhScale, bhScale, bhScale);
            updateFace(delta);
            updateSpeechBubble();
            updateJetParticles();
            accretionDisk.rotation.y += delta * 0.6;
            bhGlow.material.opacity = 0.5 + Math.sin(time * 0.5) * 0.1;
            updateFireworks(delta, time);
            if (blackholeWarpPass && blackhole && blackhole.geometry) {
                if (!blackhole.geometry.boundingSphere) {
                    blackhole.geometry.computeBoundingSphere();
                }
                const ndc = blackhole.position.clone().project(camera);
                const centerUv = new THREE.Vector2(ndc.x * 0.5 + 0.5, ndc.y * 0.5 + 0.5);
                const distance = camera.position.distanceTo(blackhole.position);
                const worldRadius = blackhole.geometry.boundingSphere.radius * blackhole.scale.x;
                const ndcRadius = (worldRadius / Math.max(distance, 0.001)) / Math.tan(THREE.MathUtils.degToRad(camera.fov * 0.5));
                const uvRadius = Math.min(0.45, Math.max(0.01, ndcRadius * 1.5));
                const distanceFalloff = THREE.MathUtils.clamp(1.0 - (distance - 30) / 120, 0.75, 1.0);
                blackholeWarpPass.material.uniforms.center.value.copy(centerUv);
                blackholeWarpPass.material.uniforms.radius.value = uvRadius * 1.1 * distanceFalloff;
                const maxWarpDist = 100;
                const minWarpDist = 0;
                const distFactor = 1 - THREE.MathUtils.clamp((distance - minWarpDist) / (maxWarpDist - minWarpDist), 0, 1);
                const warpStrength = distFactor * distFactor * distFactor * distFactor * distFactor * 1;
                blackholeWarpPass.material.uniforms.strength.value = warpStrength;
            }

            // ポストエフェクト
            updateGlitch();

            controls.update();
            composer.render();
            const prevAutoClear = renderer.autoClear;
            renderer.autoClear = false;
            renderer.render(faceScene, camera);
            renderer.autoClear = prevAutoClear;
        }
        animate();
    </script>
