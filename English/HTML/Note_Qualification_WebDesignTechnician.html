<html>

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
  <link href="../../Asset/CSS/Learning.css" rel="stylesheet" />

  <title>Web Design Technician</title>
</head>

<body>

  <v-app id="App" v-cloak>
    <template>

      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Webデザイン技能士</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">

            <v-row justify="center">
              <v-col xs="12" md="6">

                <v-card>
                  <v-card-title class="content-text">試験について</v-card-title>
                  <v-card-text>

                    <v-stepper v-model="Count_Step_1">

                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1"
                          class="step-title">概要</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2"
                          class="step-title">出題傾向</v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">概要</v-card-title>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 30%; min-width: 120px;">項目</th>
                                      <th class="text-left" style="width: 70%; min-width: 400px;">説明</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in overview" :key="item.name">
                                      <td style="padding: 12px;">{{ item.name }}</td>
                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <p class="text-subtitle-2 font-weight-bold">出題傾向</p>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">分野</th>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">割合</th>
                                      <th class="text-left" style="width: 50%; min-width: 200px;">傾向</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in exam_trend" :key="item.name">
                                      <td style="padding: 12px;">{{ item.name }}</td>
                                      <td v-html="item.rate" style="font-size: 16px; padding: 12px;"></td>
                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                              <p class="mt-4 text-caption" style="color: #666;">
                                ※上記の割合は、公式テキストや過去問題の傾向を基にした推定値であり、実際の試験では変動する可能性があります。
                              </p>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                          </div>
                        </v-stepper-content>

                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>

                <v-card class="mt-6">
                  <v-card-title class="content-text">学習</v-card-title>
                  <v-card-text>

                    <v-text-field v-model="searchQuery" label="学習内容を検索" prepend-inner-icon="mdi-magnify" clearable
                      outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_2">

                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_2 > 1" step="1" @click="Count_Step_2 = 1"
                          class="step-title">HTML/CSS</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_2 > 2" step="2" @click="Count_Step_2 = 2"
                          class="step-title">デザイン基礎</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_2 > 3" step="3" @click="Count_Step_2 = 3"
                          class="step-title">サイト設計・運用</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_2 > 4" step="4" @click="Count_Step_2 = 4"
                          class="step-title">法規・アクセシビリティ</v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">HTML/CSS</v-card-title>
                              <v-treeview :items="filteredMarkup" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesMarkup" @update:open="updateOpenNodesMarkup">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_2 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">デザイン基礎</v-card-title>
                              <v-treeview :items="filteredDesign" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesDesign" @update:open="updateOpenNodesDesign">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_2 = 1">戻る</v-btn>
                            <v-btn color="primary" @click="Count_Step_2 = 3">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="3">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">サイト設計・運用</v-card-title>
                              <v-treeview :items="filteredOperation" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesOperation" @update:open="updateOpenNodesOperation">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_2 = 2">戻る</v-btn>
                            <v-btn color="primary" @click="Count_Step_2 = 4">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="4">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">法規・アクセシビリティ</v-card-title>
                              <v-treeview :items="filteredRules" item-key="name" activatable open-on-click dense
                                :open.sync="openNodesRules" @update:open="updateOpenNodesRules">
                                <template v-slot:label="{ item }">
                                  <span :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                                </template>
                              </v-treeview>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_2 = 3">戻る</v-btn>
                          </div>
                        </v-stepper-content>

                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>

              </v-col>
            </v-row>

          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>

    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        Count_Step_2: 1,
        dialog: false,
        searchQuery: '',
        filteredMarkup: [],
        filteredDesign: [],
        filteredOperation: [],
        filteredRules: [],
        openNodesMarkup: [],
        openNodesDesign: [],
        openNodesOperation: [],
        openNodesRules: [],
        overview: [
          {
            name: "試験の目的とメリット",
            description: "Web制作・運用に必要な知識と技能を証明する国家検定。制作現場での基礎力の可視化に有効。"
          },
          {
            name: "出題形式",
            description: "学科試験と実技試験で構成。問題形式・試験時間は等級により異なる。"
          },
          {
            name: "合格基準",
            description: "学科・実技それぞれの基準点を満たす必要がある。"
          },
          {
            name: "出題範囲",
            description: "HTML/CSS、デザイン基礎、サイト設計・運用、法規・アクセシビリティ。"
          }
        ],
        exam_trend: [
          {
            name: "HTML/CSS",
            rate: "約35%",
            description: "文書構造、セレクタ、レイアウト、レスポンシブ対応。正しいマークアップと記述ルールが中心。"
          },
          {
            name: "デザイン基礎",
            rate: "約20%",
            description: "配色、タイポグラフィ、視線誘導、情報整理。読みやすさと伝達性の設計が問われる。"
          },
          {
            name: "サイト設計・運用",
            rate: "約25%",
            description: "要件定義、UI設計、更新運用、テスト、品質管理。"
          },
          {
            name: "法規・アクセシビリティ",
            rate: "約20%",
            description: "著作権、個人情報、JISアクセシビリティ、Web標準準拠。"
          }
        ],
        Markup: [
          {
            name: "1. HTML",
            children: [
              { name: "セマンティックタグ（header, main, section）" },
              { name: "フォーム要素とラベル関連付け" },
              { name: "見出し階層と文書構造" }
            ]
          },
          {
            name: "2. CSS",
            children: [
              { name: "ボックスモデルとdisplay" },
              { name: "Flexbox/Gridの使い分け" },
              { name: "レスポンシブ（media query）" }
            ]
          },
          {
            name: "3. 実技での注意",
            children: [
              { name: "クラス命名を一貫させる" },
              { name: "仕様どおりの余白・フォント設定" },
              { name: "相対パスとファイル構成を誤らない" }
            ]
          }
        ],
        Design: [
          {
            name: "1. レイアウト",
            children: [
              { name: "グリッドと整列" },
              { name: "余白設計（近接・整列）" },
              { name: "視線誘導（Z型/F型）" }
            ]
          },
          {
            name: "2. 配色と文字",
            children: [
              { name: "コントラスト比の確保" },
              { name: "可読性の高いフォント選択" },
              { name: "ブランドトーンに合わせた配色" }
            ]
          },
          {
            name: "3. UIの基本",
            children: [
              { name: "ボタンとリンクの識別" },
              { name: "入力フォームのエラー提示" },
              { name: "状態変化（hover/focus）の設計" }
            ]
          }
        ],
        Operation: [
          {
            name: "1. 要件と情報設計",
            children: [
              { name: "目的・ターゲットの定義" },
              { name: "サイトマップと導線設計" },
              { name: "ワイヤーフレーム作成" }
            ]
          },
          {
            name: "2. 実装運用",
            children: [
              { name: "バージョン管理の基本（Git）" },
              { name: "テスト観点（表示崩れ、リンク切れ）" },
              { name: "公開後の更新フロー" }
            ]
          },
          {
            name: "3. 品質管理",
            children: [
              { name: "チェックリストで再現性確保" },
              { name: "不具合報告の記録方法" },
              { name: "改善サイクル（PDCA）" }
            ]
          }
        ],
        Rules: [
          {
            name: "1. 法規",
            children: [
              { name: "著作権（画像・文章・フォント利用）" },
              { name: "個人情報保護とフォーム設計" },
              { name: "利用規約・プライバシーポリシー" }
            ]
          },
          {
            name: "2. アクセシビリティ",
            children: [
              { name: "代替テキスト（alt）" },
              { name: "キーボード操作対応" },
              { name: "色だけに依存しない情報提示" }
            ]
          },
          {
            name: "3. 合格のための演習",
            children: [
              { name: "学科: 用語定義を短文で暗記" },
              { name: "実技: 制限時間で模擬制作" },
              { name: "提出前に構文・表示チェックを固定化" }
            ]
          }
        ]
      },
      created() {
        this.filteredMarkup = JSON.parse(JSON.stringify(this.Markup));
        this.filteredDesign = JSON.parse(JSON.stringify(this.Design));
        this.filteredOperation = JSON.parse(JSON.stringify(this.Operation));
        this.filteredRules = JSON.parse(JSON.stringify(this.Rules));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesMarkup(newOpen) {
          this.openNodesMarkup = newOpen;
        },
        updateOpenNodesDesign(newOpen) {
          this.openNodesDesign = newOpen;
        },
        updateOpenNodesOperation(newOpen) {
          this.openNodesOperation = newOpen;
        },
        updateOpenNodesRules(newOpen) {
          this.openNodesRules = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredMarkup = JSON.parse(JSON.stringify(this.Markup));
            this.filteredDesign = JSON.parse(JSON.stringify(this.Design));
            this.filteredOperation = JSON.parse(JSON.stringify(this.Operation));
            this.filteredRules = JSON.parse(JSON.stringify(this.Rules));
            this.openNodesMarkup = [];
            this.openNodesDesign = [];
            this.openNodesOperation = [];
            this.openNodesRules = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredMarkup = filterTree(JSON.parse(JSON.stringify(this.Markup)));
          this.filteredDesign = filterTree(JSON.parse(JSON.stringify(this.Design)));
          this.filteredOperation = filterTree(JSON.parse(JSON.stringify(this.Operation)));
          this.filteredRules = filterTree(JSON.parse(JSON.stringify(this.Rules)));

          this.openNodesMarkup = this.collectAllNodeIds(this.filteredMarkup);
          this.openNodesDesign = this.collectAllNodeIds(this.filteredDesign);
          this.openNodesOperation = this.collectAllNodeIds(this.filteredOperation);
          this.openNodesRules = this.collectAllNodeIds(this.filteredRules);
        }
      }
    });
  </script>
</body>

</html>
