  <style>
    .code-block pre {
      background-color: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1em;
      overflow-x: auto;
      font-size: 0.85em;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .code-block code {
      color: #333;
    }

    .note-stepper-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start !important;
      gap: 12px 10px;
      align-items: stretch;
      padding: 8px 0 12px;
      height: auto !important;
      overflow: visible !important;
    }

    .note-stepper-header .v-stepper__step {
      flex: 0 0 calc((100% - 30px) / 4);
      max-width: calc((100% - 30px) / 4);
      min-width: 0;
      border: 0 !important;
      border-radius: 0;
      background: transparent !important;
      box-shadow: none !important;
      padding: 10px 28px 10px 8px;
      position: relative;
    }

    .note-stepper-header .v-stepper__label {
      display: inline-block;
      max-width: calc(100% - 28px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .note-stepper-header .v-stepper__step::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 4px;
      width: 22px;
      height: 2px;
      background: #b0bec5;
      transform: translateY(-50%);
    }

    .note-stepper-header .v-stepper__step:nth-child(4n)::after,
    .note-stepper-header .v-stepper__step:last-child::after {
      display: none;
    }

    @media (max-width: 780px) {
      .note-stepper-header .v-stepper__step {
        flex: 0 0 calc((100% - 10px) / 2);
        max-width: calc((100% - 10px) / 2);
        padding-right: 18px;
      }

      .note-stepper-header .v-stepper__step::after {
        display: block;
      }

      .note-stepper-header .v-stepper__step:nth-child(2n)::after,
      .note-stepper-header .v-stepper__step:last-child::after {
        display: none;
      }

      .note-stepper-header .v-stepper__label {
        display: inline-block !important;
        max-width: calc(100% - 24px);
        font-size: 12px;
      }
    }
  </style>
</head>

                              </v-treeview>

import random

def is_prime_miller_rabin(n, k=5):
    """
    n: 判定したい整数
    k: テスト回数（多いほど精度向上）
    """
    if n < 2:
        return False
    if n == 2 or n == 3:
        return True
    if n % 2 == 0:
        return False

    d = n - 1
    s = 0
    while d % 2 == 0:
        d //= 2
        s += 1

    for _ in range(k):
        a = random.randrange(2, n - 1)
        x = pow(a, d, n)  # a^d % n
        if x == 1 or x == n - 1:
            continue
        for _ in range(s - 1):
            x = pow(x, 2, n)
            if x == n - 1:
                break
        else:
            return False
    return True  # 高確率で素数

            this.openNodesPrimeNumberSearch = [];
            return;

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredMentalArithmetic = filterTree(JSON.parse(JSON.stringify(this.MentalArithmetic)));
          this.openNodesMentalArithmetic = this.collectAllNodeIds(this.filteredMentalArithmetic);
