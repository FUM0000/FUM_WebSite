<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="author" content="F U M">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-B89KY0993B');
  </script>

  <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

  <title>Various Statistics</title>

  <style>
    :root {
      --vs-bg: #eef2f4;
      --vs-hero-a: #0f766e;
      --vs-hero-b: #155e75;
      --vs-card-bg: #f9fbfc;
      --vs-border: #d5e3e7;
      --vs-text-strong: #12323b;
      --vs-text-soft: #53727a;
      --vs-accent: #0ea5a4;
    }

    #Main,
    #Main .v-main__wrap {
      background: linear-gradient(160deg, #e7eff1 0%, #f6fafb 100%);
    }

    .vs-wrap {
      max-width: 1100px;
    }

    .vs-hero {
      border-radius: 20px;
      padding: 28px;
      background: linear-gradient(130deg, var(--vs-hero-a) 0%, var(--vs-hero-b) 100%);
      color: #fff;
      box-shadow: 0 16px 36px rgba(9, 48, 60, 0.28);
      margin-bottom: 22px;
    }

    .vs-hero-title {
      font-size: clamp(26px, 4vw, 36px);
      line-height: 1.2;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .vs-hero-sub {
      color: rgba(231, 250, 255, 0.92);
      font-size: 15px;
      max-width: 760px;
    }

    .vs-panel {
      border-radius: 16px;
      border: 1px solid var(--vs-border);
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(16, 33, 40, 0.08);
      margin-bottom: 20px;
    }

    .vs-panel .v-card__text {
      padding: 18px 20px;
    }

    .vs-meta {
      color: var(--vs-text-soft);
      font-size: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .vs-stat-card {
      height: 100%;
      border-radius: 14px !important;
      border: 1px solid var(--vs-border);
      background: var(--vs-card-bg);
      box-shadow: 0 8px 18px rgba(18, 50, 59, 0.08);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .vs-stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 24px rgba(18, 50, 59, 0.14);
    }

    .vs-title {
      color: var(--vs-text-strong);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .vs-item {
      display: flex;
      gap: 8px;
      color: #2e4951;
      font-size: 0.94rem;
      margin-bottom: 8px;
      align-items: flex-start;
    }

    .vs-item:last-child {
      margin-bottom: 0;
    }

    .vs-item .v-icon {
      color: var(--vs-accent);
      margin-top: 1px;
    }

    .vs-source {
      color: #52727b;
      font-size: 0.82rem;
      padding-top: 8px;
      border-top: 1px dashed #c8dbe0;
      margin-top: 12px;
    }

    [v-cloak] {
      display: none;
    }
  </style>
</head>

<body>
  <v-app id="App" v-cloak>
    <template>
      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Various Statistics</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" class="pa-4 pa-md-6">
            <div class="vs-wrap mx-auto">
              <section class="vs-hero">
                <div class="vs-hero-title">Various Statistics</div>
                <div class="vs-hero-sub">
                  Curated insights on daily habits, health, work, and digital life, organized with evidence and practical actions.
                </div>
              </section>

              <v-card class="vs-panel">
                <v-card-text>
                  <v-row align="center" dense>
                    <v-col cols="12" md="6">
                      <v-select v-model="selectedCategory" :items="categories" item-text="text" item-value="value"
                        label="Category" outlined dense hide-details></v-select>
                    </v-col>
                    <v-col cols="12" md="6">
                      <div class="vs-meta">
                        <span><v-icon small class="mr-1">mdi-view-grid-outline</v-icon>{{ filteredStats.length }} items</span>
                        <span><v-icon small class="mr-1">mdi-filter-outline</v-icon>{{ categoryLabel }}</span>
                      </div>
                    </v-col>
                  </v-row>
                </v-card-text>
              </v-card>

              <v-row>
                <v-col cols="12" md="6" v-for="(stat, index) in filteredStats" :key="index">
                  <v-card class="vs-stat-card">
                    <v-card-text>
                      <v-chip small :color="categoryMeta(stat.category).color" dark class="mb-3">
                        {{ categoryMeta(stat.category).text }}
                      </v-chip>

                      <div class="vs-title">{{ stat.title }}</div>

                      <div class="vs-item">
                        <v-icon small>mdi-chart-line</v-icon>
                        <div><strong>Fact:</strong> {{ stat.fact }}</div>
                      </div>
                      <div class="vs-item">
                        <v-icon small>mdi-lightbulb-on-outline</v-icon>
                        <div><strong>Why:</strong> {{ stat.why }}</div>
                      </div>
                      <div class="vs-item">
                        <v-icon small>mdi-wrench-outline</v-icon>
                        <div><strong>Tip:</strong> {{ stat.tip }}</div>
                      </div>

                      <div class="vs-source">Source: {{ stat.source }}</div>
                    </v-card-text>
                  </v-card>
                </v-col>
              </v-row>
            </div>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        selectedCategory: 'all',
        categories: [
          { text: 'All', value: 'all', color: 'blue-grey darken-1' },
          { text: 'Daily Habits', value: 'daily-habits', color: 'teal darken-1' },
          { text: 'Health', value: 'health', color: 'green darken-1' },
          { text: 'Work & Study', value: 'work-study', color: 'indigo darken-1' },
          { text: 'Digital Life', value: 'digital-life', color: 'deep-orange darken-1' }
        ],
        stats: [
          {
            category: 'daily-habits',
            title: 'Morning Light and Circadian Rhythm',
            fact: 'Getting outdoor light soon after waking helps regulate the body clock.',
            why: 'Strong morning light is a primary cue for melatonin timing later in the day.',
            tip: 'Spend 10-20 minutes outside within the first hour after waking.',
            source: 'Guidelines in sleep and chronobiology'
          },
          {
            category: 'daily-habits',
            title: 'Too Many Options Slow Action',
            fact: 'Excessive choices tend to reduce decision quality and increase procrastination.',
            why: 'More options increase cognitive load and raise comparison costs.',
            tip: 'Limit frequent decisions, such as outfits, meals, and priorities, to 3-5 options.',
            source: 'Behavioral science research on choice overload and decision fatigue'
          },
          {
            category: 'health',
            title: 'Weekly Exercise Benchmark',
            fact: 'Adults are generally advised to complete at least 150 minutes of moderate activity per week.',
            why: 'This level is consistently linked to lower cardiovascular and metabolic risk.',
            tip: 'Split activity into five 30-minute sessions or three longer sessions.',
            source: 'WHO and national public health guidelines'
          },
          {
            category: 'health',
            title: 'Consistent Sleep and Wake Time',
            fact: 'Keeping sleep and wake times stable helps mood and metabolic indicators stay more stable.',
            why: 'Smaller circadian shifts support better sleep quality and daytime alertness.',
            tip: 'Keep weekday and weekend wake times within about one hour.',
            source: 'Chronobiology and sleep quality studies'
          },
          {
            category: 'work-study',
            title: 'Protected Focus Blocks Improve Output',
            fact: 'Even short uninterrupted focus periods raise completion rates for demanding tasks.',
            why: 'Task switching adds measurable re-focus costs and lowers efficiency.',
            tip: 'Use 45-60 minute focus blocks followed by 5-15 minute breaks.',
            source: 'Research on attention resources and productivity'
          },
          {
            category: 'work-study',
            title: 'Short Meetings, Clear Decisions',
            fact: 'Shorter meetings can reduce fatigue while maintaining decision quality.',
            why: 'Long meetings increase passive participation and reduce attention.',
            tip: 'Default to 25 or 50 minutes and end with three written action items.',
            source: 'Organizational behavior and meeting efficiency studies'
          },
          {
            category: 'digital-life',
            title: 'Night Screen Light Delays Sleep',
            fact: 'Bright screen exposure before bed tends to delay sleep onset.',
            why: 'Blue-enriched light suppresses melatonin and shifts sleep phase later.',
            tip: 'Enable night mode and lower brightness 1-2 hours before bedtime.',
            source: 'Sleep medicine research on evening light exposure'
          },
          {
            category: 'digital-life',
            title: 'Notifications Fragment Focus',
            fact: 'Frequent notifications reduce the time available for deep focus.',
            why: 'Even brief interruptions leave residual attention that slows task resumption.',
            tip: 'Batch notifications into 2-3 check windows per day.',
            source: 'HCI research on interruptions and attention'
          },
          {
            category: 'daily-habits',
            title: 'Too Much Sitting Harms Health',
            fact: 'Prolonged sitting is linked to higher risk of back pain and metabolic decline.',
            why: 'Extended low muscle activity reduces circulation and energy metabolism.',
            tip: 'Stand up every 30-60 minutes and move lightly for 1-2 minutes.',
            source: 'Exercise physiology and public health research'
          },
          {
            category: 'daily-habits',
            title: 'Protein at Breakfast Supports Satiety',
            fact: 'Higher protein intake at breakfast helps reduce daytime hunger.',
            why: 'Protein supports satiety hormones and may blunt rapid glucose spikes.',
            tip: 'Add one item such as eggs, yogurt, or soy foods to breakfast.',
            source: 'Nutrition and appetite regulation research'
          },
          {
            category: 'daily-habits',
            title: 'Writing Tasks Down Reduces Anxiety',
            fact: 'Externalizing tasks on paper or notes can reduce subjective anxiety.',
            why: 'Moving unstructured thoughts out of working memory lowers mental load.',
            tip: 'List 3-5 tasks for the next day before bed or before starting work.',
            source: 'Cognitive psychology and task management research'
          },
          {
            category: 'health',
            title: 'Strength Training Frequency',
            fact: 'Training major muscle groups at least twice per week is commonly recommended.',
            why: 'Maintaining muscle mass helps preserve function and daily performance with age.',
            tip: 'Sustain short sessions of bodyweight squats, push-ups, and hip hinges.',
            source: 'Exercise guidelines and resistance training research'
          },
          {
            category: 'health',
            title: 'Fiber Intake and Gut Health',
            fact: 'Higher dietary fiber intake is associated with better gut and metabolic indicators.',
            why: 'Gut microbes ferment fiber into short-chain fatty acids that support gut function.',
            tip: 'Include small portions of vegetables, legumes, and whole grains in each meal.',
            source: 'Nutritional epidemiology and microbiome research'
          },
          {
            category: 'health',
            title: 'Alcohol and Sleep Quality',
            fact: 'Drinking near bedtime may shorten sleep latency but often worsens later sleep quality.',
            why: 'Alcohol metabolism disrupts sleep architecture and increases nighttime awakenings.',
            tip: 'Avoid drinking right before bed and keep intake moderate.',
            source: 'Sleep medicine and alcohol metabolism research'
          },
          {
            category: 'work-study',
            title: 'Retrieval Practice Improves Retention',
            fact: 'Memory retention improves more when recall practice is added than by rereading alone.',
            why: 'The act of retrieval strengthens memory traces and access pathways.',
            tip: 'After studying, spend three minutes writing key points from memory.',
            source: 'Cognitive science research on the testing effect'
          },
          {
            category: 'work-study',
            title: 'The Illusion of Multitasking Efficiency',
            fact: 'Parallel work may feel faster but often increases total time and error rate.',
            why: 'The brain mostly switches rapidly rather than processing in true parallel, adding switch costs.',
            tip: 'Keep one primary task per work block, then move to the next after completion.',
            source: 'Experimental psychology and workplace efficiency research'
          },
          {
            category: 'work-study',
            title: 'Break Quality Drives Productivity',
            fact: 'Even short breaks recover attention better when they include posture and gaze changes.',
            why: 'Staying in the same posture and stimulus stream accelerates fatigue and distraction.',
            tip: 'During breaks, leave your seat and combine distance viewing, walking, and stretching.',
            source: 'Research on work fatigue and recovery behavior'
          },
          {
            category: 'digital-life',
            title: 'Passive Scrolling and Well-Being',
            fact: 'Aimless passive social media browsing is associated with lower mood in some studies.',
            why: 'Overexposure to comparison cues and low-reward time use may drive the effect.',
            tip: 'Set one clear goal before opening social apps, then stop once it is done.',
            source: 'Research on digital behavior and subjective well-being'
          },
          {
            category: 'digital-life',
            title: 'Keeping Devices Out of the Bedroom',
            fact: 'Reducing device use in the bedroom is linked to longer sleep duration.',
            why: 'It reduces both light stimulation and cognitive stimulation before sleep.',
            tip: 'Charge devices outside the bedroom and use a dedicated alarm clock.',
            source: 'Sleep hygiene intervention studies'
          },
          {
            category: 'digital-life',
            title: 'Continuous Short-Video Watching',
            fact: 'Binge-watching short videos often makes elapsed time feel shorter than it is.',
            why: 'Infinite-feed design weakens stopping cues and delays exit decisions.',
            tip: 'Set an end time and start a timer before opening short-video apps.',
            source: 'Media use behavior research'
          }
        ]
      },
      computed: {
        filteredStats() {
          if (this.selectedCategory === 'all') {
            return this.stats;
          }
          return this.stats.filter((item) => item.category === this.selectedCategory);
        },
        categoryLabel() {
          return this.categoryMeta(this.selectedCategory).text;
        }
      },
      methods: {
        categoryMeta(category) {
          return this.categories.find((c) => c.value === category) || this.categories[0];
        }
      }
    });
  </script>
</body>

</html>
