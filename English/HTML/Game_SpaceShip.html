        // =================================================================================
        // 蠑ｾ繧ｯ繝ｩ繧ｹ (C_Bullet)
        // =================================================================================
        class C_Bullet extends FC_GameObject {
            _Speed = 12; 
            _Lifespan = 2; 
            _Timer_Life = new FC_Timer(this._Lifespan);
            _IsActive = true;
            get IsActive() { return this._IsActive; }

            constructor(_position, _rotationZ) {
                super();
                const geometry = new THREE.SphereGeometry(0.15, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
                this._Object = new THREE.Mesh(geometry, material);
                this.Position = _position;
                this._Object.rotation.z = _rotationZ;
                Scene.add(this._Object);
                this._Timer_Life.Restart();
            }

            Update() {
                if (!this._IsActive) return;

                const direction = new THREE.Vector3(0, 1, 0);
                direction.applyQuaternion(this._Object.quaternion);
                this.Position.add(direction.multiplyScalar(this._Speed * FC_Environment.TIME_DELTA));

                this._Timer_Life.Update();
                if (this._Timer_Life.Flag_Finished) this.Destroy();
            }

            Destroy() {
                if (!this._IsActive) return;
                this._IsActive = false;
                Scene.remove(this._Object);
            }
        }

        // =================================================================================
        // 繝峨Ο繝・・繧｢繧､繝・Β繧ｯ繝ｩ繧ｹ (C_Item_Drop)
        // =================================================================================
        class C_Item_Drop extends FC_GameObject {
            static LIFESPAN = 30.0;
            static BLINK_SLOW_START = 15.0;
            static BLINK_FAST_START = 3.75;

            _Lifespan = C_Item_Drop.LIFESPAN;
            _Timer_Life = new FC_Timer(C_Item_Drop.LIFESPAN);
            _IsActive = true;
            get IsActive() { return this._IsActive; }
            _Radius = 0.3;
            _Type = 'energy'; // 'energy' or 'ammo' or 'metal' or 'money'
            get Type() { return this._Type; }
            _Value = 0;
            get Value() { return this._Value; }
            _Label;
            _BlinkPhase = 0;
            _BlinkVisible = true;
            _Velocity = new THREE.Vector3();


            constructor(_position, _type, _value = null, _velocity = null) {
                super();
                this._Type = _type;
                let color;
                if(this._Type === 'energy') {
                    color = 0x00FF88;
                    this._Value = _value ?? 50;
                } else if (this._Type === 'metal') {
                    color = 0xA8C8FF;
                    this._Value = _value ?? 1;
                } else if (this._Type === 'money') {
                    color = 0x7CFF7C;
                    this._Value = _value ?? 12;
                } else { // ammo
                    color = 0xFFD700;
                    this._Value = _value ?? 8;
                }

                const geometry = new THREE.IcosahedronGeometry(this._Radius, 0);
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.1,
                    flatShading: true
                });
                this._Object = new THREE.Mesh(geometry, material);
                this.Position = _position;
                if (_velocity) this._Velocity.copy(_velocity);
                this._Label = this.CreateLabel();
                this._Label.position.set(0, 0.7, 0);
                this._Object.add(this._Label);
                Scene.add(this._Object);
                this._Timer_Life.Restart();
            }

            CreateLabel() {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 96;
                const context = canvas.getContext('2d');
                context.clearRect(0, 0, canvas.width, canvas.height);
                context.font = 'bold 38px "Space Mono"';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.lineWidth = 8;
                context.strokeStyle = 'rgba(0, 0, 0, 0.75)';
                context.fillStyle = this._Type === 'energy' ? '#00FF88' : this._Type === 'metal' ? '#A8C8FF' : this._Type === 'money' ? '#7CFF7C' : '#FFD700';
                const label = this._Type === 'energy'
                    ? `+${this._Value} ENERGY`
                    : this._Type === 'metal'
                        ? `+${this._Value} RARE METAL`
                        : this._Type === 'money'
                            ? `+${this._Value} CREDITS`
                        : `+${this._Value} AMMO`;
                context.strokeText(label, canvas.width / 2, canvas.height / 2);
                context.fillText(label, canvas.width / 2, canvas.height / 2);

                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    depthTest: false,
                });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(2.1, 0.8, 1);
                return sprite;
            }

            Update() {
                if (!this._IsActive) return;

                const timeRemaining = Math.max(0, this._Lifespan - this._Timer_Life._Timer);
                this.Position.add(this._Velocity.clone().multiplyScalar(FC_Environment.TIME_DELTA));
                this._Velocity.multiplyScalar(0.93);
                this._Object.rotation.z += FC_Environment.TIME_DELTA * 1.4;
                if (this._Label) this._Label.material.rotation = 0;

                if (timeRemaining <= C_Item_Drop.BLINK_FAST_START) {
                    const urgency = 1 - timeRemaining / C_Item_Drop.BLINK_FAST_START;
                    const blinkRate = THREE.MathUtils.lerp(11, 26, urgency * urgency);
                    this.#ApplyBlink(blinkRate);
                } else if (timeRemaining <= C_Item_Drop.BLINK_SLOW_START) {
                    const slowSpan = C_Item_Drop.BLINK_SLOW_START - C_Item_Drop.BLINK_FAST_START;
                    const slowProgress = 1 - (timeRemaining - C_Item_Drop.BLINK_FAST_START) / slowSpan;
                    const blinkRate = THREE.MathUtils.lerp(1.1, 3.2, slowProgress);
                    this.#ApplyBlink(blinkRate);
                } else {
                    this.#SetVisible(true);
                }

                this._Timer_Life.Update();
                if (this._Timer_Life.Flag_Finished) this.Destroy();
            }

            #ApplyBlink(_rate) {
                this._BlinkPhase += FC_Environment.TIME_DELTA * _rate;
                const shouldBeVisible = Math.floor(this._BlinkPhase) % 2 === 0;
                if (shouldBeVisible !== this._BlinkVisible) {
                    this.#SetVisible(shouldBeVisible);
                }
            }

            #SetVisible(_visible) {
                this._BlinkVisible = _visible;
                this._Object.visible = _visible;
                if (this._Label) this._Label.visible = _visible;
            }

            Destroy() {
                if (!this._IsActive) return;
                this._IsActive = false;
                this._Object.visible = false;
                if (this._Label?.material?.map) this._Label.material.map.dispose();
                if (this._Label?.material) this._Label.material.dispose();
                Scene.remove(this._Object);
            }
        }


        // =================================================================================
        // 謨ｵ・医い繧ｹ繝・Ο繧､繝会ｼ峨け繝ｩ繧ｹ (C_Enemy_Asteroid)
        // =================================================================================
        class C_Enemy_Asteroid extends FC_GameObject {
            _Speed = 1;
            _Velocity = new THREE.Vector3();
            _IsActive = true;
            get IsActive() { return this._IsActive; }
            _Radius = 1;

            constructor() {
                super();
                this._Object = CreateAsteroidMesh(this._Radius);
                Scene.add(this._Object);
                this.Initialize();
            }

            Initialize() {
                const cameraZ = Camera.Object.position.z;
                const distance = -cameraZ;
                const vFov = THREE.MathUtils.degToRad(Camera.Object.fov);
                const height = 2 * Math.tan(vFov / 2) * distance;
                const width = height * Camera.Object.aspect;
                const cameraCenter = Camera.Position_LookAt;
                const spawnOffset = 2.0;
                const side = Math.floor(Math.random() * 4);
                let x, y;

                switch (side) {
                    case 0: x = RandomNumber_Between(cameraCenter.x - width / 2, cameraCenter.x + width / 2); y = cameraCenter.y + height / 2 + spawnOffset; break;
                    case 1: x = RandomNumber_Between(cameraCenter.x - width / 2, cameraCenter.x + width / 2); y = cameraCenter.y - height / 2 - spawnOffset; break;
                    case 2: x = cameraCenter.x + width / 2 + spawnOffset; y = RandomNumber_Between(cameraCenter.y - height / 2, cameraCenter.y + height / 2); break;
                    case 3: x = cameraCenter.x - width / 2 - spawnOffset; y = RandomNumber_Between(cameraCenter.y - height / 2, cameraCenter.y + height / 2); break;
                }
                this.Position = new THREE.Vector3(x, y, 0);

                const targetPos = new THREE.Vector3(
                    RandomNumber_Between(cameraCenter.x - width / 3, cameraCenter.x + width / 3),
                    RandomNumber_Between(cameraCenter.y - height / 3, cameraCenter.y + height / 3),
                    0
                );
                this._Velocity = targetPos.sub(this.Position).normalize();
                this._Speed = RandomNumber_Between(2.5 / 3, 4.5 / 3);
            }

            Update() {
                if (!this._IsActive) return;
                this.Position.add(this._Velocity.clone().multiplyScalar(this._Speed * FC_Environment.TIME_DELTA));
                this._Object.rotation.x += FC_Environment.TIME_DELTA * 0.35;
                this._Object.rotation.y += FC_Environment.TIME_DELTA * 0.28;
                if (this.Position.distanceTo(Player.Position) > 50) this.Destroy();
            }

            Destroy() {
                if (!this._IsActive) return;
                this._IsActive = false;
                if (typeof Manager !== "undefined" && Manager?.SpawnEnemyBurst) {
                    Manager.SpawnEnemyBurst(this.Position.clone(), 0xffa24a);
                }
                Scene.remove(this._Object);
            }
        }

        class C_Manager extends FC_Manager {

            _Joystick = new FC_Input_Joystick(document.getElementById("Joystick"));
            _Keyboard = new FC_Input_Keyboard();

                super(Scene, Renderer);
                this.BGM = '../../Asset/Audio/wave_1.wav';

                Scene.fog = new THREE.Fog(0x222222, 0, 0);

                super.Initialize();

                Player.Initialize();
                Camera.Initialize();
                Camera.Target = Player;
                Camera.Object.far = 1000;
                Camera.Object.updateProjectionMatrix();

                this._Bullets.forEach(b => b.Destroy());
                this._Bullets = [];
                this._EnemyBullets.forEach(b => b.Destroy());
                this._EnemyBullets = [];
                this._Enemies.forEach(e => e.Destroy());
                this._Enemies = [];
                this._Drops.forEach(d => d.Destroy());
                this._Drops = [];
                this._Effects.forEach(effect => effect.Destroy());
                this._Effects = [];

                this._Score = 0;
                this._UI_Score.Text = "SCORE: 0";
                this._Boost_Button_Enabled = false;
                this._Timer_AsteroidSpawn.Time_Limit = 1.0;
                this._Timer_AsteroidSpawn.Restart();
                this._Timer_ShooterSpawn.Time_Limit = 12.0;
                this._Timer_ShooterSpawn.Restart();

                this._UI_Gameover.Hide();
                this._UI_Gameover.Position = new THREE.Vector3(0, 0, -8);

            #ShowWaitingUI() {
                this._UI_Start.Show();
                this._UI_Tap.Show();
                this._UI_Tap.Fog = false;
            }

            #EnterWaitingStart() {
                Scene.fog = null;
                this.Initialize();
                this._State = "Waiting_Start";
                this.#ShowWaitingUI();
            }

            Update() {

                if (this._State == "Before_Loaded") {
                    this._State = "Loaded";
                    super.Fade(true);
                    this.#EnterWaitingStart();
                }
                else {
                    this._Keyboard.Update();
                    this.#ProcessMovementInput();
                    this.#UpdateBoostState();

                    switch (this._State) {
                        case "Waiting":
                            this._Timer_Waiting.Update();
                            if (this._Timer_Waiting.Flag_Finished) {
                                this._State = "Waiting_Start";
                                this.#ShowWaitingUI();
                            }
                            break;
                        case "Playing": Manager.#Update_Playing(); break;
                    }
                    Manager.#Update_System();
                }

                Renderer.render(Scene, Camera.Object);
                requestAnimationFrame(this.Update.bind(this));
            }


            Start() {
                super.Start();
                this._UI_Start.Animation_Move(new THREE.Vector3(0, 1, 0), 1);
                this._UI_Tap.Animation_Move(new THREE.Vector3(0, -1, 0), 1);
            }
            GameOver() {
                super.GameOver();
                this._UI_Gameover.Position = new THREE.Vector3(Camera.Position_LookAt.x, Camera.Position_LookAt.y + 0.5, -8);
                this._UI_Gameover.Text = `GAMEOVER\nSCORE: ${this._Score}`;
                this._UI_Gameover.Show();
            }

            Shoot() {
                if (this._State !== "Playing") return;
                const bullet = Player.Shoot();
                if (bullet) this._Bullets.push(bullet);
            }

            ToggleBoostButton() {
                this._Boost_Button_Enabled = !this._Boost_Button_Enabled;
                this.#UpdateBoostState();
            }

            #SpawnEnemy() {
                this._Timer_AsteroidSpawn.Update();
                const asteroidCount = this._Enemies.filter(enemy => enemy.IsActive && enemy instanceof C_Enemy_Asteroid).length;
                if (this._Timer_AsteroidSpawn.Flag_Finished && asteroidCount < 1) {
                    this._Enemies.push(new C_Enemy_Asteroid());
                    this._Timer_AsteroidSpawn.Restart();
                }

                this._Timer_ShooterSpawn.Update();
                if (this._Timer_ShooterSpawn.Flag_Finished) {
                    this._Enemies.push(new C_Enemy_Shooter());
                    this._Timer_ShooterSpawn.Restart();
                }
            }

            #CheckCollisions() {
                // 蠑ｾ vs 謨ｵ
                for (let i = this._Bullets.length - 1; i >= 0; i--) {
                    const bullet = this._Bullets[i];
                    if (!bullet.IsActive) continue;
                    if (this._MotherShip.IsShieldBlocking(bullet.Position) || this._Shop.IsShieldBlocking(bullet.Position)) {
                        bullet.Destroy();
                        continue;
                    }

                    for (let j = this._Enemies.length - 1; j >= 0; j--) {
                    const enemy = this._Enemies[j];
                        if (!enemy.IsActive) continue;

                        if (bullet.Position.distanceTo(enemy.Position) < enemy._Radius) {
                            bullet.Destroy();
                            this.#SpawnDrops(enemy);
                            enemy.Destroy();

                            this._Score += 100;
                            this._UI_Score.Text = `SCORE: ${this._Score}`;
                            break;
                        }
                    }
                }

                // 繝励Ξ繧､繝､繝ｼ vs 謨ｵ
                for (let i = this._Enemies.length - 1; i >= 0; i--) {
                    const enemy = this._Enemies[i];
                    if (!enemy.IsActive) continue;
                    if (this._MotherShip.IsShieldBlocking(enemy.Position, enemy._Radius * 0.65) || this._Shop.IsShieldBlocking(enemy.Position, enemy._Radius * 0.65)) {
                        enemy.Destroy();
                        continue;
                    }
                    if (Player.Position.distanceTo(enemy.Position) < Player._Radius + enemy._Radius) {
                        enemy.Destroy();
                        Player.TakeDamage(25);
                    }
                }

                for (let i = this._EnemyBullets.length - 1; i >= 0; i--) {
                    const bullet = this._EnemyBullets[i];
                    if (!bullet.IsActive) continue;
                    if (this._MotherShip.IsShieldBlocking(bullet.Position, bullet._Radius) || this._Shop.IsShieldBlocking(bullet.Position, bullet._Radius)) {
                        bullet.Destroy();
                        continue;
                    }
                    if (Player.Position.distanceTo(bullet.Position) < Player._Radius + bullet._Radius) {
                        bullet.Destroy();
                        Player.TakeDamage(10);
                    }
                }

                // 繝励Ξ繧､繝､繝ｼ vs 繝峨Ο繝・・繧｢繧､繝・Β
                for (let i = this._Drops.length - 1; i >= 0; i--) {
                    const drop = this._Drops[i];
                    if (!drop.IsActive) continue;
                    if (Player.Position.distanceTo(drop.Position) < Player._Radius + drop._Radius) {
                        Player.Collect_Item(drop);
                        drop.Destroy();
                    }
                }
            }

                const quaternion_tilt_x_4 = new THREE.Quaternion();
                quaternion_tilt_y_4.setFromAxisAngle(new THREE.Vector3(0, 1, 0), THREE.MathUtils.degToRad(-30));
                quaternion_tilt_x_4.setFromAxisAngle(new THREE.Vector3(1, 0, 0), THREE.MathUtils.degToRad(-30));
                quaternion_4.multiply(quaternion_tilt_y_4);
                quaternion_4.multiply(quaternion_tilt_x_4);

            #Update_Playing() {
                Player.Update(this._Input_Move);
                Camera.Update(Player);

                this._UI_Start.Update();
                this._UI_Tap.Update();

                this._MotherShip.Update();
                Player.SetReplenishActive(this._MotherShip.Check(Player.Position));
                this._Shop.Update();
                Player.SetShopAvailable(this._Shop.Check(Player.Position));

                this._Particle_Move.Update();

                this.#SpawnEnemy();

                this._Bullets.forEach(b => b.Update());
                this._Enemies.forEach(e => {
                    e.Update();
                    if (typeof e.TryShoot === 'function') {
                        const enemyBullet = e.TryShoot();
                        if (enemyBullet) this._EnemyBullets.push(enemyBullet);
                    }
                });
                this._EnemyBullets.forEach(b => b.Update());
                this._Drops.forEach(d => d.Update());
                this._Effects.forEach(effect => effect.Update());

                this.#CheckCollisions();

                this._Bullets = this._Bullets.filter(b => b.IsActive);
                this._EnemyBullets = this._EnemyBullets.filter(b => b.IsActive);
                this._Enemies = this._Enemies.filter(e => e.IsActive);
                this._Drops = this._Drops.filter(d => d.IsActive);
                this._Effects = this._Effects.filter(effect => effect.IsActive);
            }

            #ProcessMovementInput() {
                const raw = this._Joystick.getInput().add(this._Keyboard.Input_Move);
                const deadZone = 0.14;

                if (raw.length() < deadZone) {
                    this._SmoothedInput.lerp(new THREE.Vector2(0, 0), GetSmoothFactor(14));
                    this._Input_Move = this._SmoothedInput;
                    return;
                }

                const magnitude = Math.min(1, (raw.length() - deadZone) / (1 - deadZone));
                const target = raw.clone().normalize().multiplyScalar(magnitude);
                this._SmoothedInput.lerp(target, GetSmoothFactor(this._InputSmoothing));
                this._Input_Move = this._SmoothedInput;
            }

            #UpdateBoostState() {
                Player.Flag_Boost = this._Boost_Button_Enabled || this._Keyboard.IsPressed('shift');
            }

            #SpawnDrops(_enemy) {
                let drops = [];
                if (_enemy instanceof C_Enemy_Asteroid) {
                    drops = [
                        { type: 'metal', value: 1 }
                    ];
                } else {
                    drops = [
                        { type: 'energy', value: 10 },
                        { type: 'ammo', value: 2 },
                        { type: 'money', value: Math.round(RandomNumber_Between(12, 20)) }
                    ];
                }

                drops.forEach((dropData, index) => {
                    const angle = (Math.PI * 2 * index) / drops.length + Math.random() * 0.45;
                    const velocity = new THREE.Vector3(Math.cos(angle), Math.sin(angle), 0).multiplyScalar(1.2 + Math.random() * 0.6);
                    const drop = new C_Item_Drop(_enemy.Position.clone(), dropData.type, dropData.value, velocity);
                    this._Drops.push(drop);
                });
            }

            SpawnEnemyBurst(_position, _color) {
                this._Effects.push(new C_Destroy_Effect(_position, _color));
            }
        }

        class C_Enemy_Bullet extends FC_GameObject {
            _Speed = 3.2;
            _Velocity = new THREE.Vector3();
            _Lifespan = 4;
            _Timer_Life = new FC_Timer(this._Lifespan);
            _IsActive = true;
            _Radius = 0.22;
            get IsActive() { return this._IsActive; }

            constructor(_position, _velocity) {
                super();
                const geometry = new THREE.SphereGeometry(this._Radius, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: 0xFF5555 });
                this._Object = new THREE.Mesh(geometry, material);
                this.Position = _position;
                this._Velocity = _velocity.clone().normalize();
                Scene.add(this._Object);
                this._Timer_Life.Restart();
            }

            Update() {
                if (!this._IsActive) return;

                this.Position.add(this._Velocity.clone().multiplyScalar(this._Speed * FC_Environment.TIME_DELTA));
                this._Timer_Life.Update();
                if (this._Timer_Life.Flag_Finished || this.Position.distanceTo(Player.Position) > 55) this.Destroy();
            }

            Destroy() {
                if (!this._IsActive) return;
                this._IsActive = false;
                Scene.remove(this._Object);
            }
        }

        function GetSmoothFactor(_speed) {
            return 1 - Math.exp(-_speed * FC_Environment.TIME_DELTA);
        }

        class C_Exhaust_Trail {
            _Owner;
            _Color;
            _Scale;
            _Particles = [];
            _SpawnAccumulator = 0;

            constructor(_owner, _color = 0x00ff88, _scale = 1) {
                this._Owner = _owner;
                this._Color = new THREE.Color(_color);
                this._Scale = _scale;
            }

            Update(_velocity, _facingDirection, _isBoosting = false) {
                if (_velocity.lengthSq() > 0.0005) {
                    const spawnRate = _isBoosting ? 38 : 20;
                    this._SpawnAccumulator += FC_Environment.TIME_DELTA * spawnRate;
                    while (this._SpawnAccumulator >= 1) {
                        this._SpawnAccumulator -= 1;
                        this.#SpawnParticle(_facingDirection, _isBoosting);
                    }
                } else {
                    this._SpawnAccumulator = 0;
                }

                for (let i = this._Particles.length - 1; i >= 0; i--) {
                    const particle = this._Particles[i];
                    particle.life -= FC_Environment.TIME_DELTA;
                    if (particle.life <= 0) {
                        Scene.remove(particle.mesh);
                        this._Particles.splice(i, 1);
                        continue;
                    }

                    particle.mesh.position.add(particle.velocity.clone().multiplyScalar(FC_Environment.TIME_DELTA * 60));
                    const alpha = particle.life / particle.maxLife;
                    particle.mesh.material.opacity = alpha * 0.65;
                    particle.mesh.scale.setScalar(particle.size * alpha);
                }
            }

            #SpawnParticle(_facingDirection, _isBoosting) {
                const backward = _facingDirection.clone().normalize().multiplyScalar(-1);
                const angle = (Math.random() - 0.5) * Math.PI / 9;
                const rotatedX = backward.x * Math.cos(angle) - backward.y * Math.sin(angle);
                const rotatedY = backward.x * Math.sin(angle) + backward.y * Math.cos(angle);
                const speed = _isBoosting ? 0.12 : 0.06;
                const velocity = new THREE.Vector3(rotatedX * speed, rotatedY * speed, 0);
                const position = this._Owner.Position.clone().add(backward.multiplyScalar(this._Owner._Radius * 1.25));

                const mesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08 * this._Scale, 6, 6),
                    new THREE.MeshBasicMaterial({ color: this._Color, transparent: true, opacity: 0.55 })
                );
                mesh.position.copy(position);
                Scene.add(mesh);

                this._Particles.push({
                    mesh: mesh,
                    velocity: velocity,
                    life: 0.28 * this._Scale,
                    maxLife: 0.28 * this._Scale,
                    size: 1 + Math.random() * 0.7
                });
            }

            Destroy() {
                this._Particles.forEach(particle => Scene.remove(particle.mesh));
                this._Particles = [];
            }
        }

        class C_Destroy_Effect {
            _IsActive = true;
            get IsActive() { return this._IsActive; }
            _Particles = [];

            constructor(_position, _color) {
                const baseColor = new THREE.Color(_color);

                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.5;
                    const speed = 0.05 + Math.random() * 0.08;
                    const life = 0.45 + Math.random() * 0.2;
                    const mesh = new THREE.Mesh(
                        new THREE.SphereGeometry(0.08 + Math.random() * 0.05, 6, 6),
                        new THREE.MeshBasicMaterial({
                            color: baseColor,
                            transparent: true,
                            opacity: 0.9
                        })
                    );
                    mesh.position.copy(_position);
                    Scene.add(mesh);

                    this._Particles.push({
                        mesh: mesh,
                        velocity: new THREE.Vector3(Math.cos(angle) * speed, Math.sin(angle) * speed, 0),
                        life: life,
                        maxLife: life
                    });
                }
            }

            Update() {
                if (!this._IsActive) return;

                let hasAliveParticle = false;
                this._Particles.forEach(particle => {
                    if (particle.life <= 0) return;

                    hasAliveParticle = true;
                    particle.life -= FC_Environment.TIME_DELTA;
                    particle.mesh.position.add(particle.velocity.clone().multiplyScalar(FC_Environment.TIME_DELTA * 60));
                    particle.velocity.multiplyScalar(0.93);
                    const alpha = Math.max(0, particle.life / particle.maxLife);
                    particle.mesh.material.opacity = alpha * 0.9;
                    particle.mesh.scale.setScalar(Math.max(0.12, 0.35 + (1 - alpha) * 0.9));
                    particle.mesh.visible = alpha > 0;
                });

                if (!hasAliveParticle) {
                    this.Destroy();
                }
            }

            Destroy() {
                if (!this._IsActive) return;
                this._IsActive = false;
                this._Particles.forEach(particle => {
                    Scene.remove(particle.mesh);
                    particle.mesh.geometry.dispose();
                    particle.mesh.material.dispose();
                });
                this._Particles = [];
            }
        }

        class C_Enemy_Shooter extends FC_GameObject {
            _Speed = 0.62;
            _Velocity = new THREE.Vector3();
            _IsActive = true;
            _Radius = 0.5;
            _Shoot_Cooldown = new FC_Timer(RandomNumber_Between(2.6, 3.8));
            _FacingDirection = new THREE.Vector3(0, 1, 0);
            _Trail;
            _Timer_Wander = new FC_Timer(RandomNumber_Between(1.3, 2.8));
            _WanderDirection = new THREE.Vector3(0, 1, 0);
            _AggroRange = 8.5;
            _AttackRange = 12.5;
            get IsActive() { return this._IsActive; }

            constructor() {
                super();

                this._Object = CreateShipMesh(0xcc3344, 0x661828, this._Radius, 0xffb0b8);
                this._Trail = new C_Exhaust_Trail(this, 0xff8855, 0.75);
                Scene.add(this._Object);
                this.Initialize();
            }

            Initialize() {
                const spawnDistance = 14;
                const angle = Math.random() * Math.PI * 2;
                this.Position = Player.Position.clone().add(new THREE.Vector3(
                    Math.cos(angle) * spawnDistance,
                    Math.sin(angle) * spawnDistance,
                    0
                ));

                this._Velocity = Player.Position.clone().sub(this.Position).normalize();
                this._FacingDirection.copy(this._Velocity);
                this._Object.rotation.z = Math.atan2(-this._FacingDirection.x, this._FacingDirection.y);
                this.#ResetWanderDirection();
                this._Shoot_Cooldown.Time_Limit = RandomNumber_Between(2.6, 3.8);
                this._Shoot_Cooldown.Restart();
                this._Timer_Wander.Time_Limit = RandomNumber_Between(1.3, 2.8);
                this._Timer_Wander.Restart();
            }

            TryShoot() {
                if (!this._IsActive) return null;

                this._Shoot_Cooldown.Update();
                if (!this._Shoot_Cooldown.Flag_Finished) return null;

                const toPlayer = Player.Position.clone().sub(this.Position);
                if (toPlayer.lengthSq() === 0 || toPlayer.length() > this._AttackRange) return null;

                const playerLag = Player._Velocity.clone().multiplyScalar(-RandomNumber_Between(0.25, 0.8));
                const randomOffset = new THREE.Vector3(
                    RandomNumber_Between(-1.2, 1.2),
                    RandomNumber_Between(-1.2, 1.2),
                    0
                );
                const aimPoint = Player.Position.clone().add(playerLag).add(randomOffset);
                const aimDirection = aimPoint.sub(this.Position);
                if (aimDirection.lengthSq() === 0) return null;

                this._Shoot_Cooldown.Time_Limit = RandomNumber_Between(2.6, 3.8);
                this._Shoot_Cooldown.Restart();
                const shotDirection = this._FacingDirection.clone().normalize();
                const shotPosition = this.Position.clone().add(shotDirection.multiplyScalar(this._Radius));
                return new C_Enemy_Bullet(shotPosition, aimDirection.normalize());
            }

            Update() {
                if (!this._IsActive) return;

                const toPlayer = Player.Position.clone().sub(this.Position);
                const distance = toPlayer.length();
                this._Timer_Wander.Update();
                if (this._Timer_Wander.Flag_Finished) {
                    this.#ResetWanderDirection();
                    this._Timer_Wander.Time_Limit = RandomNumber_Between(1.3, 2.8);
                    this._Timer_Wander.Restart();
                }

                if (distance > 0.001) {
                    let desiredDirection = this._WanderDirection.clone().multiplyScalar(0.45);
                    if (distance < this._AggroRange) {
                        desiredDirection = toPlayer.normalize();
                    } else if (distance < this._AttackRange) {
                        desiredDirection = toPlayer.normalize().multiplyScalar(0.55).add(this._WanderDirection.clone().multiplyScalar(0.45));
                    }

                    if (distance < 3.5) {
                        desiredDirection.add(toPlayer.normalize().multiplyScalar(-0.8));
                    }

                    if (desiredDirection.lengthSq() > 0.0001) desiredDirection.normalize();

                    const targetVelocity = desiredDirection.multiplyScalar(this._Speed);
                    this._Velocity.lerp(targetVelocity, GetSmoothFactor(1.8));
                    this.Position.add(this._Velocity.clone().multiplyScalar(FC_Environment.TIME_DELTA));

                    if (this._Velocity.lengthSq() > 0.0001) {
                        const desiredFacing = this._Velocity.clone().normalize();
                        this._FacingDirection.lerp(desiredFacing, GetSmoothFactor(3.2));
                        this._FacingDirection.normalize();
                        this._Object.rotation.z = Math.atan2(-this._FacingDirection.x, this._FacingDirection.y);
                    }
                }

                this._Trail.Update(this._Velocity, this._FacingDirection, false);

                if (this.Position.distanceTo(Player.Position) > 60) this.Destroy();
            }

            #ResetWanderDirection() {
                this._WanderDirection = new THREE.Vector3(
                    RandomNumber_Between(-1, 1),
                    RandomNumber_Between(-1, 1),
                    0
                );
                if (this._WanderDirection.lengthSq() < 0.001) {
                    this._WanderDirection.set(0, 1, 0);
                }
                this._WanderDirection.normalize();
            }

            Destroy() {
                if (!this._IsActive) return;
                this._IsActive = false;
                if (typeof Manager !== "undefined" && Manager?.SpawnEnemyBurst) {
                    Manager.SpawnEnemyBurst(this.Position.clone(), 0xff6666);
                }
                this._Trail.Destroy();
                Scene.remove(this._Object);
            }
        }
