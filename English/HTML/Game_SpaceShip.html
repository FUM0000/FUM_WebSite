                this._Shoot_Cooldown.Finish();
            }
            Update(_input) {
                this._Shoot_Cooldown.Update();
                const stickMagnitude = _input ? Math.min(1, _input.length()) : 0;
                let direction = new THREE.Vector3();
                if (stickMagnitude > 0.0001) {
                    direction = new THREE.Vector3(-_input.x, _input.y, 0).normalize();
                }
                this.Move(direction, stickMagnitude);
                this.#UpdateReplenishment();
            }

            get SpeedRatio() {
                return THREE.MathUtils.clamp(
                    this._Velocity.length() / (this._MaxSpeed * (this._Flag_Boost ? 1.45 : 1)),
                    0,
                    1
                );
            }

            Move(_stickDirection, _stickMagnitude = 0) {
                const hasInput = _stickDirection.lengthSq() > 0.0001;
                this._Flag_Thrusting = false;
                this._Flag_Braking = false;
                this._ThrustIntensity = THREE.MathUtils.lerp(this._ThrustIntensity, 0, GetSmoothFactor(8));
                this._BrakeIntensity = THREE.MathUtils.lerp(this._BrakeIntensity, 0, GetSmoothFactor(8));

                if (hasInput) {
                    const inputDirection = _stickDirection.clone().normalize();
                    const facing = this._FacingDirection.clone().normalize();
                    const travelDirection = this._Velocity.lengthSq() > 0.0004
                        ? this._Velocity.clone().normalize()
                        : facing;
                    const angleFromFacing = Math.acos(THREE.MathUtils.clamp(facing.dot(inputDirection), -1, 1));
                    const angleFromTravel = Math.acos(THREE.MathUtils.clamp(travelDirection.dot(inputDirection), -1, 1));
                    const turnRate = 0.45 + 0.75 * _stickMagnitude;

                    this._FacingDirection.lerp(inputDirection, GetSmoothFactor(turnRate));
                    this._FacingDirection.normalize();
                    const facingAngle = Math.atan2(-this._FacingDirection.x, this._FacingDirection.y);
                    let angleDelta = facingAngle - this._LastFacingAngle;
                    if (angleDelta > Math.PI) angleDelta -= Math.PI * 2;
                    if (angleDelta < -Math.PI) angleDelta += Math.PI * 2;
                    this._LastFacingAngle = facingAngle;
                    this._BankRoll = THREE.MathUtils.lerp(this._BankRoll, THREE.MathUtils.clamp(-angleDelta * 3.2, -0.42, 0.42), GetSmoothFactor(11));
                    this._Object.rotation.z = facingAngle;
                    this._Object.rotation.x = this._BankRoll * 0.38;

                    if (angleFromFacing <= Math.PI * 0.5) {
                        this._Flag_Thrusting = true;
                        const alignmentFactor = Math.cos(angleFromFacing);
                        const maxSpeed = this._MaxSpeed * (this._Flag_Boost ? 1.45 : 1);
                        let acceleration = this._Acceleration * alignmentFactor * (0.55 + 0.45 * _stickMagnitude);
                        let energyRate = 1.85;
                        if (this._Flag_Boost) {
                            acceleration *= 1.85;
                            energyRate *= 1.8;
                        }

                        const currentForwardSpeed = Math.max(0, this._Velocity.dot(this._FacingDirection));
                        const targetSpeed = Math.min(maxSpeed, currentForwardSpeed + acceleration * FC_Environment.TIME_DELTA * 2.4);
                        const newForwardSpeed = THREE.MathUtils.lerp(
                            currentForwardSpeed,
                            targetSpeed,
                            GetSmoothFactor(5.2 + alignmentFactor * 2.5)
                        );
                        this._Velocity.copy(this._FacingDirection).multiplyScalar(newForwardSpeed);
                        this._ThrustIntensity = alignmentFactor * (0.35 + 0.65 * _stickMagnitude) * (0.45 + this.SpeedRatio * 0.55);
                        if (this._Flag_Boost) this._ThrustIntensity = Math.min(1, this._ThrustIntensity * 1.25);

                        this._Energy_Carbon -= acceleration * FC_Environment.TIME_DELTA * energyRate;
                    } else if (angleFromTravel > Math.PI * 0.5 && this._Velocity.lengthSq() > 0.0004) {
                        this.#ApplyBraking(_stickMagnitude);
                    } else {
                        this.#ApplyVelocityDrag();
                    }
                } else {
                    this.#ApplyVelocityDrag();
                    this._BankRoll = THREE.MathUtils.lerp(this._BankRoll, 0, GetSmoothFactor(7));
                    this._Object.rotation.x = this._BankRoll * 0.38;
                }

                if (this._Velocity.lengthSq() > 0.0001) {
                    const speed = this._Velocity.length();
                    const forwardSpeed = this._Velocity.dot(this._FacingDirection);
                    const alignedSpeed = Math.max(0, forwardSpeed);
                    this._Velocity.copy(this._FacingDirection).multiplyScalar(
                        THREE.MathUtils.lerp(alignedSpeed, speed, GetSmoothFactor(2.2))
                    );
                }

                const thrustScale = 1 + this._ThrustIntensity * 0.05 - this._BrakeIntensity * 0.02;
                const scaleTarget = THREE.MathUtils.clamp(thrustScale, 0.96, 1.06);
                this._Object.scale.x = THREE.MathUtils.lerp(this._Object.scale.x, scaleTarget, GetSmoothFactor(10));
                this._Object.scale.y = THREE.MathUtils.lerp(this._Object.scale.y, scaleTarget, GetSmoothFactor(10));

                this._Object.position.add(this._Velocity.clone().multiplyScalar(FC_Environment.TIME_DELTA));

                this._Energy_Carbon = Math.max(0, this._Energy_Carbon);
                if (this._Energy_Carbon <= 0) Manager.GameOver();
            }

            #ApplyBraking(_stickMagnitude = 1) {
                this._Flag_Braking = true;
                const speed = this._Velocity.length();
                const travelDirection = this._Velocity.clone().normalize();
                let brakeForce = this._Acceleration * (1.35 + 0.35 * _stickMagnitude);
                if (this._Flag_Boost) brakeForce *= 1.25;

                const brakeDelta = brakeForce * FC_Environment.TIME_DELTA;
                const newSpeed = Math.max(0, speed - brakeDelta);
                this._Velocity.copy(travelDirection).multiplyScalar(newSpeed);
                this._BrakeIntensity = THREE.MathUtils.clamp(speed / (this._MaxSpeed * 1.45), 0.25, 1) * (0.5 + 0.5 * _stickMagnitude);

                this._Energy_Carbon -= brakeDelta * 1.1;
            }

            #ApplyVelocityDrag() {
                const speed = this._Velocity.length();
                if (speed < 0.14) {
                    this._Velocity.multiplyScalar(0.68);
                    if (this._Velocity.length() < 0.018) this._Velocity.set(0, 0, 0);
                } else {
                    const drag = 1 - (0.0018 + speed * 0.0011) * (FC_Environment.TIME_DELTA * 60);
                    this._Velocity.multiplyScalar(THREE.MathUtils.clamp(drag, 0.92, 0.9995));
                }
            }

            Shoot() {
                if (this._Shoot_Cooldown.Flag_Finished && this._Ammo >= 1) {
                    this._Ammo--;
                    this._Shoot_Cooldown.Restart();

                    const direction = this._FacingDirection.clone().normalize();
                    const bulletPos = this.Position.clone().add(direction.multiplyScalar(this._Radius));

                    return new C_Bullet(bulletPos, this._Object.rotation.z);
                }
                return null;
            }

            TakeDamage(_amount) {
                this._Energy_Carbon -= _amount;
                this._Energy_Carbon = Math.max(0, this._Energy_Carbon);
                if (this._Energy_Carbon <= 0) Manager.GameOver();
            }

            Collect_Item(_item) {
                if (!this.CanCarryItem(_item.Type, _item.Value)) return false;
                if(_item.Type === 'energy') {
                    this._Energy_Carbon = Math.min(this._Energy_Carbon_Max, this._Energy_Carbon + _item.Value);
                } else if (_item.Type === 'metal') {
                    this._Inventory_Rare_Metals += _item.Value;
                } else if (_item.Type === 'money') {
                    this._Credits += Math.round(_item.Value);
                } else { // ammo
                    this._Inventory_Ammo_Packs++;
                }
                this._Credits = Math.round(this._Credits);
                return true;
            }

            GetItemWeight(_type) {
                switch (_type) {
                    case 'energy': return 2.5;
                    case 'ammo': return 0.6;
                    case 'metal': return 4.5;
                    case 'money': return 0.02;
                    default: return 0;
                }
            }

            GetCurrentCargoWeight() {
                return this._Inventory_Energy_Packs * this.GetItemWeight('energy')
                    + this._Inventory_Ammo_Packs * this.GetItemWeight('ammo')
                    + this._Inventory_Rare_Metals * this.GetItemWeight('metal')
                    + this._Credits * this.GetItemWeight('money');
            }

            CanCarryItem(_type, _value) {
                const addedWeight = _type === 'money'
                    ? Math.round(_value) * this.GetItemWeight('money')
                    : this.GetItemWeight(_type);
                return this.GetCurrentCargoWeight() + addedWeight <= this._CargoCapacity;
            }

            GetInventoryEntries() {
                return [
                    {
                        id: 'energy_pack',
                        label: 'Energy Pack',
                        count: this._Inventory_Energy_Packs,
                        weight: this.GetItemWeight('energy'),
                        detail: `Use to recover 100 energy.\nWeight ${this.GetItemWeight('energy').toFixed(1)} each.`
                    },
                    {
                        id: 'ammo_pack',
                        label: 'Ammo Pack',
                        count: this._Inventory_Ammo_Packs,
                        weight: this.GetItemWeight('ammo'),
                        detail: `Use to load 2 ammo.\nWeight ${this.GetItemWeight('ammo').toFixed(1)} each.`
                    },
                    {
                        id: 'rare_metal',
                        label: 'Rare Metal',
                        count: this._Inventory_Rare_Metals,
                        weight: this.GetItemWeight('metal'),
                        detail: `Valuable upgrade material.\nWeight ${this.GetItemWeight('metal').toFixed(1)} each.`
                    },
                    {
                        id: 'credits',
                        label: 'Credits',
                        count: this._Credits,
                        weight: this.GetItemWeight('money'),
                        detail: `Used for shop purchases.\nWeight ${this.GetItemWeight('money').toFixed(2)} each.`
                    }
                ];
            }

            SetShopAvailable(_bool) {
                this._Flag_InShop = _bool;
            }

            UseInventoryItem(_itemId) {
                switch (_itemId) {
                    case 'energy_pack':
                        if (this._Inventory_Energy_Packs <= 0 || this._Energy_Carbon >= this._Energy_Carbon_Max) return false;
                        this._Inventory_Energy_Packs--;
                        this._Energy_Carbon = Math.min(this._Energy_Carbon_Max, this._Energy_Carbon + 100);
                        return true;
                    case 'ammo_pack':
                        if (this._Inventory_Ammo_Packs <= 0 || this._Ammo >= this._Ammo_Max) return false;
                        this._Inventory_Ammo_Packs--;
                        this._Ammo = Math.min(this._Ammo_Max, this._Ammo + 2);
                        return true;
                    default:
                        return false;
                }
            }

            DiscardInventoryItem(_itemId) {
                switch (_itemId) {
                    case 'energy_pack':
                        if (this._Inventory_Energy_Packs <= 0) return false;
                        this._Inventory_Energy_Packs--;
                        return true;
                    case 'ammo_pack':
                        if (this._Inventory_Ammo_Packs <= 0) return false;
                        this._Inventory_Ammo_Packs--;
                        return true;
                    case 'rare_metal':
                        if (this._Inventory_Rare_Metals <= 0) return false;
                        this._Inventory_Rare_Metals--;
                        return true;
                    default:
                        return false;
                }
            }

            BuyEnergyPack() {
                const cost = 12;
                if (this._Credits < cost) return false;
                this._Credits -= cost;
                this._Energy_Carbon = Math.min(this._Energy_Carbon_Max, this._Energy_Carbon + 35);
                this._Credits = Math.round(this._Credits);
                return true;
            }

            BuyAmmoPack() {
                const cost = 10;
                if (this._Credits < cost) return false;
                this._Credits -= cost;
                this._Ammo = Math.min(this._Ammo_Max, this._Ammo + 18);
                this._Credits = Math.round(this._Credits);
                return true;
            }

            SellRareMetal() {
                if (this._Inventory_Rare_Metals < 1) return false;
                this._Inventory_Rare_Metals -= 1;
                this._Credits += 30;
                this._Credits = Math.round(this._Credits);
                return true;
            }

            UpgradeEngine() {
                const cost = 30 + this._Upgrade_Engine_Level * 25;
                if (this._Credits < cost) return false;
                this._Credits -= cost;
                this._Credits = Math.round(this._Credits);
                this._Upgrade_Engine_Level++;
                this._Acceleration += 0.55;
                this._MaxSpeed += 0.4;
                return true;
            }

            UpgradeBattery() {
                const cost = 35 + this._Upgrade_Battery_Level * 30;
                if (this._Credits < cost) return false;
                this._Credits -= cost;
                this._Credits = Math.round(this._Credits);
                this._Upgrade_Battery_Level++;
                this._Energy_Carbon_Max += 20;
                this._Energy_Carbon_Initial += 20;
                this._Energy_Carbon = Math.min(this._Energy_Carbon_Max, this._Energy_Carbon + 20);
                this._Ammo_Max += 10;
                this._Ammo_Initial += 5;
                this._Ammo = Math.min(this._Ammo_Max, this._Ammo + 5);
                return true;
            }

            SetReplenishActive(_bool) {
                if (_bool && !this._Flag_Replenishing) {
                    this._Replenish_Progress = 0;
                    this._Replenish_Energy_Start = this._Energy_Carbon;
                    this._Replenish_Ammo_Start = this._Ammo;
                }
                this._Flag_Replenishing = _bool;
            }

            #UpdateReplenishment() {
                if (!this._Flag_Replenishing) return;

                this._Replenish_Progress = Math.min(1, this._Replenish_Progress + FC_Environment.TIME_DELTA / 1.0);
                const replenishFactor = this._Replenish_Progress;
                if (this._Energy_Carbon < this._Energy_Carbon_Initial) {
                    this._Energy_Carbon = THREE.MathUtils.lerp(this._Replenish_Energy_Start, this._Energy_Carbon_Initial, replenishFactor);
                }
                if (this._Ammo < this._Ammo_Initial) {
                    this._Ammo = THREE.MathUtils.lerp(this._Replenish_Ammo_Start, this._Ammo_Initial, replenishFactor);
                }
            }

            Replenish_at_Base() {
                this.SetReplenishActive(true);
            }
        }

        class C_Particle_Move {

            _Array_Particle;
            _Number;
            _Size;
            _Position_Past;
            _Lifespan;
            _SpawnAccumulator = 0;
            _ParticleSystem;
            _Container;
            _Scratch_Velocity = new THREE.Vector3();

            constructor() {
                const canvas = document.createElement('canvas');
                canvas.width = 32;
                canvas.height = 32;
                const context = canvas.getContext('2d');
                const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                gradient.addColorStop(0.35, 'rgba(255, 255, 255, 0.85)');
                gradient.addColorStop(0.7, 'rgba(200, 255, 255, 0.25)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                context.fillStyle = gradient;
                context.fillRect(0, 0, 32, 32);
                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;

                this._Container = new THREE.Object3D();
                Scene.add(this._Container);

                this._Array_Particle = [];
                this._Number = 260;
                this._Size = 22;
                this._Position_Past = new THREE.Vector3();
                this._Lifespan = 0.55;
                this._ParticleSystem = this.Create_ParticleSystem(texture);
                this._Container.add(this._ParticleSystem);
            }

            Initialize() {
                this._Array_Particle = [];
                this._Position_Past = new THREE.Vector3();

                const positions = this._ParticleSystem.geometry.attributes.position.array;
                const colors = this._ParticleSystem.geometry.attributes.color.array;
                const sizes = this._ParticleSystem.geometry.attributes.size.array;

                for (let i = 0; i < positions.length; i++) {
                    positions[i] = 0;
                    colors[i] = 0;
                }
                for (let i = 0; i < sizes.length; i++) {
                    sizes[i] = this._Size;
                }

                this._ParticleSystem.geometry.attributes.position.needsUpdate = true;
                this._ParticleSystem.geometry.attributes.color.needsUpdate = true;
                this._ParticleSystem.geometry.attributes.size.needsUpdate = true;

                this._Container.position.set(0, 0, 0);
            }

            Create_ParticleSystem(_texture) {
                const positions = new Float32Array(this._Number * 3);
                const colors = new Float32Array(this._Number * 3);
                const sizes = new Float32Array(this._Number);

                for (let i = 0; i < this._Number; i++) { sizes[i] = this._Size; }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        U_Texture: { value: _texture },
                    },
                    vertexShader: `
                        varying vec3 V_Color;
                        attribute float size;
                        attribute vec3 color;

                        void main() {
                            V_Color = color;
                            vec4 position_view = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = size;
                            gl_Position = projectionMatrix * position_view;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D U_Texture;
                        varying vec3 V_Color;

                        void main() {
                            gl_FragColor = vec4(V_Color, 1.0) * texture2D(U_Texture, gl_PointCoord);
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    depthTest: false,
                    transparent: true
                });

                return new THREE.Points(geometry, material);
            }

            Update() {
                const cameraPosition = Camera.Position.clone();
                cameraPosition.z = 0;
                this._Container.position.copy(cameraPosition);

                let spawnRate = 0;
                if (Player._Flag_Thrusting) {
                    spawnRate = 18 + Player._ThrustIntensity * 70 + Player.SpeedRatio * 24;
                    if (Player.Flag_Boost) spawnRate *= 1.45;
                }
                if (Player._Flag_Braking) {
                    spawnRate = Math.max(spawnRate, 24 + Player._BrakeIntensity * 55);
                }

                this._SpawnAccumulator += FC_Environment.TIME_DELTA * spawnRate;
                while (this._SpawnAccumulator >= 1 && this._Array_Particle.length < this._Number) {
                    this._SpawnAccumulator -= 1;
                    this.#SpawnExhaustParticle(Player._Flag_Braking);
                }

                this._Position_Past.copy(Player.Position);

                const positions = this._ParticleSystem.geometry.attributes.position.array;
                const colors = this._ParticleSystem.geometry.attributes.color.array;
                const sizes = this._ParticleSystem.geometry.attributes.size.array;
                const delta = FC_Environment.TIME_DELTA;

                let index_particle = 0;
                for (let i = this._Array_Particle.length - 1; i >= 0; i--) {
                    const particle = this._Array_Particle[i];
                    particle.life -= delta;

                    if (particle.life <= 0) {
                        this._Array_Particle.splice(i, 1);
                        continue;
                    }

                    particle.position.addScaledVector(particle.velocity, delta);
                    const ratio_lifespan = particle.life / particle.maxLife;
                    const fade = ratio_lifespan * ratio_lifespan;

                    const index = index_particle * 3;
                    positions[index] = particle.position.x;
                    positions[index + 1] = particle.position.y;
                    positions[index + 2] = particle.position.z;
                    colors[index] = particle.color.r * fade;
                    colors[index + 1] = particle.color.g * fade;
                    colors[index + 2] = particle.color.b * fade;
                    sizes[index_particle] = particle.size * (0.35 + fade * 0.65);

                    index_particle++;
                }

                for (let i = index_particle * 3; i < positions.length; i++) {
                    positions[i] = 0;
                    colors[i] = 0;
                }
                for (let i = index_particle; i < sizes.length; i++) {
                    sizes[i] = 0;
                }

                this._ParticleSystem.geometry.attributes.position.needsUpdate = true;
                this._ParticleSystem.geometry.attributes.color.needsUpdate = true;
                this._ParticleSystem.geometry.attributes.size.needsUpdate = true;
            }

            #SpawnExhaustParticle(_isBraking) {
                const facing = Player._FacingDirection.clone().normalize();
                const backward = facing.clone().multiplyScalar(-1);
                const exhaustSide = _isBraking ? facing : backward;
                const lateral = new THREE.Vector3(-facing.y, facing.x, 0);
                const spread = (Math.random() - 0.5) * Player._Radius * 0.55;

                const angle = (Math.random() - 0.5) * Math.PI / (_isBraking ? 7 : 9);
                const exhaustDir = exhaustSide.clone();
                const rotatedX = exhaustDir.x * Math.cos(angle) - exhaustDir.y * Math.sin(angle);
                const rotatedY = exhaustDir.x * Math.sin(angle) + exhaustDir.y * Math.cos(angle);
                exhaustDir.set(rotatedX, rotatedY, 0).normalize();

                const playerSpeed = Player._Velocity.length();
                const intensity = _isBraking ? Player._BrakeIntensity : Player._ThrustIntensity;
                const emitSpeed = (_isBraking ? 2.8 : 1.6) + playerSpeed * 0.55 + intensity * 1.8;
                const shipInfluence = _isBraking ? 1.05 : 0.88 + Player.SpeedRatio * 0.2;

                this._Scratch_Velocity.copy(exhaustDir).multiplyScalar(emitSpeed);
                this._Scratch_Velocity.sub(Player._Velocity.clone().multiplyScalar(shipInfluence));

                const exhaustPosition = Player.Position.clone()
                    .add(exhaustSide.clone().multiplyScalar(Player._Radius * (_isBraking ? 1.15 : 1.3)))
                    .add(lateral.multiplyScalar(spread));
                const particlePosition = exhaustPosition.sub(this._Container.position);

                const thrustColor = new THREE.Color(0x44ffaa);
                const boostColor = new THREE.Color(0x66ddff);
                const brakeColor = new THREE.Color(0x99ccff);
                const baseColor = _isBraking ? brakeColor : (Player.Flag_Boost ? boostColor : thrustColor);
                const tint = baseColor.clone().lerp(new THREE.Color(0xffffff), 0.15 + intensity * 0.35);

                const life = this._Lifespan * (0.65 + intensity * 0.55) * (_isBraking ? 0.9 : 1);

                this._Array_Particle.push({
                    position: particlePosition,
                    velocity: this._Scratch_Velocity.clone(),
                    size: this._Size * (0.22 + intensity * 0.35 + playerSpeed * 0.08) * (0.75 + Math.random() * 0.5),
                    life: life,
                    maxLife: life,
                    color: tint
                });
            }
        }

        class C_Background {

            _Distance_Area;
            _Object;

            constructor() {
                this._Distance_Area = 1000;
                this._Object = this.CreateNearStars();
                Scene.add(this._Object);
            }

            CreateNearStars() {
                const object = new THREE.Object3D();

                const distribution = [
                    { size: 8, count: 100, range: { min: 50, max: 60 } },
                    { size: 6, count: 250, range: { min: 60, max: 70 } },
                    { size: 5, count: 500, range: { min: 70, max: 80 } },
                    { size: 4, count: 1000, range: { min: 80, max: 90 } },
                    { size: 3, count: 1000, range: { min: 50, max: 100 } }
                ];

                const starColors = {
                    white: { r: 1.0, g: 1.0, b: 1.0 },
                    blue: { r: 0.5, g: 0.6, b: 1.0 },
                    orange: { r: 1.0, g: 0.7, b: 0.7 },
                    yellow: { r: 1.0, g: 1.0, b: 0.7 }
                };

                for (const { size, count, range } of distribution) {
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(count * 3);
                    const colors = new Float32Array(count * 3);
                    const sizes = new Float32Array(count);

                    for (let i = 0; i < count; i++) {
                        const x = (Math.random() - 0.5) * this._Distance_Area;
                        const y = (Math.random() - 0.5) * this._Distance_Area;
                        const z = Math.random() * (range.max - range.min) + range.min;

                        positions[i * 3] = x;
                        positions[i * 3 + 1] = y;
                        positions[i * 3 + 2] = z;

                        let selectedColor;
                        if (size === 8 || size === 6) {
                            const random = Math.random();
                            if (random < 0.4) {
                                selectedColor = starColors.white;
                            } else if (random < 0.6) {
                                selectedColor = starColors.blue;
                            } else if (random < 0.8) {
                                selectedColor = starColors.orange;
                            } else {
                                selectedColor = starColors.yellow;
                            }
                        } else {
                            selectedColor = starColors.white;
                        }
                        colors[i * 3] = selectedColor.r;
                        colors[i * 3 + 1] = selectedColor.g;
                        colors[i * 3 + 2] = selectedColor.b;

                        sizes[i] = size;
                    }

                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                    const material = new THREE.ShaderMaterial({
                        uniforms: {
                            U_Texture: { value: new THREE.CanvasTexture(this.CreateStarTexture()) }
                        },
                        vertexShader: this.GetNearStarsVertexShader(),
                        fragmentShader: this.GetNearStarsFragmentShader(),
                        blending: THREE.AdditiveBlending,
                        depthTest: false,
                        transparent: true
                    });

                    const points = new THREE.Points(geometry, material);
                    object.add(points);
                }

                return object;
            }

            CreateStarTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 8;
                canvas.height = 8;
                const context = canvas.getContext('2d');
                context.beginPath();
                context.arc(4, 4, 2, 0, Math.PI * 2);
                context.fillStyle = '#ffffff';
                context.fill();
                return canvas;
            }

            GetNearStarsVertexShader() {
                return `
                    varying vec3 V_Color;
                    attribute float size;
                    attribute vec3 color;

                    void main() {
                        V_Color = color;
                        vec4 position_view = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size;
                        gl_Position = projectionMatrix * position_view;
                    }
                `;
            }

            GetNearStarsFragmentShader() {
                return `
                    uniform sampler2D U_Texture;
                    varying vec3 V_Color;

                    void main() {
                        gl_FragColor = vec4(V_Color, 1.0) * texture2D(U_Texture, gl_PointCoord);
                    }
                `;
            }
        }

        class C_SpaceCamera extends FC_Camera {

            _SmoothPosition = new THREE.Vector3();
            _SmoothLookAt = new THREE.Vector3();
            _ShakeAmount = 0;

            Initialize() {
                super.Initialize();
                this._SmoothPosition.copy(this.Position);
                this._SmoothLookAt.copy(this._Position_LookAt);
            }

            Update(_player = null) {
                if (!this._Flag_Target || !_player) {
                    super.Update();
                    return;
                }

                const velocity = _player._Velocity;
                const speedRatio = _player.SpeedRatio;
                const lag = 0.14 + speedRatio * 0.2;

                const desiredPosition = new THREE.Vector3(
                    _player.Position.x + this._OFFSET_TARGET_DEFAULT.x - velocity.x * lag,
                    _player.Position.y + this._OFFSET_TARGET_DEFAULT.y - velocity.y * lag,
                    _player.Position.z + this._OFFSET_TARGET_DEFAULT.z
                );
                const desiredLookAt = new THREE.Vector3(
                    _player.Position.x + this._OFFSET_LOOKAT_DEFAULT.x + velocity.x * 0.06,
                    _player.Position.y + this._OFFSET_LOOKAT_DEFAULT.y + velocity.y * 0.06,
                    _player.Position.z + this._OFFSET_LOOKAT_DEFAULT.z
                );

                this._SmoothPosition.lerp(desiredPosition, GetSmoothFactor(5.8));
                this._SmoothLookAt.lerp(desiredLookAt, GetSmoothFactor(7.5));

                if (_player._Flag_Boost) this._ShakeAmount = Math.min(0.07, this._ShakeAmount + FC_Environment.TIME_DELTA * 0.55);
                else if (_player._Flag_Braking) this._ShakeAmount = Math.min(0.05, this._ShakeAmount + FC_Environment.TIME_DELTA * 0.42);
                else this._ShakeAmount *= Math.exp(-FC_Environment.TIME_DELTA * 10);

                const shakeX = (Math.random() - 0.5) * this._ShakeAmount;
                const shakeY = (Math.random() - 0.5) * this._ShakeAmount;

                this.Position = this._SmoothPosition.clone().add(new THREE.Vector3(shakeX, shakeY, 0));
                this.LookAt = this._SmoothLookAt.clone().add(new THREE.Vector3(shakeX * 0.35, shakeY * 0.35, 0));
            }
        }

        const Environment = new FC_Environment();
        const Camera = new C_SpaceCamera(Renderer, undefined, new THREE.Vector3(0, 0, -10));
        const Light_Ambient = new FC_Light_Ambient(Scene);
        Light_Ambient._Object.intensity = 0.52;
        Light_Ambient._Object.color.set(0x6a7a8e);

        const Light_Directional = new FC_Light_Directional(Scene);
        Light_Directional._Object.intensity = 0.78;
        Light_Directional._Object.color.set(0xfff0dc);
        Scene.add(Light_Directional._Object.target);

        const Light_Hemisphere = new THREE.HemisphereLight(0x7a9ab8, 0x1c2434, 0.32);
        Scene.add(Light_Hemisphere);

        const Light_Rim = new THREE.DirectionalLight(0x5a78a8, 0.2);
        Scene.add(Light_Rim);
        Scene.add(Light_Rim.target);

        const Light_KeyOffset = new THREE.Vector3(8, 10, -10);
        const Light_RimOffset = new THREE.Vector3(-6, -7, 9);

        function UpdateSceneLighting() {
            const focus = Camera.Position_LookAt;

            Light_Directional._Object.position.copy(focus).add(Light_KeyOffset);
            Light_Directional._Object.target.position.copy(focus);
            Light_Directional._Object.target.updateMatrixWorld();

            Light_Rim.position.copy(focus).add(Light_RimOffset);
            Light_Rim.target.position.copy(focus);
            Light_Rim.target.updateMatrixWorld();
        }

        window.addEventListener('resize', Camera.Resize_Screen, false);

        const Manager = new C_Manager();
        const Player = new C_Player();

        SetupOverlayWindow(InventoryWindow, InventoryHeader, InventoryCollapse);
        SetupOverlayWindow(MinimapWindow, MinimapHeader, MinimapCollapse);
        SetupOverlayWindow(ShopWindow, ShopHeader, ShopCollapse);
        ApplyOverlayDefaults();
        ApplyOverlayZOrder();
        UpdateOverlayVisibility("Before_Loaded");

        function HandleInventorySelection(event) {
            const button = event.target.closest("[data-item-id]");
            if (!button) return;
            event.preventDefault?.();
            event.stopPropagation?.();
            SelectedInventoryItem = button.dataset.itemId;
            OpenInventoryPopup(SelectedInventoryItem);
        }

        InventoryContent.addEventListener("click", HandleInventorySelection);
        InventoryContent.addEventListener("pointerup", HandleInventorySelection);

        InventoryUseButton.addEventListener("click", () => {
            if (!InventoryPopupItemId) return;
            if (Player.UseInventoryItem(InventoryPopupItemId)) {
                CloseInventoryPopup();
            } else {
                UpdateInventoryPopup(InventoryPopupItemId);
            }
        });

        InventoryDiscardButton.addEventListener("click", () => {
            if (!InventoryPopupItemId) return;
            if (Player.DiscardInventoryItem(InventoryPopupItemId)) {
                CloseInventoryPopup();
            } else {
                UpdateInventoryPopup(InventoryPopupItemId);
            }
        });

        InventoryCloseButton.addEventListener("click", () => {
            CloseInventoryPopup();
        });

        InventoryPopupBackdrop.addEventListener("pointerdown", () => {
            CloseInventoryPopup();
        });

        ShopBuyEnergy.addEventListener("click", () => { if (Player.Flag_InShop) Player.BuyEnergyPack(); });
        ShopBuyAmmo.addEventListener("click", () => { if (Player.Flag_InShop) Player.BuyAmmoPack(); });
        ShopSellMetal.addEventListener("click", () => { if (Player.Flag_InShop) Player.SellRareMetal(); });
        ShopUpgradeEngine.addEventListener("click", () => { if (Player.Flag_InShop) Player.UpgradeEngine(); });
        ShopUpgradeBattery.addEventListener("click", () => { if (Player.Flag_InShop) Player.UpgradeBattery(); });

        Manager.Initialize();
        Manager.Update();

        function SetupOverlayWindow(_window, _header, _collapseButton) {
            let dragState = null;
            let activePointerId = null;

            const EndDrag = (_event) => {
                if (dragState && _event && activePointerId !== null && _event.pointerId !== activePointerId) return;
                dragState = null;
                activePointerId = null;
            };

            _header.addEventListener("pointerdown", (event) => {
                if (event.target === _collapseButton) return;
                BringOverlayToFront(_window);
                const rect = _window.getBoundingClientRect();
                _window.style.width = `${Math.round(rect.width)}px`;
                dragState = {
                    offsetX: event.clientX - rect.left,
                    offsetY: event.clientY - rect.top,
                };
                activePointerId = event.pointerId;
                event.preventDefault();
                try { _header.setPointerCapture(event.pointerId); } catch (_error) { }
            });

            document.addEventListener("pointermove", (event) => {
                if (!dragState || event.pointerId !== activePointerId) return;
                event.preventDefault();
                const left = Math.min(window.innerWidth - _window.offsetWidth - 8, Math.max(8, event.clientX - dragState.offsetX));
                const top = Math.min(window.innerHeight - _window.offsetHeight - 8, Math.max(8, event.clientY - dragState.offsetY));
                _window.style.left = `${left}px`;
                _window.style.top = `${top}px`;
                _window.style.right = "auto";
                _window.style.bottom = "auto";
            });

            document.addEventListener("pointerup", (event) => {
                EndDrag(event);
                if (_header.hasPointerCapture(event.pointerId)) _header.releasePointerCapture(event.pointerId);
            });

            document.addEventListener("pointercancel", (event) => {
                EndDrag(event);
            });

            _header.addEventListener("lostpointercapture", () => EndDrag());

            _collapseButton.addEventListener("click", () => {
                _window.classList.toggle("is-collapsed");
                _collapseButton.textContent = _window.classList.contains("is-collapsed") ? "+" : "-";
            });

            _window.addEventListener("pointerdown", () => {
                BringOverlayToFront(_window);
            }, true);
        }

        function SetOverlayCollapsed(_window, _collapseButton, _collapsed) {
            _window.classList.toggle("is-collapsed", _collapsed);
            _collapseButton.textContent = _collapsed ? "+" : "-";
        }

        function IsMobileViewport() {
            return Mobile_or_Desktop() || window.matchMedia("(max-width: 900px)").matches;
        }

        function ApplyOverlayZOrder() {
            OverlayStack.forEach((overlayWindow, index) => {
                overlayWindow.style.zIndex = `${OverlayZBase + index}`;
            });
        }

        function BringOverlayToFront(_window) {
            OverlayStack = OverlayStack.filter(overlayWindow => overlayWindow !== _window);
            OverlayStack.push(_window);
            ApplyOverlayZOrder();
        }

        function ApplyOverlayDefaults() {
            if (IsMobileViewport()) {
                ApplyMobileOverlayDefaults();
            } else {
                ApplyDesktopOverlayDefaults();
            }
        }

        function ApplyMobileOverlayDefaults() {
            document.body.classList.add("mobile-overlay-mode");
            const margin = 8;
            const gap = 8;
            let bottom = 12;

            OverlayConfigs.forEach((overlay) => {
                const minWidth = parseFloat(window.getComputedStyle(overlay.window).minWidth) || 220;
                const width = Math.max(minWidth, window.innerWidth - margin * 2);
                SetOverlayCollapsed(overlay.window, overlay.button, true);
                overlay.window.style.left = `${margin}px`;
                overlay.window.style.right = `${margin}px`;
                overlay.window.style.width = `${Math.round(width)}px`;
                overlay.window.style.maxWidth = "none";
                overlay.window.style.top = "auto";
                overlay.window.style.bottom = `${bottom}px`;
                overlay.window.style.height = "";
                const headerHeight = overlay.header.offsetHeight || 44;
                bottom += headerHeight + gap;
            });
        }

        function ApplyDesktopOverlayDefaults() {
            document.body.classList.remove("mobile-overlay-mode");
            const left = 12;
            const gap = 10;
            const headerHeights = OverlayConfigs.map((overlay) => overlay.header.offsetHeight || 44);
            const totalHeight = headerHeights.reduce((sum, height) => sum + height, 0) + gap * (OverlayConfigs.length - 1);
            let top = Math.max(8, Math.round((window.innerHeight - totalHeight) / 2));

            OverlayConfigs.forEach((overlay, index) => {
                const width = Math.round(overlay.window.getBoundingClientRect().width || 220);
                SetOverlayCollapsed(overlay.window, overlay.button, true);
                overlay.window.style.left = `${left}px`;
                overlay.window.style.right = "auto";
                overlay.window.style.width = `${width}px`;
                overlay.window.style.maxWidth = "none";
                overlay.window.style.top = `${top}px`;
                overlay.window.style.bottom = "auto";
                overlay.window.style.height = "";
                top += headerHeights[index] + gap;
            });
        }

        function UpdateOverlayVisibility(_state) {
            const shouldShow = _state !== "Before_Loaded" && _state !== "Loaded";
            InventoryWindow.classList.toggle("is-hidden", !shouldShow);
            MinimapWindow.classList.toggle("is-hidden", !shouldShow);
            ShopWindow.classList.toggle("is-hidden", !shouldShow);
            ShopWindow.classList.toggle("is-active", shouldShow && Player.Flag_InShop);
            if (!shouldShow) {
                CloseInventoryPopup();
                EnergyWarning.classList.add("is-hidden");
            }
        }

        function OpenInventoryPopup(_itemId) {
            InventoryPopupItemId = _itemId;
            UpdateInventoryPopup(_itemId);
            InventoryPopupBackdrop.classList.remove("is-hidden");
            InventoryPopup.classList.remove("is-hidden");
        }

        function CloseInventoryPopup() {
            InventoryPopupItemId = null;
            InventoryPopupBackdrop.classList.add("is-hidden");
            InventoryPopup.classList.add("is-hidden");
        }

        function UpdateInventoryPopup(_itemId) {
            const entry = Player.GetInventoryEntries().find(item => item.id === _itemId);
            if (!entry) {
                CloseInventoryPopup();
                return;
            }

            const canUse = (_itemId === "energy_pack" && entry.count > 0 && Player.Energy_Carbon < Player._Energy_Carbon_Max)
                || (_itemId === "ammo_pack" && entry.count > 0 && Player.Ammo < Player._Ammo_Max);
            const canDiscard = _itemId !== "credits" && entry.count > 0;

            InventoryPopupTitle.textContent = entry.label;
            InventoryPopupText.textContent =
                `Count ${Math.round(entry.count)}\n${entry.detail}`;
            InventoryUseButton.disabled = !canUse;
            InventoryDiscardButton.disabled = !canDiscard;
        }

        function UpdateMinimap() {
            const width = MinimapCanvas.width;
            const height = MinimapCanvas.height;
            MinimapContext.clearRect(0, 0, width, height);
            MinimapContext.fillStyle = "rgba(6, 12, 20, 0.96)";
            MinimapContext.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const range = 120;
            const scale = width / (range * 2);

            MinimapContext.strokeStyle = "rgba(168, 200, 255, 0.18)";
            MinimapContext.lineWidth = 1;
            for (let i = 1; i < 4; i++) {
                const radius = (width * i) / 8;
                MinimapContext.beginPath();
                MinimapContext.arc(centerX, centerY, radius, 0, Math.PI * 2);
                MinimapContext.stroke();
            }

            Manager._Enemies.filter(enemy => enemy.IsActive).forEach(enemy => {
                const color = enemy instanceof C_Enemy_Asteroid ? "#ff9b42" : "#ff5555";
                DrawMinimapDot(enemy.Position, color, 4, false);
            });
            DrawMinimapDot(Manager._Shop.Position, "#9fd0ff", 5, true);
            Manager._Drops.filter(drop => drop.IsActive).forEach(drop => {
                const color = drop.Type === "metal" ? "#a8c8ff" : drop.Type === "energy" ? "#00ff88" : drop.Type === "money" ? "#7cff7c" : "#ffd700";
                DrawMinimapDot(drop.Position, color, 3, false);
            });
            DrawMotherShipIndicator();
            DrawMinimapDot(Player.Position, "#00cc66", 5, true);

            function DrawMinimapDot(_position, _color, _radius, _outline) {
                const relativeX = (_position.x - Player.Position.x) * scale;
                const relativeY = (_position.y - Player.Position.y) * scale;
                const x = centerX - relativeX;
                const y = centerY - relativeY;
                if (x < -8 || x > width + 8 || y < -8 || y > height + 8) return;

                MinimapContext.beginPath();
                MinimapContext.fillStyle = _color;
                MinimapContext.arc(x, y, _radius, 0, Math.PI * 2);
                MinimapContext.fill();
                if (_outline) {
                    MinimapContext.strokeStyle = "rgba(255,255,255,0.65)";
                    MinimapContext.lineWidth = 1.5;
                    MinimapContext.stroke();
                }
            }

            function DrawMotherShipIndicator() {
                const relative = Manager._MotherShip.Position.clone().sub(Player.Position);
                const distance = relative.length();
                const relativeX = -relative.x * scale;
                const relativeY = relative.y * scale;
                const rawX = centerX + relativeX;
                const rawY = centerY - relativeY;
                const margin = 12;

                if (rawX >= margin && rawX <= width - margin && rawY >= margin && rawY <= height - margin) {
                    DrawMinimapDot(Manager._MotherShip.Position, "#66ffcc", 6, true);
                    return;
                }

                const angle = Math.atan2(-relative.y, -relative.x);
                const radius = width / 2 - margin;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;

                MinimapContext.beginPath();
                MinimapContext.fillStyle = "#66ffcc";
                MinimapContext.arc(x, y, 6, 0, Math.PI * 2);
                MinimapContext.fill();
                MinimapContext.strokeStyle = "rgba(255,255,255,0.75)";
                MinimapContext.lineWidth = 1.5;
                MinimapContext.stroke();

                MinimapContext.fillStyle = "#66ffcc";
                MinimapContext.font = '11px "Space Mono"';
                MinimapContext.textAlign = "center";
                MinimapContext.fillText(`${Math.round(distance)}m`, x, y - 10);
            }
        }

        function KeyDown(event) {
            if (['Space', 'ShiftLeft', 'ShiftRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(event.code)) {
                event.preventDefault();
            }
            if (event.code === 'Space') {
                Manager.Shoot();
            }
        }

        function TouchStart(event) {
            if (event.target.closest?.("#Inventory_Window, #Minimap_Window, #Shop_Window, #Inventory_Popup")) return;
            if (Manager.Timer_Input.Flag_Finished) {

                let screen_x, screen_y;
                switch (event.type) {
                    case "touchstart":
                        screen_x = event.touches[0].clientX;
                        screen_y = event.touches[0].clientY;
                        break;
                    case "pointerdown":
                    case "mousedown":
                        screen_x = event.clientX;
                        screen_y = event.clientY;
                        break;
                }

                const screen_position = new THREE.Vector2(
                    (screen_x / window.innerWidth) * 2 - 1,
                    -(screen_y / window.innerHeight) * 2 + 1
                );
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(screen_position, Camera.Object);

                const ui_home = raycaster.intersectObject(Manager.UI_Home.Mesh_Front);
                if (ui_home.length > 0) { window.location.href = "./index.html"; return; }
                const ui_music = raycaster.intersectObject(Manager.UI_Music.Mesh_Front);
                if (ui_music.length > 0) { Manager.BGM.Flag_Playing ? Manager.BGM.Stop() : Manager.BGM.Play(); return; }
                const ui_boost = raycaster.intersectObject(Manager.UI_Boost.Mesh_Front);
                if (ui_boost.length > 0) { Manager.ToggleBoostButton(); return; }

                const ui_shoot = raycaster.intersectObject(Manager.UI_Shoot.Mesh_Front);
                if (ui_shoot.length > 0) { Manager.Shoot(); return; }

                switch (Manager.State) {
                    case "Waiting_Start": Manager.Start(); break;
                    case "Playing": break;
                    case "Waiting_Restart":
                        Manager.Fade(false);
                        setTimeout(() => {
                            Manager.Initialize();
                            Manager.Change_State("Waiting");
                            Manager.Fade(true);
                        }, 1000);
                        break;
                }
                Manager.Timer_Input.Restart();
            }
        }
    </script>
