<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="F U M">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-B89KY0993B');
    </script>

    <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

    <title>Japanese Quiz</title>

    <style>
        .quiz-card {
            border-left: 6px solid #1565c0;
        }

        .result-box {
            border-radius: 8px;
            border: 1px solid #cfd8dc;
            background: #fafcfe;
        }

        .choice-btn {
            justify-content: flex-start;
            text-transform: none;
            white-space: normal;
            height: auto !important;
            min-height: 44px;
            line-height: 1.5;
            padding: 10px 14px !important;
        }
    </style>
</head>

<body>
    <v-app id="App">
        <template>
            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Japanese Quiz</main-system-bar>

            <v-main id="Main">
                <transition name="Fade_Page">
                    <v-container v-show="Ready_Page" fluid class="pa-5">
                        <v-row justify="center">
                            <v-col cols="12" md="9" lg="8">
                                <v-card>
                                    <v-system-bar>Quiz Settings</v-system-bar>
                                    <v-card-text>
                                        <v-row dense>
                                            <v-col cols="12" md="7">
                                                <div class="text-subtitle-1 mb-2">難易度を選択</div>
                                                <v-btn-toggle v-model="SelectedLevel" mandatory>
                                                    <v-btn value="all">All</v-btn>
                                                    <v-btn value="beginner">初級</v-btn>
                                                    <v-btn value="intermediate">中級</v-btn>
                                                    <v-btn value="advanced">上級</v-btn>
                                                </v-btn-toggle>
                                            </v-col>
                                            <v-col cols="12" md="5" class="d-flex align-center">
                                                <v-switch
                                                    v-model="FavoritesOnly"
                                                    hide-details
                                                    class="mt-0"
                                                    label="お気に入りのみ出題">
                                                </v-switch>
                                            </v-col>
                                        </v-row>

                                        <v-divider class="my-4"></v-divider>

                                        <v-row dense>
                                            <v-col cols="6" md="3">
                                                <v-sheet outlined rounded class="pa-3 text-center">
                                                    <div class="text-caption">問題数</div>
                                                    <div class="text-h6">{{ WorkingSet.length }}</div>
                                                </v-sheet>
                                            </v-col>
                                            <v-col cols="6" md="3">
                                                <v-sheet outlined rounded class="pa-3 text-center">
                                                    <div class="text-caption">正解数</div>
                                                    <div class="text-h6">{{ CorrectCount }}</div>
                                                </v-sheet>
                                            </v-col>
                                            <v-col cols="6" md="3">
                                                <v-sheet outlined rounded class="pa-3 text-center">
                                                    <div class="text-caption">解答数</div>
                                                    <div class="text-h6">{{ AnsweredCount }}</div>
                                                </v-sheet>
                                            </v-col>
                                            <v-col cols="6" md="3">
                                                <v-sheet outlined rounded class="pa-3 text-center">
                                                    <div class="text-caption">正答率</div>
                                                    <div class="text-h6">{{ Accuracy }}%</div>
                                                </v-sheet>
                                            </v-col>
                                        </v-row>
                                    </v-card-text>
                                </v-card>
                            </v-col>
                        </v-row>

                        <v-row justify="center" class="mt-2">
                            <v-col cols="12" md="9" lg="8">
                                <v-card class="quiz-card" v-if="CurrentQuestion">
                                    <v-card-title class="pb-0">
                                        <v-chip small :color="LevelColor(CurrentQuestion.level)" dark>{{ LevelText(CurrentQuestion.level) }}</v-chip>
                                        <v-spacer></v-spacer>
                                        <v-btn icon @click="ToggleFavorite(CurrentQuestion.id)">
                                            <v-icon :color="IsFavorite(CurrentQuestion.id) ? 'amber darken-2' : 'grey'">
                                                {{ IsFavorite(CurrentQuestion.id) ? 'mdi-star' : 'mdi-star-outline' }}
                                            </v-icon>
                                        </v-btn>
                                    </v-card-title>

                                    <v-card-text>
                                        <div class="text-caption mb-1">{{ ProgressText }}</div>
                                        <div class="text-h6 mb-4">{{ CurrentQuestion.question }}</div>

                                        <v-row dense>
                                            <v-col cols="12" v-for="(choice, index) in CurrentChoices" :key="index">
                                                <v-btn
                                                    block
                                                    outlined
                                                    class="choice-btn"
                                                    :color="ChoiceColor(choice)"
                                                    @click="Choose(choice)"
                                                    :disabled="Answered">
                                                    {{ choice }}
                                                </v-btn>
                                            </v-col>
                                        </v-row>

                                        <v-expand-transition>
                                            <v-sheet v-if="Answered" class="result-box pa-3 mt-4">
                                                <div class="font-weight-bold" :class="ResultOk ? 'green--text text--darken-2' : 'red--text text--darken-2'">
                                                    {{ ResultOk ? '正解です' : '不正解です' }}
                                                </div>
                                                <div class="mt-1">正解: {{ CurrentQuestion.answer }}</div>
                                                <div class="mt-1 text-body-2">{{ CurrentQuestion.explanation }}</div>
                                            </v-sheet>
                                        </v-expand-transition>
                                    </v-card-text>

                                    <v-card-actions>
                                        <v-spacer></v-spacer>
                                        <v-btn color="primary" @click="NextQuestion" :disabled="!Answered">次の問題</v-btn>
                                    </v-card-actions>
                                </v-card>

                                <v-alert v-else type="info" outlined class="mt-4">
                                    条件に一致する問題がありません。難易度や「お気に入りのみ出題」を変更してください。
                                </v-alert>
                            </v-col>
                        </v-row>

                        <v-row justify="center" class="mt-2">
                            <v-col cols="12" md="9" lg="8">
                                <v-card>
                                    <v-system-bar>Favorites</v-system-bar>
                                    <v-card-text>
                                        <div v-if="FavoriteQuestions.length === 0" class="text-body-2">
                                            まだお気に入りはありません。星アイコンから登録できます。
                                        </div>
                                        <v-row dense v-else>
                                            <v-col cols="12" v-for="item in FavoriteQuestions" :key="item.id">
                                                <v-sheet outlined rounded class="pa-2 d-flex align-center">
                                                    <v-chip x-small :color="LevelColor(item.level)" dark class="mr-2">{{ LevelText(item.level) }}</v-chip>
                                                    <div class="text-body-2 flex-grow-1">{{ item.question }}</div>
                                                    <v-btn small text color="primary" @click="LoadFavorite(item.id)">この問題を解く</v-btn>
                                                </v-sheet>
                                            </v-col>
                                        </v-row>
                                    </v-card-text>
                                </v-card>
                            </v-col>
                        </v-row>
                    </v-container>
                </transition>
            </v-main>

            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
            <main-footer></main-footer>
        </template>
    </v-app>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

    <script>
        let vue = new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common],
            data: {
                SelectedLevel: 'all',
                FavoritesOnly: false,
                QuizBank: [
                    { id: 1, level: 'beginner', question: '「ありがとう」の丁寧で一般的な表現はどれ？', choices: ['ありがとうございます', 'ありがとうだ', 'ありがたいです', 'ありがとうでした'], answer: 'ありがとうございます', explanation: '「ありがとうございます」が日常で最も一般的な丁寧表現です。' },
                    { id: 2, level: 'beginner', question: '「水」をひらがなで書くと？', choices: ['みず', 'みづ', 'みす', 'みっず'], answer: 'みず', explanation: '「水」は「みず」と読みます。' },
                    { id: 3, level: 'beginner', question: '「きれい」の反対に近い意味はどれ？', choices: ['よごれている', 'しずか', 'はやい', 'あかるい'], answer: 'よごれている', explanation: '「きれい」の対義語として「よごれている」が適切です。' },
                    { id: 4, level: 'beginner', question: '助詞「を」の主な役割は？', choices: ['動作の対象を示す', '場所を示す', '時間を示す', '逆接を示す'], answer: '動作の対象を示す', explanation: '「を」は動作の目的語を示すときに使います。' },
                    { id: 5, level: 'beginner', question: '「本」をひらがなで読むと？', choices: ['ほん', 'ぽん', 'ぼん', 'ほおん'], answer: 'ほん', explanation: '「本」の一般的な読みは「ほん」です。' },
                    { id: 6, level: 'beginner', question: '「学校へ行きます。」の「へ」は何を示す？', choices: ['方向', '原因', '所有', '並列'], answer: '方向', explanation: '助詞「へ」は移動の方向を示します。' },
                    { id: 7, level: 'beginner', question: '「犬」の読みとして正しいものは？', choices: ['いぬ', 'ねこ', 'うま', 'とり'], answer: 'いぬ', explanation: '「犬」は「いぬ」と読みます。' },
                    { id: 8, level: 'beginner', question: '「私は学生です。」の「です」は何のために使う？', choices: ['丁寧さを示す', '過去を示す', '疑問を示す', '禁止を示す'], answer: '丁寧さを示す', explanation: '「です」は丁寧な断定表現です。' },
                    { id: 9, level: 'beginner', question: '「食べる」の過去形はどれ？', choices: ['食べた', '食べるた', '食べますた', '食べって'], answer: '食べた', explanation: '一段動詞「食べる」の過去形は「食べた」です。' },
                    { id: 10, level: 'beginner', question: '「大きい」の反対語は？', choices: ['小さい', '高い', '遠い', '重い'], answer: '小さい', explanation: '「大きい」の反対語は「小さい」です。' },
                    { id: 11, level: 'beginner', question: '数え方で「三人」はどう読む？', choices: ['さんにん', 'みにん', 'さんびと', 'みっつにん'], answer: 'さんにん', explanation: '人の助数詞は「にん」を使い、「三人」は「さんにん」です。' },
                    { id: 12, level: 'beginner', question: '「今日」の読みとして一般的なのは？', choices: ['きょう', 'こんにち', 'あした', 'さくじつ'], answer: 'きょう', explanation: '日常会話では「きょう」と読むのが一般的です。' },
                    { id: 13, level: 'beginner', question: '「〜ません」は何を表す？', choices: ['否定', '過去', '推量', '命令'], answer: '否定', explanation: '「〜ません」は丁寧な否定表現です。' },
                    { id: 14, level: 'beginner', question: '「これはペンですか。」の文の種類は？', choices: ['疑問文', '命令文', '感嘆文', '条件文'], answer: '疑問文', explanation: '文末の「か」により疑問文になります。' },
                    { id: 15, level: 'beginner', question: '「赤い花」の「赤い」は何を修飾している？', choices: ['花', '赤い', 'は', 'い'], answer: '花', explanation: '形容詞「赤い」は名詞「花」を修飾します。' },
                    { id: 16, level: 'beginner', question: '「行きます」の辞書形は？', choices: ['行く', '行きる', '行った', '行ける'], answer: '行く', explanation: '「行きます」の辞書形は「行く」です。' },
                    { id: 17, level: 'beginner', question: '「〜で」は場所で何を示せる？', choices: ['動作が行われる場所', '移動の到着点', '所有者', '逆接'], answer: '動作が行われる場所', explanation: '助詞「で」は動作の行われる場所を示します。' },
                    { id: 18, level: 'beginner', question: '「静かだ」の丁寧形はどれ？', choices: ['静かです', '静かだです', '静かます', '静かかったです'], answer: '静かです', explanation: 'ナ形容詞「静かだ」の丁寧形は「静かです」です。' },
                    { id: 19, level: 'beginner', question: '「朝」の読みは？', choices: ['あさ', 'よる', 'ひる', 'ばん'], answer: 'あさ', explanation: '「朝」は「あさ」と読みます。' },
                    { id: 20, level: 'beginner', question: '「友だちと話す」の「と」は何を示す？', choices: ['相手・共同', '目的', '時点', '逆接'], answer: '相手・共同', explanation: '助詞「と」は一緒に行う相手を示します。' },

                    { id: 21, level: 'intermediate', question: '「雨が降りそうだ」の「そうだ」は何を表す？', choices: ['様態・推量', '伝聞のみ', '過去の確定', '命令'], answer: '様態・推量', explanation: '見た目や状況からの推量を表す「そうだ」です。' },
                    { id: 22, level: 'intermediate', question: '「読ませる」はどの活用形？', choices: ['使役形', '受身形', '可能形', '意向形'], answer: '使役形', explanation: '「〜させる」は使役の形です。' },
                    { id: 23, level: 'intermediate', question: '「もし時間があれば、行きます。」の条件表現はどれ？', choices: ['〜ば', '〜たらこそ', '〜ても', '〜ので'], answer: '〜ば', explanation: '仮定条件の基本形は「〜ば」です。' },
                    { id: 24, level: 'intermediate', question: '「彼は日本語が上手だ。」で自然な言い換えは？', choices: ['彼は日本語にたけている。', '彼は日本語を高い。', '彼は日本語をうまくいく。', '彼は日本語がのびる。'], answer: '彼は日本語にたけている。', explanation: '「たけている」は能力が高いことを表します。' },
                    { id: 25, level: 'intermediate', question: '「〜てしまう」が表せる意味として適切なのは？', choices: ['完了・遺憾', '推量のみ', '尊敬のみ', '受身のみ'], answer: '完了・遺憾', explanation: '「〜てしまう」は動作の完了や残念な気持ちを表せます。' },
                    { id: 26, level: 'intermediate', question: '「日本へ来てから、三年になります。」の「〜てから」は？', choices: ['起点', '逆接', '目的', '並列'], answer: '起点', explanation: '「〜てから」はある動作を起点にその後を述べます。' },
                    { id: 27, level: 'intermediate', question: '「忘れないように、メモします。」の「ように」は何を示す？', choices: ['目的', '確定事実', '引用', '禁止'], answer: '目的', explanation: '「〜ように」は目的を示す用法があります。' },
                    { id: 28, level: 'intermediate', question: '「行かなければならない」の意味は？', choices: ['義務', '希望', '推量', '完了'], answer: '義務', explanation: '「〜なければならない」は義務・必要を表します。' },
                    { id: 29, level: 'intermediate', question: '「食べられる」の用法としてこの文で自然なのは？「私は魚が___。」', choices: ['食べられる', '食べさせる', '食べてある', '食べさせられる'], answer: '食べられる', explanation: '「魚が食べられる」は可能の意味で自然です。' },
                    { id: 30, level: 'intermediate', question: '「彼に本を読まれた。」はどの意味？', choices: ['受身', '使役', '可能', '命令'], answer: '受身', explanation: '「〜られる」により受身の意味になります。' },
                    { id: 31, level: 'intermediate', question: '「〜たばかり」は何を表す？', choices: ['直後', '長期間の継続', '確実な未来', '命令'], answer: '直後', explanation: '「〜たばかり」は動作直後を表します。' },
                    { id: 32, level: 'intermediate', question: '「〜てもいい」は何を表す？', choices: ['許可', '禁止', '義務', '推量'], answer: '許可', explanation: '「〜てもいい」は許可を表す表現です。' },
                    { id: 33, level: 'intermediate', question: '「〜ないでください」の意味は？', choices: ['禁止・依頼', '強い命令', '勧誘', '願望'], answer: '禁止・依頼', explanation: '相手にしないでほしいと丁寧に依頼する表現です。' },
                    { id: 34, level: 'intermediate', question: '「〜ことがある」の用法として適切なのは？', choices: ['経験', '命令', '尊敬', '伝聞'], answer: '経験', explanation: '「〜たことがある」で経験を表します。' },
                    { id: 35, level: 'intermediate', question: '「日本語を勉強しているところです。」の「ところ」は？', choices: ['動作の局面', '場所のみ', '人称', '逆接'], answer: '動作の局面', explanation: '「〜ところだ」は動作の場面・局面を表します。' },
                    { id: 36, level: 'intermediate', question: '「〜にくい」の意味として正しいものは？', choices: ['しづらい', 'しやすい', '絶対可能', '完了した'], answer: 'しづらい', explanation: '「〜にくい」は実行しづらさを表します。' },
                    { id: 37, level: 'intermediate', question: '「〜ようと思う」の意味は？', choices: ['意志', '禁止', '受身', '尊敬'], answer: '意志', explanation: '「〜ようと思う」は話し手の意志を表します。' },
                    { id: 38, level: 'intermediate', question: '「〜ながら」の使い方として正しいのは？', choices: ['音楽を聞きながら勉強する。', '音楽を聞きながらに勉強する。', '音楽ながら勉強する。', '音楽を聞きながらだ勉強する。'], answer: '音楽を聞きながら勉強する。', explanation: '「〜ながら」は同時進行の動作を表します。' },
                    { id: 39, level: 'intermediate', question: '「〜予定だ」は何を表す？', choices: ['計画', '義務', '完了', '伝聞'], answer: '計画', explanation: '「〜予定だ」は予定・計画を示します。' },
                    { id: 40, level: 'intermediate', question: '「〜そうです（伝聞）」に最も近い表現は？', choices: ['〜と聞きました', '〜てみます', '〜たいです', '〜らしいですか'], answer: '〜と聞きました', explanation: '伝聞の「そうです」は聞いた情報を伝えます。' },

                    { id: 41, level: 'advanced', question: '「〜ざるを得ない」の意味として最も近いものは？', choices: ['そうするしかない', '絶対にしたくない', '自由に選べる', '一度だけする'], answer: 'そうするしかない', explanation: '「〜ざるを得ない」は避けられずそうする必要があるという意味です。' },
                    { id: 42, level: 'advanced', question: '「恐縮ですが」の機能として最も適切なのは？', choices: ['依頼前のクッション表現', '強い命令', '話題転換のみ', '断定の強調'], answer: '依頼前のクッション表現', explanation: '相手への配慮を示しながら依頼する時に使います。' },
                    { id: 43, level: 'advanced', question: '「彼の説明は要を得ている」の意味は？', choices: ['要点を的確に押さえている', '説明が長すぎる', '事実と逆である', '感情的すぎる'], answer: '要点を的確に押さえている', explanation: '「要を得る」はポイントを外さないことを意味します。' },
                    { id: 44, level: 'advanced', question: '「〜に越したことはない」の使い方として自然なのは？', choices: ['早めに準備できるに越したことはない。', '雨に越したことはない。', '食べるに越したことはないですか？', '静かに越したことはない。'], answer: '早めに準備できるに越したことはない。', explanation: '「Aに越したことはない」は「Aが最も望ましい」という意味で使います。' },
                    { id: 45, level: 'advanced', question: '「〜かねる」の意味として適切なのは？', choices: ['〜するのが難しい', '〜する予定だ', '〜してもよい', '〜したくてたまらない'], answer: '〜するのが難しい', explanation: '「〜かねる」は心理的・状況的に実行困難な意味です。' },
                    { id: 46, level: 'advanced', question: '「本件につきましては、追ってご連絡いたします。」の「追って」は？', choices: ['後ほど', 'すぐに', '二度と', '偶然'], answer: '後ほど', explanation: '「追って」は時間をおいて後で、という意味です。' },
                    { id: 47, level: 'advanced', question: '「〜を皮切りに」の意味は？', choices: ['最初のきっかけとして', '最後の段階で', '同時並行で', '偶然にも'], answer: '最初のきっかけとして', explanation: '「〜を皮切りに」はある事柄を起点に展開することを表します。' },
                    { id: 48, level: 'advanced', question: '「〜に伴って」の用法として正しいのは？', choices: ['人口の増加に伴って、問題も増えた。', '人口の増加に伴って、静かだ。', '人口の増加を伴ってに、問題も増えた。', '人口に伴って増加、問題も増えた。'], answer: '人口の増加に伴って、問題も増えた。', explanation: '「〜に伴って」はAの変化とともにBが起こることを示します。' },
                    { id: 49, level: 'advanced', question: '「〜にほかならない」の意味は？', choices: ['まさに〜だ', '〜ではない', '〜かもしれない', '〜だけれども'], answer: 'まさに〜だ', explanation: '強い断定で「他でもなくそれだ」と示す表現です。' },
                    { id: 50, level: 'advanced', question: '「〜ずにはいられない」はどんな気持ちを表す？', choices: ['抑えられない', '完全な無関心', '確定過去', '義務'], answer: '抑えられない', explanation: '自然にそうしてしまう、我慢できない気持ちを表します。' },
                    { id: 51, level: 'advanced', question: '「〜に際して」の使い方として自然なのは？', choices: ['入学に際して、必要書類を確認してください。', '入学に際して、昨日雨だった。', '入学に際してを、確認してください。', '入学際してに、確認してください。'], answer: '入学に際して、必要書類を確認してください。', explanation: '「〜に際して」は重要な機会・場面にあたってを意味します。' },
                    { id: 52, level: 'advanced', question: '「〜ないまでも」の意味として近いものは？', choices: ['少なくとも〜は', '絶対に〜ない', 'ほとんど〜だ', '〜してはいけない'], answer: '少なくとも〜は', explanation: '全面的ではないが最低限その程度は、という含みです。' },
                    { id: 53, level: 'advanced', question: '「〜を余儀なくされる」の意味は？', choices: ['やむを得ずそうする', '自発的に楽しんでする', '二度としない', '推量するだけ'], answer: 'やむを得ずそうする', explanation: '外的要因でやらざるを得ない状況を表します。' },
                    { id: 54, level: 'advanced', question: '「〜といえども」の機能は？', choices: ['例外を認めない逆接', '原因説明', '単純な並列', '丁寧化のみ'], answer: '例外を認めない逆接', explanation: '「たとえ〜でも」の硬い言い方で例外を否定します。' },
                    { id: 55, level: 'advanced', question: '「〜をものともせず」の意味は？', choices: ['困難を気にせず', '困難を誇張して', '困難に負けて', '困難を避けて'], answer: '困難を気にせず', explanation: '障害をものともせずに行動する強さを表します。' },
                    { id: 56, level: 'advanced', question: '「〜次第だ」の使い方として最も自然なのは？', choices: ['準備ができ次第、出発します。', '準備ができ次第です、出発します。', '準備次第にでき、出発します。', '準備が次第、出発します。'], answer: '準備ができ次第、出発します。', explanation: '「〜次第」は「〜したらすぐに」を表します。' },
                    { id: 57, level: 'advanced', question: '「〜とはいえ」の意味に近いものは？', choices: ['そうは言っても', 'だからこそ', 'そのうえ', 'その結果'], answer: 'そうは言っても', explanation: '前件を一部認めつつ後件で修正する逆接です。' },
                    { id: 58, level: 'advanced', question: '「〜のみならず」の用法として適切なのは？', choices: ['彼は英語のみならず、中国語も話せる。', '彼は英語のみならず。', '彼はのみならず英語。', '彼は英語のみならずに話せる。'], answer: '彼は英語のみならず、中国語も話せる。', explanation: '「〜のみならず」は「〜だけでなく」を表します。' },
                    { id: 59, level: 'advanced', question: '「〜ずくめ」の意味は？', choices: ['同種のものばかり', 'ほとんどない', '少しだけある', '矛盾している'], answer: '同種のものばかり', explanation: '「黒ずくめ」「いいことずくめ」のように同種が続く意味です。' },
                    { id: 60, level: 'advanced', question: '「〜まみれ」の意味として正しいものは？', choices: ['何かがたくさん付着している', '清潔である', '完全に空である', '丁寧な尊敬語である'], answer: '何かがたくさん付着している', explanation: '「泥まみれ」など、物が一面につく状態を表します。' }
                ],
                FavoriteIds: [],
                QuestionOrder: [],
                CurrentIndex: 0,
                CurrentChoices: [],
                SelectedChoice: '',
                Answered: false,
                ResultOk: false,
                CorrectCount: 0,
                AnsweredCount: 0,
                FavoriteStorageKey: 'japanese-quiz-favorites-v1'
            },
            computed: {
                WorkingSet() {
                    let rows = this.QuizBank;
                    if (this.SelectedLevel !== 'all') {
                        rows = rows.filter(q => q.level === this.SelectedLevel);
                    }
                    if (this.FavoritesOnly) {
                        rows = rows.filter(q => this.FavoriteIds.includes(q.id));
                    }
                    return rows;
                },
                CurrentQuestion() {
                    if (!this.WorkingSet.length || !this.QuestionOrder.length) {
                        return null;
                    }
                    const id = this.QuestionOrder[this.CurrentIndex];
                    return this.WorkingSet.find(q => q.id === id) || null;
                },
                FavoriteQuestions() {
                    return this.QuizBank.filter(q => this.FavoriteIds.includes(q.id));
                },
                ProgressText() {
                    if (!this.CurrentQuestion || !this.WorkingSet.length) {
                        return '';
                    }
                    return `問題 ${this.CurrentIndex + 1} / ${this.WorkingSet.length}`;
                },
                Accuracy() {
                    if (!this.AnsweredCount) {
                        return 0;
                    }
                    return Math.round((this.CorrectCount / this.AnsweredCount) * 100);
                }
            },
            watch: {
                SelectedLevel() {
                    this.ResetQuiz();
                },
                FavoritesOnly() {
                    this.ResetQuiz();
                }
            },
            created() {
                this.LoadFavorites();
                this.ResetQuiz();
            },
            methods: {
                LevelText(level) {
                    if (level === 'beginner') return '初級';
                    if (level === 'intermediate') return '中級';
                    return '上級';
                },
                LevelColor(level) {
                    if (level === 'beginner') return 'green darken-1';
                    if (level === 'intermediate') return 'orange darken-2';
                    return 'red darken-2';
                },
                IsFavorite(id) {
                    return this.FavoriteIds.includes(id);
                },
                ToggleFavorite(id) {
                    if (this.IsFavorite(id)) {
                        this.FavoriteIds = this.FavoriteIds.filter(v => v !== id);
                    } else {
                        this.FavoriteIds.push(id);
                    }
                    this.SaveFavorites();
                    if (this.FavoritesOnly) {
                        this.ResetQuiz();
                    }
                },
                LoadFavorites() {
                    try {
                        const raw = localStorage.getItem(this.FavoriteStorageKey);
                        this.FavoriteIds = raw ? JSON.parse(raw) : [];
                    } catch (e) {
                        this.FavoriteIds = [];
                    }
                },
                SaveFavorites() {
                    localStorage.setItem(this.FavoriteStorageKey, JSON.stringify(this.FavoriteIds));
                },
                ShuffleChoices(choices) {
                    const out = choices.slice();
                    for (let i = out.length - 1; i > 0; i -= 1) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [out[i], out[j]] = [out[j], out[i]];
                    }
                    return out;
                },
                RefreshCurrentChoices() {
                    if (!this.CurrentQuestion) {
                        this.CurrentChoices = [];
                        return;
                    }
                    this.CurrentChoices = this.ShuffleChoices(this.CurrentQuestion.choices);
                },
                ResetQuestionOrder() {
                    this.QuestionOrder = this.WorkingSet.map(q => q.id);
                    this.CurrentIndex = 0;
                    this.SelectedChoice = '';
                    this.Answered = false;
                    this.RefreshCurrentChoices();
                },
                ResetQuiz() {
                    this.CorrectCount = 0;
                    this.AnsweredCount = 0;
                    this.ResetQuestionOrder();
                },
                Choose(choice) {
                    if (this.Answered || !this.CurrentQuestion) {
                        return;
                    }
                    this.SelectedChoice = choice;
                    this.Answered = true;
                    this.AnsweredCount += 1;
                    this.ResultOk = (choice === this.CurrentQuestion.answer);
                    if (this.ResultOk) {
                        this.CorrectCount += 1;
                    }
                },
                ChoiceColor(choice) {
                    if (!this.Answered) {
                        return '';
                    }
                    if (choice === this.CurrentQuestion.answer) {
                        return 'green';
                    }
                    if (choice === this.SelectedChoice && choice !== this.CurrentQuestion.answer) {
                        return 'red';
                    }
                    return '';
                },
                NextQuestion() {
                    if (!this.WorkingSet.length) {
                        return;
                    }
                    this.CurrentIndex += 1;
                    if (this.CurrentIndex >= this.QuestionOrder.length) {
                        this.CurrentIndex = 0;
                    }
                    this.SelectedChoice = '';
                    this.Answered = false;
                    this.RefreshCurrentChoices();
                },
                LoadFavorite(id) {
                    if (!this.WorkingSet.find(q => q.id === id)) {
                        this.FavoritesOnly = false;
                        this.SelectedLevel = 'all';
                    }
                    this.QuestionOrder = this.WorkingSet.map(q => q.id);
                    const idx = this.QuestionOrder.indexOf(id);
                    this.CurrentIndex = idx >= 0 ? idx : 0;
                    this.SelectedChoice = '';
                    this.Answered = false;
                    this.RefreshCurrentChoices();
                }
            }
        });
    </script>
