                name: '工程', children: [
                  { name: 'モアレ' },
                  { name: 'ドライダウン' },
                  { name: '裏抜け' },
                  { name: 'オフセット印刷' },
                  { name: 'オンデマンド印刷' },
                  { name: 'グラビア印刷' },
                  { name: '活版印刷' },
                  { name: '製版' },
                  { name: '断裁' },
                ]
              },
            ]
          },
        ],
        VisualBlender: [
          {
            name: '初期設定', children: [
              {
                name: 'プリファレンス', children: [
                  { name: 'Interface > Language = "Japanese"' },
                  { name: '入力 > キーボード > テンキーを模倣 = true' },
                  { name: '視点の操作 > 周回とパン > 選択部分を中心に回転 = true' },
                  { name: '視点の操作 > 周回とパン > 透視投影 = false' },
                  { name: '視点の操作 > 周回とパン > 深度 = true' },
                  { name: 'キーマップ > 3Dビュー > 詳細シェーディングバイメニューアイテム = true' },
                  { name: 'システム > cyclesレンダーデバイス > OptiX' },
                  { name: 'システム > メモリと制御 > アンドゥ回数 = 100' },
                ]
              },
              { name: 'ファイル > デフォルト > スタートアップファイルを保存' },
              { name: 'ビュー > 焦点距離 = 100mm' },
            ]
          },
          {
            name: 'アドオン', children: [
              { name: 'EdgeFlow    : メッシュ整地' },
              { name: 'tissue      : 幾何学的なオブジェクト作成' },
              { name: 'Blender GIS : 読み込みファイル拡張' },
            ]
          },
          {
            name: '用語', children: [
              { name: 'モーショングラフィクス' },
            ]
          },
        ]
      },
      created() {
        this.filteredVisualPhoto = JSON.parse(JSON.stringify(this.VisualPhoto));
        this.filteredVisualDraw = JSON.parse(JSON.stringify(this.VisualDraw));
        this.filteredVisualBlender = JSON.parse(JSON.stringify(this.VisualBlender));
        this.filteredVisualDesign = JSON.parse(JSON.stringify(this.VisualDesign));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) {
                collect(node.children);
              }
            });
          };
          collect(items);
          return ids;
        },
        updateOpenNodesVisualPhoto(newOpen) {
          this.openNodesVisualPhoto = newOpen;
        },
        updateOpenNodesVisualDraw(newOpen) {
          this.openNodesVisualDraw = newOpen;
        },
        updateOpenNodesVisualBlender(newOpen) {
          this.openNodesVisualBlender = newOpen;
        },
        updateOpenNodesVisualDesign(newOpen) {
          this.openNodesVisualDesign = newOpen;
        },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredVisualPhoto = JSON.parse(JSON.stringify(this.VisualPhoto));
            this.filteredVisualDraw = JSON.parse(JSON.stringify(this.VisualDraw));
            this.filteredVisualBlender = JSON.parse(JSON.stringify(this.VisualBlender));
            this.filteredVisualDesign = JSON.parse(JSON.stringify(this.VisualDesign));
            this.openNodesVisualPhoto = [];
            this.openNodesVisualDraw = [];
            this.openNodesVisualBlender = [];
            this.openNodesVisualDesign = [];
            return;
          }

          const filterTree = (items) => {
            return items.reduce((acc, item) => {
              const itemCopy = { ...item };
              const matches = item.name.toLowerCase().includes(query);

              if (item.children) {
                itemCopy.children = filterTree(item.children);
                if (itemCopy.children.length > 0 || matches) {
                  itemCopy.matches = matches;
                  acc.push(itemCopy);
                }
              } else if (matches) {
                itemCopy.matches = true;
                acc.push(itemCopy);
              }
              return acc;
            }, []);
          };

          this.filteredVisualPhoto = filterTree(JSON.parse(JSON.stringify(this.VisualPhoto)));
          this.filteredVisualDraw = filterTree(JSON.parse(JSON.stringify(this.VisualDraw)));
          this.filteredVisualBlender = filterTree(JSON.parse(JSON.stringify(this.VisualBlender)));
          this.filteredVisualDesign = filterTree(JSON.parse(JSON.stringify(this.VisualDesign)));

          this.openNodesVisualPhoto = this.collectAllNodeIds(this.filteredVisualPhoto);
          this.openNodesVisualDraw = this.collectAllNodeIds(this.filteredVisualDraw);
          this.openNodesVisualBlender = this.collectAllNodeIds(this.filteredVisualBlender);
          this.openNodesVisualDesign = this.collectAllNodeIds(this.filteredVisualDesign);
        }
      }
    });
  </script>
