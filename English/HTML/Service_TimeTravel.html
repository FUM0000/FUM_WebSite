      computed: {
        selectedYear() {
          return this.selectedYearValue;
        },
        hourAngle() {
          return (this.clockHour % 12) * 30 + this.clockMinute * 0.5;
        },
        minuteAngle() {
          return this.clockMinute * 6;
        },
        clockLabel() {
          const h = String(this.clockHour).padStart(2, '0');
          const m = String(this.clockMinute).padStart(2, '0');
          return `${h}:${m}`;
        },
        clockEvents() {
          return this.clock_list[String(this.clockHour)] || [];
        },
        japanEvents() {
          return this.japan_list[String(this.selectedYear)] || [];
        },
        worldEvents() {
          return this.world_list[String(this.selectedYear)] || [];
        },
        selectedMonthDay() {
          const parts = (this.selectedDate || '').split('-');
          if (parts.length !== 3) return '';
          return `${Number(parts[1])}/${Number(parts[2])}`;
        },
        calendarEvents() {
          if (!this.selectedMonthDay) return [];
          return this.calendar_list[this.selectedMonthDay] || [];
        }
      },
      mounted() {
        document.addEventListener('mousemove', this.onClockDragMove);
        document.addEventListener('mouseup', this.stopClockDrag);
        document.addEventListener('touchmove', this.onClockDragMove, { passive: false });
        document.addEventListener('touchend', this.stopClockDrag);
      },
      beforeDestroy() {
        document.removeEventListener('mousemove', this.onClockDragMove);
        document.removeEventListener('mouseup', this.stopClockDrag);
        document.removeEventListener('touchmove', this.onClockDragMove);
        document.removeEventListener('touchend', this.stopClockDrag);
      },
      methods: {
        startDialDrag(event) {
          this.isDialDragging = true;
          this.lastDialAngle = this.getDialAngle(event);
          this.dragMinuteRemainder = 0;
        },
        stopClockDrag() {
          this.isDialDragging = false;
          this.lastDialAngle = null;
          this.dragMinuteRemainder = 0;
        },
        onClockDragMove(event) {
          if (!this.isDialDragging) return;
          if (event.cancelable) event.preventDefault();
          this.updateClockFromDialDelta(event);
        },
        getPointerPosition(event) {
          if (event.touches && event.touches.length > 0) {
            return { x: event.touches[0].clientX, y: event.touches[0].clientY };
          }
          return { x: event.clientX, y: event.clientY };
        },
        getDialAngle(event) {
          const face = this.$refs.clockFace;
          if (!face) return null;

          const rect = face.getBoundingClientRect();
          const pointer = this.getPointerPosition(event);
          const x = pointer.x - rect.left - rect.width / 2;
          const y = pointer.y - rect.top - rect.height / 2;
          let angle = Math.atan2(y, x) * 180 / Math.PI + 90;
          if (angle < 0) angle += 360;
          return angle;
        },
        applyMinuteDelta(deltaMinutes) {
          if (!deltaMinutes) return;
          const total = this.clockHour * 60 + this.clockMinute;
          const next = ((total + deltaMinutes) % 1440 + 1440) % 1440;
          this.clockHour = Math.floor(next / 60);
          this.clockMinute = next % 60;
        },
        updateClockFromDialDelta(event) {
          const currentAngle = this.getDialAngle(event);
          if (currentAngle === null || this.lastDialAngle === null) {
            this.lastDialAngle = currentAngle;
            return;
          }

          let deltaAngle = currentAngle - this.lastDialAngle;
          if (deltaAngle > 180) deltaAngle -= 360;
          if (deltaAngle < -180) deltaAngle += 360;

          this.lastDialAngle = currentAngle;

          const minuteFloat = deltaAngle * 2 + this.dragMinuteRemainder;
          const minuteInt = minuteFloat >= 0 ? Math.floor(minuteFloat) : Math.ceil(minuteFloat);
          this.dragMinuteRemainder = minuteFloat - minuteInt;
          this.applyMinuteDelta(minuteInt);
        },
        updateSelectedYear(value) {
          if (typeof value !== 'string') return;
          const year = Number(value.split('-')[0]);
          if (!Number.isNaN(year)) {
            this.selectedYearValue = year;
          }
        },
        onDateInput(value) {
          this.updateSelectedYear(value);
        },
        onPickerDateChange(value) {
          this.updateSelectedYear(value);
        }
      }
    })
