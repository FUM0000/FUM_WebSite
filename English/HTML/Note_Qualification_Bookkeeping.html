  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>

  <script>

          { "name": "出題形式", "description": "大問形式で仕訳・帳簿・決算整理・財務諸表が横断的に出題。CBT/統一試験いずれでも時間配分と転記精度が合否を左右する。" },

          {
            "name": "3. 商品売買と付随論点",
            "children": [

              { "name": "値引・割戻し・返品処理" },
              { "name": "掛代金の回収/支払" },
              { "name": "消費税の基礎処理" }
            ]
          },
          {
            "name": "4. 手形・固定資産・その他",
            "children": [
              { "name": "約束手形・為替手形" },
              { "name": "有形固定資産の取得・売却" },

              { "name": "1問30秒目安の反復" }
            ]
          }
        ],
        NotesB: [
          {
            "name": "1. 主要簿と補助簿",
            "children": [
              { "name": "仕訳帳と総勘定元帳の関係" },
              { "name": "現金出納帳・当座預金出納帳" },
              { "name": "売掛金元帳・買掛金元帳" },
              { "name": "商品有高帳と統制勘定" }
            ]
          },
          {
            "name": "2. 転記と照合",
            "children": [
              { "name": "日付順・証憑順の処理" },
              { "name": "元帳残高の突合" },
              { "name": "補助簿合計と統制勘定の一致" },
              { "name": "訂正仕訳のルール" }
            ]
          },
          {
            "name": "3. 試算表",
            "children": [
              { "name": "合計試算表・残高試算表・合計残高試算表" },
              { "name": "一致しても誤りが残るケース" },
              { "name": "貸借不一致時の探索手順" },
              { "name": "桁ズレ・転記漏れの検出" }
            ]
          },
          {
            "name": "4. 第2問対策",
            "children": [
              { "name": "語句・理論問題で先行得点" },
              { "name": "空欄補充は連動科目から埋める" },
              { "name": "不明箇所は後回しで全体完了" },
              { "name": "最後に整合チェック" }
            ]
          },
          {
            "name": "5. 失点防止",
            "children": [
              { "name": "借貸の左右固定ルール" },
              { "name": "マイナス記入の禁止確認" },
              { "name": "問題文条件の線引き" },
              { "name": "計算欄と答案欄の二重確認" }
            ]
          }
        ],
        NotesC: [
          {
            "name": "1. 決算整理仕訳",
            "children": [
              { "name": "減価償却(直接法/間接法)" },
              { "name": "貸倒引当金の設定" },
              { "name": "前払/前受・未払/未収" },
              { "name": "消耗品・貯蔵品の整理" }
            ]
          },
          {
            "name": "2. 商品と棚卸",
            "children": [
              { "name": "期末商品の棚卸" },

            ]
          },
          {
            "name": "3. 精算表",
            "children": [
              { "name": "試算表欄→整理記入欄→PL/BS欄" },
              { "name": "相手科目漏れの検出" },

            ]
          },
          {
            "name": "4. 第3問対策",
            "children": [
              { "name": "転記→集計→検算を定型化" },
              { "name": "計算メモを残して再確認" },
              { "name": "時間配分(目安20/12/28)" },
              { "name": "部分点狙いの書き切り" }
            ]
          },
          {
            "name": "5. 直前確認",
            "children": [
              { "name": "決算整理の頻出仕訳総復習" },
              { "name": "苦手論点のみ再演習" },
              { "name": "本番用チェックリスト作成" },
              { "name": "見直し時間を必ず確保" }
            ]
          }
        ],
        NotesD: [
          {
            "name": "1. 損益計算書(P/L)",
            "children": [
              { "name": "売上総利益・営業利益・当期純利益" },
              { "name": "収益費用の対応関係" },
              { "name": "表示順序と符号" },
              { "name": "利益計算の検算" }
            ]
          },
          {
            "name": "2. 貸借対照表(B/S)",
            "children": [
              { "name": "資産=負債+純資産" },

              { "name": "貸借一致の確認" }
            ]
          },
          {
            "name": "3. 財務諸表の連動理解",
            "children": [
              { "name": "仕訳→元帳→試算表→精算表→財務諸表" },
              { "name": "当期純利益の流れ" },
              { "name": "決算整理が与える影響" },
              { "name": "整合性チェック手順" }
            ]
          },
          {
            "name": "4. 本試験戦略",
            "children": [
              { "name": "大問ごとの得点目標設定" },
              { "name": "解く順序を固定" },
              { "name": "難問は後回しで失点抑制" },
              { "name": "見直しで計算ミス回収" }
            ]
          },
          {
            "name": "5. 合格直結チェック",
            "children": [
              { "name": "主要仕訳を即答できる" },
              { "name": "試算表・精算表を自力完成できる" },
              { "name": "PL/BSを時間内に作成できる" },
              { "name": "模試で70点超を安定化" }
            ]
          }
        ]
      },
      created() {
        this.filteredA = JSON.parse(JSON.stringify(this.NotesA));
        this.filteredB = JSON.parse(JSON.stringify(this.NotesB));
        this.filteredC = JSON.parse(JSON.stringify(this.NotesC));
        this.filteredD = JSON.parse(JSON.stringify(this.NotesD));
      },
      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) collect(node.children);
            });
          };
          collect(items);
          return ids;
        },
        updateOpenA(newOpen) { this.openA = newOpen; },
        updateOpenB(newOpen) { this.openB = newOpen; },
        updateOpenC(newOpen) { this.openC = newOpen; },
        updateOpenD(newOpen) { this.openD = newOpen; },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredA = JSON.parse(JSON.stringify(this.NotesA));
            this.filteredB = JSON.parse(JSON.stringify(this.NotesB));
            this.filteredC = JSON.parse(JSON.stringify(this.NotesC));
            this.filteredD = JSON.parse(JSON.stringify(this.NotesD));
            this.openA = []; this.openB = []; this.openC = []; this.openD = [];
            return;
          }
          const filterTree = (items) => items.reduce((acc, item) => {
            const itemCopy = { ...item };
            const matches = item.name.toLowerCase().includes(query);
            if (item.children) {
              itemCopy.children = filterTree(item.children);
              if (itemCopy.children.length > 0 || matches) {
                itemCopy.matches = matches;
                acc.push(itemCopy);
              }
            } else if (matches) {
              itemCopy.matches = true;
              acc.push(itemCopy);
            }
            return acc;
          }, []);

          this.filteredA = filterTree(JSON.parse(JSON.stringify(this.NotesA)));
          this.filteredB = filterTree(JSON.parse(JSON.stringify(this.NotesB)));
          this.filteredC = filterTree(JSON.parse(JSON.stringify(this.NotesC)));
          this.filteredD = filterTree(JSON.parse(JSON.stringify(this.NotesD)));
          this.openA = this.collectAllNodeIds(this.filteredA);
          this.openB = this.collectAllNodeIds(this.filteredB);
          this.openC = this.collectAllNodeIds(this.filteredC);
          this.openD = this.collectAllNodeIds(this.filteredD);
        }
      }
    });
  </script>
</body>

</html>
