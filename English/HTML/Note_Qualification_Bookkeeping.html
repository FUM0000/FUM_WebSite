    .glossary-inline {
      display: grid;
      grid-template-columns: minmax(110px, 34%) minmax(0, 1fr);

      align-items: start;
      width: 100%;

  <title>Bookkeeping Grade 3</title>
</head>

<body>

  <v-app id="App" v-cloak>
    <template>

      <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Note > Bookkeeping > Grade 3</main-system-bar>

      <v-main id="Main">
        <transition name="Fade_Page">
          <v-container v-show="Ready_Page" fluid fill-height class="pa-5" style="display: flex; align-content: center;">

            <v-row justify="center">
              <v-col xs="12" md="6">

                <v-card>
                  <v-card-title class="content-text">試験について</v-card-title>
                  <v-card-text>
                    <v-stepper v-model="Count_Step_1">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_1 > 1" step="1" @click="Count_Step_1 = 1" class="step-title">概要</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_1 > 2" step="2" @click="Count_Step_1 = 2" class="step-title">出題傾向</v-stepper-step>
                      </v-stepper-header>

                      <v-stepper-items>
                        <v-stepper-content step="1">
                          <v-card class="mb-12">
                            <v-card-text>
                              <v-card-title class="text-subtitle-2 font-weight-bold">概要</v-card-title>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 30%; min-width: 120px;">項目</th>
                                      <th class="text-left" style="width: 70%; min-width: 400px;">説明</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in overview" :key="item.name">
                                      <td style="padding: 12px;">{{ item.name }}</td>
                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn color="primary" @click="Count_Step_1 = 2">次へ</v-btn>
                          </div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12">
                            <v-card-text>
                              <p class="text-subtitle-2 font-weight-bold">出題傾向</p>
                              <v-simple-table>
                                <template v-slot:default>
                                  <thead style="background-color: #CFD8DC;">
                                    <tr>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">分野</th>
                                      <th class="text-left" style="width: 25%; min-width: 100px;">割合</th>
                                      <th class="text-left" style="width: 50%; min-width: 200px;">傾向</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    <tr v-for="item in exam_trend" :key="item.name">
                                      <td style="padding: 12px;">{{ item.name }}</td>
                                      <td v-html="item.rate" style="font-size: 16px; padding: 12px;"></td>
                                      <td v-html="item.description" style="font-size: 16px; padding: 12px;"></td>
                                    </tr>
                                  </tbody>
                                </template>
                              </v-simple-table>
                              <p class="mt-4 text-caption" style="color: #666;">※上記の割合は、公式シラバスや過去問題傾向を基にした推定値であり、実際の試験では変動する可能性があります。</p>
                            </v-card-text>
                          </v-card>
                          <div class="button-container">
                            <v-btn text @click="Count_Step_1 = 1">戻る</v-btn>
                          </div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>

                <v-card class="mt-6">
                  <v-card-title class="content-text">学習</v-card-title>
                  <v-card-text>
                    <v-text-field v-model="searchQuery" label="学習内容を検索" prepend-inner-icon="mdi-magnify" clearable outlined dense class="mb-4" @input="filterTreeview"></v-text-field>

                    <v-stepper v-model="Count_Step_2">
                      <v-stepper-header>
                        <v-stepper-step :complete="Count_Step_2 > 1" step="1" @click="Count_Step_2 = 1" class="step-title">{{ learningLabels[0] }}</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_2 > 2" step="2" @click="Count_Step_2 = 2" class="step-title">{{ learningLabels[1] }}</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_2 > 3" step="3" @click="Count_Step_2 = 3" class="step-title">{{ learningLabels[2] }}</v-stepper-step>
                        <v-divider></v-divider>
                        <v-stepper-step :complete="Count_Step_2 > 4" step="4" @click="Count_Step_2 = 4" class="step-title">{{ learningLabels[3] }}</v-stepper-step>
                      </v-stepper-header>

                        <v-stepper-items>
                          <v-stepper-content step="1">
                          <v-card class="mb-12"><v-card-text>
                            <v-card-title class="text-subtitle-2 font-weight-bold">{{ learningLabels[0] }}</v-card-title>
                            <v-treeview :items="filteredA" item-key="name" activatable open-on-click dense :open.sync="openA" @update:open="updateOpenA">
                              <template v-slot:label="{ item }">
                                <div v-if="item.definition" class="glossary-inline" :class="{ 'search-highlight': item.matches }">
                                  <span class="glossary-inline__term">{{ item.name }}</span>
                                  <span class="glossary-inline__description">{{ item.definition }}</span>
                                </div>
                                <span v-else :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                              </template>
                            </v-treeview>
                          </v-card-text></v-card>
                          <div class="button-container"><v-btn color="primary" @click="Count_Step_2 = 2">次へ</v-btn></div>
                        </v-stepper-content>

                        <v-stepper-content step="2">
                          <v-card class="mb-12"><v-card-text>
                            <v-card-title class="text-subtitle-2 font-weight-bold">{{ learningLabels[1] }}</v-card-title>
                            <v-treeview :items="filteredB" item-key="name" activatable open-on-click dense :open.sync="openB" @update:open="updateOpenB">
                              <template v-slot:label="{ item }">
                                <div v-if="item.definition" class="glossary-inline" :class="{ 'search-highlight': item.matches }">
                                  <span class="glossary-inline__term">{{ item.name }}</span>
                                  <span class="glossary-inline__description">{{ item.definition }}</span>
                                </div>
                                <span v-else :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                              </template>
                            </v-treeview>
                          </v-card-text></v-card>
                          <div class="button-container"><v-btn text @click="Count_Step_2 = 1">戻る</v-btn><v-btn color="primary" @click="Count_Step_2 = 3">次へ</v-btn></div>
                        </v-stepper-content>

                        <v-stepper-content step="3">
                          <v-card class="mb-12"><v-card-text>
                            <v-card-title class="text-subtitle-2 font-weight-bold">{{ learningLabels[2] }}</v-card-title>
                            <v-treeview :items="filteredC" item-key="name" activatable open-on-click dense :open.sync="openC" @update:open="updateOpenC">
                              <template v-slot:label="{ item }">
                                <div v-if="item.definition" class="glossary-inline" :class="{ 'search-highlight': item.matches }">
                                  <span class="glossary-inline__term">{{ item.name }}</span>
                                  <span class="glossary-inline__description">{{ item.definition }}</span>
                                </div>
                                <span v-else :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                              </template>
                            </v-treeview>
                          </v-card-text></v-card>
                          <div class="button-container"><v-btn text @click="Count_Step_2 = 2">戻る</v-btn><v-btn color="primary" @click="Count_Step_2 = 4">次へ</v-btn></div>
                        </v-stepper-content>

                        <v-stepper-content step="4">
                          <v-card class="mb-12"><v-card-text>
                            <v-card-title class="text-subtitle-2 font-weight-bold">{{ learningLabels[3] }}</v-card-title>
                            <v-treeview :items="filteredD" item-key="name" activatable open-on-click dense :open.sync="openD" @update:open="updateOpenD">
                              <template v-slot:label="{ item }">
                                <div v-if="item.definition" class="glossary-inline" :class="{ 'search-highlight': item.matches }">
                                  <span class="glossary-inline__term">{{ item.name }}</span>
                                  <span class="glossary-inline__description">{{ item.definition }}</span>
                                </div>
                                <span v-else :class="{ 'search-highlight': item.matches }">{{ item.name }}</span>
                              </template>
                            </v-treeview>
                          </v-card-text></v-card>
                          <div class="button-container"><v-btn text @click="Count_Step_2 = 3">戻る</v-btn></div>
                        </v-stepper-content>
                      </v-stepper-items>
                    </v-stepper>
                  </v-card-text>
                </v-card>

              </v-col>
            </v-row>
          </v-container>
        </transition>
      </v-main>

      <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
      <main-footer></main-footer>
    </template>
  </v-app>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
  <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

  <script>
    new Vue({
      el: '#App',
      vuetify: new Vuetify(),
      mixins: [window.Mixins_Common],
      data: {
        Count_Step_1: 1,
        Count_Step_2: 1,
        dialog: false,
        searchQuery: '',
        filteredA: [],
        filteredB: [],
        filteredC: [],
        filteredD: [],
        openA: [],
        openB: [],
        openC: [],
        openD: [],
        overview: [
          { "name": "学習目的", "description": "日商簿記3級は会社のお金の動きを記録計算する商業簿記。簿記の流れ(取引→仕訳→転記→試算表→決算整理→財務諸表)を一貫して処理できる状態を作る。" },
          { "name": "試験形式", "description": "問題数は3題以内。制限時間60分。" },
          { "name": "合格基準", "description": "100点満点中70点以上。" },
          { "name": "出題範囲", "description": "簿記の基礎、日常取引、帳簿、試算表、決算整理、精算表、P/L・B/S" }
        ],
        exam_trend: [
          { "name": "簿記の基礎", "rate": "25%", "description": "簿記の目的、5要素、借方・貸方、勘定科目、仕訳の基本ルール。" },
          { "name": "日常の取引処理", "rate": "35%", "description": "現金預金、商品売買、掛取引、手形、電子記録債権、固定資産、費用収益の仕訳。" },
          { "name": "決算処理", "rate": "25%", "description": "試算表、決算整理仕訳、減価償却、貸倒引当金、前払・未払・前受・未収、精算表。" },
          { "name": "財務諸表", "rate": "15%", "description": "損益計算書(P/L)と貸借対照表(B/S)の作成と整合確認。" }
        ],
        learningLabels: ["簿記の基礎", "日常取引処理", "決算処理", "財務諸表・試験対策"],
        NotesA: [
          {
            "name": "1. 簿記の流れと基本用語",
            "children": [
              { "name": "簿記の流れ", "definition": "取引→仕訳→転記→試算表→決算整理→財務諸表の順で進む。" },
              { "name": "取引", "definition": "お金や物の出入りなど、簿記で記録する出来事。日付も必ず押さえる。" },
              { "name": "仕訳", "definition": "1つの取引を借方と貸方に分けて仕訳帳へ記録すること。決算書を直接作る作業ではない。" },
              { "name": "転記", "definition": "仕訳帳の内容を総勘定元帳へ移し、勘定科目ごとに整理すること。" },
              { "name": "試算表", "definition": "勘定科目ごとに仕訳結果を集計し、帳簿の正誤を確認する。" },
              { "name": "決算整理", "definition": "減価償却、繰越商品、貸倒引当金、前払・未払・前受・未収などを期末に調整する。" },
              { "name": "簿記", "definition": "企業の取引を記録・計算・整理し、経営成績と財政状態を示す技術。" },
              { "name": "経営成績", "definition": "一定期間の黒字・赤字などの成果（損益）のこと。" },
              { "name": "会計期間", "definition": "期首から期末までの、損益を測定する対象期間。" },
              { "name": "複式簿記", "definition": "1つの取引を借方と貸方の両面で記録する方法。" },
              { "name": "財産・資産・負債・純資産を帳簿で管理する" },
              { "name": "会計期間は期首→期中→期末(決算日)で進む" },
              { "name": "複式簿記・仕訳・売掛金・買掛金・会計期間を最優先で定着させる" }
            ]
          },
          {
            "name": "2. 5要素と借貸ルール",
            "children": [
              { "name": "借方・貸方の見え方", "definition": "各工程で借方・貸方を使うが、目的により表記の出し方が異なる。仕訳では両側を明示し、元帳や精算表では整理の仕方が変わる。" },
              { "name": "資産・費用は借方で増加、貸方で減少" },
              { "name": "負債・純資産・収益は貸方で増加、借方で減少" },
              { "name": "借方合計と貸方合計は必ず一致" }
            ]
          },
          {
            "name": "3. 勘定科目",
            "children": [
              {
                "name": "資産",
                "children": [
                  { "name": "資産", "definition": "将来のプラスになる財産。基本的に借方で増加する。" },
                  { "name": "現金", "definition": "手元にある通貨。金庫内の紙幣・硬貨など。" },
                  { "name": "当座預金", "definition": "小切手や手形の決済に使う預金。" },
                  { "name": "普通預金", "definition": "自由に預け入れや引き出しができる預金。" },
                  { "name": "売掛金", "definition": "掛売上によって将来受け取る代金。" },
                  { "name": "受取手形", "definition": "将来代金を受け取る権利を示す手形。" },
                  { "name": "有価証券", "definition": "株式や社債などの証券。取得原価は購入代価に売買手数料などの付随費用を加えて求める。" },
                  { "name": "土地", "definition": "事業用に保有する土地。" },
                  { "name": "建物", "definition": "店舗や事務所などの建物。" },
                  { "name": "備品", "definition": "机・椅子・パソコンなどの器具備品。" },
                  { "name": "車両運搬具", "definition": "自動車や配送用車両など。" },
                  { "name": "貸付金", "definition": "他者へ貸し付けたお金。貸し付け時は資産として計上し、回収時は受取利息と区別して処理する。" },
                  { "name": "未収入金", "definition": "営業外取引などで後日受け取るお金。商品販売による売掛金とは区別する。" },
                  { "name": "前払金", "definition": "商品やサービスの受け取り前に先に支払った金額。" },
                  { "name": "仮払金", "definition": "内容未確定のまま一時的に支払った金額。" },
                  { "name": "繰越商品", "definition": "期末に残って次期へ繰り越す商品。" },
                  { "name": "前払費用", "definition": "次期分を先に支払った費用。" },
                  { "name": "未収収益", "definition": "当期分だが未受取の収益。" },
                  { "name": "資産の注意", "definition": "前払金と前払費用、売掛金と未収入金の区別を意識する。売掛金は商品売買など営業取引、未収入金は固定資産売却など営業外取引で使う。" }
                ]
              },
              {
                "name": "負債",
                "children": [
                  { "name": "負債", "definition": "将来支払う義務。基本的に貸方で増加する。" },
                  { "name": "買掛金", "definition": "掛仕入で後日に支払う義務。" },
                  { "name": "支払手形", "definition": "将来代金を支払う義務を示す手形。" },
                  { "name": "借入金", "definition": "金融機関などから借りたお金。借入時は負債として計上し、返済時は支払利息と区別して処理する。" },
                  { "name": "未払金", "definition": "営業外取引などで後日支払うお金。商品仕入による買掛金とは区別する。" },
                  { "name": "前受金", "definition": "商品やサービスの提供前に先に受け取った金額。" },
                  { "name": "仮受金", "definition": "内容未確定のまま一時的に受け取った金額。" },
                  { "name": "未払費用", "definition": "当期分だが未払いの費用。" },
                  { "name": "前受収益", "definition": "次期分を先に受け取った収益。" },
                  { "name": "負債の注意", "definition": "前受金と前受収益、買掛金と未払金の違いを押さえる。買掛金は商品売買など営業取引、未払金は備品購入など営業外取引で使う。" }
                ]
              },
              {
                "name": "純資産",
                "children": [
                  { "name": "純資産", "definition": "返済義務のない自己資本。基本的に貸方で増加する。" },
                  { "name": "資本金", "definition": "元入れされた自己資本。純資産の中心科目。" }
                ]
              },
              {
                "name": "収益",
                "children": [
                  { "name": "収益", "definition": "利益のもとになる稼ぎ。基本的に貸方で増加する。" },
                  { "name": "売上", "definition": "商品やサービスを提供して得た収益。" },
                  { "name": "受取利息", "definition": "預金や貸付によって受け取る利息。" },
                  { "name": "受取手数料", "definition": "仲介や事務処理などで受け取る手数料。" },
                  { "name": "受取地代", "definition": "土地の貸付で受け取る収益。" },
                  { "name": "受取家賃", "definition": "建物や部屋の貸付で受け取る収益。" },
                  { "name": "受取配当金", "definition": "株式保有などにより受け取る配当。" },
                  { "name": "収益の注意", "definition": "受取系の科目は収益か資産かを文脈で見分ける。" }
                ]
              },
              {
                "name": "費用",
                "children": [
                  { "name": "費用", "definition": "収益を得るためにかかった支出。基本的に借方で増加する。" },
                  { "name": "仕入", "definition": "販売目的の商品を仕入れたときの費用科目。" },
                  { "name": "支払利息", "definition": "借入金などに対して支払う利息。" },
                  { "name": "減価償却費", "definition": "固定資産の取得原価を使用期間に配分した費用。" },
                  { "name": "水道光熱費", "definition": "電気・ガス・水道などの費用。" },

      methods: {
        collectAllNodeIds(items) {
          const ids = [];
          const collect = (nodes) => {
            nodes.forEach((node) => {
              ids.push(node.name);
              if (node.children) collect(node.children);
            });
          };
          collect(items);
          return ids;
        },
        updateOpenA(newOpen) { this.openA = newOpen; },
        updateOpenB(newOpen) { this.openB = newOpen; },
        updateOpenC(newOpen) { this.openC = newOpen; },
        updateOpenD(newOpen) { this.openD = newOpen; },
        filterTreeview() {
          const query = this.searchQuery ? this.searchQuery.toLowerCase().trim() : '';
          if (!query) {
            this.filteredA = JSON.parse(JSON.stringify(this.NotesA));
            this.filteredB = JSON.parse(JSON.stringify(this.NotesB));
            this.filteredC = JSON.parse(JSON.stringify(this.NotesC));
            this.filteredD = JSON.parse(JSON.stringify(this.NotesD));
            this.openA = []; this.openB = []; this.openC = []; this.openD = [];
            return;
          }
          const filterTree = (items) => items.reduce((acc, item) => {
             const itemCopy = { ...item };
             const searchText = `${item.name} ${item.definition || ''}`.toLowerCase();
             const matches = searchText.includes(query);
             if (item.children) {
               itemCopy.children = filterTree(item.children);
              if (itemCopy.children.length > 0 || matches) {
                itemCopy.matches = matches;
                acc.push(itemCopy);
              }
            } else if (matches) {
              itemCopy.matches = true;
              acc.push(itemCopy);
            }
            return acc;
          }, []);

          this.filteredA = filterTree(JSON.parse(JSON.stringify(this.NotesA)));
          this.filteredB = filterTree(JSON.parse(JSON.stringify(this.NotesB)));
          this.filteredC = filterTree(JSON.parse(JSON.stringify(this.NotesC)));
          this.filteredD = filterTree(JSON.parse(JSON.stringify(this.NotesD)));
          this.openA = this.collectAllNodeIds(this.filteredA);
          this.openB = this.collectAllNodeIds(this.filteredB);
          this.openC = this.collectAllNodeIds(this.filteredC);
          this.openD = this.collectAllNodeIds(this.filteredD);
        }
