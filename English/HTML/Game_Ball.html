<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="author" content="F U M">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no">

    <link rel="shortcut icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.126.1/build/three.module.js';
        import { FBXLoader } from "https://unpkg.com/three@0.126.1/examples/jsm/loaders/FBXLoader.js";

        // Renderer
        const Renderer = new THREE.WebGLRenderer({ canvas: document.querySelector("#Canvas_1"), antialias: true });
        Renderer.setPixelRatio(window.devicePixelRatio);
        Renderer.setSize(window.innerWidth, window.innerHeight);
        window.addEventListener('resize', ResizeScreen, false);
        Renderer.setClearColor(new THREE.Color(0xFCA3B7));

        const Scene = new THREE.Scene();

        // フォグ（遠くをぼかす）
        Scene.fog = new THREE.Fog(0xFCA3B7, 3, 12);

        const Loader_FBX = new FBXLoader();

        // カメラ回転制御
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraRotation = { x: 0, y: 0 };

        document.addEventListener('touchstart', e => TouchStart(e.touches[0].clientX, e.touches[0].clientY));
        document.addEventListener('touchmove',  e => TouchMove (e.touches[0].clientX, e.touches[0].clientY));
        document.addEventListener('touchend',   () => TouchEnd());
        document.addEventListener('mousedown',  e => TouchStart(e.clientX, e.clientY));
        document.addEventListener('mousemove',  e => TouchMove (e.clientX, e.clientY));
        document.addEventListener('mouseup',    () => TouchEnd());

        // 定数
        let DeltaTime = 1 / 60;
        const Gravity = 9.8;
        const CalculationError_Time = 0.1;
        const Resistance = 0.998;

        // カメラクラス
        class Base_Camera_1_CLASS {
            #Object;
            #X = 0;
            #Y = 1.5;
            #Z = 0;

            constructor() {
                this.#Object = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 30);
                this.#Object.position.set(this.#X, this.#Y, this.#Z);
                this.#Object.lookAt(0, 0, 2);
            }
            Update() {
                this.#Object.rotation.order = 'YXZ';
                this.#Object.rotation.x = cameraRotation.x;
                this.#Object.rotation.y = cameraRotation.y;
                this.#Object.rotation.z = 0;
            }
            Get_Object() { return this.#Object; }
        }

        // タイマー制御クラス
        class Base_InputControler_1_CLASS {
            #Time_Flag_Finishing = true;
            #Time_Flag_Using = false;
            #Time_Timer = 0;
            Update() {
                if (this.#Time_Flag_Using) {
                    setTimeout(() => {
                        this.#Time_Flag_Using = false;
                        this.#Time_Flag_Finishing = true;
                    }, this.#Time_Timer * 1000);
                }
            }
            Get_Time_Flag_Finishing() { return this.#Time_Flag_Finishing; }
            Set_Timer(_time) {
                if (!this.#Time_Flag_Using) {
                    this.#Time_Timer = _time;
                    this.#Time_Flag_Using = true;
                    this.#Time_Flag_Finishing = false;
                }
            }
        }

        // ライト
        class Base_Light_Ambient_1_CLASS {
            constructor() {
                const light = new THREE.AmbientLight(0xffffff, 0.7);
                Scene.add(light);
            }
        }
        class Base_Light_Directional_1_CLASS {
            constructor() {
                const light = new THREE.DirectionalLight(0xffffff, 0.8);
                light.position.set(5, 10, 3);
                Scene.add(light);
            }
        }

        // ゲームマネージャ
        class Base_Manager_1_CLASS {
            #State = "Made";
            #Level = 1;
            #UI_Home_1;
            #UI_Start_1;
            #UI_Clear_1;
            #UI_Level_1;

            constructor() {
                // UI作成
                this.#UI_Home_1 = document.createElement('div');
                this.#UI_Home_1.id = "UI_Home_1";
                this.#UI_Home_1.innerHTML = "HOME";
                document.body.appendChild(this.#UI_Home_1);

                // リセットボタンを追加
                const UI_Reset_1 = document.createElement('div');
                UI_Reset_1.id = "UI_Reset_1";
                UI_Reset_1.innerHTML = "RESET";
                document.body.appendChild(UI_Reset_1);

                this.#UI_Start_1 = document.createElement('div');
                this.#UI_Start_1.id = "UI_Start_1";
                document.body.appendChild(this.#UI_Start_1);

                this.#UI_Clear_1 = document.createElement('div');
                this.#UI_Clear_1.id = "UI_Clear_1";
                document.body.appendChild(this.#UI_Clear_1);

                this.#UI_Level_1 = document.createElement('div');
                this.#UI_Level_1.id = "UI_Level_1";
                this.#UI_Level_1.innerHTML = "Level: 1";
                document.body.appendChild(this.#UI_Level_1);

                const UI_Shoot_1 = document.createElement('div');
                UI_Shoot_1.id = "UI_Shoot_1";
                UI_Shoot_1.innerHTML = "発射";
                document.body.appendChild(UI_Shoot_1);

                UI_Shoot_1.addEventListener('click', () => {
                    if (this.#State === "Playing") Ball_1.Shoot();
                });

                UI_Reset_1.addEventListener('click', () => {
                    this.Ready();
                });

                $("#UI_Home_1").click(() => {
                    window.location.href = '../../English/HTML/index.html';
                });
            }
            Initialize() {
                this.#State = "WaitingStart";
                this.#UI_Start_1.innerHTML = "";
            }
            Get_State() { return this.#State; }
            Set_State(_state) { this.#State = _state; }
            Get_Level() { return this.#Level; }
            Ready() {
                this.#State = "WaitingStart";
                this.#UI_Start_1.innerHTML = "START";
                this.#UI_Clear_1.innerHTML = "";
                Ball_1.Initialize();
                Progress_1.Initialize();
            }
            Start() {
                this.#State = "Playing";
                this.#UI_Start_1.innerHTML = "";
            }
            Clear() {
                this.#State = "Goal";
                this.#UI_Clear_1.innerHTML = "WOOOW! Level Up!";
                this.#Level++;
                this.#UI_Level_1.innerHTML = "Level: " + this.#Level;
                Ball_1.Set_Difficulty(this.#Level);
                PaperCup_1.Set_Difficulty(this.#Level);
            }
        }

        // ボール
        class Ball_1_CLASS {
            #Bounce_Count = 0;
            #Bounce_Max = 3;
            #Direction_Move = new THREE.Vector3();
            #ElapsedFrame_Firing = 0;
            #ElapsedFrame_Gravity = 0;
            #Flag_Cup = false;
            #Flag_Shoot = false;
            #Object = null;
            #Shadow_Object = null;
            #Shadow_Size = 0.02;
            #Previous_X = 0;
            #Previous_Y = 1;
            #Previous_Z = 0;
            #Ground_Bounce = 0.5;
            #Radius = 0.08;
            #Side_Bounce = 0.38;
            #Speed = 5;
            #Speed_Max = 8;
            #Speed_Base = 1;
            #Velocity_X = 0; #Velocity_Y = 0; #Velocity_Z = 0;
            #X = 0; #Y = 1; #Z = 0;

            constructor() {
                const size = 0.01;
                Loader_FBX.load('../../Asset/Model/Ball_PinPon_1.fbx', 
                    obj => {
                        this.#Object = obj;
                        this.#Object.scale.set(size, size, size);
                        Scene.add(this.#Object);
                    },
                    undefined,
                    err => console.error(err)
                );

                const shadowGeometry = new THREE.CircleGeometry(1, 48);
                const shadowMaterial = new THREE.MeshBasicMaterial({
                    color: 0x000000,
                    transparent: true,
                    opacity: 0.32,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const shadowTexture = this.CreateShadowTexture();
                shadowMaterial.map = shadowTexture;
                this.#Shadow_Object = new THREE.Mesh(shadowGeometry, shadowMaterial);
                this.#Shadow_Object.rotation.x = -Math.PI / 2;
                this.#Shadow_Object.scale.set(this.#Shadow_Size, this.#Shadow_Size, 1);
                this.#Shadow_Object.position.set(0, 0.05, 0);
                Scene.add(this.#Shadow_Object);
            }

            CreateShadowTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 1.0)');
                gradient.addColorStop(0.6, 'rgba(0, 0, 0, 0.5)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0.0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 256, 256);

                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                return texture;
            }

            Initialize() {
                this.#Bounce_Count = 0;
                this.#ElapsedFrame_Firing = 0;
                this.#ElapsedFrame_Gravity = 0;
                this.#Flag_Cup = false;
                this.#Flag_Shoot = false;
                this.#Velocity_X = this.#Velocity_Y = this.#Velocity_Z = 0;
                this.#Speed = this.#Speed_Base;
                this.#X = 0; this.#Y = 1; this.#Z = 0;
                this.#Previous_X = this.#X;
                this.#Previous_Y = this.#Y;
                this.#Previous_Z = this.#Z;
                if (this.#Object) this.#Object.position.set(0,1,0);
                if (this.#Shadow_Object) {
                    this.#Shadow_Object.scale.set(this.#Shadow_Size, this.#Shadow_Size, 1);
                    this.#Shadow_Object.position.set(0, 0.05, 0);
                }
            }

            Update() {
                if (!this.#Flag_Shoot) {
                    const cam = Base_Camera_1.Get_Object();
                    const dir = new THREE.Vector3();
                    cam.getWorldDirection(dir);
                    const dist = 0.5;
                    this.#X = cam.position.x + dir.x * dist;
                    this.#Y = cam.position.y + dir.y * dist;
                    this.#Z = cam.position.z + dir.z * dist;
                    if (this.#Object) this.#Object.position.set(this.#X, this.#Y, this.#Z);
                }

                if (this.#Flag_Shoot) {
                    this.#ElapsedFrame_Firing += DeltaTime;
                    if (this.#ElapsedFrame_Firing >= CalculationError_Time) {
                        this.#ElapsedFrame_Firing = 0;
                        this.Update_Shoot();
                    }
                }

                if (this.#Object) {
                    this.#Object.position.set(this.#X, this.#Y, this.#Z);
                }
                if (this.#Shadow_Object) {
                    this.#Shadow_Object.position.set(this.#X, 0.05, this.#Z);
                }
            }

            Update_Shoot() {
                this.#Previous_X = this.#X;
                this.#Previous_Y = this.#Y;
                this.#Previous_Z = this.#Z;

                this.#Velocity_X *= Resistance;
                this.#Velocity_Z *= Resistance;

                this.#X += this.#Velocity_X * DeltaTime;
                this.#Y += this.#Velocity_Y * DeltaTime;
                this.#Z += this.#Velocity_Z * DeltaTime;

                this.#ElapsedFrame_Gravity += DeltaTime;
                if (this.#ElapsedFrame_Gravity >= CalculationError_Time) {
                    this.#ElapsedFrame_Gravity = 0;
                    this.#Velocity_Y -= Gravity * DeltaTime * 2; // 少し重めに
                }

                // 床との衝突（y=0）
                if (this.#Y <= this.#Radius) {
                    this.#Y = this.#Radius;
                    this.#Velocity_Y *= -this.#Ground_Bounce; // バウンド減衰
                    this.#Bounce_Count++;

                    if (this.#Bounce_Count >= this.#Bounce_Max) {
                        this.#Flag_Shoot = false;
                        Base_Manager_1.Ready();
                    }
                }

                // カップに入ったか
                if (PaperCup_1.Get_Object()) {
                    const cupObj = PaperCup_1.Get_Object();
                    const goalY = PaperCup_1.Get_Collision_Y();
                    const collisionRadius = PaperCup_1.Get_Collision_Radius();
                    const prevBottomY = this.#Previous_Y - this.#Radius;
                    const currBottomY = this.#Y - this.#Radius;
                    const crossedGoalPlane = (prevBottomY > goalY) && (currBottomY <= goalY);

                    if (PaperCup_1.Resolve_Side_Collision(
                        this,
                        this.#Previous_X, this.#Previous_Y, this.#Previous_Z,
                        this.#X, this.#Y, this.#Z
                    )) {
                        return;
                    }

                    let isGoal = false;
                    if (!this.#Flag_Cup && crossedGoalPlane) {
                        const denom = prevBottomY - currBottomY;
                        const t = Math.max(0, Math.min(1, Math.abs(denom) > 1e-6 ? (prevBottomY - goalY) / denom : 1));
                        const hitX = this.#Previous_X + (this.#X - this.#Previous_X) * t;
                        const hitZ = this.#Previous_Z + (this.#Z - this.#Previous_Z) * t;
                        const hitDX = hitX - cupObj.position.x;
                        const hitDZ = hitZ - cupObj.position.z;
                        const hitDistXZ = Math.hypot(hitDX, hitDZ);
                        isGoal = hitDistXZ <= collisionRadius;
                    }

                    if (isGoal) {
                        this.#Flag_Cup = true;
                        Base_Manager_1.Clear();
                        Base_InputControler_1.Set_Timer(2.5);
                    }
                }
            }

            Get_Object() { return this.#Object; }
            Get_Radius() { return this.#Radius; }
            Get_X() { return this.#X; }
            Get_Y() { return this.#Y; }
            Get_Z() { return this.#Z; }
            Get_Velocity_X() { return this.#Velocity_X; }
            Get_Velocity_Z() { return this.#Velocity_Z; }
            Set_X(x) { this.#X = x; }
            Set_Y(y) { this.#Y = y; }
            Set_Z(z) { this.#Z = z; }
            Set_Velocity_X(vx) { this.#Velocity_X = vx; }
            Set_Velocity_Z(vz) { this.#Velocity_Z = vz; }
            Get_Side_Bounce() { return this.#Side_Bounce; }
            Set_Shadow_Size(size) {
                this.#Shadow_Size = Math.max(0, size);
                if (this.#Shadow_Object) {
                    this.#Shadow_Object.scale.set(this.#Shadow_Size, this.#Shadow_Size, 1);
                }
            }
            Set_Difficulty(level) {
                this.#Speed_Base = 1;
            }
            Shoot() {
                const power = Progress_1.Get_Percentage() / 100;
                this.#Speed = this.#Speed_Base + (this.#Speed_Max - this.#Speed_Base) * power;

                const cam = Base_Camera_1.Get_Object();
                const dir = new THREE.Vector3();
                cam.getWorldDirection(dir);

                this.#Velocity_X = dir.x * this.#Speed;
                this.#Velocity_Y = dir.y * this.#Speed;
                this.#Velocity_Z = dir.z * this.#Speed;

                this.#Flag_Shoot = true;
            }
        }

        // 紙コップ
        class PaperCup_1_CLASS {
            #Height = 0.5;
            #Collision_Mesh = null;
            #Side_Collision_Mesh = null;
            #Collision_Offset_Y = 0.35;
            #Collision_Radius = 0.15;
            #Side_Collision_Bottom_Radius = 0.14;
            #Side_Collision_Top_Radius = 0.19;
            #Side_Collision_Height = 0.42;
            #Object = null;
            #Radius = 1;
            #X = 0; #Y = 0; #Z = 2;

            #Scale = 0.05;

            constructor() {
                Loader_FBX.load('../../Asset/Model/Cup_Paper_1.fbx',
                    obj => {
                        this.#Object = obj;
                        this.#Object.scale.set(this.#Scale, this.#Scale, this.#Scale);
                        this.#Object.position.set(this.#X, this.#Y, this.#Z);
                        Scene.add(this.#Object);
                        this.Update_Collision_Position();
                    },
                    undefined,
                    err => console.error(err)
                );

                const collisionGeometry = new THREE.CircleGeometry(this.#Collision_Radius, 48);
                const collisionMaterial = new THREE.MeshBasicMaterial({
                    color: 0x33ff99,
                    transparent: true,
                    opacity: 0.45,
                    side: THREE.DoubleSide
                });
                this.#Collision_Mesh = new THREE.Mesh(collisionGeometry, collisionMaterial);
                this.#Collision_Mesh.rotation.x = -Math.PI / 2;
                Scene.add(this.#Collision_Mesh);

                const sideCollisionGeometry = new THREE.CylinderGeometry(
                    this.#Side_Collision_Top_Radius,
                    this.#Side_Collision_Bottom_Radius,
                    this.#Side_Collision_Height,
                    48,
                    1,
                    true
                );
                const sideCollisionMaterial = new THREE.MeshBasicMaterial({
                    color: 0x3399ff,
                    transparent: true,
                    opacity: 0.25,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                this.#Side_Collision_Mesh = new THREE.Mesh(sideCollisionGeometry, sideCollisionMaterial);
                Scene.add(this.#Side_Collision_Mesh);

                this.Update_Collision_Position();
            }

            Get_Object() { return this.#Object; }
            Get_Collision_Radius() { return this.#Collision_Radius; }
            Get_Collision_Y() { return this.#Y + this.#Collision_Offset_Y; }
            Get_Radius() { return this.#Radius; }
            Get_Height() { return this.#Height; }
            Set_Side_Collision(
                bottomRadius = this.#Side_Collision_Bottom_Radius,
                topRadius = this.#Side_Collision_Top_Radius,
                height = this.#Side_Collision_Height
            ) {
                this.#Side_Collision_Bottom_Radius = Math.max(0.01, bottomRadius);
                this.#Side_Collision_Top_Radius = Math.max(0.01, topRadius);
                this.#Side_Collision_Height = Math.max(0.01, height);

                if (this.#Collision_Mesh && this.#Collision_Mesh.geometry) {
                    this.#Collision_Mesh.geometry.dispose();
                    this.#Collision_Mesh.geometry = new THREE.CircleGeometry(this.#Collision_Radius, 48);
                }
                if (this.#Side_Collision_Mesh && this.#Side_Collision_Mesh.geometry) {
                    this.#Side_Collision_Mesh.geometry.dispose();
                    this.#Side_Collision_Mesh.geometry = new THREE.CylinderGeometry(
                        this.#Side_Collision_Top_Radius,
                        this.#Side_Collision_Bottom_Radius,
                        this.#Side_Collision_Height,
                        48,
                        1,
                        true
                    );
                }
                this.Update_Collision_Position();
            }
            Set_Difficulty(level) {
                if (this.#Object) this.#Object.position.z = this.#Z;
                this.Update_Collision_Position();
            }
            Resolve_Side_Collision(ball, prevX, prevY, prevZ, currX, currY, currZ) {
                const eps = 1e-5;
                const ballRadius = ball.Get_Radius();
                const minY = this.#Y - ballRadius;
                const maxY = this.#Y + this.#Side_Collision_Height + ballRadius;
                const segVY = currY - prevY;

                let tMin = 0;
                let tMax = 1;
                if (Math.abs(segVY) < eps) {
                    if (prevY < minY || prevY > maxY) return false;
                } else {
                    const tA = (minY - prevY) / segVY;
                    const tB = (maxY - prevY) / segVY;
                    tMin = Math.max(0, Math.min(tA, tB));
                    tMax = Math.min(1, Math.max(tA, tB));
                    if (tMax < tMin) return false;
                }

                const dx0 = prevX - this.#X;
                const dz0 = prevZ - this.#Z;
                const vxSeg = currX - prevX;
                const vzSeg = currZ - prevZ;

                const radiusSlope = (this.#Side_Collision_Top_Radius - this.#Side_Collision_Bottom_Radius) / this.#Side_Collision_Height;
                const rAt0 = this.#Side_Collision_Bottom_Radius + radiusSlope * (prevY - this.#Y);
                const rVel = radiusSlope * segVY;

                const signedAt = (_t) => {
                    const x = prevX + vxSeg * _t;
                    const y = prevY + segVY * _t;
                    const z = prevZ + vzSeg * _t;
                    const radius = this.#Side_Collision_Bottom_Radius + radiusSlope * (y - this.#Y);
                    const dist = Math.hypot(x - this.#X, z - this.#Z);
                    return dist - radius;
                };

                const startSigned = signedAt(0);
                const startOutside = startSigned >= 0;
                const radiusOffset = startOutside ? ballRadius : -ballRadius;
                const effectiveRAt0 = rAt0 + radiusOffset;

                const A = (vxSeg * vxSeg + vzSeg * vzSeg) - (rVel * rVel);
                const B = 2 * (dx0 * vxSeg + dz0 * vzSeg - effectiveRAt0 * rVel);
                const C = (dx0 * dx0 + dz0 * dz0) - (effectiveRAt0 * effectiveRAt0);

                const roots = [];
                if (Math.abs(A) < eps) {
                    if (Math.abs(B) > eps) {
                        roots.push(-C / B);
                    }
                } else {
                    const D = B * B - 4 * A * C;
                    if (D >= 0) {
                        const sqrtD = Math.sqrt(D);
                        roots.push((-B - sqrtD) / (2 * A));
                        roots.push((-B + sqrtD) / (2 * A));
                    }
                }

                roots.sort((a, b) => a - b);

                let hitT = null;
                for (const t of roots) {
                    if (t < tMin - eps || t > tMax + eps) continue;
                    const clampedT = Math.max(tMin, Math.min(tMax, t));
                    const s = signedAt(clampedT);
                    const targetSigned = startOutside ? ballRadius : -ballRadius;
                    if (Math.abs(s - targetSigned) > 0.005) continue;
                    hitT = clampedT;
                    break;
                }

                if (hitT === null) return false;

                const hitX = prevX + vxSeg * hitT;
                const hitY = prevY + segVY * hitT;
                const hitZ = prevZ + vzSeg * hitT;
                const hitRadius = this.#Side_Collision_Bottom_Radius + radiusSlope * (hitY - this.#Y);
                const hitDX = hitX - this.#X;
                const hitDZ = hitZ - this.#Z;
                const hitDist = Math.hypot(hitDX, hitDZ);
                let nx = 1;
                let nz = 0;
                if (hitDist > eps) {
                    nx = hitDX / hitDist;
                    nz = hitDZ / hitDist;
                }

                const sBefore = signedAt(Math.max(tMin, hitT - 1e-4));
                const hitFromOutside = sBefore >= 0;
                const wallNx = hitFromOutside ? nx : -nx;
                const wallNz = hitFromOutside ? nz : -nz;

                const push = 0.001;
                const centerDist = hitRadius + (hitFromOutside ? ballRadius : -ballRadius);
                ball.Set_X(this.#X + nx * centerDist + wallNx * push);
                ball.Set_Y(hitY);
                ball.Set_Z(this.#Z + nz * centerDist + wallNz * push);

                const vx = ball.Get_Velocity_X();
                const vz = ball.Get_Velocity_Z();
                const dot = vx * wallNx + vz * wallNz;
                if (dot < 0) {
                    const bounce = ball.Get_Side_Bounce();
                    ball.Set_Velocity_X(vx - (1 + bounce) * dot * wallNx);
                    ball.Set_Velocity_Z(vz - (1 + bounce) * dot * wallNz);
                }

                return true;
            }
            Update_Collision_Position() {
                if (this.#Collision_Mesh) {
                    this.#Collision_Mesh.position.set(
                        this.#X,
                        this.#Y + this.#Collision_Offset_Y,
                        this.#Z
                    );
                }
                if (this.#Side_Collision_Mesh) {
                    this.#Side_Collision_Mesh.position.set(
                        this.#X,
                        this.#Y + (this.#Side_Collision_Height * 0.5),
                        this.#Z
                    );
                }
            }
        }

        // パワーゲージ
        class Progress_1_CLASS {
            #Element;
            #MoveDirection = 1;
            #Speed = 0.5;
            constructor() {
                this.#Element = document.getElementById('Progress_1');
            }
            Update() {
                if (Base_Manager_1.Get_State() === "Playing") {
                    this.#Element.value += this.#MoveDirection * this.#Speed;
                    if (this.#Element.value >= 100) {
                        this.#Element.value = 100;
                        this.#MoveDirection = -1;
                    } else if (this.#Element.value <= 0) {
                        this.#Element.value = 0;
                        this.#MoveDirection = 1;
                    }
                }
            }
            Initialize() { this.#Element.value = 0; }
            Get_Percentage() { return this.#Element.value; }
        }

        // 床（大きな板）
        function CreateFloor() {
            const geometry = new THREE.PlaneGeometry(30, 30);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xFFFFFF,
                roughness: 0.9 
            });
            const floor = new THREE.Mesh(geometry, material);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0;
            floor.receiveShadow = true;
            Scene.add(floor);
        }

        // インスタンス生成
        const Base_Camera_1       = new Base_Camera_1_CLASS();
        const Base_InputControler_1 = new Base_InputControler_1_CLASS();
        new Base_Light_Ambient_1_CLASS();
        new Base_Light_Directional_1_CLASS();
        const Base_Manager_1      = new Base_Manager_1_CLASS();
        const Ball_1              = new Ball_1_CLASS();
        const PaperCup_1          = new PaperCup_1_CLASS();
        const Progress_1          = new Progress_1_CLASS();

        PaperCup_1.Set_Side_Collision();
        CreateFloor();           // 床追加

        Base_Manager_1.Ready();

        // アニメーションループ
        function Loop() {
            Base_InputControler_1.Update();

            Ball_1.Update();
            if (Base_Manager_1.Get_State() === "Playing") {
                Progress_1.Update();
            }

            Base_Camera_1.Update();

            Renderer.render(Scene, Base_Camera_1.Get_Object());
            requestAnimationFrame(Loop);
        }
        Loop();

        function ResizeScreen() {
            const cam = Base_Camera_1.Get_Object();
            cam.aspect = window.innerWidth / window.innerHeight;
            cam.updateProjectionMatrix();
            Renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function TouchStart(x, y) {
            if (Base_InputControler_1.Get_Time_Flag_Finishing()) {
                const state = Base_Manager_1.Get_State();
                if (state === "WaitingStart") {
                    Base_Manager_1.Start();
                } else if (state === "Playing") {
                    isDragging = true;
                    previousMousePosition = { x, y };
                } else if (state === "Goal") {
                    Base_Manager_1.Ready();
                }
            }
            Base_InputControler_1.Set_Timer(0.1);
        }

        function TouchMove(x, y) {
            if (Base_Manager_1.Get_State() === "Playing" && isDragging) {
                const dx = x - previousMousePosition.x;
                const dy = y - previousMousePosition.y;

                cameraRotation.y -= dx * 0.004;
                cameraRotation.x -= dy * 0.004;
                cameraRotation.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, cameraRotation.x));

                previousMousePosition = { x, y };
            }
        }

        function TouchEnd() {
            isDragging = false;
        }
    </script>

    <style>

        @keyframes clearPulse {

        #UI_Shoot_1:hover {
            filter: saturate(1.08) brightness(1.03);

                0 18px 36px rgba(120, 44, 20, 0.42),

            transform: translateX(-50%) scale(0.96);

        #Progress_1 {
            position: absolute;

        #Progress_1::-webkit-progress-value {

        @keyframes uiSlide {
            from { opacity: 0; transform: translateY(-10px); }
