    <title>Constellation</title>

    <style>
        body {
            width: 0;
            height: 0;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #App {
            position: relative;
            z-index: 1;
            background-color: transparent !important;
            pointer-events: none;
        }

        #App a,
        #App button,
        #App input,
        #App select,
        #App textarea,
        #App .v-btn,
        #App .v-list-item,
        #App .v-icon {
            pointer-events: auto;
        }

        #controls {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            top: auto;
            width: 100%;
            min-width: 300px;
            max-height: 17vh;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 16px;
            border-radius: 12px 12px 0 0;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: auto;
            transition: none;
        }

        #controls.collapsed {
            max-height: 3rem;
            padding: 16px;
            overflow-y: hidden;
            /* 閉じているときはスクロール不可 */
        }

        #controls-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        #controls-title {
            font-size: 1rem;
            font-weight: 600;
        }

        #controls-toggle {
            background: transparent;
            border: 1px solid #888;
            color: #fff;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #controls-body {
            overflow: hidden;
        }

        /* 閉じているときは中身を非表示にする */
        #controls.collapsed #controls-body {
            display: none;
        }

        #learn-controls {
            position: fixed;
            bottom: 200px;
            left: 0;
            right: 0;
            top: auto;
            width: 100%;
            min-width: 300px;
            max-height: 28vh;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 16px;
            border-radius: 12px 12px 0 0;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: auto;
            transition: none;
        }

        #learn-controls.collapsed {
            max-height: 3rem;
            padding: 16px;
            overflow-y: hidden;
        }

        #learn-controls-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        #learn-controls-title {
            font-size: 1rem;
            font-weight: 600;
        }

        #learn-controls-toggle {
            background: transparent;
            border: 1px solid #888;
            color: #fff;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #learn-controls-body {
            overflow: hidden;
        }

        #learn-controls.collapsed #learn-controls-body {
            display: none;
        }

        #constellation-learning-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 8px;
        }

        .constellation-item {
            border: 1px solid #355a7a;
            border-radius: 8px;
            padding: 8px 10px;
            background: rgba(22, 34, 48, 0.6);
            line-height: 1.35;
            font-size: 0.92rem;
        }

        .constellation-item strong {
            color: #cde8ff;
            font-size: 0.98rem;
        }

        /* ラベルをより読みやすく、指でタップしやすく */
        label {
            display: flex;
            flex-direction: column;
            margin: 12px 0;
            font-size: 1.05rem;
        }

        label select,
        label input[type="number"],
        label input[type="date"],
        label input[type="time"] {
            margin-top: 6px;
            padding: 10px 12px;
            font-size: 1.1rem;
            border-radius: 6px;
            border: 1px solid #555;
            background: #111;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }

        /* ボタンも大きく、タップしやすく */
        .button {
            margin-top: 16px;
            padding: 12px 24px;
            font-size: 1.1rem;
            width: 100%;
            background: #555;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* PCでは元の位置に戻したい場合（メディアクエリ） */
        @media (min-width: 768px) {
            #controls {
                position: absolute;
                top: 10px;
                left: 10px;
                bottom: auto;
                right: auto;
                width: auto;
                max-height: none;
                padding: 12px;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.65);
            }

            /* PC でも閉じているときはスクロールさせない */
            #controls.collapsed {
                max-height: 3rem;
                overflow-y: hidden;
            }

            #learn-controls {
                position: absolute;
                top: 10px;
                left: 360px;
                bottom: auto;
                right: auto;
                width: 340px;
                max-height: 78vh;
                padding: 12px;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.65);
            }

            #learn-controls.collapsed {
                max-height: 3rem;
                overflow-y: hidden;
            }

            label {
                display: block;
                margin: 6px 0;
                font-size: 1rem;
            }

            .button {
                width: auto;
                margin-top: 8px;
                padding: 6px 12px;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <canvas id="StarCanvas"></canvas>

    <v-app id="App">
        <template>
            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Service > Constellation</main-system-bar>

            <v-main>
                <div id="controls" class="collapsed">
                    <div id="controls-header" onclick="toggleControls()">
                        <span id="controls-title">観測条件</span>
                        <button id="controls-toggle" type="button">開く ▽</button>
                    </div>
                    <div id="controls-body">
                        <label>国:
                            <select id="country" onchange="updateDefaultByCountry()">
                                <option value="JP" selected>日本</option>
                                <option value="US">アメリカ (東部)</option>
                                <option value="GB">イギリス</option>
                                <option value="FR">フランス</option>
                                <option value="DE">ドイツ</option>
                                <option value="AU">オーストラリア (東部)</option>
                                <option value="custom">カスタム</option>
                            </select>
                        </label>

                        <label>緯度 (deg): <input type="number" id="lat" value="35.6895" step="0.1"></label>
                        <label>経度 (deg): <input type="number" id="lon" value="139.6917" step="0.1"></label>
                        <p id="standardMeridian" style="margin:8px 0; font-size:0.9em; color:#aaa;">
                            標準子午線: 135°E (東京)
                        </p>

                        <label>日付: <input type="date" id="date"></label>
                        <label>時間 (現地時): <input type="time" id="time" step="1"></label>
                        <label><input type="checkbox" id="showHorizon" checked onchange="updateGuideVisibility()"> 地平線を表示</label>
                        <label><input type="checkbox" id="showDirections" checked onchange="updateGuideVisibility()"> 方角 (N/E/S/W) を表示</label>
                        <button type="button" class="button" onclick="simulate()">表示更新</button>
                    </div>
                </div>

                <div id="learn-controls" class="collapsed">
                    <div id="learn-controls-header" onclick="toggleLearnControls()">
                        <span id="learn-controls-title">星座を学ぶ (88)</span>
                        <button id="learn-controls-toggle" type="button">開く ▽</button>
                    </div>
                    <div id="learn-controls-body">
                        <label>星座を選択:
                            <select id="learn-constellation-select" onchange="selectConstellationForLearning()"></select>
                        </label>
                        <div id="constellation-learning-description" class="constellation-item"></div>
                    </div>
                </div>
            </v-main>

            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
            <main-footer-simple></main-footer-simple>
        </template>
    </v-app>

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x00050a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);
            camera.position.set(0.8, 0.3, 0.8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('StarCanvas') });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // ── Post Processing ──
            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.5,    // strength
                0.5,    // radius
                1       // threshold ← 暗い星はほとんど光らない
            );
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 0.55;
            controls.enableZoom = false;
            controls.enablePan = false;
            controls.enableRotate = true;
            camera.fov = 90;
            camera.updateProjectionMatrix();
            function handleZoom(delta) {
                // delta > 0 → ズームアウト（視野角大きく）
                // delta < 0 → ズームイン（視野角小さく）
                const zoomFactor = 1 + delta * 0.0008;
                camera.fov = THREE.MathUtils.clamp(
                    camera.fov * zoomFactor,
                    10,
                    120
                );
                camera.updateProjectionMatrix();
            }
            // マウスホイール
            renderer.domElement.addEventListener('wheel', (event) => {
                event.preventDefault();
                handleZoom(event.deltaY);
            }, { passive: false });
            // ピンチ
            let lastTouchDistance = null;
            let isPinching = false;
            renderer.domElement.addEventListener(
                'touchstart',
                (event) => {
                    if (event.touches.length === 2) {
                        const dx =
                            event.touches[0].clientX -
                            event.touches[1].clientX;
                        const dy =
                            event.touches[0].clientY -
                            event.touches[1].clientY;

                        lastTouchDistance = Math.hypot(dx, dy);
                        isPinching = true;

                        controls.enableRotate = false;
                    }
                },
                { passive: false }
            );
            renderer.domElement.addEventListener(
                'touchmove',
                (event) => {
                    if (event.touches.length !== 2 || !isPinching) return;

                    event.preventDefault();

                    const dx =
                        event.touches[0].clientX -
                        event.touches[1].clientX;
                    const dy =
                        event.touches[0].clientY -
                        event.touches[1].clientY;

                    const currentDistance = Math.hypot(dx, dy);
                    const delta = lastTouchDistance - currentDistance;

                    if (Math.abs(delta) > 0.5) {
                        handleZoom(delta * 10);
                        lastTouchDistance = currentDistance;
                    }
                },
                { passive: false }
            );
            renderer.domElement.addEventListener(
                'touchend',
                (event) => {
                    if (event.touches.length < 2) {
                        lastTouchDistance = null;
                        isPinching = false;

                        controls.enableRotate = true;
                    }
                },
                { passive: false }
            );

            createGuides();
            window.updateGuideVisibility();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createLabelSprite(text, color = '#3c84c6') {
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 160;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 86px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color;
            ctx.shadowColor = '#00131f';
            ctx.shadowBlur = 12;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false,
                depthWrite: false
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(300, 150, 1);
            return sprite;
        }

        function createGuides() {
            const guideRadius = 610;

            horizonGroup = new THREE.Group();
            horizonGroup.name = 'horizonGuide';
            const horizonPoints = [];
            const segments = 128;
            for (let i = 0; i <= segments; i++) {
                const a = (i / segments) * Math.PI * 2;
                horizonPoints.push(new THREE.Vector3(
                    guideRadius * Math.cos(a),
                    0,
                    guideRadius * Math.sin(a)
                ));
            }
            const horizonGeometry = new THREE.BufferGeometry().setFromPoints(horizonPoints);
            const horizonMaterial = new THREE.LineBasicMaterial({
                color: 0x3c84c6,
                transparent: true,
                opacity: 0.8,
                depthTest: false
            });
            horizonGroup.add(new THREE.Line(horizonGeometry, horizonMaterial));
            scene.add(horizonGroup);

            directionGroup = new THREE.Group();
            directionGroup.name = 'directionGuide';
            const dirs = [
                { label: 'N', az: Math.PI },
                { label: 'E', az: 1.5 * Math.PI },
                { label: 'S', az: 0 },
                { label: 'W', az: 0.5 * Math.PI }
            ];

            dirs.forEach(dir => {
                const innerR = guideRadius - 20;
                const outerR = guideRadius + 20;
                const x1 = innerR * Math.cos(dir.az);
                const z1 = innerR * Math.sin(dir.az);
                const x2 = outerR * Math.cos(dir.az);
                const z2 = outerR * Math.sin(dir.az);
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(x1, 0, z1),
                    new THREE.Vector3(x2, 0, z2)
                ]);
                const lineMat = new THREE.LineBasicMaterial({
                    color: 0x7db9f2,
                    transparent: true,
                    opacity: 0.9,
                    depthTest: false
                });
                directionGroup.add(new THREE.Line(lineGeo, lineMat));

                const labelR = guideRadius + 38;
                const sprite = createLabelSprite(dir.label);
                sprite.position.set(labelR * Math.cos(dir.az), 4, labelR * Math.sin(dir.az));
                directionGroup.add(sprite);
            });

            scene.add(directionGroup);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // 以下は元のコードとほぼ同じ（緯度経度・時間計算部分）
        function degToRad(deg) { return deg * Math.PI / 180; }

        function JulianDateFromUnixTime(t) {
            return (t / 86400000) + 2440587.5;
        }

        function greenwichMeanSiderealTime(jd) {
            const t = (jd - 2451545.0) / 36525.0;
            let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * t * t - t * t * t / 38710000;
            gmst = (gmst % 360 + 360) % 360;
            return degToRad(gmst);
        }

        function raDecToAltAz(ra, dec, lat, lon, jd) {
            const gmst = greenwichMeanSiderealTime(jd);
            let lst = gmst + lon;
            let ha = lst - ra;

            ha = ((ha % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            if (ha > Math.PI) ha -= 2 * Math.PI;

            const sinAlt = Math.sin(lat) * Math.sin(dec) + Math.cos(lat) * Math.cos(dec) * Math.cos(ha);
            const alt = Math.asin(sinAlt);

            let az = Math.atan2(
                Math.sin(ha) * Math.cos(dec),
                Math.cos(ha) * Math.sin(lat) * Math.cos(dec) - Math.sin(dec) * Math.cos(lat)
            );
            az = (az + 2 * Math.PI) % (2 * Math.PI);

            return { az, alt };
        }

        function renderConstellationLearningList() {
            const container = document.getElementById('constellation-learning-list');
            if (!container) return;
            container.innerHTML = constellationLearningData
                .map(c => `<div class="constellation-item"><strong>${c.en}</strong><br>${c.ja}<br>IAU: ${c.abbr}</div>`)
                .join('');
        }

        window.updateGuideVisibility = function () {
            const showHorizon = document.getElementById('showHorizon')?.checked ?? true;
            const showDirections = document.getElementById('showDirections')?.checked ?? true;
            if (horizonGroup) horizonGroup.visible = showHorizon;
            if (directionGroup) directionGroup.visible = showDirections;
        };

        // 現在の日時を入力欄にセット（日本時間）
        function setCurrentDateTime() {
            const now = new Date();
            // 日本時間に強制（tzOffset=9）
            const jpTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (9 * 3600000));

            const dateStr = jpTime.toISOString().split('T')[0];
            const timeStr = jpTime.toTimeString().slice(0, 5);

            document.getElementById('date').value = dateStr;
            document.getElementById('time').value = timeStr;
        }

        // 16進数をRGBに変換するヘルパー
        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            const bigint = parseInt(hex, 16);
            return {
                r: (bigint >> 16) & 255,
                g: (bigint >> 8) & 255,
                b: bigint & 255
            };
        }

        // ── 暖色（赤・オレンジ・黄系）かどうかを判定 ──
        function isWarmColor(hex) {
            const { r, g, b } = hexToRgb(hex);

            // 基本条件：赤成分がかなり強い
            if (r < 180) return false;  // 赤が弱い → 冷色寄り

            // 暖色判定のメイン条件（以下のいずれかを満たせば暖色）
            const conditions = [
                // 強い赤～赤橙（Betelgeuse, Antares系）
                r > 210 && g < 100 && b < 100,

                // オレンジ～黄橙（Aldebaran, Pollux, Arcturus系）
                r > 210 && g > 120 && g < 200 && b < 140,

                // 淡いオレンジ・黄味がかった白（Arcturus, Menkalinan系）
                r > 230 && g > 180 && b < 160 && (r - g) < 70,

                // 赤みが強いが少し青を含む場合も救済（自然な暖色範囲）
                r > g * 1.35 && r > b * 1.4 && (g + b > 100)
            ];

            return conditions.some(cond => cond === true);
        }

        window.simulate = function () {
            const latDeg = parseFloat(document.getElementById('lat').value) || 35;
            const lonDeg = parseFloat(document.getElementById('lon').value) || 135;
            const dateStr = document.getElementById('date').value;
            const timeStr = document.getElementById('time').value;

            if (!dateStr || !timeStr) return;

            const country = document.getElementById('country').value;
            const tzOffset = countryDefaults[country]?.tzOffset ?? 9;

            const [year, month, day] = dateStr.split('-').map(Number);
            const [hour, min] = timeStr.split(':').map(Number);

            const localDate = new Date(Date.UTC(year, month - 1, day, hour, min, 0));
            const utcDate = new Date(localDate.getTime() - tzOffset * 3600000);
            const jd = JulianDateFromUnixTime(utcDate.getTime());

            const lat = degToRad(latDeg);
            const lon = degToRad(lonDeg);

            // 古い星を削除
            scene.children.forEach(child => {
                if (child.type === 'Points') {
                    scene.remove(child);
                    child.geometry?.dispose();
                    child.material?.dispose();
                }
            });

            const positions = [];
            const colors = [];
            const sizes = [];

            stars.forEach(star => {
                const raRad = degToRad(star.ra);
                const decRad = degToRad(star.dec);

                const { az, alt } = raDecToAltAz(raRad, decRad, lat, lon, jd);

                // if (alt <= 0) return; // 地平線以下は非表示

                const theta = Math.PI / 2 - alt;
                const phi = az;

                const radius = 600;
                const x = radius * Math.sin(theta) * Math.cos(phi);
                const z = radius * Math.sin(theta) * Math.sin(phi);
                const y = radius * Math.cos(theta);

                // サイズ計算 star.mag=-1.0~4.5のときsize=2.0~10.0になる補正式
                let size = (4 / 3) * (6.0 - star.mag);

                positions.push(x, y, z);

                // 明るさ（発光強度）を色に反映
                const col = new THREE.Color(star.color);

                // 色温度的な暖色系（赤・オレンジ）を少し強く光らせる補正
                const warmBoost = isWarmColor(star.color) ? 2.0 : 1.0;
                const baseBrightness = (4 / 3) * (6.0 - star.mag) * 0.5;
                const brightness = baseBrightness * warmBoost;
                col.multiplyScalar(brightness);

                colors.push(col.r, col.g, col.b);
                sizes.push(size);
            });

            if (positions.length === 0) return;

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            // カスタムシェーダーで個別サイズをサポート
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    scale: { value: window.innerHeight / 2 }
                },
                vertexShader: `
                    attribute float size;
                    varying vec3 vColor;

                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z); // 遠近法調整
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        vec2 coord = gl_PointCoord - vec2(0.5);
                        float dist = length(coord);
                        if (dist > 0.49) discard;           // より厳密な円形
                        float alpha = 1.0 - smoothstep(0.40, 0.49, dist); // 柔らかい縁
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthTest: false,
                depthWrite: false
            });

            const points = new THREE.Points(geometry, material);
            scene.add(points);
        }

        // 初期化＆初回表示
        init();
        window.addEventListener('DOMContentLoaded', () => {
            updateDefaultByCountry();
            setCurrentDateTime();
            simulate();
            window.updateGuideVisibility();
            renderConstellationLearningList();
        });

        window.vue = new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common]
        });

    </script>
