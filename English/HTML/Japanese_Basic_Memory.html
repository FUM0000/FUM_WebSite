<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="F U M">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B89KY0993B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

    <link rel="icon" type="image/x-icon" href="../../Asset/Image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Asset/Image/Icon_1_2.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="../../Asset/CSS/Common.css?v=1.0" rel="stylesheet" />

    <title>Memory Mechanism</title>
</head>

<body>

    <v-app id="App">
        <template>

            <main-system-bar :drawer="Drawer" @change-drawer="ChangeDrawer">Basic > Memory Mechanism</main-system-bar>

            <v-main id="Main" class="memory-main">
                <transition name="Fade_Page">
                    <div v-show="Ready_Page" class="memory-page">
                        <nav class="section-rail" aria-label="Page sections">
                            <button v-for="section in Sections" :key="section.id" type="button"
                                :class="['rail-stop', { active: ActiveSection === section.id }]"
                                @click="scrollToSection(section.id)">
                                <span class="rail-stop__dot"></span>
                                <span class="rail-stop__label">{{ section.short }}</span>
                            </button>
                        </nav>

                        <section id="hero" data-section class="hero-shell reveal-block visible">
                            <div class="hero-grid">
                                <div class="hero-copy">
                                    <div class="eyebrow">Intro</div>
                                    <h1>Make memory easier to keep.</h1>
                                    <p class="hero-lead">
                                        A brief guide to how memory works, how it relates to forgetting, and how the
                                        brain turns complex information into stable long-term memory.
                                    </p>
                                </div>
                            </div>
                        </section>

                        <section id="memory-parade" data-section class="content-section reveal-block">
                            <div class="section-head">
                                <div class="eyebrow">Important</div>
                                <h2>Important Items</h2>
                                <p>5 important items related to memory.</p>
                            </div>

                            <div class="memory-route">
                                <article v-for="item in StrategyCards" :key="item.id"
                                    :class="['route-stop', `tone-${item.tone}`, item.align]">
                                    <div class="route-stop__body">
                                        <div class="route-stop__topline">
                                            <div class="route-stop__icon"><v-icon>{{ item.icon }}</v-icon></div>
                                            <div class="route-stop__meta">
                                                <div class="route-stop__kicker">{{ item.effect }}</div>
                                                <h3>{{ item.title }}</h3>
                                            </div>
                                        </div>
                                        <p>{{ item.description }}</p>
                                        <div class="route-stop__notes">
                                            <div class="mini-note">
                                                <span class="mini-note__label">Why it works</span>
                                                <span>{{ item.why }}</span>
                                            </div>
                                        </div>
                                    </div>
                                </article>
                            </div>
                        </section>

                        <section id="forgetting-drop" data-section class="content-section reveal-block">
                            <div class="section-head">
                                <div class="eyebrow">Curve</div>
                                <h2>The Forgetting Curve</h2>
                                <p>Without review, memory drops quickly. Early review softens that drop.</p>
                            </div>

                            <div class="curve-layout">
                                <div class="curve-stage">
                                    <div class="curve-card">
                                        <svg class="curve-graphic" viewBox="0 0 620 300" role="img" aria-label="Illustration of the forgetting curve and spaced review">
                                            <defs>
                                                <linearGradient id="dropLine" x1="0%" y1="0%" x2="100%" y2="0%">
                                                    <stop offset="0%" stop-color="#ffdb6e"></stop>
                                                    <stop offset="100%" stop-color="#ff7e5f"></stop>
                                                </linearGradient>
                                                <linearGradient id="reviewLine" x1="0%" y1="0%" x2="100%" y2="0%">
                                                    <stop offset="0%" stop-color="#7cf5d7"></stop>
                                                    <stop offset="100%" stop-color="#49a8ff"></stop>
                                                </linearGradient>
                                            </defs>
                                            <g class="curve-grid">
                                                <line x1="70" y1="40" x2="70" y2="250"></line>
                                                <line x1="70" y1="250" x2="560" y2="250"></line>
                                                <line x1="170" y1="250" x2="170" y2="266"></line>
                                                <line x1="300" y1="250" x2="300" y2="266"></line>
                                                <line x1="430" y1="250" x2="430" y2="266"></line>
                                            </g>
                                            <path class="curve-line curve-line-drop" d="M70 70 C135 100, 180 150, 230 205 S370 240, 560 246"></path>
                                            <path class="curve-line curve-line-review" d="M70 70 C140 92, 170 110, 190 145 S250 165, 300 135 S370 160, 430 128 S505 145, 560 120"></path>
                                            <g class="review-points">
                                                <circle cx="190" cy="145" r="8"></circle>
                                                <circle cx="300" cy="135" r="8"></circle>
                                                <circle cx="430" cy="128" r="8"></circle>
                                            </g>
                                            <g class="curve-labels">
                                                <text x="30" y="48">Remembrance</text>
                                                <text x="520" y="286">Time</text>
                                                <text x="160" y="286">1 day</text>
                                                <text x="280" y="286">Review</text>
                                                <text x="412" y="286">Review</text>
                                                <text x="440" y="90">Spaced review</text>
                                                <text x="378" y="228">No review</text>
                                            </g>
                                        </svg>
                                    </div>
                                </div>

                                <div class="curve-sidebar">
                                    <div class="drop-tip"><span class="drop-tip__step">1</span><div><h3>Learn once</h3><p>Initial study creates a fragile trace, not a permanent memory.</p></div></div>
                                    <div class="drop-tip"><span class="drop-tip__step">2</span><div><h3>Review early</h3><p>Quick reinforcement keeps the path active before it weakens too much.</p></div></div>
                                    <div class="drop-tip"><span class="drop-tip__step">3</span><div><h3>Space the reviews</h3><p>Intervals help the brain rebuild the route and make recall easier.</p></div></div>
                                </div>
                            </div>
                        </section>
                        <section id="story-lab" data-section class="content-section reveal-block">
                            <div class="section-head">
                                <div class="eyebrow">Technique</div>
                                <h2>Choose the Method</h2>
                                <p>There are two main cases: remembering a theory, or remembering a name. Each one works better with a different approach.</p>
                            </div>

                            <div class="technique-grid">
                                <article v-for="method in MemoryMethods" :key="method.id" class="technique-card">
                                    <div class="technique-card__header">
                                        <div>
                                            <div class="technique-card__eyebrow">{{ method.kicker }}</div>
                                            <h3>{{ method.title }}</h3>
                                        </div>
                                        <div class="technique-card__icon"><v-icon>{{ method.icon }}</v-icon></div>
                                    </div>

                                    <p class="technique-card__summary">{{ method.summary }}</p>

                                    <div class="technique-steps">
                                        <article v-for="step in method.steps" :key="step.title" class="technique-step">
                                            <span class="technique-step__number">{{ step.number }}</span>
                                            <div>
                                                <h4>{{ step.title }}</h4>
                                                <p>{{ step.text }}</p>
                                            </div>
                                        </article>
                                    </div>
                                </article>
                            </div>
                        </section>

                        <section id="finale" data-section class="content-section reveal-block finale-section">
                            <div class="finale-grid">
                                <div class="finale-copy">
                                    <div class="eyebrow">Finale</div>
                                    <h2>Memory improves when the process has shape.</h2>
                                    <p>Keep the flow simple: review on purpose, connect ideas, and give the brain time to settle them.</p>
                                </div>
                            </div>
                        </section>
                    </div>
                </transition>
            </v-main>

            <main-navigation :drawer="Drawer" @change-drawer="ChangeDrawer"></main-navigation>
            <main-footer></main-footer>

        </template>
    </v-app>

    <style>
        :root {
            --memory-surface: rgba(255, 255, 255, 0.82);
            --memory-surface-strong: rgba(255, 255, 255, 0.92);
            --memory-border: rgba(22, 32, 51, 0.12);
            --memory-text: #162033;
            --memory-muted: rgba(22, 32, 51, 0.76);
            --memory-gold: #5b7fd6;
            --memory-orange: #7f9ae3;
            --memory-cyan: #8dc4dd;
            --memory-mint: #9fcfa7;
            --memory-pink: #e1a9be;
            --memory-shadow: 0 20px 48px rgba(0, 0, 0, 0.18);
        }

        .memory-main {
            position: relative;
            overflow: hidden;
            background: transparent !important;
            color: var(--memory-text);
        }

        .memory-page { position: relative; z-index: 1; width: min(1040px, calc(100% - 48px)); margin: 0 auto; padding: 40px 0 96px; }
        .section-rail { position: fixed; top: 50%; right: 10%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .rail-stop { display: flex; align-items: center; justify-content: flex-end; gap: 10px; border: 0; background: transparent; color: rgba(22, 32, 51, 0.52); cursor: pointer; transition: transform 0.24s ease, color 0.24s ease; }
        .rail-stop:hover, .rail-stop.active { color: var(--memory-text); transform: translateX(-3px); }
        .rail-stop__dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(22, 32, 51, 0.2); transition: transform 0.24s ease, background 0.24s ease; }
        .rail-stop.active .rail-stop__dot { background: var(--memory-gold); transform: scale(1.2); box-shadow: 0 0 0 6px rgba(91, 127, 214, 0.14); }
        .rail-stop__label { min-width: 84px; text-align: right; font-size: 0.74rem; letter-spacing: 0.12em; text-transform: uppercase; font-family: "Outfit", sans-serif; font-weight: 700; }
        .hero-shell, .content-section { position: relative; padding: 42px 0; }
        .hero-grid { display: block; }
        .hero-copy { max-width: 760px; }
        .eyebrow { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; color: var(--memory-gold); }
        .hero-copy h1, .section-head h2, .finale-copy h2 { margin: 0; line-height: 1.08; font-family: "Outfit", sans-serif; font-weight: 800; letter-spacing: -0.03em; text-transform: none; }
        .hero-copy h1 { font-size: clamp(2.7rem, 5vw, 4.6rem); max-width: 8ch; }
        .hero-lead, .section-head p, .finale-copy p { color: var(--memory-muted); font-size: clamp(1rem, 1.2vw, 1.08rem); line-height: 1.9; max-width: 58ch; }
        .curve-card { background: var(--memory-surface-strong); border: 1px solid var(--memory-border); box-shadow: var(--memory-shadow); }
        .section-head { max-width: 640px; margin-bottom: 26px; }
        .section-head h2, .finale-copy h2 { font-size: clamp(2rem, 4vw, 3.4rem); }
        .memory-route { display: grid; gap: 18px; }
        .route-stop { display: flex; }
        .route-stop.left { justify-content: flex-start; }
        .route-stop.right { justify-content: flex-end; }
        .route-stop__body { width: min(100%, 700px); padding: 24px 26px; border-radius: 22px; background: rgba(255, 255, 255, 0.78); border: 1px solid rgba(22, 32, 51, 0.08); box-shadow: var(--memory-shadow); }
        .route-stop__topline { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
        .route-stop__icon { flex: 0 0 48px; width: 48px; height: 48px; border-radius: 14px; display: grid; place-items: center; background: rgba(91, 127, 214, 0.14); font-size: 1.3rem; }
        .route-stop__meta { min-width: 0; }
        .route-stop__kicker { margin-bottom: 6px; font-size: 0.8rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--memory-gold); font-weight: 700; }
        .route-stop__body h3 { margin: 0; font-size: 1.28rem; line-height: 1.2; color: #162033; }
        .route-stop__body p { margin: 0; color: var(--memory-muted); line-height: 1.78; max-width: 42ch; }
        .route-stop__notes { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 18px; max-width: 260px; }
        .mini-note { flex: 1 1 240px; padding: 12px 14px; border-radius: 16px; background: rgba(255, 255, 255, 0.66); border: 1px solid rgba(22, 32, 51, 0.08); }
        .mini-note__label { display: block; margin-bottom: 8px; font-size: 0.76rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--memory-gold); font-weight: 700; }
        .curve-layout { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr); gap: 24px; align-items: start; }
        .curve-card { padding: 26px; border-radius: 24px; }
        .curve-graphic { display: block; width: 100%; height: auto; }
        .curve-grid line { stroke: rgba(22, 32, 51, 0.18); stroke-width: 2; }
        .curve-line { fill: none; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
        .curve-line-drop { stroke: url(#dropLine); }
        .curve-line-review { stroke: url(#reviewLine); }
        .review-points circle {
            fill: #fff4b8;
            stroke: rgba(255, 255, 255, 0.25);
            stroke-width: 2;
            transform-box: fill-box;
            transform-origin: center;
            animation: reviewHop 2.1s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
            filter: drop-shadow(0 0 0 rgba(255, 193, 86, 0.18));
        }
        .review-points circle:nth-child(1) { animation-delay: 0s; }
        .review-points circle:nth-child(2) { animation-delay: 0.24s; }
        .review-points circle:nth-child(3) { animation-delay: 0.48s; }
        .curve-labels text { fill: rgba(22, 32, 51, 0.76); font-family: "Outfit", sans-serif; font-size: 16px; font-weight: 600; }
        .curve-caption { margin-top: 14px; color: var(--memory-muted); line-height: 1.75; }
        .curve-sidebar { display: grid; gap: 14px; align-content: start; }
        .drop-tip { display: flex; gap: 16px; padding: 20px; border-radius: 20px; background: rgba(255, 255, 255, 0.78); border: 1px solid rgba(22, 32, 51, 0.08); box-shadow: var(--memory-shadow); }
        .drop-tip__step { flex: 0 0 44px; width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; background: linear-gradient(135deg, var(--memory-gold), var(--memory-orange)); color: #ffffff; font-weight: 800; }
        .drop-tip h3, .technique-step h4 { margin: 0 0 8px; font-size: 1.1rem; }
        .drop-tip p, .technique-step p { margin: 0; color: var(--memory-muted); line-height: 1.75; }
        .technique-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        .technique-card {
            padding: 24px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(22, 32, 51, 0.08);
            box-shadow: var(--memory-shadow);
        }
        .technique-card__header {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        .technique-card__eyebrow {
            margin-bottom: 8px;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--memory-gold);
            font-weight: 700;
        }
        .technique-card__header h3 { margin: 0; font-size: 1.55rem; line-height: 1.18; color: #162033; }
        .technique-card__icon {
            flex: 0 0 52px;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: rgba(91, 127, 214, 0.12);
            color: var(--memory-text);
        }
        .technique-card__summary { margin: 0 0 18px; color: var(--memory-muted); line-height: 1.8; }
        .technique-steps { display: grid; gap: 12px; }
        .technique-step {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
            padding: 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(22, 32, 51, 0.08);
        }
        .technique-step__number {
            display: inline-grid;
            place-items: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--memory-cyan), var(--memory-mint));
            color: #09111f;
            font-weight: 800;
        }
        .finale-section { padding-top: 48px; }
        .finale-grid { display: flex; justify-content: flex-end; }
        .finale-copy { width: min(100%, 760px); text-align: right; }
        .finale-copy h2 { margin-left: auto; max-width: 14ch; }
        .finale-copy p { margin: 18px 0 0 auto; }
        .tone-gold { --tone-main: #ffd55e; }
        .tone-cyan { --tone-main: #62e5ff; }
        .tone-mint { --tone-main: #91f4c8; }
        .tone-pink { --tone-main: #ff8edb; }
        .tone-orange { --tone-main: #ff9a68; }
        .reveal-block { opacity: 0; transform: translateY(18px); transition: opacity 0.42s ease-out, transform 0.42s ease-out; will-change: opacity, transform; }
        .reveal-block.visible { opacity: 1; transform: translateY(0); }
        @keyframes floatCard { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes reviewHop {
            0%, 18%, 100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 0 rgba(255, 193, 86, 0.16));
            }
            7% {
                transform: translateY(-14px) scale(1.08);
                filter: drop-shadow(0 10px 16px rgba(255, 193, 86, 0.36));
            }
            12% {
                transform: translateY(-4px) scale(0.96);
                filter: drop-shadow(0 6px 10px rgba(255, 193, 86, 0.24));
            }
        }
        @media (max-width: 1180px) {
            .section-rail { display: none; }
            .curve-layout { grid-template-columns: 1fr; }
            .hero-copy h1 { max-width: none; }
            .technique-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .memory-page { width: calc(100% - 24px); padding: 28px 0 88px; }
            .hero-shell, .content-section { padding: 32px 0; }
            .hero-grid { gap: 18px; }
            .curve-card, .technique-card, .route-stop__body { padding: 18px; }
            .memory-route, .technique-steps { gap: 14px; }
            .route-stop,
            .route-stop.left,
            .route-stop.right { display: block; }
            .route-stop__body { width: 100%; }
            .route-stop__notes { grid-template-columns: 1fr; }
            .curve-labels text { font-size: 13px; }
            .drop-tip { padding: 18px; }
            .finale-grid { justify-content: stretch; }
            .finale-copy { width: 100%; text-align: left; }
            .finale-copy h2 { margin-left: 0; }
            .finale-copy p { margin-left: 0; }
        }

        @media (max-width: 560px) {
            .hero-copy h1 { font-size: 2.4rem; }
            .section-head h2, .finale-copy h2 { font-size: 1.9rem; }
            .hero-lead, .section-head p, .finale-copy p { font-size: 0.98rem; }
            .curve-card { padding: 18px; }
            .technique-card { padding: 18px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .review-points circle { animation: none !important; }
            .reveal-block { opacity: 1; transform: none; transition: none; }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.x/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="../../Asset/Javascript/Common.js?v=1.03"></script>

    <script>
        new Vue({
            el: '#App',
            vuetify: new Vuetify(),
            mixins: [window.Mixins_Common],
            data: {
                ActiveSection: 'hero',
                Observer: null,
                Sections: [
                    { id: 'hero', short: 'Intro' },
                    { id: 'memory-parade', short: 'Important' },
                    { id: 'forgetting-drop', short: 'Curve' },
                    { id: 'story-lab', short: 'Technique' },
                    { id: 'finale', short: 'Finale' },
                ],
                StrategyCards: [
                    { id: 'repetition', title: 'Repetition', icon: 'mdi-repeat', tone: 'gold', align: 'left', effect: 'Basic principles of memory', description: 'Combining this with the following "Association" will yield tremendous results.', why: 'It strengthens neural networks.' },
                    { id: 'associate', title: 'Association', icon: 'mdi-graph-outline', tone: 'cyan', align: 'right', effect: 'Memory tricks', description: 'The stronger the memory cues, the easier it is to recall.', why: 'It expands the routes of effective neural networks.' },
                    { id: 'imagery', title: 'Imagery', icon: 'mdi-image-filter-hdr', tone: 'pink', align: 'left', effect: 'Vivid', description: 'Visual perception allows us to process a lot of information simultaneously, including shape, color, position, size, impression, and situation.', why: 'It broadens the connectivity of neural networks.' },
                    { id: 'sleep', title: 'Sleep', icon: 'mdi-sleep', tone: 'mint', align: 'right', effect: '24-hour operation', description: 'In addition to rest, the neural network is being reorganized and strengthened.', why: 'It learns automatically.' },
                    { id: 'exercise', title: 'Exercise', icon: 'mdi-run-fast', tone: 'orange', align: 'left', effect: 'Brain booster', description: 'It is activated by neurotransmitters and helps the function of neural networks.', why: 'It improves brain function.' },
                ],
                MemoryMethods: [
                    {
                        id: 'theory',
                        kicker: 'For theory',
                        title: 'Understand, Review',
                        icon: 'mdi-book-open-page-variant-outline',
                        summary: 'When the target is a concept or a system, the goal is to understand the logic first and then keep rebuilding it with review.',
                        steps: [
                            { number: '01', title: 'Understand the idea', text: 'Break the theory into a simple cause-and-effect pattern you can explain in your own words.' },
                            { number: '02', title: 'Recall without looking', text: 'Try to rebuild the idea from memory instead of only rereading it.' },
                            { number: '03', title: 'Review at intervals', text: 'Come back later and repeat the recall so the theory becomes stable long-term memory.' },
                        ]
                    },
                    {
                        id: 'name',
                        kicker: 'For names',
                        title: 'Sound to Scene',
                        icon: 'mdi-account-voice',
                        summary: 'When the target is a name, start from the sound. Attach that sound to familiar knowledge and turn the link into a clear imagined scene.',
                        steps: [
                            { number: '01', title: 'Catch the sound', text: 'Listen to the name and find a similar sound you already know well.' },
                            { number: '02', title: 'Connect it to existing knowledge', text: 'Pick a word, image, or fact that naturally matches that sound.' },
                            { number: '03', title: 'Create one clear scene', text: 'Imagine a quick scene that ties the sound and the known image together so the name becomes easier to recall.' },
                        ]
                    }
                ]
            },
            methods: {
                scrollToSection(id) {
                    const target = document.getElementById(id);
                    if (!target) return;
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                },
                updateActiveSection() {
                    const sections = Array.from(this.$el.querySelectorAll('[data-section]'));
                    if (!sections.length) return;

                    const activationLine = window.innerHeight * 0.35;
                    let currentSection = sections[0].id;

                    sections.forEach((section) => {
                        const rect = section.getBoundingClientRect();
                        if (rect.top <= activationLine) {
                            currentSection = section.id;
                        }
                    });

                    this.ActiveSection = currentSection;
                },
                setupRevealObserver() {
                    const blocks = this.$el.querySelectorAll('.reveal-block');

                    this.Observer = new IntersectionObserver((entries) => {
                        entries.forEach((entry) => {
                            if (entry.target.classList.contains('reveal-block') && entry.isIntersecting) {
                                entry.target.classList.add('visible');
                            }
                        });
                    }, {
                        threshold: 0.08,
                        rootMargin: '0px 0px -8% 0px'
                    });

                    blocks.forEach(block => this.Observer.observe(block));
                }
            },
            mounted() {
                this.$nextTick(() => {
                    this.setupRevealObserver();
                    this.updateActiveSection();
                    window.addEventListener('scroll', this.updateActiveSection, { passive: true });
                    window.addEventListener('resize', this.updateActiveSection);
                });
            },
            beforeDestroy() {
                if (this.Observer) {
                    this.Observer.disconnect();
                }
                window.removeEventListener('scroll', this.updateActiveSection);
                window.removeEventListener('resize', this.updateActiveSection);
            }
        });
    </script>

</body>

</html>
